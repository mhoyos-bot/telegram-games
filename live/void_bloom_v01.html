<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VOID BLOOM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050108; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 18px; pointer-events: none;
    }
    #score { color: #fff; font: bold 26px/1 monospace; text-shadow: 0 0 18px rgba(160,80,255,0.9); }
    #combo { color: rgba(80,255,200,0.95); font: bold 17px/1 monospace;
             text-shadow: 0 0 12px rgba(80,255,200,0.6); min-width: 80px; text-align: center; }
    #lives { color: rgba(255,100,160,0.9); font: 22px/1 monospace; letter-spacing: 4px; }
    #feedback {
      position: fixed; top: 42%; left: 50%; transform: translate(-50%,-50%);
      font: bold 34px/1 monospace; pointer-events: none; opacity: 0;
      transition: opacity 0.12s; white-space: nowrap;
      text-shadow: 0 0 20px currentColor;
    }
    #hint {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.22); font: 11px/1 monospace; letter-spacing: 0.12em;
      pointer-events: none; transition: opacity 1.5s;
    }
    #hint.faded { opacity: 0; }
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: rgba(5,1,8,0.85);
    }
    #overlay h1 { color: #fff; font: bold 42px/1.3 monospace; margin-bottom: 8px;
                  text-shadow: 0 0 24px rgba(160,80,255,0.9); }
    #overlay .sub { color: rgba(255,255,255,0.45); font: 14px/1 monospace; margin-bottom: 6px; }
    #overlay .final { color: rgba(80,255,200,0.9); font: bold 22px/1 monospace; margin: 16px 0 24px; }
    #restart {
      background: rgba(160,80,255,0.12); border: 1px solid rgba(160,80,255,0.4);
      color: rgba(160,80,255,0.9); font: bold 18px/1 monospace; padding: 13px 36px;
      cursor: pointer; letter-spacing: 0.1em;
    }
    #restart:active { background: rgba(160,80,255,0.25); }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">00000</div>
    <div id="combo"></div>
    <div id="lives">♥♥♥</div>
  </div>
  <div id="feedback"></div>
  <div id="hint">TAP AT FULL BLOOM FOR PERFECT</div>
  <div id="overlay" style="display:none">
    <h1 id="ov-title">BLOOM FADED</h1>
    <div class="sub" id="ov-sub">THE VOID RECLAIMS</div>
    <div class="final" id="ov-score">SCORE: 00000</div>
    <button id="restart">BLOOM AGAIN</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ── STATE ──────────────────────────────────────────────────────────
  let score = 0, combo = 0, lives = 3, gameActive = false;
  let blooms = [], particles = [];
  let spawnTimer = 0, diffTimer = 0;
  let spawnInterval = 1900, bloomLifetime = 3000;
  let camShake = 0, feedbackTimer = 0;
  const usedSlots = new Set();
  const camBase = new THREE.Vector3(0, 13, 16);

  // ── RENDERER ────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.insertBefore(renderer.domElement, document.getElementById('hud'));

  // ── SCENE ───────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050108);
  scene.fog = new THREE.Fog(0x050108, 16, 36);

  const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 80);
  camera.position.copy(camBase);
  camera.lookAt(0, 0, 0);

  // ── LIGHTS ──────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x180828, 3.0));
  const sun = new THREE.DirectionalLight(0xa050ff, 0.9);
  sun.position.set(8, 14, 6);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x50ffc0, 0.35);
  fill.position.set(-8, 6, -8);
  scene.add(fill);

  // ── GROUND ──────────────────────────────────────────────────────────
  const gGeo = new THREE.PlaneGeometry(30, 30, 26, 26);
  const gPos = gGeo.attributes.position;
  for (let i = 0; i < gPos.count; i++) {
    const x = gPos.getX(i), z = gPos.getZ(i);
    if (Math.sqrt(x * x + z * z) > 5) {
      gPos.setY(i, (Math.random() - 0.5) * 0.9);
    }
  }
  gGeo.computeVertexNormals();
  const gMat = new THREE.MeshLambertMaterial({ color: 0x0d0818, flatShading: true });
  const ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // Ground cracks (dark lines via thin boxes)
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 1 + Math.random() * 10;
    const len = 0.5 + Math.random() * 2;
    const cGeo = new THREE.BoxGeometry(0.05, 0.02, len);
    const cMat = new THREE.MeshBasicMaterial({ color: 0x300060 });
    const crack = new THREE.Mesh(cGeo, cMat);
    crack.position.set(Math.cos(a) * r, 0.01, Math.sin(a) * r);
    crack.rotation.y = a + Math.random() * 0.8;
    scene.add(crack);
  }

  // Rocks
  for (let i = 0; i < 18; i++) {
    const r = 5 + Math.random() * 9;
    const a = Math.random() * Math.PI * 2;
    const s = 0.25 + Math.random() * 0.55;
    const rGeo = new THREE.DodecahedronGeometry(s, 0);
    const rMat = new THREE.MeshLambertMaterial({ color: 0x1a0a28, flatShading: true });
    const rock = new THREE.Mesh(rGeo, rMat);
    rock.position.set(Math.cos(a) * r, s * 0.4, Math.sin(a) * r);
    rock.rotation.set(Math.random(), Math.random() * 2, Math.random());
    scene.add(rock);
  }

  // Dead trees (spiky silhouettes)
  function deadTree(x, z) {
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1, 0.18, 1.8, 5),
      new THREE.MeshLambertMaterial({ color: 0x100820, flatShading: true })
    );
    trunk.position.y = 0.9;
    g.add(trunk);
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2 + Math.random() * 0.5;
      const len = 0.5 + Math.random() * 0.8;
      const br = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.08, len, 4),
        new THREE.MeshLambertMaterial({ color: 0x100820, flatShading: true })
      );
      br.position.set(Math.cos(a) * 0.35, 1.5 + Math.random() * 0.3, Math.sin(a) * 0.35);
      br.rotation.z = (Math.random() - 0.5) * 0.8;
      g.add(br);
    }
    g.position.set(x, 0, z);
    scene.add(g);
  }
  [[-7,-6],[7,-7],[-8,4],[9,5],[-5,8],[6,9],[-9,-1],[10,-4],[0,-9],[3,-7]].forEach(([x,z]) => deadTree(x,z));

  // ── SPAWN SLOTS (stone rings) ────────────────────────────────────────
  const SLOTS = [
    [-2.8, 0, -2.6], [2.8, 0, -2.6],
    [-3.6, 0, 0.4],  [3.6, 0, 0.4],
    [-2.0, 0, 3.2],  [2.0, 0, 3.2],
    [0,    0, -4.0]
  ];

  SLOTS.forEach(([x, y, z]) => {
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const st = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07, 0.11, 0.28, 5),
        new THREE.MeshLambertMaterial({ color: 0x2a1040, flatShading: true })
      );
      st.position.set(x + Math.cos(a) * 0.75, 0.14, z + Math.sin(a) * 0.75);
      st.rotation.set(Math.random() * 0.25, Math.random() * Math.PI, 0);
      scene.add(st);
    }
  });

  // ── BLOOM COLORS ────────────────────────────────────────────────────
  const PALETTES = [
    { core: 0xa040ff, glow: new THREE.Color(0xa040ff), petals: 0xcc80ff },
    { core: 0x40ffcc, glow: new THREE.Color(0x40ffcc), petals: 0x80ffee },
    { core: 0xff4090, glow: new THREE.Color(0xff4090), petals: 0xff90c0 },
    { core: 0x40a0ff, glow: new THREE.Color(0x40a0ff), petals: 0x90c8ff },
    { core: 0xffcc20, glow: new THREE.Color(0xffcc20), petals: 0xffe880 },
  ];

  // ── SPAWN BLOOM ─────────────────────────────────────────────────────
  function spawnBloom() {
    if (!gameActive) return;
    const avail = SLOTS.map((_, i) => i).filter(i => !usedSlots.has(i));
    if (avail.length === 0) return;
    const slotIdx = avail[Math.floor(Math.random() * avail.length)];
    const [sx, sy, sz] = SLOTS[slotIdx];
    usedSlots.add(slotIdx);

    const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    const group = new THREE.Group();

    // Stem
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.1, 1.2, 5),
      new THREE.MeshLambertMaterial({ color: pal.core, flatShading: true, emissive: pal.glow, emissiveIntensity: 0.2 })
    );
    stem.position.y = 0.6;
    group.add(stem);

    // Petals (6 cones around centre)
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const petal = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.55, 4),
        new THREE.MeshLambertMaterial({ color: pal.petals, flatShading: true, emissive: pal.glow, emissiveIntensity: 0.35 })
      );
      petal.position.set(Math.cos(a) * 0.38, 1.3, Math.sin(a) * 0.38);
      petal.rotation.z = Math.PI * 0.55;
      petal.rotation.y = a;
      group.add(petal);
    }

    // Core bulb
    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 5, 4),
      new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: pal.glow, emissiveIntensity: 1.0, flatShading: true })
    );
    bulb.position.y = 1.3;
    group.add(bulb);

    // Glow point light
    const pLight = new THREE.PointLight(pal.glow, 0, 4.5);
    pLight.position.y = 1.3;
    group.add(pLight);

    group.position.set(sx, -0.4, sz);
    group.scale.setScalar(0.01);
    scene.add(group);

    // Lifetime fractions: rise 25%, peak 50%, fade 25%
    const life = bloomLifetime;
    const riseEnd  = life * 0.25;
    const peakEnd  = life * 0.75;
    // perfect window: middle 30% of peak
    const perfStart = life * 0.38;
    const perfEnd   = life * 0.62;

    blooms.push({
      group, pLight, slotIdx, pal,
      age: 0, life, riseEnd, peakEnd, perfStart, perfEnd,
      baseY: sy, hit: false, state: 'rising'
    });
  }

  // ── PARTICLES ───────────────────────────────────────────────────────
  function burst(pos, color, n) {
    for (let i = 0; i < n; i++) {
      const m = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.06 + Math.random() * 0.06, 0),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
      );
      m.position.copy(pos);
      scene.add(m);
      const vel = new THREE.Vector3(
        (Math.random() - 0.5) * 6,
        Math.random() * 7 + 2,
        (Math.random() - 0.5) * 6
      );
      particles.push({ m, vel, life: 0, max: 500 + Math.random() * 400 });
    }
  }

  // ── HIT DETECTION ───────────────────────────────────────────────────
  const ray = new THREE.Raycaster();
  const mUV = new THREE.Vector2();

  function onPointer(e) {
    if (!gameActive) return;
    const cx = e.clientX ?? e.touches?.[0]?.clientX;
    const cy = e.clientY ?? e.touches?.[0]?.clientY;
    if (cx == null) return;
    mUV.x =  (cx / innerWidth)  * 2 - 1;
    mUV.y = -(cy / innerHeight) * 2 + 1;
    ray.setFromCamera(mUV, camera);

    const targets = [];
    for (const b of blooms) {
      if (!b.hit && b.state !== 'fading') {
        for (const ch of b.group.children) targets.push(ch);
      }
    }
    const hits = ray.intersectObjects(targets);
    if (!hits.length) return;
    const hitChild = hits[0].object;
    const bloom = blooms.find(b => b.group.children.includes(hitChild));
    if (bloom && !bloom.hit) tapBloom(bloom, cx, cy);
  }

  // ── TAP BLOOM ───────────────────────────────────────────────────────
  const feedbackEl = document.getElementById('feedback');
  function showFeedback(txt, col) {
    feedbackEl.textContent = txt;
    feedbackEl.style.color = col;
    feedbackEl.style.opacity = '1';
    feedbackTimer = 600;
  }

  function tapBloom(bloom, cx, cy) {
    bloom.hit = true;
    const perfect = bloom.age >= bloom.perfStart && bloom.age <= bloom.perfEnd;
    combo++;
    const base = perfect ? 25 : 10;
    const pts = base * combo;
    score += pts;

    if (perfect) {
      showFeedback('PERFECT!', 'rgba(80,255,200,0.95)');
      camShake = 0.28;
      burst(new THREE.Vector3().copy(bloom.group.position).add(new THREE.Vector3(0,1.3,0)), bloom.pal.glow, 30);
    } else {
      showFeedback(combo > 1 ? `GOOD ×${combo}` : 'GOOD', 'rgba(200,150,255,0.95)');
      camShake = 0.12;
      burst(new THREE.Vector3().copy(bloom.group.position).add(new THREE.Vector3(0,1.3,0)), bloom.pal.glow, 15);
    }

    updateHUD();
    removeBloom(bloom);
  }

  function missBloom(bloom) {
    if (!gameActive) return;
    lives--;
    combo = 0;
    camShake = 0.35;
    showFeedback('MISS', 'rgba(255,80,120,0.95)');
    updateHUD();
    removeBloom(bloom);
    if (lives <= 0) endGame();
  }

  function removeBloom(bloom) {
    usedSlots.delete(bloom.slotIdx);
    scene.remove(bloom.group);
    blooms = blooms.filter(b => b !== bloom);
  }

  // ── HUD ─────────────────────────────────────────────────────────────
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const livesEl = document.getElementById('lives');
  function updateHUD() {
    scoreEl.textContent = String(score).padStart(5, '0');
    comboEl.textContent = combo > 1 ? `×${combo}` : '';
    livesEl.textContent = '♥'.repeat(Math.max(0, lives)) + '♡'.repeat(Math.max(0, 3 - lives));
  }

  // ── GAME FLOW ────────────────────────────────────────────────────────
  let spawnTick = 0, diffTick = 0;

  function startGame() {
    score = 0; combo = 0; lives = 3;
    spawnInterval = 1900; bloomLifetime = 3000;
    gameActive = true;
    blooms.forEach(b => scene.remove(b.group));
    blooms = []; usedSlots.clear(); particles.forEach(p => scene.remove(p.m)); particles = [];
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('hint').classList.remove('faded');
    setTimeout(() => document.getElementById('hint').classList.add('faded'), 3500);
    updateHUD();
    spawnTick = 0; diffTick = 0;
    // Immediate first bloom
    spawnBloom();
  }

  function endGame() {
    gameActive = false;
    const ov = document.getElementById('overlay');
    document.getElementById('ov-title').textContent = 'BLOOM FADED';
    document.getElementById('ov-sub').textContent = score >= 500 ? 'THE VOID IS IMPRESSED' : 'THE VOID RECLAIMS';
    document.getElementById('ov-score').textContent = `SCORE: ${String(score).padStart(5,'0')}`;
    document.getElementById('restart').textContent = 'BLOOM AGAIN';
    ov.style.display = 'flex';
  }

  // ── ANIMATE ─────────────────────────────────────────────────────────
  let last = 0;
  function animate(ts) {
    requestAnimationFrame(animate);
    const dt = Math.min(ts - last, 50);
    last = ts;
    if (dt <= 0) return;

    // Camera shake
    if (camShake > 0.001) {
      camera.position.x = camBase.x + (Math.random() - 0.5) * camShake * 1.2;
      camera.position.y = camBase.y + (Math.random() - 0.5) * camShake * 0.6;
      camShake *= 0.82;
    } else {
      camera.position.lerp(camBase, 0.15);
    }

    // Feedback fade
    if (feedbackTimer > 0) {
      feedbackTimer -= dt;
      if (feedbackTimer <= 0) feedbackEl.style.opacity = '0';
    }

    // Spawn ticker
    if (gameActive) {
      spawnTick += dt;
      if (spawnTick >= spawnInterval) {
        spawnTick = 0;
        spawnBloom();
        // Double spawn chance increases with difficulty
        if (Math.random() < 0.22 + (3000 - bloomLifetime) / 10000) {
          setTimeout(spawnBloom, spawnInterval * 0.45);
        }
      }
      // Difficulty ramp
      diffTick += dt;
      if (diffTick >= 8000) {
        diffTick = 0;
        spawnInterval  = Math.max(700, spawnInterval - 160);
        bloomLifetime  = Math.max(1700, bloomLifetime - 220);
      }
    }

    // Update blooms
    const expired = [];
    for (const b of blooms) {
      if (b.hit) continue;
      b.age += dt;
      const t = b.age / b.life;

      if (b.age < b.riseEnd) {
        // Rising
        b.state = 'rising';
        const p = b.age / b.riseEnd;
        const eased = 1 - Math.pow(1 - p, 3);
        b.group.scale.setScalar(eased);
        b.group.position.y = b.baseY + eased * 0.6;
        b.pLight.intensity = eased * 1.2;
      } else if (b.age < b.peakEnd) {
        // Peak
        b.state = 'peak';
        const pulse = 1 + Math.sin(b.age * 0.007) * 0.07;
        b.group.scale.setScalar(pulse);
        b.group.position.y = b.baseY + 0.6;
        b.group.rotation.y += 0.012;
        b.pLight.intensity = 1.8 + Math.sin(b.age * 0.009) * 0.5;
      } else if (b.age < b.life) {
        // Fading
        b.state = 'fading';
        const fadeT = (b.age - b.peakEnd) / (b.life - b.peakEnd);
        const p = 1 - fadeT;
        b.group.scale.setScalar(p);
        b.group.position.y = b.baseY + p * 0.6;
        b.pLight.intensity = p * 1.5;
      } else {
        expired.push(b);
      }
    }
    expired.forEach(b => missBloom(b));

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += dt;
      const t = p.life / p.max;
      p.vel.y -= 0.018 * dt;
      p.m.position.addScaledVector(p.vel, dt * 0.001);
      p.m.scale.setScalar(1 - t);
      p.m.material.opacity = 1 - t;
      if (t >= 1) { scene.remove(p.m); particles.splice(i, 1); }
    }

    renderer.render(scene, camera);
  }

  // ── EVENTS ──────────────────────────────────────────────────────────
  window.addEventListener('pointerdown', onPointer);
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  document.getElementById('restart').addEventListener('click', startGame);

  // Telegram WebApp
  if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }

  // Auto-start (instant_start hook)
  startGame();
  animate(0);
  </script>
</body>
</html>
