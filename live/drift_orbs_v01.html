<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DRIFT ORBS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;touch-action:none;background:#050814;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;z-index:10}
#score{color:#14f195;font-size:32px;font-weight:bold;text-shadow:0 0 18px #14f195;letter-spacing:2px}
#combo{color:#ffdd44;font-size:15px;font-weight:bold;text-shadow:0 0 10px #ffaa00;
  opacity:0;transition:opacity 0.15s;letter-spacing:3px;margin-top:5px}
#timer{color:#88aaff;font-size:22px;font-weight:bold;text-shadow:0 0 12px #4466ff;
  text-align:right}
#timelabel{color:#445577;font-size:11px;letter-spacing:3px;text-align:right;margin-top:3px}
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity 0.08s;z-index:20}
#chainpop{position:fixed;top:36%;left:50%;transform:translate(-50%,-50%);
  font-size:38px;font-weight:bold;pointer-events:none;opacity:0;white-space:nowrap;
  text-shadow:0 0 24px currentColor;letter-spacing:4px;z-index:15}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(5,8,20,0.93);z-index:30}
#overlay h1{color:#14f195;font-size:42px;text-shadow:0 0 32px #14f195;
  letter-spacing:8px;margin-bottom:8px}
#overlay .sub{color:#5577aa;font-size:13px;margin-bottom:30px;text-align:center;
  line-height:2;max-width:270px}
#overlay .fscore{color:#ffdd44;font-size:30px;text-shadow:0 0 16px #ffaa00;
  display:none;margin-bottom:22px;letter-spacing:2px}
#overlay .fchain{color:#ff6688;font-size:14px;display:none;
  margin-bottom:22px;letter-spacing:2px;text-shadow:0 0 10px #ff3366}
#overlay button{background:#050814;border:2px solid #14f195;color:#14f195;font-size:17px;
  padding:13px 44px;cursor:pointer;letter-spacing:4px;font-family:'Courier New',monospace;
  box-shadow:0 0 24px #14f19544;transition:all 0.15s}
#overlay button:hover{background:#0a1a14;box-shadow:0 0 36px #14f19566}
#overlay button:active{transform:scale(0.96)}
#overlay.gone{display:none}
#hint{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  color:#223344;font-size:11px;letter-spacing:3px;pointer-events:none;z-index:10}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="hud">
  <div>
    <div id="score">0</div>
    <div id="combo"></div>
  </div>
  <div>
    <div id="timer">60</div>
    <div id="timelabel">SECONDS</div>
  </div>
</div>
<div id="chainpop"></div>
<div id="overlay" id="overlay">
  <h1>DRIFT ORBS</h1>
  <div class="sub">TAP an orb to pop it<br>chain reactions multiply your score<br>bigger chains = bigger rewards</div>
  <div class="fscore" id="fscore"></div>
  <div class="fchain" id="fchain"></div>
  <button id="startbtn">PLAY</button>
</div>
<div id="hint">TAP ORBS TO POP</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.min.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// --- Telegram ---
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
function haptic(t) { try { tg?.HapticFeedback?.impactOccurred(t||'medium'); } catch(_e){} }

// --- Renderer ---
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050814);
renderer.shadowMap.enabled = false;

// --- Scene ---
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050814, 0.055);

// --- Camera ---
const cam = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
cam.position.set(0, 0, 14);
let camShake = {x:0, y:0, decay:0};

// --- Lights ---
const ambLight = new THREE.AmbientLight(0x223355, 0.8);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0x88ccff, 0.6);
dirLight.position.set(5, 8, 5);
scene.add(dirLight);

// --- Resize ---
window.addEventListener('resize', () => {
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Colors ---
const COLORS = [0x14f195, 0xff4488, 0xffcc22, 0x44aaff, 0xff8822, 0xcc44ff, 0x22ffdd, 0xff3355];
const DARK_COLORS = [0x0a8850, 0x991a44, 0x997700, 0x1a5588, 0x993311, 0x661188, 0x119966, 0x991122];

// --- Geometries ---
const orbGeo = new THREE.IcosahedronGeometry(0.55, 1);
const coreGeo = new THREE.IcosahedronGeometry(0.28, 0);
const sparkGeo = new THREE.IcosahedronGeometry(0.1, 0);

// --- Orb Pool ---
const MAX_ORBS = 20;
const orbs = [];

function makeOrb() {
  const ci = Math.floor(Math.random() * COLORS.length);
  const mat = new THREE.MeshLambertMaterial({color: COLORS[ci], emissive: DARK_COLORS[ci]});
  const mesh = new THREE.Mesh(orbGeo, mat);

  // inner core glow
  const coreMat = new THREE.MeshBasicMaterial({color: COLORS[ci]});
  const core = new THREE.Mesh(coreGeo, coreMat);
  mesh.add(core);

  mesh.userData = {
    active: false, colorIdx: ci,
    vx:0, vy:0, vz:0,
    rotSpeed: new THREE.Vector3(
      (Math.random()-0.5)*0.03,
      (Math.random()-0.5)*0.03,
      (Math.random()-0.5)*0.03
    ),
    scale: 1, targetScale: 1,
    popping: false, popTimer: 0,
    wave: false, waveR: 0, waveMax: 4.5,
    chainHit: false
  };
  scene.add(mesh);
  return mesh;
}

for (let i = 0; i < MAX_ORBS; i++) orbs.push(makeOrb());

function spawnOrb() {
  const orb = orbs.find(o => !o.userData.active);
  if (!orb) return null;
  const ud = orb.userData;
  const range = 7;
  orb.position.set(
    (Math.random()-0.5)*range*2,
    (Math.random()-0.5)*range,
    (Math.random()-0.5)*4 - 2
  );
  const speed = 0.015 + Math.random()*0.025;
  const angle = Math.random()*Math.PI*2;
  ud.vx = Math.cos(angle)*speed;
  ud.vy = Math.sin(angle)*speed*(0.5+Math.random()*0.5);
  ud.vz = (Math.random()-0.5)*0.01;
  ud.active = true;
  ud.popping = false;
  ud.popTimer = 0;
  ud.wave = false;
  ud.waveR = 0;
  ud.chainHit = false;
  ud.scale = 1;
  ud.targetScale = 1;
  orb.scale.setScalar(0.01);
  orb.visible = true;
  return orb;
}

function resetOrb(orb) {
  orb.userData.active = false;
  orb.visible = false;
}

// --- Particles Pool ---
const MAX_PARTICLES = 120;
const particles = [];

function makeSpark() {
  const mat = new THREE.MeshBasicMaterial({color: 0xffffff});
  const mesh = new THREE.Mesh(sparkGeo, mat);
  mesh.userData = {active:false, vx:0, vy:0, vz:0, life:0, maxLife:0, color:0xffffff};
  mesh.visible = false;
  scene.add(mesh);
  return mesh;
}

for (let i = 0; i < MAX_PARTICLES; i++) particles.push(makeSpark());

function spawnBurst(pos, color, count) {
  count = count || 10;
  for (let i = 0; i < count; i++) {
    const p = particles.find(p => !p.userData.active);
    if (!p) break;
    const ud = p.userData;
    ud.active = true;
    p.position.copy(pos);
    const speed = 0.04 + Math.random()*0.08;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI;
    ud.vx = Math.sin(phi)*Math.cos(theta)*speed;
    ud.vy = Math.sin(phi)*Math.sin(theta)*speed;
    ud.vz = Math.cos(phi)*speed;
    ud.life = 0;
    ud.maxLife = 25 + Math.random()*20;
    ud.color = color;
    p.material.color.setHex(color);
    p.scale.setScalar(0.8 + Math.random()*0.6);
    p.visible = true;
  }
}

// --- Wave Ring Pool ---
const MAX_RINGS = 8;
const rings = [];

function makeRing() {
  const geo = new THREE.RingGeometry(0.8, 0.92, 24);
  const mat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.8, side:THREE.DoubleSide});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = {active:false, r:0, maxR:5, color:0xffffff};
  mesh.visible = false;
  scene.add(mesh);
  return mesh;
}

for (let i = 0; i < MAX_RINGS; i++) rings.push(makeRing());

function spawnRing(pos, color) {
  const ring = rings.find(r => !r.userData.active);
  if (!ring) return;
  ring.userData.active = true;
  ring.userData.r = 0.1;
  ring.userData.maxR = 5;
  ring.userData.color = color;
  ring.material.color.setHex(color);
  ring.material.opacity = 0.9;
  ring.position.copy(pos);
  ring.lookAt(cam.position);
  ring.visible = true;
}

// --- Score floaters ---
const MAX_FLOATERS = 12;
const floaters = [];

function makeFloater() {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;pointer-events:none;font-family:Courier New,monospace;font-weight:bold;z-index:12;opacity:0;transition:none';
  document.body.appendChild(div);
  return {el:div, active:false, x:0, y:0, vy:-1.5, life:0, maxLife:45};
}

for (let i = 0; i < MAX_FLOATERS; i++) floaters.push(makeFloater());

function spawnFloater(worldPos, text, color) {
  const f = floaters.find(f => !f.active);
  if (!f) return;
  // project to screen
  const v = worldPos.clone().project(cam);
  const sx = (v.x*0.5+0.5)*window.innerWidth;
  const sy = (-v.y*0.5+0.5)*window.innerHeight;
  f.active = true;
  f.x = sx;
  f.y = sy;
  f.vy = -1.8;
  f.life = 0;
  f.el.textContent = text;
  f.el.style.color = color || '#14f195';
  f.el.style.textShadow = `0 0 12px ${color||'#14f195'}`;
  f.el.style.fontSize = '22px';
  f.el.style.left = sx + 'px';
  f.el.style.top = sy + 'px';
  f.el.style.opacity = '1';
}

// --- Flash ---
const flashEl = document.getElementById('flash');
function doFlash(color, strength) {
  flashEl.style.background = color || '#14f195';
  flashEl.style.opacity = strength || 0.18;
  setTimeout(() => { flashEl.style.opacity = 0; }, 80);
}

// --- Shake ---
function doShake(amount) {
  camShake.x = (Math.random()-0.5)*amount;
  camShake.y = (Math.random()-0.5)*amount;
  camShake.decay = 0.85;
}

// --- Chain Pop UI ---
const chainPopEl = document.getElementById('chainpop');
let chainPopTimer = 0;
const CHAIN_LABELS = ['','','DOUBLE!','TRIPLE!','QUAD!','PENTA!','ULTRA!','MEGA!','MAX CHAIN!'];
const CHAIN_COLORS = ['','','#ffdd44','#ff8822','#ff4488','#cc44ff','#14f195','#44aaff','#ffffff'];

function showChainPop(n) {
  if (n < 2) return;
  const label = CHAIN_LABELS[Math.min(n, CHAIN_LABELS.length-1)];
  const color = CHAIN_COLORS[Math.min(n, CHAIN_COLORS.length-1)];
  chainPopEl.textContent = label;
  chainPopEl.style.color = color;
  chainPopEl.style.opacity = '1';
  chainPopTimer = 60;
}

// --- Game State ---
let score = 0;
let timeLeft = 60;
let gameRunning = false;
let gameOver = false;
let comboCount = 0;
let comboTimer = 0;
let lastChain = 0;
let tickCount = 0;
let bestChain = 0;

const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const timerEl = document.getElementById('timer');
const overlay = document.getElementById('overlay');
const fscoreEl = document.getElementById('fscore');
const fchainEl = document.getElementById('fchain');
const startBtn = document.getElementById('startbtn');

function startGame() {
  score = 0; timeLeft = 60; comboCount = 0; comboTimer = 0;
  lastChain = 0; tickCount = 0; bestChain = 0;
  gameOver = false; gameRunning = true;
  scoreEl.textContent = '0';
  timerEl.textContent = '60';
  timerEl.style.color = '#88aaff';
  comboEl.style.opacity = '0';
  chainPopEl.style.opacity = '0';
  fscoreEl.style.display = 'none';
  fchainEl.style.display = 'none';
  overlay.classList.add('gone');
  // reset all orbs
  orbs.forEach(o => resetOrb(o));
  particles.forEach(p => { p.userData.active = false; p.visible = false; });
  rings.forEach(r => { r.userData.active = false; r.visible = false; });
  floaters.forEach(f => { f.active = false; f.el.style.opacity = '0'; });
  // spawn initial orbs
  const initialCount = 12;
  for (let i = 0; i < initialCount; i++) spawnOrb();
}

function endGame() {
  gameRunning = false;
  gameOver = true;
  haptic('heavy');
  doFlash('#ff4488', 0.35);
  fscoreEl.style.display = 'block';
  fscoreEl.textContent = 'SCORE: ' + score;
  if (bestChain >= 3) {
    fchainEl.style.display = 'block';
    fchainEl.textContent = 'BEST CHAIN: ' + bestChain + 'x';
  }
  startBtn.textContent = 'PLAY AGAIN';
  overlay.classList.remove('gone');
}

startBtn.addEventListener('click', startGame);

// --- Pop an orb ---
function popOrb(orb, chain) {
  if (!orb.userData.active || orb.userData.popping) return;
  const ud = orb.userData;
  ud.popping = true;
  ud.popTimer = 0;
  ud.targetScale = 1.8;

  const color = COLORS[ud.colorIdx];
  const chainMult = Math.max(1, chain);
  const pts = 10 * chainMult;
  score += pts;
  scoreEl.textContent = score;

  spawnBurst(orb.position, color, 12 + chain*3);
  spawnRing(orb.position, color);

  // chain wave: affects nearby orbs after delay
  ud.wave = true;
  ud.waveR = 0;

  // floater
  spawnFloater(orb.position, chain > 1 ? '+'+pts+'×'+chain : '+'+pts, '#' + color.toString(16).padStart(6,'0'));

  haptic(chain > 2 ? 'heavy' : 'medium');
  doFlash('#' + color.toString(16).padStart(6,'0'), 0.1 + chain*0.04);
  if (chain >= 2) doShake(0.12 + chain*0.06);
}

// --- Chain explosion detection ---
const CHAIN_RADIUS = 2.2;
const CHAIN_DELAY_PER_WAVE = 0.35; // seconds

function processChainWaves(dt) {
  orbs.forEach(orb => {
    const ud = orb.userData;
    if (!ud.active || !ud.wave) return;
    ud.waveR += 3.5 * dt;
    if (ud.waveR >= ud.waveMax) {
      ud.wave = false;
      return;
    }
    // check collisions at this wave front
    orbs.forEach(other => {
      if (other === orb) return;
      if (!other.userData.active || other.userData.popping || other.userData.chainHit) return;
      const dist = orb.position.distanceTo(other.position);
      // hit when wave front passes through
      if (dist <= ud.waveR + 0.1 && dist >= ud.waveR - 0.5) {
        other.userData.chainHit = true;
        // compute chain depth
        const chainDepth = Math.floor(ud.waveR / 1.5) + 2;
        setTimeout(() => {
          if (other.userData.active && !other.userData.popping) {
            popOrb(other, chainDepth);
            lastChain = chainDepth;
            if (chainDepth > bestChain) bestChain = chainDepth;
            showChainPop(chainDepth);
          }
        }, 120);
      }
    });
  });
}

// --- Raycaster for tap ---
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function onPointerDown(e) {
  if (!gameRunning) return;
  e.preventDefault();
  const x = (e.clientX !== undefined ? e.clientX : e.touches[0].clientX);
  const y = (e.clientY !== undefined ? e.clientY : e.touches[0].clientY);
  pointer.x = (x / window.innerWidth)*2 - 1;
  pointer.y = -(y / window.innerHeight)*2 + 1;
  raycaster.setFromCamera(pointer, cam);
  const activeOrbs = orbs.filter(o => o.userData.active && !o.userData.popping);
  const hits = raycaster.intersectObjects(activeOrbs);
  if (hits.length > 0) {
    const orb = hits[0].object.parent || hits[0].object;
    // find the parent orb
    const target = orbs.find(o => o === orb || o.children.includes(orb));
    if (target && target.userData.active && !target.userData.popping) {
      comboCount++;
      comboTimer = 90;
      popOrb(target, 1);
      if (comboCount >= 2) {
        comboEl.textContent = 'COMBO ×' + comboCount;
        comboEl.style.opacity = '1';
      }
    }
  } else {
    // miss - reset combo
    comboCount = 0;
    comboEl.style.opacity = '0';
  }
}

renderer.domElement.addEventListener('pointerdown', onPointerDown, {passive:false});

// --- Background stars ---
const STAR_COUNT = 150;
const starPositions = new Float32Array(STAR_COUNT * 3);
for (let i = 0; i < STAR_COUNT; i++) {
  starPositions[i*3]   = (Math.random()-0.5)*40;
  starPositions[i*3+1] = (Math.random()-0.5)*30;
  starPositions[i*3+2] = (Math.random()-0.5)*20 - 10;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({color:0x334466, size:0.08});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// --- Timer countdown ---
let timerAccum = 0;

// --- Main loop ---
let lastTime = 0;

function tick(now) {
  requestAnimationFrame(tick);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  tickCount++;

  if (gameRunning) {
    // Timer
    timerAccum += dt;
    if (timerAccum >= 1) {
      timerAccum -= 1;
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 10) {
        timerEl.style.color = '#ff4444';
        timerEl.style.textShadow = '0 0 12px #ff2222';
      }
      if (timeLeft <= 0) {
        endGame();
      }
    }

    // Spawn orbs if needed
    const activeCount = orbs.filter(o => o.userData.active).length;
    if (activeCount < 10 && Math.random() < 0.06) spawnOrb();
    if (activeCount < 6) spawnOrb();

    // Combo decay
    if (comboTimer > 0) {
      comboTimer -= 1;
      if (comboTimer <= 0) {
        comboCount = 0;
        comboEl.style.opacity = '0';
      }
    }

    // Chain pop UI decay
    if (chainPopTimer > 0) {
      chainPopTimer--;
      if (chainPopTimer <= 0) chainPopEl.style.opacity = '0';
    }

    // Process chain waves
    processChainWaves(dt);

    // Update orbs
    const bound = 9;
    orbs.forEach(orb => {
      const ud = orb.userData;
      if (!ud.active) return;

      if (ud.popping) {
        ud.popTimer++;
        ud.scale += (ud.targetScale - ud.scale) * 0.25;
        if (ud.popTimer === 8) {
          // final pop
          ud.targetScale = 0;
        }
        if (ud.popTimer > 20) {
          resetOrb(orb);
          return;
        }
      } else {
        // drift motion
        orb.position.x += ud.vx;
        orb.position.y += ud.vy;
        orb.position.z += ud.vz;

        // gentle oscillation
        ud.vy += Math.sin(tickCount*0.02 + orb.position.x) * 0.0003;

        // bounce at bounds
        if (Math.abs(orb.position.x) > bound) { ud.vx *= -1; orb.position.x = Math.sign(orb.position.x)*bound; }
        if (Math.abs(orb.position.y) > bound*0.7) { ud.vy *= -1; orb.position.y = Math.sign(orb.position.y)*bound*0.7; }
        if (Math.abs(orb.position.z) > 4) { ud.vz *= -1; }

        // scale pulse
        ud.scale = 1 + Math.sin(tickCount*0.04 + orb.id)*0.04;
      }

      orb.scale.setScalar(Math.max(0, ud.scale));
      orb.rotation.x += ud.rotSpeed.x;
      orb.rotation.y += ud.rotSpeed.y;
      orb.rotation.z += ud.rotSpeed.z;
    });

    // Update particles
    particles.forEach(p => {
      const ud = p.userData;
      if (!ud.active) return;
      p.position.x += ud.vx;
      p.position.y += ud.vy;
      p.position.z += ud.vz;
      ud.vy -= 0.001; // slight gravity
      ud.vx *= 0.97;
      ud.vy *= 0.97;
      ud.vz *= 0.97;
      ud.life++;
      const t = 1 - ud.life / ud.maxLife;
      p.scale.setScalar(t * 0.9);
      p.material.opacity = t;
      if (ud.life >= ud.maxLife) {
        ud.active = false;
        p.visible = false;
      }
    });

    // Update rings
    rings.forEach(ring => {
      const ud = ring.userData;
      if (!ud.active) return;
      ud.r += 4.0 * dt;
      const t = 1 - ud.r / ud.maxR;
      ring.scale.setScalar(ud.r);
      ring.material.opacity = t * 0.7;
      ring.lookAt(cam.position);
      if (ud.r >= ud.maxR) {
        ud.active = false;
        ring.visible = false;
      }
    });

    // Update floaters
    floaters.forEach(f => {
      if (!f.active) return;
      f.y += f.vy;
      f.life++;
      const t = 1 - f.life / f.maxLife;
      f.el.style.opacity = Math.min(1, t*3);
      f.el.style.top = f.y + 'px';
      if (f.life >= f.maxLife) {
        f.active = false;
        f.el.style.opacity = '0';
      }
    });
  }

  // Camera shake
  if (camShake.decay > 0) {
    cam.position.x = camShake.x;
    cam.position.y = camShake.y;
    camShake.x *= camShake.decay;
    camShake.y *= camShake.decay;
    if (Math.abs(camShake.x) < 0.001) {
      camShake.decay = 0;
      cam.position.x = 0;
      cam.position.y = 0;
    }
  }

  // Slow star drift
  stars.rotation.y += 0.0002;
  stars.rotation.x += 0.0001;

  renderer.render(scene, cam);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
