<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PULSE RUN</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #06001a; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; user-select: none; -webkit-user-select: none; }
#c { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
#hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
#score { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); color: #0ff; font-size: 32px; font-weight: bold; text-shadow: 0 0 12px #0ff, 0 0 28px #0ff4; letter-spacing: 3px; }
#best { position: absolute; top: 16px; right: 12px; color: #334; font-size: 12px; letter-spacing: 1px; }
#dj { position: absolute; top: 58px; left: 50%; transform: translateX(-50%); color: #ff0; font-size: 11px; letter-spacing: 3px; font-weight: bold; opacity: 0; transition: opacity 0.1s; }
#dj.on { opacity: 1; }
#spd-wrap { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); width: 100px; }
#spd-track { width: 100%; height: 3px; background: #111; border-radius: 2px; }
#spd-fill { height: 100%; width: 0%; background: #0ff; border-radius: 2px; box-shadow: 0 0 6px #0ff; transition: background 0.5s; }
#spd-lbl { color: #223; font-size: 9px; letter-spacing: 3px; text-align: center; margin-top: 4px; }
#over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.35s; }
#over.show { opacity: 1; pointer-events: auto; }
#ot { color: #f46; font-size: 42px; font-weight: bold; text-shadow: 0 0 22px #f46, 0 0 44px #f462; letter-spacing: 6px; margin-bottom: 10px; }
#os { color: #ddd; font-size: 18px; letter-spacing: 2px; margin-bottom: 4px; }
#ob { font-size: 13px; letter-spacing: 2px; min-height: 18px; margin-bottom: 20px; }
#oh { color: #334; font-size: 12px; letter-spacing: 2px; animation: blink 1.1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="score">0</div>
  <div id="best">BEST: 0</div>
  <div id="dj">×2 JUMP</div>
  <div id="spd-wrap">
    <div id="spd-track"><div id="spd-fill"></div></div>
    <div id="spd-lbl">SPEED</div>
  </div>
  <div id="over">
    <div id="ot">CRASH</div>
    <div id="os"></div>
    <div id="ob"></div>
    <div id="oh">TAP TO RUN AGAIN</div>
  </div>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ===== RENDERER =====
const cv = document.getElementById('c');
const R = new THREE.WebGLRenderer({ canvas: cv, antialias: false, powerPreference: 'low-power' });
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.setSize(innerWidth, innerHeight);
R.setClearColor(0x06001a);

// ===== SCENE =====
const S = new THREE.Scene();
S.fog = new THREE.Fog(0x06001a, 22, 52);

// ===== CAMERA =====
const CAM0 = new THREE.Vector3(0, 3.5, 10);
const CAM = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
CAM.position.copy(CAM0);
CAM.lookAt(0, 0.8, -2);

// ===== LIGHTS =====
S.add(new THREE.AmbientLight(0x2211aa, 0.9));
const dl = new THREE.DirectionalLight(0x4488ff, 0.6);
dl.position.set(-3, 8, 4);
S.add(dl);

// ===== GROUND =====
const GD = 3.4;
S.add(Object.assign(
  new THREE.Mesh(new THREE.BoxGeometry(100, 0.2, GD), new THREE.MeshBasicMaterial({ color: 0x0a011e })),
  { position: new THREE.Vector3(0, -0.1, 0) }
));
const eMat = new THREE.MeshBasicMaterial({ color: 0xff0099 });
[-GD/2, GD/2].forEach(z => {
  const e = new THREE.Mesh(new THREE.BoxGeometry(100, 0.05, 0.05), eMat);
  e.position.set(0, 0.02, z);
  S.add(e);
});
// Lane dashes
const dMat = new THREE.MeshBasicMaterial({ color: 0x1a0044 });
for (let i = 0; i < 26; i++) {
  const d = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.01, 0.05), dMat);
  d.position.set(i * 5 - 30, 0.005, 0);
  S.add(d);
}

// ===== STARS =====
const sv = [];
for (let i = 0; i < 300; i++) sv.push((Math.random()-.5)*90, Math.random()*18+3, (Math.random()-.5)*15-8);
const sg = new THREE.BufferGeometry();
sg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sv), 3));
S.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0x6644aa, size: 0.13 })));

// ===== PLAYER =====
const PX = -3.2, PY0 = 0.4;
const PG = new THREE.Group();
PG.position.set(PX, PY0, 0);
S.add(PG);

const pBody = new THREE.Mesh(
  new THREE.BoxGeometry(0.65, 0.65, 0.65),
  new THREE.MeshBasicMaterial({ color: 0x00eeff })
);
PG.add(pBody);

const pGlow = new THREE.Mesh(
  new THREE.BoxGeometry(0.92, 0.92, 0.92),
  new THREE.MeshBasicMaterial({ color: 0x0055ff, transparent: true, opacity: 0.22, depthWrite: false })
);
PG.add(pGlow);

// Trail cubes
for (let i = 1; i <= 4; i++) {
  const s = 0.58 - i*0.08;
  const tr = new THREE.Mesh(
    new THREE.BoxGeometry(s, s, s),
    new THREE.MeshBasicMaterial({ color: 0x001166, transparent: true, opacity: 0.16-i*0.03, depthWrite: false })
  );
  tr.position.x = -i * 0.52;
  PG.add(tr);
}

// Shadow blob
const shMesh = new THREE.Mesh(
  new THREE.CircleGeometry(0.38, 8),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.45 })
);
shMesh.rotation.x = -Math.PI / 2;
shMesh.position.set(PX, 0.005, 0);
S.add(shMesh);

// ===== OBSTACLE MATERIALS =====
const OM = [
  new THREE.MeshBasicMaterial({ color: 0xff2244 }),
  new THREE.MeshBasicMaterial({ color: 0xff6600 }),
  new THREE.MeshBasicMaterial({ color: 0xcc0055 })
];
const CM = new THREE.MeshBasicMaterial({ color: 0xffcc00 });

const OBS = [], COINS = [], PARTS = [];
const SPX = 16, KX = -8;
const GRAV = -30, JV = 11.5;

function addObs(x, diff) {
  const h = 0.55 + Math.random() * 0.85 * (1 + diff * 0.6);
  const w = 0.45 + Math.random() * 0.45;
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, 1.1), OM[Math.floor(Math.random()*3)]);
  m.position.set(x, h/2, 0);
  S.add(m);
  OBS.push({ m, hw: w/2, hh: h/2 });
}

function addCoins(x, y) {
  const n = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), CM);
    m.position.set(x + i*0.65, y, 0);
    S.add(m);
    COINS.push({ m });
  }
}

function burst(x, y, col, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2.5 + Math.random() * 4;
    const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 1 });
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.16, 0.16), mat);
    m.position.set(x+(Math.random()-.5)*.4, y+(Math.random()-.5)*.4, (Math.random()-.5)*.5);
    S.add(m);
    PARTS.push({ m, vx: Math.cos(a)*sp, vy: Math.abs(Math.sin(a))*sp+1.5, life: 1 });
  }
}

// ===== HUD REFS =====
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const djEl    = document.getElementById('dj');
const overEl  = document.getElementById('over');
const osEl    = document.getElementById('os');
const obEl    = document.getElementById('ob');
const spdFill = document.getElementById('spd-fill');

let best = parseInt(localStorage.getItem('pr2_b') || '0');
bestEl.textContent = 'BEST: ' + best;

// ===== GAME STATE =====
let state = 'run';
let score = 0, cScore = 0, dist = 0, spd = 6;
let pY = PY0, pVY = 0, gnd = true, djAvail = true;
let shk = 0, shkT = 0;
let spT = 0, spI = 2.4, coT = 0;
let T = 0, pT = performance.now();

function reset() {
  OBS.forEach(o => S.remove(o.m));   OBS.length = 0;
  COINS.forEach(c => S.remove(c.m)); COINS.length = 0;
  PARTS.forEach(p => S.remove(p.m)); PARTS.length = 0;
  score = 0; cScore = 0; dist = 0; spd = 6;
  pY = PY0; pVY = 0; gnd = true; djAvail = true;
  shk = 0; shkT = 0; spT = 0; spI = 2.4; coT = 0; T = 0;
  overEl.classList.remove('show');
  state = 'run';
  pT = performance.now();
}

function jump() {
  if (gnd) {
    pVY = JV; gnd = false;
  } else if (djAvail) {
    pVY = JV * 0.88; djAvail = false;
    djEl.classList.add('on');
    setTimeout(() => djEl.classList.remove('on'), 500);
  }
}

function tap() {
  if (state === 'dead') { reset(); return; }
  jump();
}

window.addEventListener('touchstart', e => { e.preventDefault(); tap(); }, { passive: false });
window.addEventListener('mousedown', tap);
window.addEventListener('resize', () => {
  CAM.aspect = innerWidth / innerHeight;
  CAM.updateProjectionMatrix();
  R.setSize(innerWidth, innerHeight);
});

function hitObs(o) {
  const pr = 0.27;
  return Math.abs(PX - o.m.position.x) < (o.hw + pr) &&
         Math.abs(pY - o.m.position.y) < (o.hh + pr);
}

function die() {
  state = 'dead';
  shk = 0.42; shkT = 0.55;
  burst(PX, pY, 0x00eeff, 14);
  const tot = score + cScore;
  const isNew = tot > best;
  if (isNew) { best = tot; localStorage.setItem('pr2_b', best); bestEl.textContent = 'BEST: ' + best; }
  osEl.textContent = 'SCORE: ' + tot;
  obEl.textContent = isNew ? '★ NEW BEST ★' : 'BEST: ' + best;
  obEl.style.color   = isNew ? '#ff0' : '#446';
  setTimeout(() => overEl.classList.add('show'), 420);
}

function update(dt) {
  if (state !== 'run') return;
  T += dt;
  dist += spd * dt;

  const dif = Math.min(1, dist / 800);
  spd = 6 + 14 * dif * dif;
  spI = Math.max(0.88, 2.4 - dif * 1.4);
  score = Math.floor(dist * 0.5);

  const tot = score + cScore;
  scoreEl.textContent = tot;
  const sp = (spd - 6) / 14;
  spdFill.style.width = (sp * 100) + '%';
  spdFill.style.background = sp > 0.7 ? '#f84' : sp > 0.4 ? '#ff0' : '#0ff';

  // Physics
  if (!gnd) {
    pVY += GRAV * dt;
    pY  += pVY * dt;
    if (pY <= PY0) { pY = PY0; pVY = 0; gnd = true; djAvail = true; }
  }

  // Player visuals
  PG.position.y = pY;
  PG.rotation.z = gnd ? 0 : Math.max(-.3, Math.min(.3, pVY * .022));
  pGlow.scale.setScalar(0.88 + Math.sin(T * 9) * .12);
  const ss = Math.max(.3, 1 - (pY - PY0) * .15);
  shMesh.scale.set(ss, ss, 1);

  // Spawn obstacles
  spT += dt;
  if (spT >= spI) {
    spT -= spI;
    addObs(SPX, dif);
    if (dif > 0.3 && Math.random() < 0.22) addObs(SPX + 3 + Math.random() * 2, dif * 0.7);
  }

  // Spawn coins
  coT += dt;
  if (coT >= 1.7) {
    coT = 0;
    if (Math.random() < 0.55) addCoins(SPX + 0.5, PY0 + 0.5 + Math.random() * 1.3);
  }

  // Move + check obstacles
  for (let i = OBS.length - 1; i >= 0; i--) {
    const o = OBS[i];
    o.m.position.x -= spd * dt;
    if (o.m.position.x < KX) { S.remove(o.m); OBS.splice(i, 1); continue; }
    if (hitObs(o)) { die(); return; }
  }

  // Move + collect coins
  for (let i = COINS.length - 1; i >= 0; i--) {
    const c = COINS[i];
    c.m.position.x -= spd * dt;
    c.m.rotation.y += dt * 4;
    if (c.m.position.x < KX) { S.remove(c.m); COINS.splice(i, 1); continue; }
    if (Math.abs(PX - c.m.position.x) < .55 && Math.abs(pY - c.m.position.y) < .55) {
      cScore += 10;
      burst(c.m.position.x, c.m.position.y, 0xffcc00, 6);
      S.remove(c.m); COINS.splice(i, 1);
    }
  }

  // Particles
  for (let i = PARTS.length - 1; i >= 0; i--) {
    const p = PARTS[i];
    p.life -= dt * 1.8;
    p.vx  *= .96;
    p.vy  += GRAV * .35 * dt;
    p.m.position.x += p.vx * dt;
    p.m.position.y += p.vy * dt;
    p.m.material.opacity = p.life;
    p.m.rotation.z += dt * 5;
    if (p.life <= 0) { S.remove(p.m); PARTS.splice(i, 1); }
  }

  // Camera shake
  if (shkT > 0) {
    shkT -= dt; shk *= .85;
    CAM.position.x = CAM0.x + (Math.random() - .5) * shk;
    CAM.position.y = CAM0.y + (Math.random() - .5) * shk;
  } else {
    CAM.position.copy(CAM0);
  }
}

// ===== LOOP =====
(function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now - pT) / 1000, .05);
  pT = now;
  update(dt);
  R.render(S, CAM);
})();
</script>
</body>
</html>
