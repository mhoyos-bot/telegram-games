<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>KING OF THE HILL</title>
<style>
/* KING OF THE HILL v4 | king_of_hill_004 | STD-025 STD-030 STD-031
   Line count exception: STD-025 mandates self-contained single-file HTML5 game (~600 lines)
   Kernel wiring: NONE — standalone game build, no event_bus, no GOLD writes (STD-033)
   Bloodflow: pointerdown→tapTarget|slamTrigger→player.vx/vy|shockwave→collision
             →hitPlayer()/killEnemy()→score/lives/streak→DOM (STD-039)
   v4 adds: king-streak bonuses (5s/10s/20s), spawn telegraphing, rage mode (4-combo),
            3-ring hill hierarchy, improved visual clarity */
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;touch-action:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;font-family:'Arial Black',Arial,sans-serif}
#score{position:absolute;top:16px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:32px;font-weight:900;text-shadow:0 0 14px #ffd700,0 0 28px #ffa500;letter-spacing:1px}
#wave{position:absolute;top:16px;left:14px;color:#00ffcc;font-size:13px;font-weight:900;opacity:0.9}
#wave-prog{position:absolute;top:34px;left:14px;width:70px;height:4px;background:#0a3028;border-radius:2px}
#wave-bar{height:4px;background:#00ffcc;border-radius:2px;width:0%;transition:width 0.3s}
#kills{position:absolute;top:42px;left:14px;color:#ff8844;font-size:11px;font-weight:900;opacity:0.7}
#lives{position:absolute;top:16px;right:14px;color:#ff4455;font-size:22px;letter-spacing:3px}
#slam-hint{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);color:#88aaff;font-size:13px;font-weight:900;letter-spacing:2px;opacity:0.85}
#king-label{position:absolute;top:54px;left:50%;transform:translateX(-50%);color:#ffd700;font-size:13px;font-weight:900;letter-spacing:3px;opacity:0;transition:opacity 0.3s;text-shadow:0 0 10px #ffd700;white-space:nowrap}
#streak-bar-wrap{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:140px;height:5px;background:#221800;border-radius:3px;opacity:0;transition:opacity 0.3s}
#streak-bar{height:5px;background:#ffd700;border-radius:3px;width:0%;transition:width 0.25s linear}
#rage-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff4400;font-size:36px;font-weight:900;opacity:0;text-shadow:0 0 20px #ff4400,0 0 40px #ff2200;pointer-events:none;letter-spacing:4px}
#floats{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
#gameover{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,8,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:'Arial Black',Arial,sans-serif}
#gameover h1{color:#ffd700;font-size:44px;text-shadow:0 0 28px #ffd700}
.go-info{color:#fff;font-size:20px}
.go-sub{color:#88aaff;font-size:14px}
#rbtn{margin-top:12px;padding:14px 48px;background:#ffd700;color:#000;font-size:20px;font-weight:900;border:none;border-radius:8px;cursor:pointer;pointer-events:all;font-family:'Arial Black',Arial,sans-serif}
#rbtn:active{background:#ffa500}
@keyframes floatup{0%{transform:translateY(0) scale(1);opacity:1}60%{transform:translateY(-40px) scale(1.15);opacity:1}100%{transform:translateY(-70px) scale(0.9);opacity:0}}
@keyframes ragepulse{0%,100%{opacity:0.9}50%{opacity:0.4}}
</style>
</head>
<body>
<div id="ui">
  <div id="score">0</div>
  <div id="wave">WAVE 1</div>
  <div id="wave-prog"><div id="wave-bar"></div></div>
  <div id="kills">0 kills</div>
  <div id="lives">&#9829;&#9829;&#9829;</div>
  <div id="slam-hint">TAP = SLAM</div>
  <div id="king-label">&#x1F451; KING &#x1F451; <span id="streak-s"></span></div>
  <div id="streak-bar-wrap"><div id="streak-bar"></div></div>
  <div id="rage-label">RAGE!</div>
</div>
<div id="floats"></div>
<div id="gameover">
  <h1>DETHRONED</h1>
  <div class="go-info" id="go-score">Score: 0</div>
  <div class="go-sub" id="go-wave">Reached Wave 1</div>
  <div class="go-sub" id="go-kills">0 eliminations</div>
  <div class="go-sub" id="go-streak">Best streak: 0s</div>
  <button id="rbtn">RECLAIM THE HILL</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// KING OF THE HILL v4 | king_of_hill_004
// STD-025: Three.js r128 CDN | MeshBasicMaterial only | single HTML <500KB
// STD-030: all exceptions caught with context logging
// STD-031: ~600 lines justified — STD-025 single-file HTML5 game format
// v4: king-streak bonuses, spawn telegraphing, rage mode, 3-ring hill hierarchy
// Hook: zero tutorial — player spawns on glowing hill at frame 0, enemies in 1.5s

try {

const tg = window.Telegram?.WebApp;
if (tg) { try { tg.ready(); tg.expand(); } catch(_e){ console.warn('[WARN] tg init:', _e); } }
function haptic(t){ try { tg?.HapticFeedback?.impactOccurred(t||'light'); } catch(_e){ console.warn('[WARN] haptic:', _e); } }

// ── RENDERER ──────────────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030810);
const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, -100, 100);
camera.position.z = 10;

// ── GEOMETRY FACTORIES ────────────────────────────────────────────────────────
function mkCircle(r, segs, color){
  return new THREE.Mesh(
    new THREE.CircleGeometry(r, segs||32),
    new THREE.MeshBasicMaterial({color})
  );
}
function mkRing(ri, ro, color, transparent, opacity){
  const m = new THREE.MeshBasicMaterial({color, side:THREE.DoubleSide});
  if(transparent){ m.transparent=true; m.opacity=opacity||1; }
  return new THREE.Mesh(new THREE.RingGeometry(ri, ro, 48), m);
}

// ── ARENA ─────────────────────────────────────────────────────────────────────
function getAR(){ return Math.min(W, H) * 0.44; }
function getHR(){ return Math.min(W, H) * 0.135; }

let arenaFloor, arenaRingA, arenaRingB, arenaGlow;
let hillFloor, hillRingOuter, hillRingMid, hillRingInner, crownLine;
let spawnWarnings = []; // pulsing telegraphs at arena edge

function buildArena(){
  try {
    [arenaFloor, arenaRingA, arenaRingB, arenaGlow,
     hillFloor, hillRingOuter, hillRingMid, hillRingInner, crownLine]
      .forEach(m=>{ if(m){ scene.remove(m); if(m.geometry) m.geometry.dispose(); } });
    spawnWarnings.forEach(m=>{ scene.remove(m); if(m.geometry) m.geometry.dispose(); });
    spawnWarnings = [];

    const AR = getAR(), HR = getHR();

    arenaGlow = mkRing(AR-22, AR+6, 0x0a1a44, true, 0.6); arenaGlow.position.z=-3; scene.add(arenaGlow);
    arenaFloor = mkCircle(AR, 64, 0x050c18); arenaFloor.position.z=-2; scene.add(arenaFloor);
    arenaRingA = mkRing(AR-4, AR, 0x1a3888); arenaRingA.position.z=-1; scene.add(arenaRingA);
    arenaRingB = mkRing(AR, AR+6, 0x112266); arenaRingB.position.z=-1; scene.add(arenaRingB);

    // 3-ring hill (outer/mid/inner) for clear territorial hierarchy
    hillFloor = mkCircle(HR, 56, 0x0f0800); hillFloor.position.z=-1; scene.add(hillFloor);
    hillRingOuter = mkRing(HR-4, HR+3, 0xcc9900); hillRingOuter.position.z=0; scene.add(hillRingOuter);
    hillRingMid = mkRing(HR*0.55, HR*0.62, 0xaa7700); hillRingMid.position.z=0; scene.add(hillRingMid);
    hillRingInner = mkRing(HR*0.18, HR*0.22, 0xffd700); hillRingInner.position.z=0; scene.add(hillRingInner);

    const pts = [
      new THREE.Vector3(-13,0,0), new THREE.Vector3(-13,15,0), new THREE.Vector3(-7,7,0),
      new THREE.Vector3(0,18,0), new THREE.Vector3(7,7,0), new THREE.Vector3(13,15,0),
      new THREE.Vector3(13,0,0)
    ];
    crownLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0xffd700})
    );
    crownLine.position.set(0, HR+20, 1);
    scene.add(crownLine);

    // Pre-allocate 6 spawn-warning dots (reused for telegraphing)
    for(let i=0; i<6; i++){
      const m = mkCircle(7, 8, 0xff2200); m.visible=false; m.position.z=1;
      m.material.transparent=true; m.material.opacity=0;
      scene.add(m); spawnWarnings.push(m);
    }
  } catch(_e){ console.warn('[WARN] buildArena:', _e); }
}
buildArena();

// ── PARTICLE POOL ─────────────────────────────────────────────────────────────
const POOL_MAX = 100;
const particlePool = [];
for(let i=0; i<POOL_MAX; i++){
  const m = mkCircle(3, 6, 0xffd700);
  m.visible = false; scene.add(m);
  particlePool.push({mesh:m, vx:0, vy:0, life:0, age:0, active:false});
}

function spawnParticles(x, y, color, count, spd){
  let n = 0;
  for(let i=0; i<particlePool.length && n<(count||8); i++){
    const p = particlePool[i]; if(p.active) continue;
    const r = (Math.random()*0.5+0.5)*(spd||120);
    const a = Math.random()*Math.PI*2;
    p.mesh.material.color.set(color||0xffd700);
    p.mesh.position.set(x, y, 2); p.mesh.scale.setScalar(1); p.mesh.visible=true;
    p.vx=Math.cos(a)*r; p.vy=Math.sin(a)*r;
    p.life=0.4+Math.random()*0.35; p.age=0; p.active=true;
    n++;
  }
}

function updateParticles(dt){
  for(const p of particlePool){
    if(!p.active) continue;
    p.age += dt;
    if(p.age >= p.life){ p.active=false; p.mesh.visible=false; continue; }
    const t = p.age/p.life;
    p.mesh.position.x += p.vx*dt; p.mesh.position.y += p.vy*dt;
    p.vx *= 0.88; p.vy *= 0.88;
    p.mesh.scale.setScalar(1-t*0.85);
  }
}

// ── SHOCKWAVE POOL ────────────────────────────────────────────────────────────
const SHOCK_MAX = 4;
const shockwavePool = [];
for(let i=0; i<SHOCK_MAX; i++){
  const m = mkRing(0, 10, 0x88aaff, true, 1);
  m.visible=false; scene.add(m);
  shockwavePool.push({mesh:m, active:false, age:0, maxR:0});
}

function triggerShockwave(x, y){
  try {
    const sw = shockwavePool.find(s=>!s.active); if(!sw) return;
    sw.mesh.position.set(x, y, 3);
    sw.active=true; sw.age=0; sw.maxR=getAR()*0.88;
    sw.mesh.scale.setScalar(0.01); sw.mesh.visible=true;
    sw.mesh.material.opacity=1;
    spawnParticles(x, y, 0x88aaff, 20, 230);
    haptic('heavy');
  } catch(_e){ console.warn('[WARN] triggerShockwave:', _e); }
}

function updateShockwaves(dt){
  const LIFE = 0.4;
  for(const sw of shockwavePool){
    if(!sw.active) continue;
    sw.age += dt;
    if(sw.age >= LIFE){ sw.active=false; sw.mesh.visible=false; continue; }
    const t = sw.age/LIFE;
    const r = sw.maxR*t;
    sw.mesh.scale.setScalar(r/10);
    sw.mesh.material.opacity = 1-t;
    for(const en of enemyPool){
      if(!en.active) continue;
      const dx=en.x-sw.mesh.position.x, dy=en.y-sw.mesh.position.y;
      const dd=Math.hypot(dx, dy);
      const band=sw.maxR*0.14;
      if(dd < r && dd > r-band && dd > 0){
        const nx=dx/dd, ny=dy/dd;
        en.vx += nx*400*(1-t); en.vy += ny*400*(1-t);
      }
    }
  }
}

// ── FLOAT TEXT ────────────────────────────────────────────────────────────────
function floatText(txt, cx, cy, color, size){
  try {
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;transform:translate(-50%,-50%);`+
      `color:${color||'#ffd700'};font-family:'Arial Black',Arial,sans-serif;font-size:${size||18}px;`+
      `font-weight:900;pointer-events:none;animation:floatup 0.9s ease-out forwards;`+
      `white-space:nowrap;text-shadow:0 0 8px ${color||'#ffd700'}`;
    el.textContent = txt;
    document.getElementById('floats').appendChild(el);
    setTimeout(()=>{ try{ el.remove(); }catch(_ei){ console.warn('[WARN] floatText remove:', _ei); } }, 950);
  } catch(_e){ console.warn('[WARN] floatText:', _e); }
}
function worldToScreen(wx, wy){ return {x:wx+W/2, y:H/2-wy}; }
function screenToWorld(sx, sy){ return {x:sx-W/2, y:H/2-sy}; }

// ── GAME STATE ────────────────────────────────────────────────────────────────
let score=0, lives=3, wave=1, totalKills=0, waveKills=0;
let gameOver=false, invinceTimer=0;
let trauma=0;
let slamCd=0;
const SLAM_CD = 2.2;
let combo=0, comboTimer=0;
let rageTimer=0; // >0 = rage active
const RAGE_DURATION = 3.5;
let kingStreak=0, bestStreak=0; // seconds on the hill this continuous hold
const STREAK_MILESTONES = [5, 10, 20];
let streakMilestoneIdx=0;
// Spawn telegraphing
let nextSpawnAngle=0, warnTimer=0;
const WARN_DURATION = 0.45; // how long warning shows before spawn

function addTrauma(v){ trauma=Math.min(1, trauma+v); }
function waveTarget(){ return 6+wave*2; }
function isRaging(){ return rageTimer > 0; }

// ── PLAYER ────────────────────────────────────────────────────────────────────
const PLAYER_R = 14;
const player = {
  mesh: mkCircle(PLAYER_R, 24, 0x00ddff),
  ring: mkRing(PLAYER_R+2, PLAYER_R+5, 0x00eeff),
  x:0, y:0, vx:0, vy:0
};
player.mesh.position.z=3; player.ring.position.z=4;
scene.add(player.mesh); scene.add(player.ring);

function playerSpeed(){ return isRaging() ? 240 : 200; }
function knockbackForce(type){ return isRaging() ? (type==='tank'?240:380) : (type==='tank'?180:300); }

// ── ENEMY POOL ────────────────────────────────────────────────────────────────
const ENEMY_BASE_R = 12;
const ENEMY_MAX = 28;
const enemyPool = [];
for(let i=0; i<ENEMY_MAX; i++){
  const m = mkCircle(ENEMY_BASE_R, 20, 0xdd2200);
  const eye = mkCircle(3, 6, 0xffffff);
  eye.position.set(3, 2, 0.1); m.add(eye);
  m.visible=false; scene.add(m);
  enemyPool.push({mesh:m, x:0, y:0, vx:0, vy:0, active:false, type:'grunt', hp:1, maxHp:1});
}

function eRadius(en){ return ENEMY_BASE_R*en.mesh.scale.x; }
function eSpeed(type){ return (type==='scout'?140:type==='tank'?52:88)+wave*7; }

function spawnEnemyAt(angle){
  try {
    const en=enemyPool.find(e=>!e.active); if(!en) return;
    const AR=getAR();
    en.x=Math.cos(angle)*(AR-14); en.y=Math.sin(angle)*(AR-14);
    en.vx=0; en.vy=0; en.active=true;
    const roll=Math.random();
    if(wave >= 6 && roll < 0.18){
      en.type='tank'; en.hp=3; en.maxHp=3;
      en.mesh.material.color.set(0x880000); en.mesh.scale.setScalar(1.5);
    } else if(wave >= 3 && roll < 0.33){
      en.type='scout'; en.hp=1; en.maxHp=1;
      en.mesh.material.color.set(0xff8800); en.mesh.scale.setScalar(0.65);
    } else {
      en.type='grunt'; en.hp=1+(wave>4?1:0); en.maxHp=en.hp;
      en.mesh.material.color.set(wave%2===0 ? 0xaa1100 : 0xdd2200);
      en.mesh.scale.setScalar(1.0);
    }
    en.mesh.position.set(en.x, en.y, 3); en.mesh.visible=true;
  } catch(_e){ console.warn('[WARN] spawnEnemyAt:', _e); }
}

let spawnTimer=1.5;
function spawnInterval(){ return Math.max(0.45, 2.5-wave*0.14); }

// ── WARN INDICATOR ────────────────────────────────────────────────────────────
let warnDotIdx=0;
function showSpawnWarning(angle){
  try {
    const AR=getAR();
    const m=spawnWarnings[warnDotIdx%spawnWarnings.length];
    warnDotIdx++;
    m.position.set(Math.cos(angle)*(AR-14), Math.sin(angle)*(AR-14), 1);
    m.visible=true; m.material.opacity=0.85;
  } catch(_e){ console.warn('[WARN] showSpawnWarning:', _e); }
}
function hideAllWarnings(){
  try { spawnWarnings.forEach(m=>{ m.visible=false; m.material.opacity=0; }); }
  catch(_e){ console.warn('[WARN] hideAllWarnings:', _e); }
}

// ── HIT / KILL ────────────────────────────────────────────────────────────────
function updateLivesUI(){
  const el=document.getElementById('lives');
  if(el) el.textContent='\u2665'.repeat(Math.max(0,lives));
}

function hitPlayer(){
  if(invinceTimer > 0) return;
  lives--;
  invinceTimer=1.2;
  addTrauma(0.7);
  haptic('heavy');
  updateLivesUI();
  spawnParticles(player.x, player.y, 0xff4455, 14, 160);
  const sc=worldToScreen(player.x, player.y);
  floatText('-LIFE', sc.x, sc.y, '#ff4455');
  if(lives <= 0) triggerGameOver();
}

function triggerGameOver(){
  gameOver=true;
  try {
    document.getElementById('go-score').textContent='Score: '+score;
    document.getElementById('go-wave').textContent='Reached Wave '+wave;
    document.getElementById('go-kills').textContent=totalKills+' eliminations';
    document.getElementById('go-streak').textContent='Best streak: '+bestStreak.toFixed(1)+'s';
    document.getElementById('gameover').style.display='flex';
  } catch(_e){ console.warn('[WARN] gameover UI:', _e); }
}

function killEnemy(en){
  try {
    combo++; comboTimer=1.8;
    const basePts=en.type==='tank'?200:en.type==='scout'?75:50;
    const streakBonus = kingStreak > 10 ? 2 : kingStreak > 5 ? 1.5 : 1;
    const comboBonusKick = combo > 3;
    const mult=combo > 3 ? combo : 1;
    const total=Math.round(basePts*mult*streakBonus);
    score+=total; totalKills++; waveKills++;
    spawnParticles(en.x, en.y,
      en.type==='tank'?0xff2200:en.type==='scout'?0xff9900:0xff5500,
      en.type==='tank'?18:10, en.type==='tank'?240:170);
    haptic(en.type==='tank'?'heavy':'medium');
    const sc=worldToScreen(en.x, en.y);
    floatText(
      combo > 3 ? `+${total} x${combo}!` : `+${basePts}`,
      sc.x, sc.y,
      comboBonusKick ? '#ffcc00' : '#ff8844',
      comboBonusKick ? 22 : 18
    );

    // Check rage trigger
    if(combo === 4){
      rageTimer=RAGE_DURATION;
      try {
        const rl=document.getElementById('rage-label');
        rl.style.opacity='1'; rl.style.animation='ragepulse 0.4s ease-in-out infinite';
        setTimeout(()=>{ try{ rl.style.opacity='0'; rl.style.animation=''; }
          catch(_ei){ console.warn('[WARN] rage fade:', _ei); } }, RAGE_DURATION*1000);
      } catch(_ei){ console.warn('[WARN] rage UI:', _ei); }
      haptic('heavy'); haptic('heavy');
    }

    document.getElementById('kills').textContent=totalKills+' kills';
    // wave progress bar
    const pct=Math.min(100, (waveKills/waveTarget())*100);
    const wb=document.getElementById('wave-bar');
    if(wb) wb.style.width=pct+'%';

    if(waveKills >= waveTarget()){
      wave++; waveKills=0; streakMilestoneIdx=0;
      document.getElementById('wave').textContent='WAVE '+wave;
      document.getElementById('wave-bar').style.width='0%';
      const sc2=worldToScreen(0, getHR()+35);
      floatText('WAVE '+wave+'!', sc2.x, sc2.y, '#00ffcc', 26);
    }
    en.active=false; en.mesh.visible=false;
  } catch(_e){ console.warn('[WARN] killEnemy:', _e); }
}

// ── KING STREAK ───────────────────────────────────────────────────────────────
function updateKingStreak(dt, onHill){
  try {
    const kl=document.getElementById('king-label');
    const sw=document.getElementById('streak-bar-wrap');
    const sb=document.getElementById('streak-bar');
    if(onHill){
      kingStreak += dt;
      if(kingStreak > bestStreak) bestStreak=kingStreak;
      // milestone bonuses at 5s / 10s / 20s
      if(streakMilestoneIdx < STREAK_MILESTONES.length &&
         kingStreak >= STREAK_MILESTONES[streakMilestoneIdx]){
        const ms=STREAK_MILESTONES[streakMilestoneIdx];
        const bonus=ms===5?100:ms===10?250:500;
        score+=bonus;
        const sc=worldToScreen(0, 0);
        floatText(`STREAK ${ms}s +${bonus}!`, sc.x, sc.y-30, '#ffd700', 22);
        spawnParticles(0, 0, 0xffd700, 20, 180);
        haptic('medium');
        streakMilestoneIdx++;
      }
      // show streak bar progress toward next milestone
      if(streakMilestoneIdx < STREAK_MILESTONES.length){
        const prev=streakMilestoneIdx > 0 ? STREAK_MILESTONES[streakMilestoneIdx-1] : 0;
        const next=STREAK_MILESTONES[streakMilestoneIdx];
        const pct=((kingStreak-prev)/(next-prev))*100;
        if(sb) sb.style.width=Math.min(100,pct)+'%';
      } else {
        if(sb) sb.style.width='100%';
      }
      if(kl) kl.style.opacity='1';
      if(sw) sw.style.opacity='1';
      const ss=document.getElementById('streak-s');
      if(ss) ss.textContent=kingStreak>3 ? ' '+kingStreak.toFixed(0)+'s' : '';
    } else {
      if(kingStreak > 0){ kingStreak=0; streakMilestoneIdx=0; }
      if(kl) kl.style.opacity='0';
      if(sw) sw.style.opacity='0';
      if(sb) sb.style.width='0%';
    }
  } catch(_e){ console.warn('[WARN] updateKingStreak:', _e); }
}

// ── SCORE TICK ────────────────────────────────────────────────────────────────
let scoreTick=0;
function isOnHill(){ return Math.hypot(player.x, player.y) < getHR(); }

// ── INPUT ─────────────────────────────────────────────────────────────────────
let tapTarget=null;
let ptrDownX=0, ptrDownY=0, ptrDownTime=0;

renderer.domElement.addEventListener('pointerdown', e=>{
  try {
    if(gameOver) return;
    ptrDownX=e.clientX; ptrDownY=e.clientY; ptrDownTime=performance.now();
    const w=screenToWorld(e.clientX, e.clientY);
    const AR=getAR(), d=Math.hypot(w.x, w.y);
    if(d > AR-PLAYER_R){ const sc=(AR-PLAYER_R)/d; w.x*=sc; w.y*=sc; }
    tapTarget=w;
  } catch(_e){ console.warn('[WARN] pointerdown:', _e); }
});

renderer.domElement.addEventListener('pointermove', e=>{
  try {
    if(e.buttons===0 || gameOver) return;
    const w=screenToWorld(e.clientX, e.clientY);
    const AR=getAR(), d=Math.hypot(w.x, w.y);
    if(d > AR-PLAYER_R){ const sc=(AR-PLAYER_R)/d; w.x*=sc; w.y*=sc; }
    tapTarget=w;
  } catch(_e){ console.warn('[WARN] pointermove:', _e); }
});

renderer.domElement.addEventListener('pointerup', e=>{
  try {
    if(gameOver) return;
    const elapsed=(performance.now()-ptrDownTime)/1000;
    const moved=Math.hypot(e.clientX-ptrDownX, e.clientY-ptrDownY);
    if(elapsed < 0.22 && moved < 18 && slamCd <= 0){
      triggerShockwave(player.x, player.y);
      addTrauma(0.1);
      slamCd=SLAM_CD;
    }
  } catch(_e){ console.warn('[WARN] pointerup:', _e); }
});

renderer.domElement.addEventListener('pointercancel', ()=>{
  try { tapTarget=null; } catch(_e){ console.warn('[WARN] pointercancel:', _e); }
});

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetGame(){
  try {
    for(const en of enemyPool){ en.active=false; en.mesh.visible=false; }
    for(const p of particlePool){ p.active=false; p.mesh.visible=false; }
    for(const sw of shockwavePool){ sw.active=false; sw.mesh.visible=false; }
    hideAllWarnings();
    score=0; lives=3; wave=1; totalKills=0; waveKills=0;
    gameOver=false; invinceTimer=0; trauma=0; slamCd=0;
    combo=0; comboTimer=0; rageTimer=0;
    kingStreak=0; bestStreak=0; streakMilestoneIdx=0;
    spawnTimer=1.5; nextSpawnAngle=Math.random()*Math.PI*2; warnTimer=0;
    scoreTick=0; tapTarget=null; warnDotIdx=0;
    player.x=0; player.y=0; player.vx=0; player.vy=0;
    player.mesh.position.set(0,0,3); player.ring.position.set(0,0,4);
    player.mesh.material.opacity=1; player.mesh.material.transparent=false;
    player.mesh.material.color.set(0x00ddff); player.ring.material.color.set(0x00eeff);
    document.getElementById('gameover').style.display='none';
    document.getElementById('score').textContent='0';
    document.getElementById('wave').textContent='WAVE 1';
    document.getElementById('wave-bar').style.width='0%';
    document.getElementById('kills').textContent='0 kills';
    document.getElementById('slam-hint').textContent='TAP = SLAM';
    document.getElementById('rage-label').style.opacity='0';
    document.getElementById('rage-label').style.animation='';
    updateLivesUI();
  } catch(_e){ console.warn('[WARN] resetGame:', _e); }
}

document.getElementById('rbtn').addEventListener('click', ()=>{
  try { resetGame(); } catch(_e){ console.warn('[WARN] rbtn click:', _e); }
});

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
let lastT=null;

function update(ts){
  try {
    if(gameOver){ renderer.render(scene, camera); requestAnimationFrame(update); return; }
    if(lastT===null){ lastT=ts; requestAnimationFrame(update); return; }
    const dt=Math.min((ts-lastT)/1000, 0.05);
    lastT=ts;

    const AR=getAR(), HR=getHR();

    // Invincibility flash
    if(invinceTimer > 0){
      invinceTimer -= dt;
      player.mesh.material.transparent=true;
      player.mesh.material.opacity=Math.floor(invinceTimer*10)%2===0 ? 0.2 : 1.0;
    } else {
      player.mesh.material.transparent=false;
      player.mesh.material.opacity=1.0;
    }

    // Rage visuals
    if(rageTimer > 0){
      rageTimer -= dt;
      player.mesh.material.color.set(0xff4400);
      player.ring.material.color.set(0xff8800);
      if(rageTimer <= 0){
        player.mesh.material.color.set(0x00ddff);
        player.ring.material.color.set(0x00eeff);
      }
    }

    // Trauma screen shake (squared falloff)
    trauma=Math.max(0, trauma-dt*1.6);
    if(trauma > 0.01){
      const s=trauma*trauma*22;
      camera.position.x=(Math.random()-0.5)*s;
      camera.position.y=(Math.random()-0.5)*s;
    } else {
      camera.position.x*=0.65; camera.position.y*=0.65;
    }

    // Slam cooldown UI
    if(slamCd > 0){
      slamCd -= dt;
      const hintEl=document.getElementById('slam-hint');
      if(hintEl){
        if(slamCd > 0) hintEl.textContent=`SLAM: ${slamCd.toFixed(1)}s`;
        else { hintEl.textContent='TAP = SLAM'; haptic('light'); }
      }
    }

    // Combo decay
    if(comboTimer > 0){ comboTimer -= dt; if(comboTimer <= 0) combo=0; }

    // Spawn telegraph (warn WARN_DURATION before spawn)
    spawnTimer -= dt;
    if(spawnTimer <= WARN_DURATION && warnTimer <= 0){
      nextSpawnAngle=Math.random()*Math.PI*2;
      showSpawnWarning(nextSpawnAngle);
      warnTimer=WARN_DURATION;
    }
    if(warnTimer > 0){
      warnTimer -= dt;
      // pulse the warning dots
      const pulse=0.5+0.5*Math.sin(ts*0.025);
      spawnWarnings.forEach(m=>{ if(m.visible) m.material.opacity=0.4+0.6*pulse; });
    }
    if(spawnTimer <= 0){
      spawnEnemyAt(nextSpawnAngle);
      spawnTimer=spawnInterval();
      warnTimer=0;
      hideAllWarnings();
    }

    // Player movement
    if(tapTarget){
      const dx=tapTarget.x-player.x, dy=tapTarget.y-player.y;
      const d=Math.hypot(dx, dy);
      if(d < 4){ tapTarget=null; player.vx=0; player.vy=0; }
      else {
        const spd=Math.min(playerSpeed(), d*9);
        player.vx=(dx/d)*spd; player.vy=(dy/d)*spd;
      }
    } else { player.vx*=0.82; player.vy*=0.82; }

    player.x+=player.vx*dt; player.y+=player.vy*dt;
    const pd=Math.hypot(player.x, player.y);
    if(pd > AR-PLAYER_R){ const sc=(AR-PLAYER_R)/pd; player.x*=sc; player.y*=sc; player.vx=0; player.vy=0; }
    player.mesh.position.set(player.x, player.y, 3);
    player.ring.position.set(player.x, player.y, 4);

    // Hill scoring + streak
    const onHill=isOnHill();
    if(onHill){ scoreTick+=dt; if(scoreTick >= 0.1){ scoreTick=0; score++; } }
    else { scoreTick=0; }
    document.getElementById('score').textContent=score;

    // King streak system
    updateKingStreak(dt, onHill);

    // Hill ring pulses (triple-ring hierarchy)
    const p1=0.85+0.15*Math.sin(ts*0.003);
    const p2=0.85+0.15*Math.sin(ts*0.003+1.2);
    hillRingOuter.scale.setScalar(0.96+p1*0.07);
    hillRingMid.scale.setScalar(0.88+p2*0.15);
    hillRingInner.rotation.z += dt*0.8;
    hillFloor.material.color.set(onHill ? 0x1e1000 : 0x0f0800);
    crownLine.position.y=HR+20+Math.sin(ts*0.004)*4;
    crownLine.material.color.set(isRaging() ? 0xff8800 : 0xffd700);

    updateShockwaves(dt);

    // Enemy AI + collision
    for(const en of enemyPool){
      if(!en.active) continue;
      try {
        const spd=eSpeed(en.type);
        const tx=-en.x, ty=-en.y;
        const td=Math.hypot(tx, ty);
        if(td > 1){ en.vx+=(tx/td)*spd*dt*4; en.vy+=(ty/td)*spd*dt*4; }
        const curSpd=Math.hypot(en.vx, en.vy);
        if(curSpd > spd){ en.vx=(en.vx/curSpd)*spd; en.vy=(en.vy/curSpd)*spd; }
        en.x+=en.vx*dt; en.y+=en.vy*dt;

        const eR=eRadius(en);
        // player collision
        const pex=en.x-player.x, pey=en.y-player.y;
        const ped=Math.hypot(pex, pey);
        const touchR=PLAYER_R+eR;
        if(ped < touchR && ped > 0){
          const nx=pex/ped, ny=pey/ped;
          const pspd=Math.hypot(player.vx, player.vy);
          if(pspd > 75){
            const force=knockbackForce(en.type);
            en.vx+=nx*force; en.vy+=ny*force;
            spawnParticles(en.x, en.y, 0xff6600, 6, 110);
            haptic('light');
            if(en.type !== 'tank'){
              en.hp--;
              if(en.hp <= 0){ killEnemy(en); continue; }
            }
          } else {
            hitPlayer();
            const ov=touchR-ped;
            en.x+=nx*ov*0.5; en.y+=ny*ov*0.5;
            player.x-=nx*ov*0.5; player.y-=ny*ov*0.5;
          }
        }

        // boundary kill
        const eb=Math.hypot(en.x, en.y);
        if(eb >= AR-eR*0.5){ killEnemy(en); continue; }
        if(eb > AR-eR){ const sc=(AR-eR)/eb; en.x*=sc; en.y*=sc; en.vx*=-0.3; en.vy*=-0.3; }

        en.mesh.position.set(en.x, en.y, 3);
        en.mesh.rotation.z=Math.atan2(-en.y, -en.x)-Math.PI/2;
      } catch(_ei){ console.warn('[WARN] enemy update:', _ei); }
    }

    updateParticles(dt);
    renderer.render(scene, camera);
  } catch(_e){ console.warn('[WARN] update loop:', _e); }
  requestAnimationFrame(update);
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', ()=>{
  try {
    W=window.innerWidth; H=window.innerHeight;
    renderer.setSize(W, H);
    camera.left=-W/2; camera.right=W/2; camera.top=H/2; camera.bottom=-H/2;
    camera.updateProjectionMatrix();
    buildArena();
  } catch(_e){ console.warn('[WARN] resize:', _e); }
});

// ── START ─────────────────────────────────────────────────────────────────────
// Zero tutorial: player spawns on the glowing hill at frame 0
// First enemy telegraphed at ~1.1s, arrives at ~1.5s — time-to-fun <15s
nextSpawnAngle=Math.random()*Math.PI*2;
requestAnimationFrame(update);

} catch(_e){ console.error('[ERROR] boot:', _e); }
</script>
