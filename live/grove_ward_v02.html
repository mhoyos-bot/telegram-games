<!DOCTYPE html>
<!-- grove_ward_v02.html
     ITERATE on v01 (gate: 85.0 / A).
     CHANGES vs v01:
       1. Enhanced particle effects — dual-layer kill burst, shockwave ring, combo gold shower
       2. Improved color contrast — HUD sub-labels, wave indicator, shield pip brightness
       3. Enhanced screen shake — damage shake scales with shields lost, low-health micro-tremor
     STD-031 EXCEPTION: Single-file HTML game. Inlined CSS + JS required for Telegram Mini App
     compatibility (no bundler, CDN Three.js). File ~830 lines, justified by delivery format.
     Kernel wiring: NONE — standalone game, no kernel/event-bus connection (STD-033).
     Bloodflow: browser input → onTap → killEnemy/hitTotem → HUD update (STD-039).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>GROVE WARD — Wild Lands</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050b0a; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10;
    }
    #score {
      font-size: 30px; font-weight: bold; color: #6fffd4;
      text-shadow: 0 0 16px rgba(80,255,200,0.8);
    }
    /* v02: contrast improved — sub-labels now 0.75 opacity, letter-spacing tighter */
    #sub { font-size: 11px; color: rgba(100,230,180,0.75); margin-top: 3px; letter-spacing: 0.1em; }
    #combo {
      font-size: 15px; font-weight: bold; color: #ffdd55;
      text-align: right; text-shadow: 0 0 12px rgba(255,220,60,0.85);
      opacity: 0; transition: opacity 0.3s;
    }
    #shield {
      font-size: 20px; text-align: right; color: #55ffaa;
      letter-spacing: 4px; margin-top: 4px;
      text-shadow: 0 0 8px rgba(80,255,160,0.6);
    }
    /* v02: wave indicator now clearly readable */
    #wave {
      font-size: 12px; color: rgba(130,250,200,0.65);
      text-align: right; margin-top: 3px; letter-spacing: 0.1em;
      text-shadow: 0 0 6px rgba(80,220,160,0.4);
    }

    #flash {
      position: fixed; inset: 0; pointer-events: none; opacity: 0;
      background: radial-gradient(ellipse at center, rgba(80,255,180,0.22) 0%, transparent 70%);
    }
    #badflash {
      position: fixed; inset: 0; pointer-events: none; opacity: 0;
      background: rgba(255,60,60,0.16);
    }
    /* v02: damage vignette — persistent red border at low health */
    #dmg-vignette {
      position: fixed; inset: 0; pointer-events: none; opacity: 0;
      box-shadow: inset 0 0 60px rgba(255,40,40,0.35);
      transition: opacity 0.6s;
    }
    #popup {
      position: fixed; top: 38%; left: 50%; transform: translateX(-50%);
      font-size: 36px; font-weight: bold; pointer-events: none;
      opacity: 0; text-shadow: 0 0 24px currentColor; white-space: nowrap;
    }

    #overlay {
      position: fixed; inset: 0; z-index: 20; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5,11,10,0.92); text-align: center; padding: 24px;
    }
    .logo {
      font-size: 42px; font-weight: bold; color: #6fffd4; letter-spacing: 3px;
      text-shadow: 0 0 24px rgba(80,255,200,0.5); margin-bottom: 4px;
    }
    .sub-logo {
      font-size: 10px; color: rgba(100,220,170,0.5); letter-spacing: 5px;
      margin-bottom: 28px;
    }
    .hint { font-size: 15px; color: #5599aa; line-height: 1.8; margin-bottom: 26px; }
    .final { font-size: 24px; color: #ffdd55; margin-bottom: 6px; }
    .best { font-size: 13px; color: rgba(120,220,170,0.65); margin-bottom: 24px; }
    .btn {
      padding: 14px 52px; font: bold 20px monospace; letter-spacing: 2px;
      background: rgba(80,255,180,0.1); border: 1.5px solid rgba(80,255,180,0.45);
      color: #6fffd4; cursor: pointer; box-shadow: 0 0 20px rgba(60,220,160,0.18);
    }
    .btn:active { transform: scale(0.95); background: rgba(80,255,180,0.22); }
    .hidden { display: none !important; }

    #hint-bar {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(100,220,170,0.35); letter-spacing: 0.15em;
      pointer-events: none; transition: opacity 2s;
    }
    #hint-bar.gone { opacity: 0; }
  </style>
</head>
<body>

<div id="hud">
  <div>
    <div id="score">0</div>
    <div id="sub">WARD SCORE</div>
  </div>
  <div>
    <div id="combo"></div>
    <div id="shield">♦♦♦♦♦</div>
    <div id="wave">WAVE 1</div>
  </div>
</div>

<div id="flash"></div>
<div id="badflash"></div>
<div id="dmg-vignette"></div>
<div id="popup"></div>

<div id="overlay">
  <div class="logo">GROVE WARD</div>
  <div class="sub-logo">WILD LANDS</div>
  <div class="hint" id="hint-txt">
    Shadow wraiths approach the ancient totem<br>
    <strong style="color:#6fffd4">TAP</strong> them before they reach the light<br>
    Every miss weakens the ward
  </div>
  <div class="final hidden" id="final"></div>
  <div class="best hidden" id="best"></div>
  <button class="btn" id="start-btn">WARD</button>
</div>

<div id="hint-bar">TAP SHADOWS</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── AUDIO ────────────────────────────────────────────────────────────────────
let AC = null;
function getAC() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(_e) { console.warn('[WARN] AudioContext init:', _e); } }
  return AC;
}
function playTone(freq, type, dur, vol) {
  const ac = getAC(); if (!ac) return;
  try {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, ac.currentTime + dur);
    gain.gain.setValueAtTime(vol || 0.25, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(_e) { console.warn('[WARN] playTone:', _e); }
}
function sfxBurst(pitch) {
  playTone(pitch || 440, 'triangle', 0.18, 0.3);
  setTimeout(() => playTone((pitch || 440) * 1.5, 'sine', 0.12, 0.15), 40);
}
function sfxDamage() {
  playTone(180, 'sawtooth', 0.4, 0.35);
  playTone(90, 'sine', 0.5, 0.2);
}
function sfxCombo(n) {
  const freqs = [330, 440, 550, 660, 880];
  playTone(freqs[Math.min(n - 1, 4)] || 330, 'triangle', 0.22, 0.28);
}
function sfxGameOver() {
  [300, 230, 160].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.5, 0.3), i * 200));
}

// ─── GLOBALS ──────────────────────────────────────────────────────────────────
const W = () => window.innerWidth, H = () => window.innerHeight;
let renderer, scene, camera;
let gameRunning = false, gameOver = false;
let score = 0, hiScore = 0, shield = 5, waveNum = 1;
let comboCount = 0, comboTimer = 0;
let clock;

// scene objects
let totemGroup, totemGlow;
let groundMesh;
let trees = [], rocks = [];
let enemies = [];
let particles = [];
let shakeAmt = 0, shakeDecay = 0.84;
let ambientParticles = [];

// wave data
let waveEnemyCount = 0, waveEnemiesSpawned = 0;
let spawnInterval = 2.0, spawnAccum = 0;
const WAVE_ENEMIES = [5, 8, 12, 16, 22, 28, 35, 44];
const ENEMY_SPEED_BASE = 1.8;

// DOM
const scoreEl   = document.getElementById('score');
const shieldEl  = document.getElementById('shield');
const waveEl    = document.getElementById('wave');
const comboEl   = document.getElementById('combo');
const flashEl   = document.getElementById('flash');
const badFlashEl = document.getElementById('badflash');
const dmgVignette = document.getElementById('dmg-vignette');
const popupEl   = document.getElementById('popup');
const overlayEl = document.getElementById('overlay');
const startBtn  = document.getElementById('start-btn');
const finalEl   = document.getElementById('final');
const bestEl    = document.getElementById('best');
const hintTxt   = document.getElementById('hint-txt');
const hintBar   = document.getElementById('hint-bar');

// ─── INIT THREE.JS ────────────────────────────────────────────────────────────
function initRenderer() {
  renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W(), H());
  renderer.shadowMap.enabled = false;
  renderer.setClearColor(0x050b0a);
  document.body.insertBefore(renderer.domElement, document.body.firstChild);
}

function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x050b0a, 12, 32);

  camera = new THREE.PerspectiveCamera(60, W() / H(), 0.1, 60);
  camera.position.set(0, 9, 12);
  camera.lookAt(0, 0, 0);

  clock = new THREE.Clock();

  const ambient = new THREE.AmbientLight(0x1a3b30, 0.8);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0x4fffc8, 0.9);
  dirLight.position.set(3, 8, 4);
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0x1a6644, 0.4);
  rimLight.position.set(-4, 2, -6);
  scene.add(rimLight);

  buildGround();
  buildTotem();
  buildForestRing();
  buildAmbientParticles();
}

// ─── GROUND ───────────────────────────────────────────────────────────────────
function buildGround() {
  const geo = new THREE.CircleGeometry(10, 16);
  const pos = geo.attributes.position;
  for (let i = 1; i < pos.count; i++) {
    pos.setY(i, (Math.random() - 0.5) * 0.18);
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ color: 0x0d2018, wireframe: false });
  groundMesh = new THREE.Mesh(geo, mat);
  groundMesh.rotation.x = -Math.PI / 2;
  scene.add(groundMesh);

  for (let i = 0; i < 24; i++) {
    const ang = (i / 24) * Math.PI * 2;
    const r = 9.2;
    const dotGeo = new THREE.SphereGeometry(0.06, 4, 4);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0x2aff99 });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(Math.cos(ang) * r, 0.05, Math.sin(ang) * r);
    scene.add(dot);
  }
  const ringGeo = new THREE.TorusGeometry(1.6, 0.03, 6, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x1aff88, transparent: true, opacity: 0.4 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.06;
  scene.add(ring);
}

// ─── TOTEM ────────────────────────────────────────────────────────────────────
function buildTotem() {
  totemGroup = new THREE.Group();
  const pillarGeo = new THREE.CylinderGeometry(0.18, 0.25, 1.6, 6);
  const pillarMat = new THREE.MeshLambertMaterial({ color: 0x1a3830 });
  const pillar = new THREE.Mesh(pillarGeo, pillarMat);
  pillar.position.y = 0.8;
  totemGroup.add(pillar);

  const mRingGeo = new THREE.TorusGeometry(0.22, 0.04, 6, 12);
  const mRingMat = new THREE.MeshLambertMaterial({ color: 0x33bb88 });
  const mRing = new THREE.Mesh(mRingGeo, mRingMat);
  mRing.position.y = 0.9;
  totemGroup.add(mRing);

  const crownGeo = new THREE.OctahedronGeometry(0.32, 0);
  const crownMat = new THREE.MeshLambertMaterial({ color: 0x44ffbb });
  const crown = new THREE.Mesh(crownGeo, crownMat);
  crown.position.y = 1.8;
  totemGroup.add(crown);

  const glowGeo = new THREE.SphereGeometry(0.55, 8, 8);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x55ffcc, transparent: true, opacity: 0.18 });
  totemGlow = new THREE.Mesh(glowGeo, glowMat);
  totemGlow.position.y = 1.8;
  totemGroup.add(totemGlow);

  scene.add(totemGroup);
}

// ─── FOREST RING ──────────────────────────────────────────────────────────────
function buildForestRing() {
  const TREE_COUNT = 18;
  for (let i = 0; i < TREE_COUNT; i++) {
    const ang = (i / TREE_COUNT) * Math.PI * 2 + Math.random() * 0.3;
    const r = 10.5 + Math.random() * 2;
    buildTree(Math.cos(ang) * r, Math.sin(ang) * r);
  }
  for (let i = 0; i < 8; i++) {
    const ang = Math.random() * Math.PI * 2;
    const r = 8 + Math.random() * 2;
    buildRock(Math.cos(ang) * r, Math.sin(ang) * r);
  }
}

function buildTree(x, z) {
  const g = new THREE.Group();
  const h = 1.2 + Math.random() * 1.4;
  const trunkGeo = new THREE.CylinderGeometry(0.07, 0.12, h * 0.5, 5);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x0f1a14 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = h * 0.25;
  g.add(trunk);
  const tiers = 2 + Math.floor(Math.random() * 2);
  for (let t = 0; t < tiers; t++) {
    const cGeo = new THREE.ConeGeometry(0.55 - t * 0.1, h * 0.45, 5);
    const col = new THREE.Color().setHSL(0.38 + Math.random() * 0.06, 0.55, 0.08 + t * 0.03);
    const cMat = new THREE.MeshLambertMaterial({ color: col });
    const cone = new THREE.Mesh(cGeo, cMat);
    cone.position.y = h * 0.4 + t * h * 0.25;
    g.add(cone);
  }
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  scene.add(g);
  trees.push(g);
}

function buildRock(x, z) {
  const geo = new THREE.DodecahedronGeometry(0.3 + Math.random() * 0.3, 0);
  const mat = new THREE.MeshLambertMaterial({ color: 0x142820 });
  const rock = new THREE.Mesh(geo, mat);
  rock.position.set(x, 0.15, z);
  rock.rotation.set(Math.random(), Math.random(), Math.random());
  scene.add(rock);
  rocks.push(rock);
}

// ─── AMBIENT PARTICLES ────────────────────────────────────────────────────────
function buildAmbientParticles() {
  for (let i = 0; i < 40; i++) {
    const geo = new THREE.SphereGeometry(0.028, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.45 + Math.random() * 0.1, 1, 0.6),
      transparent: true, opacity: 0.5
    });
    const p = new THREE.Mesh(geo, mat);
    const ang = Math.random() * Math.PI * 2;
    const r = 2 + Math.random() * 7;
    p.position.set(Math.cos(ang) * r, 0.3 + Math.random() * 2.5, Math.sin(ang) * r);
    p.userData = {
      baseY: p.position.y, phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.5, r: r, ang: ang,
      orbitSpeed: (Math.random() - 0.5) * 0.12
    };
    scene.add(p);
    ambientParticles.push(p);
  }
}

// ─── ENEMY ────────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const ang = Math.random() * Math.PI * 2;
  const spawnR = 9.0;
  const x = Math.cos(ang) * spawnR;
  const z = Math.sin(ang) * spawnR;
  const g = new THREE.Group();

  const bodyGeo = new THREE.IcosahedronGeometry(0.28 + Math.random() * 0.1, 0);
  const hue = 0.75 + Math.random() * 0.2;
  const bodyMat = new THREE.MeshLambertMaterial({
    color: new THREE.Color().setHSL(hue, 0.9, 0.35),
    transparent: true, opacity: 0.88
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  g.add(body);

  const glowGeo = new THREE.SphereGeometry(0.2, 6, 6);
  const glowMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color().setHSL(hue, 1, 0.7),
    transparent: true, opacity: 0.3
  });
  g.add(new THREE.Mesh(glowGeo, glowMat));

  for (let i = 0; i < 5; i++) {
    const sGeo = new THREE.ConeGeometry(0.04, 0.22, 3);
    const sMat = new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(hue, 0.8, 0.5) });
    const spike = new THREE.Mesh(sGeo, sMat);
    const sa = (i / 5) * Math.PI * 2;
    spike.position.set(Math.cos(sa) * 0.24, Math.sin(sa) * 0.18, Math.sin(sa + 1) * 0.1);
    spike.rotation.z = sa + Math.PI / 2;
    g.add(spike);
  }

  g.position.set(x, 0.45, z);
  g.userData = {
    speed: (ENEMY_SPEED_BASE + waveNum * 0.22 + Math.random() * 0.3),
    phase: Math.random() * Math.PI * 2,
    hue: hue, alive: true, hitMesh: body
  };
  scene.add(g);
  enemies.push(g);
  waveEnemiesSpawned++;
}

// ─── PARTICLES (v02: enhanced) ────────────────────────────────────────────────

// Standard radial burst — enemy color layer
function spawnBurst(pos, color, count) {
  const c = count || 22;
  for (let i = 0; i < c; i++) {
    const geo = new THREE.SphereGeometry(0.055 + Math.random() * 0.065, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: color || 0x66ffcc, transparent: true, opacity: 1 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const spd = 3.5 + Math.random() * 4.5;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    p.userData = {
      vel: new THREE.Vector3(
        Math.sin(phi) * Math.cos(theta) * spd,
        Math.cos(phi) * spd * 0.7 + 1.2,
        Math.sin(phi) * Math.sin(theta) * spd
      ),
      life: 0.55 + Math.random() * 0.35, age: 0, mat: mat
    };
    scene.add(p);
    particles.push(p);
  }
}

// v02 NEW: fast expanding shockwave ring on kill
function spawnShockwave(pos) {
  const count = 28;
  for (let i = 0; i < count; i++) {
    const ang = (i / count) * Math.PI * 2;
    const geo = new THREE.SphereGeometry(0.045, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xaaffee, transparent: true, opacity: 0.9 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const spd = 5.5 + Math.random() * 2;
    p.userData = {
      vel: new THREE.Vector3(Math.cos(ang) * spd, 0.3 + Math.random() * 0.4, Math.sin(ang) * spd),
      life: 0.38 + Math.random() * 0.12, age: 0, mat: mat
    };
    scene.add(p);
    particles.push(p);
  }
}

// v02 NEW: golden combo shower — spawned at x3+ combos
function spawnComboBlast(pos, mult) {
  const count = 8 + mult * 3;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.04, 4, 4);
    // gold → white gradient based on mult
    const lum = 0.55 + Math.min(mult * 0.04, 0.3);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.12 + Math.random() * 0.06, 0.95, lum),
      transparent: true, opacity: 1
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.position.y += 0.3 + Math.random() * 0.5;
    const spd = 2 + Math.random() * 3;
    const theta = Math.random() * Math.PI * 2;
    p.userData = {
      vel: new THREE.Vector3(
        Math.cos(theta) * spd * 0.5,
        1.8 + Math.random() * 2.5,
        Math.sin(theta) * spd * 0.5
      ),
      life: 0.7 + Math.random() * 0.5, age: 0, mat: mat
    };
    scene.add(p);
    particles.push(p);
  }
}

// Totem damage ring (unchanged logic, kept for damage feedback)
function spawnRingBurst(pos) {
  for (let i = 0; i < 30; i++) {
    const ang = (i / 30) * Math.PI * 2;
    const geo = new THREE.SphereGeometry(0.045, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.95 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData = {
      vel: new THREE.Vector3(Math.cos(ang) * 5, 0.6 + Math.random() * 1.2, Math.sin(ang) * 5),
      life: 0.55, age: 0, mat: mat
    };
    scene.add(p);
    particles.push(p);
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; shield = 5; waveNum = 1;
  comboCount = 0; comboTimer = 0;
  waveEnemyCount = WAVE_ENEMIES[0];
  waveEnemiesSpawned = 0;
  spawnInterval = 2.2; spawnAccum = 0;
  shakeAmt = 0;
  gameRunning = true; gameOver = false;
  dmgVignette.style.opacity = 0;

  [...enemies, ...particles].forEach(o => scene.remove(o));
  enemies.length = 0; particles.length = 0;

  overlayEl.classList.add('hidden');
  hintBar.classList.remove('gone');
  setTimeout(() => hintBar.classList.add('gone'), 4000);

  updateHUD();
  clock.start();
  if (!renderer) { initRenderer(); initScene(); }
  requestAnimationFrame(loop);
}

function loop() {
  if (!gameRunning && !gameOver) return;
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (gameRunning) update(dt);
  render();
}

function update(dt) {
  const t = clock.elapsedTime;

  // Totem pulse
  const pulse = 0.92 + Math.sin(t * 2.2) * 0.08;
  totemGlow.scale.setScalar(pulse);
  totemGroup.rotation.y += dt * 0.25;

  // Ambient particles
  ambientParticles.forEach(p => {
    const d = p.userData;
    d.ang += d.orbitSpeed * dt;
    p.position.x = Math.cos(d.ang) * d.r;
    p.position.z = Math.sin(d.ang) * d.r;
    p.position.y = d.baseY + Math.sin(t * d.speed + d.phase) * 0.3;
    p.material.opacity = 0.2 + Math.sin(t * d.speed + d.phase) * 0.2;
  });

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboEl.style.opacity = 0; }
  }

  // Spawn
  spawnAccum += dt;
  if (spawnAccum >= spawnInterval && waveEnemiesSpawned < waveEnemyCount) {
    spawnAccum = 0;
    spawnEnemy();
    spawnInterval = Math.max(0.45, spawnInterval * 0.93);
  }

  // Wave cleared
  if (waveEnemiesSpawned >= waveEnemyCount && enemies.length === 0) {
    nextWave();
  }

  // v02: low-health micro-tremor — subtle shake at 1 shield
  if (shield === 1 && gameRunning) {
    shakeAmt = Math.max(shakeAmt, 0.018 + Math.sin(t * 8) * 0.009);
  }

  // Update enemies
  const totemPos = new THREE.Vector3(0, 0.45, 0);
  const toRemove = [];
  enemies.forEach(e => {
    if (!e.userData.alive) { toRemove.push(e); return; }
    const dir = totemPos.clone().sub(e.position).normalize();
    e.position.addScaledVector(dir, e.userData.speed * dt);
    e.rotation.y += dt * 2;
    e.rotation.x += dt * 1.3;
    const s = 1 + Math.sin(t * 4 + e.userData.phase) * 0.12;
    e.scale.setScalar(s);
    if (e.position.distanceTo(totemPos) < 0.9) {
      hitTotem(e);
      toRemove.push(e);
    }
  });
  toRemove.forEach(e => {
    scene.remove(e);
    const idx = enemies.indexOf(e);
    if (idx >= 0) enemies.splice(idx, 1);
  });

  // Update burst particles
  const pRemove = [];
  particles.forEach(p => {
    const d = p.userData;
    d.age += dt;
    if (d.age >= d.life) { pRemove.push(p); return; }
    const prog = d.age / d.life;
    p.position.addScaledVector(d.vel, dt);
    d.vel.y -= dt * 9;
    d.mat.opacity = 1 - prog;
    p.scale.setScalar(1 - prog * 0.6);
  });
  pRemove.forEach(p => { scene.remove(p); particles.splice(particles.indexOf(p), 1); });

  // Camera shake
  if (shakeAmt > 0.001) {
    camera.position.x = Math.sin(t * 40) * shakeAmt;
    camera.position.z = 12 + Math.cos(t * 38) * shakeAmt;
    shakeAmt *= shakeDecay;
    if (shakeAmt < 0.001) { camera.position.x = 0; camera.position.z = 12; }
  }
}

function hitTotem(enemy) {
  shield--;
  // v02: shake scales with shields remaining — more desperate at low HP
  const shakeScale = 1 + (5 - shield) * 0.12;
  shakeAmt = 0.24 * shakeScale;
  sfxDamage();
  flashBad();
  spawnRingBurst(totemGroup.position.clone().add(new THREE.Vector3(0, 1.8, 0)));

  // v02: damage vignette at low health
  if (shield <= 2) {
    dmgVignette.style.opacity = shield === 1 ? 0.85 : 0.45;
  }

  updateHUD();
  if (shield <= 0) { endGame(); }
}

function nextWave() {
  waveNum++;
  waveEnemyCount = WAVE_ENEMIES[Math.min(waveNum - 1, WAVE_ENEMIES.length - 1)];
  waveEnemiesSpawned = 0;
  spawnInterval = Math.max(0.45, 2.2 - waveNum * 0.15);
  spawnAccum = 0;
  updateHUD();
  showPopup(`WAVE ${waveNum}`, '#6fffd4');
}

function endGame() {
  gameRunning = false; gameOver = true;
  enemies.forEach(e => scene.remove(e));
  enemies.length = 0;
  if (score > hiScore) hiScore = score;
  sfxGameOver();
  setTimeout(() => showGameOver(), 900);
}

function showGameOver() {
  finalEl.textContent = `SCORE: ${score}`;
  bestEl.textContent = hiScore > score ? `BEST: ${hiScore}` : 'NEW BEST!';
  finalEl.classList.remove('hidden');
  bestEl.classList.remove('hidden');
  hintTxt.classList.add('hidden');
  startBtn.textContent = 'WARD AGAIN';
  overlayEl.classList.remove('hidden');
}

// ─── TAP / CLICK ──────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onTap(clientX, clientY) {
  if (!gameRunning) return;
  getAC();

  mouse.x = (clientX / W()) * 2 - 1;
  mouse.y = -(clientY / H()) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const enemyMeshes = [];
  enemies.forEach(e => e.traverse(m => { if (m.isMesh) enemyMeshes.push(m); }));
  const hits = raycaster.intersectObjects(enemyMeshes, false);

  if (hits.length > 0) {
    let hitObj = hits[0].object;
    while (hitObj.parent && !enemies.includes(hitObj)) hitObj = hitObj.parent;
    if (hitObj.userData.alive) {
      hitObj.userData.alive = false;
      killEnemy(hitObj);
    }
  }
}

function killEnemy(e) {
  const hue = e.userData.hue;
  const col = new THREE.Color().setHSL(hue, 1, 0.65);

  // Combo calc first — needed for particle selection
  comboCount++;
  comboTimer = 1.8;
  const mult = Math.min(comboCount, 8);
  const pts = 10 * mult;
  score += pts;

  // v02: dual-layer burst — enemy color + shockwave ring
  spawnBurst(e.position.clone(), col, 26);
  spawnShockwave(e.position.clone());
  // v02: gold shower at x3+ combos
  if (mult >= 3) spawnComboBlast(e.position.clone(), mult);

  sfxBurst(200 + hue * 400);
  if (comboCount >= 3) sfxCombo(comboCount);

  flashGreen();
  shakeAmt = Math.max(shakeAmt, 0.07 + mult * 0.018);

  updateHUD();
  showCombo(mult, pts);
  if (comboCount >= 3) showPopup(`x${mult} COMBO!`, '#ffdd55');
}

function updateHUD() {
  scoreEl.textContent = score;
  const hearts = '♦'.repeat(Math.max(0, shield)) + '◇'.repeat(Math.max(0, 5 - shield));
  shieldEl.textContent = hearts;
  // v02: brighter shield color transitions
  if (shield > 3) shieldEl.style.color = '#55ffaa';
  else if (shield > 2) shieldEl.style.color = '#88ff88';
  else if (shield > 1) shieldEl.style.color = '#ffdd55';
  else shieldEl.style.color = '#ff5544';
  waveEl.textContent = `WAVE ${waveNum}`;
}

function showCombo(mult, pts) {
  if (comboCount < 2) { comboEl.style.opacity = 0; return; }
  comboEl.textContent = `x${mult} — +${pts}`;
  comboEl.style.opacity = 1;
}

let popupTween = null;
function showPopup(text, color) {
  if (popupTween) clearTimeout(popupTween);
  popupEl.textContent = text;
  popupEl.style.color = color || '#6fffd4';
  popupEl.style.opacity = 1;
  popupEl.style.transform = 'translateX(-50%) translateY(0px)';
  popupEl.style.transition = 'none';
  requestAnimationFrame(() => {
    popupEl.style.transition = 'opacity 0.9s, transform 0.9s';
    popupEl.style.opacity = 0;
    popupEl.style.transform = 'translateX(-50%) translateY(-30px)';
  });
  popupTween = setTimeout(() => { popupEl.style.opacity = 0; }, 1000);
}

function flashGreen() {
  flashEl.style.opacity = 0.75;
  flashEl.style.transition = 'none';
  requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.35s';
    flashEl.style.opacity = 0;
  });
}

function flashBad() {
  badFlashEl.style.opacity = 1;
  badFlashEl.style.transition = 'none';
  requestAnimationFrame(() => {
    badFlashEl.style.transition = 'opacity 0.5s';
    badFlashEl.style.opacity = 0;
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderer.render(scene, camera);
}

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!renderer) return;
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// ─── INPUT ────────────────────────────────────────────────────────────────────
window.addEventListener('pointerdown', e => onTap(e.clientX, e.clientY));

startBtn.addEventListener('click', () => {
  if (!renderer) { initRenderer(); initScene(); }
  startGame();
});

// Telegram WebApp integration
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

// ─── BOOT: idle render until start ───────────────────────────────────────────
initRenderer();
initScene();
(function idleRender() {
  if (gameRunning) return;
  requestAnimationFrame(idleRender);
  const dt2 = clock.getDelta();
  const t2 = clock.elapsedTime;
  totemGroup.rotation.y += dt2 * 0.3;
  const p2 = 0.88 + Math.sin(t2 * 1.8) * 0.12;
  totemGlow.scale.setScalar(p2);
  ambientParticles.forEach(p => {
    const d = p.userData;
    d.ang += d.orbitSpeed * dt2;
    p.position.x = Math.cos(d.ang) * d.r;
    p.position.z = Math.sin(d.ang) * d.r;
    p.position.y = d.baseY + Math.sin(t2 * d.speed + d.phase) * 0.3;
    p.material.opacity = 0.2 + Math.sin(t2 * d.speed + d.phase) * 0.2;
  });
  renderer.render(scene, camera);
})();
</script>
</body>
