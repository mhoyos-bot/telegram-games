<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.min.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── ATOM: threejs_telegram_bridge ─────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
function haptic(t) { tg?.HapticFeedback?.impactOccurred?.(t); }

// ── ATOM: threejs_scene_setup ─────────────────────────────────────────────────
let W = innerWidth, H = innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = false;
renderer.setSize(W, H);
renderer.setClearColor(0x030311);
Object.assign(renderer.domElement.style, { position:'fixed', top:'0', left:'0', zIndex:'1' });
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const cam   = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
cam.position.z = 10;

// ── Constants ─────────────────────────────────────────────────────────────────
const COLS   = 4;
const CLR    = [0xff1493, 0x14f195, 0xff8c00, 0x00b4ff];
const CSS    = ['#ff1493','#14f195','#ff8c00','#00b4ff'];
const MAX_HP = 5;
const HIT_H  = 78;
const NOTE_H = 52;
const GAP    = 4;
const PERF_W = 65;   // ms — tighter than v003 for more skill expression
const GOOD_W = 175;
const MISS_T = 285;
const BPM    = 128;
const BEAT   = 60000 / BPM;

// ── Layout ────────────────────────────────────────────────────────────────────
let colW, colXs, hitY, spawnY, travelPx;
let spd = 320;

function calcLayout() {
  colW     = (W - GAP * (COLS + 1)) / COLS;
  colXs    = Array.from({length:COLS}, (_,i) => -W/2 + GAP*(i+1) + colW*(i+0.5));
  hitY     = -H/2 + HIT_H * 0.5;
  spawnY   =  H/2 + NOTE_H;
  travelPx = spawnY - hitY;
}
calcLayout();
function travelMs() { return travelPx / spd * 1000; }

// ── Column BG + hit zones ─────────────────────────────────────────────────────
const colBGMats = [], hitZoneMats = [];
for (let i = 0; i < COLS; i++) {
  const bgm  = new THREE.MeshBasicMaterial({ color:CLR[i], transparent:true, opacity:0.02 });
  const bgmesh = new THREE.Mesh(new THREE.PlaneGeometry(colW, H), bgm);
  bgmesh.position.set(colXs[i], 0, -1);
  scene.add(bgmesh);
  colBGMats.push(bgm);

  const hzm  = new THREE.MeshBasicMaterial({ color:CLR[i], transparent:true, opacity:0.28 });
  const hzmesh = new THREE.Mesh(new THREE.PlaneGeometry(colW - 4, HIT_H - 6), hzm);
  hzmesh.position.set(colXs[i], hitY, 0.1);
  scene.add(hzmesh);
  hitZoneMats.push(hzm);
}

// Separator line
{
  const y = -H/2 + HIT_H;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([-W/2,y,0, W/2,y,0], 3));
  scene.add(new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.18 })));
}
// Column dividers
for (let i = 1; i < COLS; i++) {
  const x = -W/2 + GAP*i + colW*i;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([x,-H/2,0, x,H/2,0], 3));
  scene.add(new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.06 })));
}

// ── ATOM: threejs_object_pool — notes ─────────────────────────────────────────
const NOTE_MAX = 32;
const noteGeo  = new THREE.PlaneGeometry(1, NOTE_H);
const notePool = [];
for (let i = 0; i < NOTE_MAX; i++) {
  const mat  = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0 });
  const mesh = new THREE.Mesh(noteGeo, mat);
  mesh.visible = false;
  scene.add(mesh);
  notePool.push({ mesh, mat, col:0, pt:0, active:false, tapped:false });
}
function spawnNote(col, pt) {
  for (const n of notePool) {
    if (n.active) continue;
    n.col = col; n.pt = pt; n.active = true; n.tapped = false;
    n.mat.color.setHex(CLR[col]); n.mat.opacity = 0.93;
    n.mesh.scale.set(colW - 7, 1, 1);
    n.mesh.position.set(colXs[col], spawnY, 0.3);
    n.mesh.visible = true;
    return;
  }
}
function killNote(n) { n.active = false; n.mesh.visible = false; }

// ── ATOM: threejs_particle_system ─────────────────────────────────────────────
const PMAX  = 60;
const parts = [];
for (let i = 0; i < PMAX; i++) {
  const m    = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0 });
  const mesh = new THREE.Mesh(new THREE.CircleGeometry(3 + Math.random()*6, 6), m);
  mesh.visible = false;
  scene.add(mesh);
  parts.push({ mesh, m, vx:0, vy:0, life:0, max:0 });
}
function burst(x, y, hex, n) {
  let c = 0;
  for (const p of parts) {
    if (p.life > 0 || c >= n) continue;
    const a = Math.random()*Math.PI*2, s = 150 + Math.random()*320;
    p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s;
    p.life = p.max = 0.36 + Math.random()*0.24;
    p.mesh.position.set(x, y, 1.5);
    p.mesh.scale.setScalar(1);
    p.m.color.setHex(hex); p.m.opacity = 1;
    p.mesh.visible = true;
    c++;
  }
}

// DOM score popups
const POPMAX = 8;
const pops   = [];
for (let i = 0; i < POPMAX; i++) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;pointer-events:none;z-index:22;font-family:"Arial Black",Arial;' +
    'font-weight:900;font-size:22px;display:none;transform:translate(-50%,-50%)';
  document.body.appendChild(el);
  pops.push({ el, life:0, sy:0 });
}
function popScore(txt, col, css) {
  const sx = colXs[col] + W/2;
  const sy = H - HIT_H * 0.5;
  for (const p of pops) {
    if (p.life > 0) continue;
    p.life = 0.72; p.sy = sy;
    p.el.textContent = txt; p.el.style.color = css;
    p.el.style.textShadow = `0 0 10px ${css}`;
    p.el.style.display = 'block'; p.el.style.opacity = '1';
    p.el.style.left = sx+'px'; p.el.style.top = sy+'px';
    return;
  }
}

// ── ATOM: ring_ripple_atom — expanding rings at hit zone on tap ───────────────
// Pool of 12 ring meshes (3 per column, shared). Rings expand outward on hit,
// fading to transparent. Sized relative to colW at spawn time.
const RING_MAX  = 12;
const ringPool  = [];
for (let i = 0; i < RING_MAX; i++) {
  const mat  = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0,
                                              side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(new THREE.RingGeometry(0.7, 1.0, 32), mat);
  mesh.visible = false;
  scene.add(mesh);
  ringPool.push({ mesh, mat, life:0, max:0, baseScale:1 });
}
function ripple(col) {
  for (const r of ringPool) {
    if (r.life > 0) continue;
    r.life = r.max = 0.42;
    r.baseScale = colW * 0.52;
    r.mat.color.setHex(CLR[col]);
    r.mesh.position.set(colXs[col], hitY, 0.9);
    r.mesh.scale.setScalar(r.baseScale * 0.2);
    r.mat.opacity = 0.95;
    r.mesh.visible = true;
    return;
  }
}

// ── ATOM: edge_flash_atom — full-screen edge glow on PERFECT ──────────────────
const flashEl = document.getElementById('flash');
let flashT = 0, flashCol = '#14f195';
function edgeFlash(css) {
  flashCol = css;
  flashEl.style.boxShadow = `inset 0 0 140px 55px ${css}`;
  flashEl.style.opacity   = '1';
  flashT = 0.24;
}

// ── Web Audio ─────────────────────────────────────────────────────────────────
let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function tone(freq, dur, type, vol) {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(_e) { /* audio context unavailable — no-op */ }
}
const FREQS = [392, 523, 659, 784];
function playHit(col, perf) { tone(FREQS[col], perf?0.20:0.11, 'sine', perf?0.40:0.24); }
function playMiss()         { tone(110, 0.13, 'sawtooth', 0.07); }
function playBeat()         { tone(880, 0.03, 'square', 0.025); }
function playFeverJingle()  { tone(1320,0.22,'sine',0.11); tone(1760,0.16,'sine',0.08); }

// ── ATOM: fever_mode_atom ─────────────────────────────────────────────────────
const FEVER_DUR   = 8;
const FEVER_DECAY = 1.8;
let fever=0, feverOn=false, feverT=0, feverHue=0;
const fbfill = document.getElementById('fbfill');
const ftxt   = document.getElementById('ftxt');
function addFever(v) {
  if (feverOn) return;
  fever = Math.min(100, fever + v);
  fbfill.style.width = fever + '%';
  if (fever >= 100) {
    feverOn=true; feverT=FEVER_DUR; ftxt.style.opacity='1';
    playFeverJingle(); haptic('heavy');
  }
}
function loseFever() {
  fever = Math.max(0, fever - 25);
  fbfill.style.width = fever + '%';
}

// ── ATOM: threejs_ui_overlay — game state ─────────────────────────────────────
let score=0, combo=0, mult=1, hp=MAX_HP, phase='playing';
let nextBeat = performance.now() + 200;   // fast start — first note ~300ms
let beatCnt=0, patStep=0, elapsed=0, beatSkip=2;
let tier=0, shake=0, lastT=performance.now(), feedT=0, scoreT=0;

const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const multEl  = document.getElementById('mult');
const livesEl = document.getElementById('lives');
const feedEl  = document.getElementById('feed');
const goEl    = document.getElementById('go');
const fsEl    = document.getElementById('fs');

function buildLives() {
  livesEl.innerHTML = '';
  for (let i = 0; i < MAX_HP; i++) {
    const d = document.createElement('div');
    d.className = 'h' + (i >= hp ? ' x' : '');
    livesEl.appendChild(d);
  }
}
buildLives();

function showFeed(txt, css) {
  feedEl.textContent = txt; feedEl.style.color = css;
  feedEl.style.textShadow = `0 0 18px ${css}`;
  feedEl.style.opacity = '1'; feedT = 0.50;
}

function bumpScore(v) {
  score += v;
  scoreEl.textContent = String(score).padStart(5,'0');
  scoreEl.classList.remove('bump');
  void scoreEl.offsetWidth;      // reflow to retrigger transition
  scoreEl.classList.add('bump');
  scoreT = 0.09;
}

function refreshCombo() {
  if (combo >= 4) {
    mult = combo >= 20 ? 5 : combo >= 10 ? 3 : combo >= 5 ? 2 : 1;
    comboEl.textContent = `${combo}✕`;
    multEl.textContent  = mult > 1 ? `×${mult}` : '';
    comboEl.style.transform = `scale(${1 + Math.min(combo*0.013, 0.36)})`;
  } else {
    mult = 1;
    comboEl.textContent = ''; multEl.textContent = '';
    comboEl.style.transform = 'scale(1)';
  }
}

// ── Patterns per difficulty tier ──────────────────────────────────────────────
const PATS = [
  [[0],[1],[2],[3],[0],[2],[1],[3],[0,2],[1,3],[0],[1]],
  [[0],[1,3],[2],[0,3],[1],[2],[0,2],[3],[1,3],[0],[2,3],[1,0]],
  [[0,2],[1,3],[0],[1,2,3],[0,3],[2],[0,1],[3],[1,2],[0,2,3],[0],[1,3]],
];

function scheduleBeat(bt) {
  beatCnt++; elapsed += BEAT / 1000;
  if      (elapsed > 90 && tier < 2) { tier=2; beatSkip=1; spd=Math.min(720,spd+80); }
  else if (elapsed > 45 && tier < 1) { tier=1; beatSkip=1; spd=Math.min(720,spd+50); }
  if (beatCnt % 8 === 0) spd = Math.min(720, spd + 6);
  playBeat();
  if (beatCnt % beatSkip !== 0) return;
  const pat  = PATS[tier];
  const step = pat[patStep % pat.length];
  patStep++;
  const pt = bt + travelMs();
  for (const col of step) spawnNote(col, pt);
}

// ── ATOM: threejs_touch_input ─────────────────────────────────────────────────
function colFromX(cx) {
  for (let i = 0; i < COLS; i++) {
    if (cx >= colXs[i] - colW/2 + W/2 && cx <= colXs[i] + colW/2 + W/2) return i;
  }
  return -1;
}

function onTap(cx) {
  if (phase !== 'playing') return;
  if (actx?.state === 'suspended') actx.resume().catch(_e => { /* resume failed — continue */ });
  const col = colFromX(cx);
  if (col < 0) return;
  const now = performance.now();
  let best = null, bd = Infinity;
  for (const n of notePool) {
    if (!n.active || n.tapped || n.col !== col) continue;
    const d = Math.abs(now - n.pt);
    if (d < bd) { bd = d; best = n; }
  }
  if (!best) { ripple(col); return; }   // empty tap — still show ring
  best.tapped = true;
  killNote(best);
  const fMult = feverOn ? 2 : 1;
  ripple(col);

  if (bd <= PERF_W) {
    const pts = 150 * mult * fMult;
    bumpScore(pts); combo++;
    refreshCombo(); showFeed('PERFECT!', CSS[col]);
    burst(colXs[col], hitY, CLR[col], 22);
    edgeFlash(CSS[col]);
    hitZoneMats[col].opacity = 0.82;
    addFever(13); shake = 0.012; playHit(col, true);
    popScore('+'+pts, col, CSS[col]);
    haptic('heavy');
  } else if (bd <= GOOD_W) {
    const pts = 70 * mult * fMult;
    bumpScore(pts); combo++;
    refreshCombo(); showFeed('GOOD', CSS[col]);
    burst(colXs[col], hitY, CLR[col], 10);
    hitZoneMats[col].opacity = 0.54;
    addFever(5); shake = 0.005; playHit(col, false);
    popScore('+'+pts, col, CSS[col]);
    haptic('medium');
  } else {
    combo = 0; refreshCombo();
    showFeed(now < best.pt ? 'EARLY' : 'LATE', '#ff4444');
    hitZoneMats[col].opacity = 0.48;
    loseFever(); playMiss(); hp--; buildLives(); haptic('light');
    if (hp <= 0) gameOver();
  }
}

function doMiss(n) {
  combo = 0; refreshCombo();
  showFeed('MISS!', '#ff4444');
  killNote(n); loseFever(); playMiss(); hp--; buildLives(); haptic('light');
  if (hp <= 0) gameOver();
}

function gameOver() {
  phase = 'gameover';
  fsEl.textContent = score;
  goEl.classList.add('show');
}

function restart() {
  score=0; combo=0; mult=1; hp=MAX_HP; phase='playing';
  tier=0; patStep=0; beatCnt=0; beatSkip=2;
  elapsed=0; spd=320; shake=0; feedT=0; flashT=0; scoreT=0;
  fever=0; feverOn=false; feverT=0; feverHue=0;
  scoreEl.textContent='00000';
  comboEl.textContent=''; multEl.textContent='';
  feedEl.style.opacity='0';
  flashEl.style.opacity='0';
  fbfill.style.width='0%'; ftxt.style.opacity='0';
  buildLives();
  nextBeat = performance.now() + 200;
  for (const n of notePool) killNote(n);
  for (const p of parts)    { p.life=0; p.mesh.visible=false; }
  for (const p of pops)     { p.life=0; p.el.style.display='none'; }
  for (const r of ringPool) { r.life=0; r.mesh.visible=false; }
  for (let i=0; i<COLS; i++) {
    hitZoneMats[i].opacity = 0.28;
    colBGMats[i].color.setHex(CLR[i]);
    colBGMats[i].opacity = 0.02;
  }
  goEl.classList.remove('show');
}

document.getElementById('rb').addEventListener('pointerdown', restart);
renderer.domElement.addEventListener('pointerdown', e => { e.preventDefault(); onTap(e.clientX); });

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  const dt  = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;

  if (phase === 'playing') {
    while (ts >= nextBeat) { scheduleBeat(nextBeat); nextBeat += BEAT; }
  }

  const beatPhase = (ts % BEAT) / BEAT;
  const pulse     = Math.pow(Math.max(0, 1 - beatPhase * 4.2), 2);
  const now       = performance.now();

  // ATOM: fever_mode_atom tick
  if (feverOn) {
    feverT -= dt; feverHue = (feverHue + dt * 210) % 360;
    if (feverT <= 0) {
      feverOn=false; fever=0;
      fbfill.style.width='0%'; ftxt.style.opacity='0';
      for (let i=0; i<COLS; i++) colBGMats[i].color.setHex(CLR[i]);
    }
    for (let i=0; i<COLS; i++) {
      colBGMats[i].color.setHSL(((feverHue + i*90)%360)/360, 1, 0.5);
      colBGMats[i].opacity = 0.07 + pulse * 0.045;
    }
  } else {
    for (let i=0; i<COLS; i++) colBGMats[i].opacity = 0.02 + pulse * 0.016;
    if (fever > 0) {
      fever = Math.max(0, fever - FEVER_DECAY * dt);
      fbfill.style.width = fever + '%';
    }
  }

  // Note movement — derived from absolute timing (zero drift)
  for (const n of notePool) {
    if (!n.active) continue;
    const y = hitY + (n.pt - now) * spd / 1000;
    n.mesh.position.y = y;
    n.mesh.visible = (y > -H/2 - NOTE_H && y < H/2 + NOTE_H);
    if (feverOn) {
      n.mat.color.setHSL(((feverHue + n.col*90)%360)/360, 1, 0.72);
    } else {
      n.mat.color.setHex(CLR[n.col]);
    }
    if (!n.tapped && now > n.pt + MISS_T) { doMiss(n); continue; }
    const dist = Math.abs(n.pt - now);
    n.mat.opacity = dist < PERF_W ? 1.0 : dist < GOOD_W ? 0.9 : 0.83;
  }

  // Hit zone flash decay + beat pulse
  for (let i=0; i<COLS; i++) {
    const base = feverOn ? 0.40 : 0.14 + pulse * 0.12;
    if (hitZoneMats[i].opacity > base + 0.01) {
      hitZoneMats[i].opacity = Math.max(base, hitZoneMats[i].opacity - dt * 4.5);
    } else {
      hitZoneMats[i].opacity = base;
    }
  }

  // Particles
  for (const p of parts) {
    if (p.life <= 0) continue;
    p.life -= dt;
    if (p.life <= 0) { p.mesh.visible=false; continue; }
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.vy -= 430 * dt;
    const t = p.life / p.max;
    p.m.opacity = t * t; p.mesh.scale.setScalar(0.4 + t);
  }

  // ATOM: ring_ripple_atom tick — rings expand outward and fade
  for (const r of ringPool) {
    if (r.life <= 0) continue;
    r.life -= dt;
    if (r.life <= 0) { r.mesh.visible=false; continue; }
    const t = 1 - r.life / r.max;            // 0→1 as ring expands
    r.mesh.scale.setScalar(r.baseScale * (0.2 + t * 2.2));
    r.mat.opacity = (1 - t) * 0.88;
  }

  // ATOM: edge_flash_atom tick
  if (flashT > 0) {
    flashT -= dt;
    flashEl.style.opacity = flashT > 0 ? Math.min(1, flashT / 0.24).toFixed(2) : '0';
  }

  // Score bump class removal
  if (scoreT > 0) {
    scoreT -= dt;
    if (scoreT <= 0) scoreEl.classList.remove('bump');
  }

  // Score popups
  for (const p of pops) {
    if (p.life <= 0) continue;
    p.life -= dt;
    if (p.life <= 0) { p.el.style.display='none'; continue; }
    p.sy -= 90 * dt;
    p.el.style.top     = p.sy+'px';
    p.el.style.opacity = Math.min(1, p.life * 2.8).toFixed(2);
  }

  // Feedback text fade
  if (feedT > 0) {
    feedT -= dt;
    feedEl.style.opacity = feedT <= 0 ? '0' : feedT < 0.18 ? (feedT/0.18).toFixed(2) : '1';
  }

  // Camera shake
  if (shake > 0) {
    shake *= 0.78;
    cam.position.x = (Math.random()-0.5) * shake * 20;
    cam.position.y = (Math.random()-0.5) * shake * 20;
  } else {
    cam.position.x = 0; cam.position.y = 0;
  }

  renderer.render(scene, cam);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = innerWidth; H = innerHeight;
  renderer.setSize(W, H);
  cam.left=-W/2; cam.right=W/2; cam.top=H/2; cam.bottom=-H/2;
  cam.updateProjectionMatrix();
  calcLayout();
});

requestAnimationFrame(loop);
</script>
</body></html>
