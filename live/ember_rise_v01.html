<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>EMBER RISE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050a03;overflow:hidden;font-family:'Courier New',monospace;touch-action:none}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
#score{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  color:#ffcc66;font-size:32px;font-weight:bold;
  text-shadow:0 0 18px #ff8822;letter-spacing:2px}
#score.pop{animation:sPop .15s ease-out}
@keyframes sPop{0%{transform:translateX(-50%) scale(1.45)}100%{transform:translateX(-50%) scale(1)}}
#chain{position:absolute;top:56px;left:50%;transform:translateX(-50%);
  color:#ff6644;font-size:17px;font-weight:bold;text-shadow:0 0 12px #ff4400;
  opacity:0;transition:opacity .25s;letter-spacing:3px}
#lives{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:7px;align-items:center}
.ldot{width:11px;height:11px;border-radius:50%;
  background:#ff8844;box-shadow:0 0 7px #ff6622;transition:all .3s}
.ldot.off{background:#1a0d04;box-shadow:none}
#flash{position:absolute;inset:0;pointer-events:none;opacity:0;
  background:rgba(255,120,40,0.18);transition:opacity .08s}
#popup{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  color:#ffcc44;font-size:26px;font-weight:bold;
  text-shadow:0 0 14px #ff8800;pointer-events:none;opacity:0;
  transition:opacity .2s;letter-spacing:3px;white-space:nowrap}
#hint{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);
  color:rgba(255,180,80,0.55);font-size:12px;letter-spacing:3px;
  transition:opacity 1.2s;pointer-events:none}
#over{position:absolute;inset:0;background:rgba(3,6,2,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:all}
#over h1{color:#ffcc66;font-size:34px;text-shadow:0 0 20px #ff8822;
  margin-bottom:10px;letter-spacing:5px}
#over .fs{color:#ff9944;font-size:22px;margin-bottom:22px;
  text-shadow:0 0 10px #ff6600}
#over button{background:#0d0600;border:2px solid #ff8844;
  color:#ffcc66;font-size:15px;padding:12px 36px;
  cursor:pointer;letter-spacing:3px;font-family:'Courier New',monospace;
  box-shadow:0 0 16px #ff884440}
#over button:hover{background:#1a0a00}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score">0</div>
  <div id="chain"></div>
  <div id="lives"></div>
  <div id="flash"></div>
  <div id="popup"></div>
  <div id="hint">✦ TAP EMBERS — CHAIN FOR POWER ✦</div>
</div>
<div id="over">
  <h1>FLAMES FADE</h1>
  <div class="fs" id="fs"></div>
  <button id="btn">REKINDLE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

// ---- RENDERER ----
const canvas=document.getElementById('c');
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(W(),H());
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x050a03);
renderer.shadowMap.enabled=false;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x020601,0.068);

const camera=new THREE.PerspectiveCamera(62,W()/H(),0.1,50);
camera.position.set(0,2,9);
camera.lookAt(0,1,0);

window.addEventListener('resize',()=>{
  renderer.setSize(W(),H());
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
});

// ---- LIGHTING ----
scene.add(new THREE.AmbientLight(0x1a2a0a,0.5));
const sun=new THREE.DirectionalLight(0xff8833,0.4);
sun.position.set(-3,8,-2);
scene.add(sun);

// ---- ENVIRONMENT ----
// Ground
const gGeo=new THREE.PlaneGeometry(26,32,14,14);
const gPos=gGeo.attributes.position;
for(let i=0;i<gPos.count;i++) gPos.setZ(i,Math.random()*0.14);
gGeo.computeVertexNormals();
const ground=new THREE.Mesh(gGeo,
  new THREE.MeshLambertMaterial({color:0x0a1a05,flatShading:true}));
ground.rotation.x=-Math.PI/2;
ground.position.y=-1.8;
scene.add(ground);

// Trees
function makeTree(x,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(
    new THREE.CylinderGeometry(0.07,0.12,1.6,5),
    new THREE.MeshLambertMaterial({color:0x1a1005,flatShading:true}));
  trunk.position.y=0.8;
  g.add(trunk);
  const h=1.2+Math.random()*1.8;
  const foliage=new THREE.Mesh(
    new THREE.ConeGeometry(0.52+Math.random()*0.38,h,5),
    new THREE.MeshLambertMaterial({color:0x071a03,flatShading:true}));
  foliage.position.y=1.6+h/2;
  g.add(foliage);
  g.position.set(x,-1.8,z);
  g.rotation.y=Math.random()*Math.PI*2;
  const s=0.8+Math.random()*0.5;
  g.scale.set(s,s,s);
  scene.add(g);
}
for(let z=-18;z<2;z+=2.2){
  makeTree(-3.8-Math.random()*2.4,z);
  makeTree(3.8+Math.random()*2.4,z);
}
for(let x=-9;x<9;x+=2.2) makeTree(x,-17-Math.random()*2);

// ---- GAME STATE ----
const COLORS=[0xff6622,0xffaa22,0xff3322,0xffdd44,0xff8844,0xffcc88];
const MAX_MISS=6;
let score=0,combo=0,missed=0,alive=true;
let embers=[],parts=[];
let spawnTimer=0,spawnRate=900;
let shakeT=0,shakeAmp=0;

// Shared geometries
const eGeo=new THREE.SphereGeometry(1,8,6);
const pGeo=new THREE.SphereGeometry(1,4,3);

function spawnEmber(){
  const col=COLORS[Math.floor(Math.random()*COLORS.length)];
  const r=0.18+Math.random()*0.22;
  const mat=new THREE.MeshToonMaterial({color:col,emissive:col,emissiveIntensity:0.8});
  const mesh=new THREE.Mesh(eGeo,mat);
  mesh.scale.setScalar(r);
  const side=(Math.random()>0.5?1:-1)*(1.2+Math.random()*2);
  mesh.position.set(side,  -1.2+Math.random()*0.3,  -2-Math.random()*11);
  mesh.userData={
    col, r,
    vx:(Math.random()-0.5)*0.007,
    vy:0.018+Math.random()*0.014,
    vz:0.002+Math.random()*0.003,
    phase:Math.random()*Math.PI*2,
    age:0, maxAge:4+Math.random()*3,
    pts:Math.max(5,Math.round((0.38/r)*6))
  };
  scene.add(mesh);
  embers.push(mesh);
}

function burst(pos,col){
  for(let i=0;i<34;i++){
    const m=new THREE.Mesh(pGeo,
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:1}));
    m.scale.setScalar(0.03+Math.random()*0.055);
    m.position.copy(pos);
    const sp=0.04+Math.random()*0.1;
    const phi=Math.random()*Math.PI*2, theta=Math.random()*Math.PI;
    m.userData={
      vx:Math.sin(theta)*Math.cos(phi)*sp,
      vy:Math.abs(Math.sin(theta)*Math.sin(phi)*sp)+0.018,
      vz:Math.cos(theta)*sp,
      life:1, dec:0.024+Math.random()*0.028
    };
    scene.add(m); parts.push(m);
  }
  const fl=document.getElementById('flash');
  fl.style.opacity='0.3';
  setTimeout(()=>fl.style.opacity='0',80);
  shakeAmp=0.07; shakeT=0.28;
}

// Screen-space hit detection
const tmpV=new THREE.Vector3();
function hitTest(px,py){
  let best=null, bestD=9999;
  for(const e of embers){
    tmpV.copy(e.position).project(camera);
    const sx=(tmpV.x+1)/2*W();
    const sy=(1-tmpV.y)/2*H();
    const d=Math.hypot(sx-px,sy-py);
    if(d<58&&d<bestD){best=e;bestD=d;}
  }
  return best;
}

// ---- UI ----
const scoreEl=document.getElementById('score');
const chainEl=document.getElementById('chain');
const livesEl=document.getElementById('lives');
const popEl=document.getElementById('popup');
const overEl=document.getElementById('over');
const fsEl=document.getElementById('fs');
const hintEl=document.getElementById('hint');
let chainTO=null, popTO=null;

function addScore(pts){
  score+=pts;
  scoreEl.textContent=score;
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
  combo++;
  if(combo>=3){
    chainEl.textContent=`✦ ×${combo} CHAIN ✦`;
    chainEl.style.opacity='1';
    clearTimeout(chainTO);
    chainTO=setTimeout(()=>chainEl.style.opacity='0',1100);
  }
  if(combo===5||combo===10||combo===20||combo===30){
    showPop(`${combo} CHAIN!`);
  }
}

function showPop(txt){
  popEl.textContent=txt;
  popEl.style.opacity='1';
  clearTimeout(popTO);
  popTO=setTimeout(()=>popEl.style.opacity='0',700);
}

function drawLives(){
  livesEl.innerHTML='';
  for(let i=0;i<MAX_MISS;i++){
    const d=document.createElement('div');
    d.className='ldot'+(i>=MAX_MISS-missed?' off':'');
    livesEl.appendChild(d);
  }
}

function die(){
  alive=false;
  embers.forEach(e=>scene.remove(e)); embers=[];
  fsEl.textContent=`SCORE  ${score}`;
  overEl.style.display='flex';
}

function resetGame(){
  score=0; combo=0; missed=0; alive=true;
  spawnRate=900; spawnTimer=0;
  embers.forEach(e=>scene.remove(e)); embers=[];
  parts.forEach(p=>scene.remove(p)); parts=[];
  overEl.style.display='none';
  scoreEl.textContent='0';
  chainEl.style.opacity='0';
  hintEl.style.opacity='1';
  drawLives();
  setTimeout(()=>hintEl.style.opacity='0',3500);
}

// ---- INPUT ----
function onTap(px,py){
  if(!alive) return;
  const e=hitTest(px,py);
  if(e){
    const idx=embers.indexOf(e);
    if(idx!==-1){
      embers.splice(idx,1);
      burst(e.position,e.userData.col);
      scene.remove(e);
      addScore(e.userData.pts);
    }
  } else {
    // Miss-tap: break combo
    combo=0;
    chainEl.style.opacity='0';
  }
}

canvas.addEventListener('click',e=>onTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches[0]) onTap(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

document.getElementById('btn').addEventListener('click',resetGame);

// Init
drawLives();
setTimeout(()=>hintEl.style.opacity='0',4000);

// ---- MAIN LOOP ----
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;

  if(alive){
    spawnTimer+=dt*1000;
    if(spawnTimer>=spawnRate){
      spawnTimer=0;
      spawnEmber();
      spawnRate=Math.max(400,spawnRate-2.2);
    }

    for(let i=embers.length-1;i>=0;i--){
      const e=embers[i];
      const ud=e.userData;
      ud.age+=dt;
      e.position.x+=ud.vx+Math.sin(t*1.2+ud.phase)*0.003;
      e.position.y+=ud.vy;
      e.position.z+=ud.vz;
      e.rotation.x+=0.02; e.rotation.z+=0.015;
      e.material.emissiveIntensity=0.6+Math.sin(t*4+ud.phase)*0.35;
      if(ud.age>=ud.maxAge){
        scene.remove(e); embers.splice(i,1);
        missed++; drawLives();
        combo=0; chainEl.style.opacity='0';
        shakeAmp=0.1; shakeT=0.22;
        if(missed>=MAX_MISS) die();
      }
    }
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    const ud=p.userData;
    p.position.x+=ud.vx;
    p.position.y+=ud.vy;
    p.position.z+=ud.vz;
    ud.vy-=0.003;
    ud.life-=ud.dec;
    p.material.opacity=Math.max(0,ud.life);
    p.scale.setScalar(Math.max(0.001,ud.life*0.08));
    if(ud.life<=0){scene.remove(p); parts.splice(i,1);}
  }

  // Camera shake + ambient
  if(shakeT>0){
    shakeT-=dt;
    const s=shakeAmp*(shakeT/0.28);
    camera.position.x=Math.sin(t*30)*s;
    camera.position.y=2+Math.cos(t*24)*s;
    if(shakeT<=0){camera.position.x=0; camera.position.y=2;}
  } else {
    camera.position.x=Math.sin(t*0.12)*0.25;
    camera.position.y=2+Math.sin(t*0.18)*0.08;
  }
  camera.lookAt(0,1,0);

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
