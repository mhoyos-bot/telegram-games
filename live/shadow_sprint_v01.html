<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>SHADOW SPRINT — Wild Lands</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060914; overflow: hidden; touch-action: none; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 10; font-family: monospace;
    }
    #score { font-size: 26px; font-weight: bold; color: #b8f0d0;
      text-shadow: 0 0 12px rgba(80,220,140,0.6); }
    #info { font-size: 12px; color: rgba(140,190,160,0.45); margin-top: 4px; }
    #lives { font-size: 20px; letter-spacing: 4px; color: #ff7070; }
    #combo { font-size: 14px; color: #77ffbb; opacity: 0; transition: opacity 0.25s; }
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(6,9,20,0.9); font-family: monospace; text-align: center; padding: 20px;
    }
    .logo { font-size: 40px; font-weight: bold; color: #77ffbb; letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(60,220,130,0.45); margin-bottom: 6px; }
    .sub { font-size: 11px; color: #334455; letter-spacing: 5px; margin-bottom: 28px; }
    .hint { font-size: 15px; color: #6688aa; line-height: 1.75; margin-bottom: 30px; }
    .final { font-size: 22px; color: #ffdd88; margin-bottom: 8px; }
    .best { font-size: 14px; color: #7799bb; margin-bottom: 26px; }
    .btn {
      padding: 13px 50px; font: bold 20px monospace; letter-spacing: 2px;
      background: #44cc88; border: none; border-radius: 6px;
      color: #060914; cursor: pointer; box-shadow: 0 0 18px rgba(50,200,120,0.35);
    }
    .btn:active { transform: scale(0.95); }
    .hidden { display: none !important; }
    /* Visual tap zone guides */
    #zone-left, #zone-right {
      position: fixed; bottom: 0; height: 42%; z-index: 5;
      pointer-events: none; display: flex; align-items: center; justify-content: center;
    }
    #zone-left { left: 0; width: 38%; }
    #zone-right { right: 0; width: 38%; }
    #zone-left span, #zone-right span {
      font-size: 32px; opacity: 0.08; user-select: none; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="hud">
  <div>
    <div id="score">0</div>
    <div id="info"></div>
  </div>
  <div style="text-align:right">
    <div id="lives">♦♦♦</div>
    <div id="combo"></div>
  </div>
</div>

<div id="zone-left"><span>◄</span></div>
<div id="zone-right"><span>►</span></div>

<div id="overlay">
  <div class="logo">SHADOW SPRINT</div>
  <div class="sub">WILD LANDS</div>
  <div class="hint" id="hint-text">
    ← Tap left &nbsp;|&nbsp; Tap right →<br>
    Switch lanes to dodge rocks<br>
    Collect the spirit orbs
  </div>
  <div class="final hidden" id="final-score"></div>
  <div class="best hidden" id="best-score"></div>
  <button class="btn" id="start-btn">RUN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>'use strict';

if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060914);
scene.fog = new THREE.Fog(0x060914, 20, 52);

const cam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 60);
cam.position.set(0, 5.5, 12);
cam.lookAt(0, 0.5, -6);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a2535, 1.1));
const sun = new THREE.DirectionalLight(0x88ffcc, 1.0);
sun.position.set(4, 12, 5);
scene.add(sun);
const rim = new THREE.DirectionalLight(0x223388, 0.5);
rim.position.set(-6, 4, -12);
scene.add(rim);

// ── Constants ─────────────────────────────────────────────────────────────────
const LANES = [-2.4, 0, 2.4];
const GROUND_TOP = 0.3;
const PLAYER_BASE_Y = GROUND_TOP + 0.5;
const CHUNK_LEN = 24;
const NUM_CHUNKS = 6;
const PLAYER_Z = 6;

// SRG DIFF_001: speed = base + dist * factor, cap 13
const BASE_SPEED = 5;
const DIST_FACTOR = 0.003;
const SPEED_CAP = 13;

// ── State ─────────────────────────────────────────────────────────────────────
let gState = 'menu';
let score = 0, combo = 0, bestScore = 0;
let lives = 3, speed = BASE_SPEED, dist = 0;
let shake = 0, prevT = performance.now();
let playerLane = 1;
let playerX = LANES[1], playerTargetX = LANES[1];
let playerY = PLAYER_BASE_Y, playerVY = 0, isGrounded = true;
let invincible = 0;

// ── Shared Materials ──────────────────────────────────────────────────────────
function fm(hex) { return new THREE.MeshLambertMaterial({ color: hex, flatShading: true }); }

const MAT = {
  ground: fm(0x0c2218),
  trunk:  fm(0x160c06),
  leafA:  fm(0x0a2714),
  leafB:  fm(0x06200f),
  rock:   fm(0x182820),
  root:   fm(0x180f06),
  mushStem: fm(0xbb3366),
  mushCap:  fm(0xdd1155),
  player: fm(0xee8833),
  head:   fm(0xff9944),
  tail:   fm(0xffaa55),
  spirit: new THREE.MeshBasicMaterial({ color: 0x88ffcc }),
  aura:   new THREE.MeshBasicMaterial({ color: 0x44ee99, transparent: true, opacity: 0.2 }),
};

// ── Player ────────────────────────────────────────────────────────────────────
const foxG = new THREE.Group();
scene.add(foxG);

// Body
foxG.add(new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.52, 0.92), MAT.player));

// Head
const headM = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.44, 0.52), MAT.head);
headM.position.set(0, 0.44, -0.4);
foxG.add(headM);

// Ears
for (const sx of [-1, 1]) {
  const ear = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.27, 4), MAT.player);
  ear.position.set(sx * 0.18, 0.34, 0);
  ear.rotation.z = sx * 0.28;
  headM.add(ear);
}

// Snout
const snout = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.15, 0.22), fm(0xffbb66));
snout.position.set(0, -0.05, -0.3);
headM.add(snout);

// Tail
const tailM = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.78, 5), MAT.tail);
tailM.position.set(0, 0.09, 0.54);
tailM.rotation.x = -0.85;
foxG.add(tailM);

// Legs
const LEGS_DEF = [
  { x: -0.19, z: 0.28, ph: 0 }, { x: 0.19, z: 0.28, ph: Math.PI },
  { x: -0.19, z: -0.22, ph: Math.PI }, { x: 0.19, z: -0.22, ph: 0 },
];
const legGeo = new THREE.BoxGeometry(0.13, 0.36, 0.13);
const legs = LEGS_DEF.map(d => {
  const m = new THREE.Mesh(legGeo, MAT.player);
  m.position.set(d.x, -0.35, d.z);
  foxG.add(m);
  return { mesh: m, ph: d.ph };
});
let legT = 0;

// ── Terrain ───────────────────────────────────────────────────────────────────
const chunks = [], obstacles = [], spirits = [], particles = [];

function makeChunk(z) {
  const g = new THREE.Group();

  // Ground slab
  const gnd = new THREE.Mesh(new THREE.BoxGeometry(9, 0.6, CHUNK_LEN), MAT.ground);
  gnd.position.y = 0;
  g.add(gnd);

  // Moss patches (flat discs)
  for (let i = 0; i < 5; i++) {
    const moss = new THREE.Mesh(
      new THREE.CircleGeometry(0.35 + Math.random() * 0.45, 6),
      fm(Math.random() < 0.5 ? 0x0f3020 : 0x132a1a)
    );
    moss.rotation.x = -Math.PI / 2;
    moss.position.set(
      (Math.random() - 0.5) * 7,
      GROUND_TOP + 0.01,
      (Math.random() - 0.5) * (CHUNK_LEN - 3)
    );
    g.add(moss);
  }

  // Border trees + mushrooms
  for (const sx of [-1, 1]) {
    const treeN = 2 + Math.floor(Math.random() * 3);
    for (let t = 0; t < treeN; t++) {
      const tx = sx * (3.8 + Math.random() * 2.2);
      const tz = (Math.random() - 0.5) * (CHUNK_LEN - 3);
      const tg = new THREE.Group();

      const trH = 1.4 + Math.random() * 1.6;
      const trunkM = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.22, trH, 5), MAT.trunk);
      trunkM.position.y = trH / 2 + GROUND_TOP;
      tg.add(trunkM);

      const lfH = 1.7 + Math.random() * 1.3;
      const leafM = new THREE.Mesh(
        new THREE.ConeGeometry(0.65 + Math.random() * 0.45, lfH, Math.random() < 0.5 ? 5 : 6),
        Math.random() < 0.5 ? MAT.leafA : MAT.leafB
      );
      leafM.position.y = trH + GROUND_TOP + lfH * 0.46;
      tg.add(leafM);

      tg.position.set(tx, 0, tz);
      g.add(tg);
    }

    // Glowing mushrooms near edge
    for (let m = 0; m < 2; m++) {
      if (Math.random() < 0.35) {
        const mx = sx * (3.1 + Math.random() * 0.6);
        const mz = (Math.random() - 0.5) * (CHUNK_LEN - 4);
        const mg = new THREE.Group();
        mg.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.28, 5), MAT.mushStem),
          { position: new THREE.Vector3(0, GROUND_TOP + 0.14, 0) }));
        mg.add(Object.assign(new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.28, 6), MAT.mushCap),
          { position: new THREE.Vector3(0, GROUND_TOP + 0.38, 0) }));
        mg.position.set(mx, 0, mz);
        g.add(mg);
      }
    }
  }

  g.position.set(0, 0, z);
  scene.add(g);
  return { group: g, z };
}

function spawnObs(z) {
  const blocked = new Set();
  const n = Math.random() < 0.35 ? 2 : 1;
  while (blocked.size < n) blocked.add(Math.floor(Math.random() * 3));

  for (const li of blocked) {
    const x = LANES[li];
    let mesh, radius;

    if (Math.random() < 0.55) {
      // Rock
      mesh = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.4 + Math.random() * 0.22, 0),
        fm(0x182a20)
      );
      mesh.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
      mesh.position.set(x, GROUND_TOP + 0.38, z);
      radius = 0.52;
    } else {
      // Log / root
      mesh = new THREE.Group();
      const log = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.24, 1.2, 6), MAT.root);
      log.rotation.z = Math.PI / 2;
      log.position.set(0, GROUND_TOP + 0.24, 0);
      mesh.add(log);
      mesh.position.set(x, 0, z);
      radius = 0.58;
    }
    scene.add(mesh);
    obstacles.push({ mesh, z, lane: li, radius });
  }
}

function spawnSpirit(z) {
  const li = Math.floor(Math.random() * 3);
  const x = LANES[li];
  const y = GROUND_TOP + 1.0 + Math.random() * 0.65;
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.24, 0), MAT.spirit));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.38, 7, 5), MAT.aura));
  g.position.set(x, y, z);
  scene.add(g);
  spirits.push({ mesh: g, z, y, collected: false, bob: Math.random() * Math.PI * 2 });
}

function initTerrain() {
  for (let i = 0; i < NUM_CHUNKS; i++) chunks.push(makeChunk(-i * CHUNK_LEN));
  for (let i = 1; i <= 6; i++) {
    if (i > 1) spawnObs(-i * 8.5);
    spawnSpirit(-i * 6 - 1.5);
    if (i % 2 === 0) spawnSpirit(-i * 6 + 2);
  }
}

function clearAll() {
  chunks.forEach(c => scene.remove(c.group)); chunks.length = 0;
  obstacles.forEach(o => scene.remove(o.mesh)); obstacles.length = 0;
  spirits.forEach(s => scene.remove(s.mesh)); spirits.length = 0;
  particles.forEach(p => scene.remove(p.mesh)); particles.length = 0;
}

function advanceWorld(dz) {
  for (const c of chunks) { c.z += dz; c.group.position.z = c.z; }
  for (const o of obstacles) { o.z += dz; o.mesh.position.z = o.z; }
  for (const s of spirits) { s.z += dz; s.mesh.position.z = s.z; }

  // Recycle chunks that scroll past camera
  for (let i = chunks.length - 1; i >= 0; i--) {
    if (chunks[i].z > CHUNK_LEN * 1.2) {
      scene.remove(chunks[i].group);
      chunks.splice(i, 1);
      const minZ = Math.min(...chunks.map(c => c.z));
      chunks.unshift(makeChunk(minZ - CHUNK_LEN));
      const nz = minZ - CHUNK_LEN;
      if (Math.random() < 0.9) spawnObs(nz - CHUNK_LEN * 0.12 - Math.random() * CHUNK_LEN * 0.5);
      if (Math.random() < 0.65) spawnObs(nz - CHUNK_LEN * 0.5 - Math.random() * CHUNK_LEN * 0.25);
      spawnSpirit(nz - Math.random() * CHUNK_LEN * 0.72);
      if (Math.random() < 0.7) spawnSpirit(nz - CHUNK_LEN * 0.28 - Math.random() * CHUNK_LEN * 0.35);
      if (Math.random() < 0.3) spawnSpirit(nz - CHUNK_LEN * 0.55 - Math.random() * CHUNK_LEN * 0.2);
    }
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].z > PLAYER_Z + 8) { scene.remove(obstacles[i].mesh); obstacles.splice(i, 1); }
  }
  for (let i = spirits.length - 1; i >= 0; i--) {
    if (spirits[i].z > PLAYER_Z + 8 || spirits[i].collected) { scene.remove(spirits[i].mesh); spirits.splice(i, 1); }
  }
}

// ── Particles ─────────────────────────────────────────────────────────────────
const PART_GEO = new THREE.TetrahedronGeometry(0.09, 0);

function burst(px, py, pz, color, n) {
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(PART_GEO, new THREE.MeshBasicMaterial({ color }));
    m.position.set(px, py, pz);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 8, 2 + Math.random() * 7, (Math.random() - 0.5) * 5
    );
    scene.add(m);
    particles.push({ mesh: m, vel, life: 0.65, max: 0.65 });
  }
}

function tickPart(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); continue; }
    p.mesh.position.addScaledVector(p.vel, dt);
    p.vel.y -= 16 * dt;
    p.mesh.scale.setScalar(p.life / p.max);
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
function switchLane(dir) {
  playerLane = Math.max(0, Math.min(2, playerLane + dir));
  playerTargetX = LANES[playerLane];
}

function doJump() {
  if (!isGrounded) return;
  playerVY = 12;
  isGrounded = false;
  foxG.scale.set(1.2, 0.78, 1.2);
  setTimeout(() => foxG.scale.set(1, 1, 1), 80);
}

let touchStartX = 0, touchStartY = 0, touchStartT = 0;

document.addEventListener('pointerdown', e => {
  if (gState !== 'playing') return;
  touchStartX = e.clientX;
  touchStartY = e.clientY;
  touchStartT = Date.now();
});

document.addEventListener('pointerup', e => {
  if (gState !== 'playing') return;
  const dx = e.clientX - touchStartX;
  const dy = e.clientY - touchStartY;
  const elapsed = Date.now() - touchStartT;
  const adx = Math.abs(dx), ady = Math.abs(dy);

  if (elapsed < 300 && adx < 35 && ady < 35) {
    // Tap: zone-based
    const cx = e.clientX / window.innerWidth;
    if (cx < 0.38) switchLane(-1);
    else if (cx > 0.62) switchLane(1);
    else doJump();
  } else if (adx > ady * 1.4 && adx > 40) {
    switchLane(dx > 0 ? 1 : -1);
  } else if (ady > adx * 1.4 && ady > 40 && dy < 0) {
    doJump();
  }
});

document.addEventListener('keydown', e => {
  if (gState !== 'playing') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); switchLane(-1); }
  else if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); switchLane(1); }
  else if (e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w') { e.preventDefault(); doJump(); }
});

// ── HUD ───────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('info').textContent = dist > 5 ? `${Math.floor(dist)}m` : '';
  document.getElementById('lives').textContent = '♦'.repeat(lives) + '◇'.repeat(3 - lives);
  const cel = document.getElementById('combo');
  if (combo >= 2) { cel.textContent = `×${combo} COMBO`; cel.style.opacity = '1'; }
  else { cel.style.opacity = '0'; }
}

// ── Game Flow ─────────────────────────────────────────────────────────────────
function startGame() {
  score = 0; combo = 0; lives = 3; speed = BASE_SPEED; dist = 0; shake = 0; invincible = 0;
  playerLane = 1; playerX = LANES[1]; playerTargetX = LANES[1];
  playerY = PLAYER_BASE_Y; playerVY = 0; isGrounded = true;
  foxG.position.set(LANES[1], PLAYER_BASE_Y, PLAYER_Z);
  foxG.rotation.set(0, 0, 0); foxG.scale.set(1, 1, 1);
  clearAll(); initTerrain();
  document.getElementById('overlay').classList.add('hidden');
  gState = 'playing';
  updateHUD();
}

function hitObstacle() {
  if (invincible > 0) return;
  lives--;
  invincible = 1.6;
  shake = 0.4;
  combo = 0;
  burst(foxG.position.x, foxG.position.y, foxG.position.z, 0xff6622, 12);
  updateHUD();
  if (lives <= 0) {
    gState = 'dead';
    burst(foxG.position.x, foxG.position.y, foxG.position.z, 0xffaa33, 20);
    if (score > bestScore) bestScore = score;
    setTimeout(showOver, 750);
  }
}

function showOver() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.querySelector('.logo').textContent = 'GAME OVER';
  document.getElementById('hint-text').classList.add('hidden');
  document.getElementById('final-score').textContent = `SCORE  ${score}`;
  document.getElementById('final-score').classList.remove('hidden');
  document.getElementById('best-score').textContent = `BEST   ${bestScore}`;
  document.getElementById('best-score').classList.remove('hidden');
  document.getElementById('start-btn').textContent = 'TRY AGAIN';
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - prevT) / 1000, 0.05);
  prevT = now;

  tickPart(dt);

  if (gState !== 'playing') {
    renderer.render(scene, cam);
    return;
  }

  // SRG DIFF_001
  speed = Math.min(SPEED_CAP, BASE_SPEED + dist * DIST_FACTOR);
  dist += speed * dt;

  advanceWorld(speed * dt);

  // Player X smooth lerp (lane switch)
  playerX += (playerTargetX - playerX) * Math.min(dt * 13, 1);

  // Player Y jump physics
  if (!isGrounded) {
    playerVY -= 30 * dt;
    playerY += playerVY * dt;
    if (playerY <= PLAYER_BASE_Y) {
      playerY = PLAYER_BASE_Y;
      playerVY = 0;
      isGrounded = true;
      foxG.scale.set(1.28, 0.7, 1.28);
      setTimeout(() => foxG.scale.set(1, 1, 1), 90);
    }
  }

  foxG.position.set(playerX, playerY, PLAYER_Z);

  // Run animation
  legT += dt * speed * 2.3;
  legs.forEach(l => {
    l.mesh.rotation.x = Math.sin(legT + l.ph) * (isGrounded ? 0.55 : 0.1);
  });
  tailM.rotation.y = Math.sin(legT * 0.88) * 0.44;
  // Lean into turn
  foxG.rotation.z = -(playerTargetX - playerX) * 0.09;

  // Invincible flicker
  if (invincible > 0) {
    invincible -= dt;
    foxG.visible = Math.floor(now / 75) % 2 === 0;
  } else {
    foxG.visible = true;
  }

  // Spirit bob + rotate
  for (const s of spirits) {
    s.bob += dt * 2.6;
    s.mesh.position.y = s.y + Math.sin(s.bob) * 0.1;
    s.mesh.rotation.y += dt * 1.9;
  }

  // Obstacle collision
  if (invincible <= 0) {
    for (const o of obstacles) {
      const hdist = Math.abs(playerX - o.mesh.position.x);
      const zdist = Math.abs(PLAYER_Z - o.mesh.position.z);
      if (hdist < o.radius + 0.26 && zdist < o.radius + 0.36 && playerY < PLAYER_BASE_Y + 1.15) {
        hitObstacle();
        break;
      }
    }
  }

  // Spirit collection
  for (const s of spirits) {
    if (s.collected) continue;
    const hdist = Math.abs(playerX - s.mesh.position.x);
    const ydist = Math.abs(playerY - s.mesh.position.y);
    const zdist = Math.abs(PLAYER_Z - s.mesh.position.z);
    if (hdist < 0.72 && ydist < 0.72 && zdist < 0.72) {
      s.collected = true;
      combo++;
      score += 10 * (combo >= 3 ? 2 : 1);
      burst(s.mesh.position.x, s.mesh.position.y, s.mesh.position.z, 0x88ffcc, 10);
      shake = Math.min(shake + 0.07, 0.22);
      updateHUD();
    }
  }

  // Camera shake
  if (shake > 0) {
    cam.position.set(
      (Math.random() - 0.5) * shake * 0.55,
      5.5 + (Math.random() - 0.5) * shake * 0.35,
      12
    );
    shake = Math.max(0, shake - dt * 3.5);
  } else {
    cam.position.set(0, 5.5, 12);
  }
  cam.lookAt(0, 0.5, -6);

  renderer.render(scene, cam);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  document.querySelector('.logo').textContent = 'SHADOW SPRINT';
  document.getElementById('hint-text').classList.remove('hidden');
  document.getElementById('final-score').classList.add('hidden');
  document.getElementById('best-score').classList.add('hidden');
  startGame();
});

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

initTerrain();
requestAnimationFrame(loop);
</script>
</body>
</html>
