<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wild Lands: Fox Bound</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; touch-action:none; background:#0d1117; }
#ui {
  position:fixed; top:0; left:0; right:0;
  padding:16px 20px;
  pointer-events:none; z-index:10;
  font-family:'Arial Rounded MT Bold',Arial,sans-serif;
}
#score {
  font-size:38px; font-weight:bold;
  color:#e8612c;
  text-shadow:0 0 14px rgba(232,97,44,0.8);
  text-align:center;
  transition:transform 0.1s;
}
#timer-bar-wrap {
  margin:8px auto 0;
  width:200px; height:8px;
  background:rgba(255,255,255,0.12);
  border-radius:4px; overflow:hidden;
}
#timer-bar {
  height:100%; background:#e8612c; border-radius:4px;
  transition:width 0.9s linear, background 0.3s;
}
#combo {
  font-size:18px; color:#ffcc44;
  text-shadow:0 0 6px #ffcc44;
  text-align:center; margin-top:6px;
  min-height:24px;
}
#gameover {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.78);
  color:#fff; font-family:'Arial Rounded MT Bold',Arial,sans-serif;
  z-index:20;
}
#gameover h1 { font-size:14px; color:#888; letter-spacing:4px; text-transform:uppercase; margin-bottom:6px; }
#gameover h2 { font-size:46px; color:#e8612c; text-shadow:0 0 22px #e8612c; margin-bottom:8px; }
#gameover .fs { font-size:28px; color:#fff; margin-bottom:30px; }
#gameover button {
  background:#e8612c; color:#fff;
  border:none; padding:16px 52px;
  font-size:22px; font-weight:bold;
  border-radius:50px; cursor:pointer;
  box-shadow:0 0 24px rgba(232,97,44,0.5);
}
.pop {
  position:fixed; pointer-events:none;
  font-size:22px; font-weight:bold;
  color:#ffcc44;
  text-shadow:0 0 8px #ffcc44;
  animation:popUp 0.9s forwards;
  z-index:15;
  font-family:'Arial Rounded MT Bold',Arial,sans-serif;
}
@keyframes popUp {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-72px) scale(1.4); }
}
</style>
</head>
<body>
<div id="ui">
  <div id="score">0</div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="combo"></div>
</div>
<div id="gameover">
  <h1>Wild Lands</h1>
  <h2>FOX BOUND</h2>
  <div class="fs">Score: <span id="final-score">0</span></div>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// --- Telegram ---
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// --- Scene ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.Fog(0x0d1117, 14, 30);

// --- Camera ---
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 10, 13);
camera.lookAt(0, 0, 0);

// --- Lights ---
scene.add(new THREE.AmbientLight(0x443333, 2.0));
const dirLight = new THREE.DirectionalLight(0xff8844, 1.4);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// --- Ground ---
const groundGeo = new THREE.CircleGeometry(11, 18);
groundGeo.rotateX(-Math.PI / 2);
scene.add(new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ color: 0x1c2e1c })));

// Ground ring path indicator
const ringMesh = new THREE.Mesh(
  new THREE.TorusGeometry(5.5, 0.07, 6, 40),
  new THREE.MeshBasicMaterial({ color: 0x2a4a2a })
);
scene.add(ringMesh);

// --- Trees ---
function makeTree(x, z) {
  const g = new THREE.Group();
  g.add(Object.assign(new THREE.Mesh(
    new THREE.CylinderGeometry(0.09, 0.13, 1.1, 5),
    new THREE.MeshLambertMaterial({ color: 0x3d2810 })
  ), { position: new THREE.Vector3(0, 0.55, 0) }));
  const leafColors = [0x1a4020, 0x1d4a24, 0x22552a];
  for (let i = 0; i < 3; i++) {
    const c = new THREE.Mesh(
      new THREE.ConeGeometry(0.72 - i * 0.13, 0.92, 6),
      new THREE.MeshLambertMaterial({ color: leafColors[i] })
    );
    c.position.y = 1.2 + i * 0.56;
    g.add(c);
  }
  g.position.set(x, 0, z);
  g.rotation.y = Math.random() * Math.PI * 2;
  return g;
}
for (let i = 0; i < 14; i++) {
  const a = (i / 14) * Math.PI * 2;
  const r = 8.5 + Math.random() * 1.5;
  scene.add(makeTree(Math.cos(a) * r, Math.sin(a) * r));
}

// --- Mushrooms ---
function makeMushroom(x, z) {
  const g = new THREE.Group();
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.09, 0.28, 6),
    new THREE.MeshLambertMaterial({ color: 0xddbbaa })
  );
  stem.position.y = 0.14;
  const cap = new THREE.Mesh(
    new THREE.SphereGeometry(0.17, 6, 5),
    new THREE.MeshLambertMaterial({ color: 0xcc3322 })
  );
  cap.position.y = 0.36;
  g.add(stem, cap);
  g.position.set(x, 0, z);
  return g;
}
for (let i = 0; i < 9; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 2.5 + Math.random() * 4.5;
  scene.add(makeMushroom(Math.cos(a) * r, Math.sin(a) * r));
}

// --- Rocks ---
for (let i = 0; i < 7; i++) {
  const r = 2 + Math.random() * 5;
  const a = Math.random() * Math.PI * 2;
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(0.18 + Math.random() * 0.2, 0),
    new THREE.MeshLambertMaterial({ color: 0x445566 })
  );
  rock.position.set(Math.cos(a) * r, 0.18, Math.sin(a) * r);
  rock.rotation.set(Math.random() * 2, Math.random() * 2, Math.random() * 2);
  scene.add(rock);
}

// --- Fox ---
function buildFox() {
  const g = new THREE.Group();
  const orange = new THREE.MeshLambertMaterial({ color: 0xe8612c });
  const cream  = new THREE.MeshLambertMaterial({ color: 0xf5e6d3 });
  const dark   = new THREE.MeshLambertMaterial({ color: 0x1a0a05 });
  const inner  = new THREE.MeshLambertMaterial({ color: 0xee9977 });

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.46, 0.92), orange);
  body.position.y = 0.5;
  g.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.44, 0.50), orange);
  head.position.set(0, 0.84, 0.52);
  g.add(head);

  // Snout
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.19, 0.24), cream);
  snout.position.set(0, 0.75, 0.70);
  g.add(snout);

  // Nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.06, 4, 4), dark);
  nose.position.set(0, 0.81, 0.82);
  g.add(nose);

  // Eyes
  [-0.15, 0.15].forEach(ex => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.055, 4, 4), dark);
    eye.position.set(ex, 0.90, 0.74);
    g.add(eye);
  });

  // Ears + inner ears
  [-0.19, 0.19].forEach(ex => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.11, 0.24, 3), orange);
    ear.position.set(ex, 1.09, 0.45);
    g.add(ear);
    const iear = new THREE.Mesh(new THREE.ConeGeometry(0.055, 0.14, 3), inner);
    iear.position.set(ex, 1.09, 0.45);
    g.add(iear);
  });

  // Legs
  const legPos = [[-0.19,-0.22,0.30],[0.19,-0.22,0.30],[-0.19,-0.22,-0.28],[0.19,-0.22,-0.28]];
  legPos.forEach(([lx,ly,lz]) => {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.055, 0.40, 5), orange);
    leg.position.set(lx, ly, lz);
    g.add(leg);
    const paw = new THREE.Mesh(new THREE.SphereGeometry(0.075, 4, 4), cream);
    paw.position.set(lx, ly - 0.20, lz);
    g.add(paw);
  });

  // Tail group
  const tg = new THREE.Group();
  tg.position.set(0, 0.5, -0.52);
  for (let i = 0; i < 5; i++) {
    const seg = new THREE.Mesh(
      new THREE.SphereGeometry(0.13 - i * 0.015, 5, 4),
      new THREE.MeshLambertMaterial({ color: i < 4 ? 0xe8612c : 0xf5e6d3 })
    );
    seg.position.set(0, i * 0.15, -i * 0.13);
    tg.add(seg);
  }
  g.add(tg);
  g.tailGroup = tg;
  g.position.y = 0.22;
  return g;
}

const fox = buildFox();
scene.add(fox);

const foxState = {
  idle: true,
  running: false,
  catching: false,
  returning: false,
  target: new THREE.Vector3(),
  home: new THREE.Vector3(0, 0, 0),
  speed: 0.12,
  catchTimer: 0,
};

// --- Wisps ---
const WISP_COUNT = 5;
const wisps = [];
const wispGeo = new THREE.IcosahedronGeometry(0.32, 1);
const glowGeo = new THREE.IcosahedronGeometry(0.52, 1);
const innerGeo = new THREE.IcosahedronGeometry(0.14, 0);
const WISP_COLORS = [0x14f195, 0xff9966, 0x66aaff, 0xffdd44, 0xff88ff];

for (let i = 0; i < WISP_COUNT; i++) {
  const col = WISP_COLORS[i];
  const mat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.9 });
  const glowMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.22, side: THREE.BackSide });
  const innerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

  const mesh = new THREE.Mesh(wispGeo, mat);
  mesh.add(new THREE.Mesh(glowGeo, glowMat));
  mesh.add(new THREE.Mesh(innerGeo, innerMat));

  const group = new THREE.Group();
  group.add(mesh);
  scene.add(group);

  wisps.push({ group, mesh, mat, glowMat, color: col,
    active: false, phase: Math.random() * Math.PI * 2,
    vel: new THREE.Vector3(), lifetime: 0, maxLifetime: 0 });
}

// --- Particles ---
const PCOUNT = 80;
const pArr = [];
const pGeo = new THREE.SphereGeometry(0.08, 3, 3);
for (let i = 0; i < PCOUNT; i++) {
  const pm = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true }));
  pm.visible = false;
  scene.add(pm);
  pArr.push({ mesh: pm, vel: new THREE.Vector3(), life: 0, maxLife: 0 });
}

function burst(pos, color, count) {
  let n = 0;
  for (let i = 0; i < pArr.length && n < count; i++) {
    const p = pArr[i];
    if (p.mesh.visible) continue;
    p.mesh.position.copy(pos);
    p.mesh.material.color.setHex(color);
    p.mesh.material.opacity = 1;
    p.vel.set((Math.random()-0.5)*0.20, Math.random()*0.20+0.05, (Math.random()-0.5)*0.20);
    p.life = 0; p.maxLife = 500 + Math.random() * 400;
    p.mesh.visible = true; n++;
  }
}

// --- Game State ---
const GAME_DURATION = 30;
let score = 0, timeLeft = GAME_DURATION, running = true;
let combo = 0, comboTimer = 0, timerAccum = 0;

const scoreEl    = document.getElementById('score');
const timerBarEl = document.getElementById('timer-bar');
const comboEl    = document.getElementById('combo');
const gameoverEl = document.getElementById('gameover');
const finalScEl  = document.getElementById('final-score');
const restartBtn = document.getElementById('restart-btn');

// --- Spawn ---
function spawnWisp(w) {
  const a = Math.random() * Math.PI * 2;
  const r = 3 + Math.random() * 4.5;
  w.group.position.set(Math.cos(a) * r, 1.3 + Math.random() * 0.9, Math.sin(a) * r);
  w.vel.set((Math.random()-0.5)*0.022, 0, (Math.random()-0.5)*0.022);
  w.active = true; w.lifetime = 0;
  w.maxLifetime = 4000 + Math.random() * 3000;
  w.group.visible = true;
}

function spawnAll() {
  wisps.forEach((w, i) => { setTimeout(() => { if (running) spawnWisp(w); }, i * 180); });
}

// --- Score Pop ---
function showPop(x, y, text) {
  const d = document.createElement('div');
  d.className = 'pop'; d.textContent = text;
  d.style.left = (x - 24) + 'px'; d.style.top = (y - 50) + 'px';
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 950);
}

// --- Input ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let activeWisp = null, pendingPx = 0, pendingPy = 0;

function onPointerDown(e) {
  if (!running) return;
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
  const cy = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targets = wisps.filter(w => w.active).map(w => w.mesh);
  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length > 0) {
    const hit = hits[0].object;
    const w = wisps.find(w => w.mesh === hit || w.mesh.children.includes(hit));
    if (w && w.active && !foxState.running && !foxState.catching) {
      foxState.target.copy(w.group.position);
      foxState.target.y = 0;
      foxState.running = true; foxState.idle = false;
      activeWisp = w; pendingPx = cx; pendingPy = cy;
      if (tg) tg.HapticFeedback?.selectionChanged();
    }
  }
}
renderer.domElement.addEventListener('pointerdown', onPointerDown);

// --- Fox Actions ---
function foxArrived() {
  const w = activeWisp;
  if (!w || !w.active) { foxReturn(); return; }

  w.active = false; w.group.visible = false;
  combo++; comboTimer = 1800;
  const mult = Math.min(combo, 5);
  const pts = 10 * mult;
  score += pts;

  scoreEl.textContent = score;
  scoreEl.style.transform = 'scale(1.3)';
  setTimeout(() => { scoreEl.style.transform = ''; }, 160);

  showPop(pendingPx, pendingPy, combo > 1 ? `+${pts} x${mult}!` : `+${pts}`);
  burst(w.group.position.clone(), w.color, 14);
  if (tg) tg.HapticFeedback?.impactOccurred('medium');

  foxState.running = false; foxState.catching = true; foxState.catchTimer = 320;
  if (running) setTimeout(() => { if (running) spawnWisp(w); }, 1000 + Math.random() * 700);
}

function foxReturn() {
  foxState.catching = false; foxState.running = false; foxState.returning = true;
  foxState.target.copy(foxState.home);
}

// --- End / Reset ---
function endGame() {
  running = false;
  wisps.forEach(w => { w.active = false; w.group.visible = false; });
  finalScEl.textContent = score;
  gameoverEl.style.display = 'flex';
  if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

function resetGame() {
  score = 0; timeLeft = GAME_DURATION; running = true;
  combo = 0; comboTimer = 0; timerAccum = 0; activeWisp = null;
  foxState.idle = true; foxState.running = false;
  foxState.catching = false; foxState.returning = false;
  fox.position.set(0, 0.22, 0); fox.rotation.y = 0;
  scoreEl.textContent = '0'; scoreEl.style.transform = '';
  timerBarEl.style.width = '100%'; timerBarEl.style.background = '#e8612c';
  comboEl.textContent = '';
  gameoverEl.style.display = 'none';
  pArr.forEach(p => { p.mesh.visible = false; });
  spawnAll();
}

restartBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); resetGame(); });

// --- Main Loop ---
let lastTime = performance.now();
let camAngle = 0;
const _dir = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;
  const t = now * 0.001;

  if (running) {
    // Timer
    timerAccum += dt;
    if (timerAccum >= 1000) {
      timerAccum -= 1000;
      timeLeft--;
      timerBarEl.style.width = ((timeLeft / GAME_DURATION) * 100) + '%';
      if (timeLeft <= 7) timerBarEl.style.background = '#ff3333';
      if (timeLeft <= 0) endGame();
    }

    // Combo UI
    if (comboTimer > 0) {
      comboTimer -= dt;
      comboEl.textContent = combo > 1 ? `COMBO x${Math.min(combo, 5)}` : '';
      if (comboTimer <= 0) { combo = 0; comboEl.textContent = ''; }
    }

    // Wisps
    wisps.forEach(w => {
      if (!w.active) return;
      w.lifetime += dt;
      w.group.position.y = 1.4 + Math.sin(t * 2.2 + w.phase) * 0.28;
      w.group.position.x += w.vel.x;
      w.group.position.z += w.vel.z;
      if (Math.abs(w.group.position.x) > 7.5) w.vel.x *= -1;
      if (Math.abs(w.group.position.z) > 7.5) w.vel.z *= -1;
      w.mesh.rotation.y += 0.026;
      const pulse = 0.72 + Math.sin(t * 3.2 + w.phase) * 0.28;
      w.mat.opacity = pulse;
      w.glowMat.opacity = pulse * 0.28;
      if (w.lifetime > w.maxLifetime) {
        w.active = false; w.group.visible = false;
        if (running) setTimeout(() => { if (running) spawnWisp(w); }, 600);
      }
    });

    // Fox — run toward target
    if (foxState.running && !foxState.catching) {
      _dir.subVectors(foxState.target, fox.position);
      _dir.y = 0;
      const dist = _dir.length();
      if (dist < 0.45) {
        foxArrived();
      } else {
        _dir.normalize();
        fox.position.addScaledVector(_dir, foxState.speed);
        fox.rotation.y = Math.atan2(_dir.x, _dir.z);
        fox.position.y = 0.22 + Math.abs(Math.sin(t * 12)) * 0.20;
        fox.tailGroup.rotation.x = Math.sin(t * 12) * 0.45;
      }
    }

    // Fox — catch jump
    if (foxState.catching) {
      foxState.catchTimer -= dt;
      const prog = 1 - foxState.catchTimer / 320;
      fox.position.y = 0.22 + Math.sin(prog * Math.PI) * 0.65;
      fox.tailGroup.rotation.z = Math.sin(prog * Math.PI * 2) * 0.5;
      if (foxState.catchTimer <= 0) foxReturn();
    }

    // Fox — return home
    if (foxState.returning) {
      _dir.subVectors(foxState.home, fox.position);
      _dir.y = 0;
      const dist = _dir.length();
      if (dist < 0.28) {
        fox.position.set(0, 0.22, 0);
        foxState.returning = false; foxState.idle = true;
      } else {
        _dir.normalize();
        fox.position.addScaledVector(_dir, foxState.speed * 0.7);
        fox.rotation.y = Math.atan2(_dir.x, _dir.z);
        fox.position.y = 0.22 + Math.abs(Math.sin(t * 8)) * 0.10;
      }
    }

    // Fox — idle
    if (foxState.idle) {
      fox.position.y = 0.22 + Math.sin(t * 1.6) * 0.04;
      fox.tailGroup.rotation.z = Math.sin(t * 3.2) * 0.32;
      fox.rotation.y += 0.003;
    }
  }

  // Particles
  pArr.forEach(p => {
    if (!p.mesh.visible) return;
    p.life += dt;
    const prog = p.life / p.maxLife;
    if (prog >= 1) { p.mesh.visible = false; return; }
    p.mesh.position.addScaledVector(p.vel, dt * 0.06);
    p.vel.y -= 0.004;
    p.mesh.material.opacity = 1 - prog;
    p.mesh.scale.setScalar(1 - prog * 0.5);
  });

  // Gentle camera orbit
  camAngle += dt * 0.000085;
  camera.position.x = Math.sin(camAngle) * 1.4;
  camera.position.z = 13 + Math.cos(camAngle * 0.7) * 0.6;
  camera.lookAt(0, 0.5, 0);

  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Boot ---
spawnAll();
animate();
</script>
</body>
</html>
