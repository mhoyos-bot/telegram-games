<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SPIRIT FOX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080412; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; pointer-events: none;
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start;
    }
    #health-bar { display: flex; gap: 7px; align-items: center; }
    .heart {
      width: 16px; height: 16px; background: #ff4466; border-radius: 50%;
      box-shadow: 0 0 8px #ff4466; transition: all 0.15s;
    }
    .heart.empty { background: #2a1a2e; box-shadow: none; }
    #score-display {
      color: rgba(255,255,255,0.85); font: bold 20px monospace; letter-spacing: 0.05em;
      text-shadow: 0 0 12px rgba(255,180,80,0.6);
    }

    #wave-label {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font: 11px monospace; letter-spacing: 0.18em;
      pointer-events: none; text-align: center;
    }
    #combo-pop {
      position: fixed; top: 42%; left: 50%; transform: translate(-50%, -50%);
      color: #ffcc44; font: bold 26px monospace; letter-spacing: 0.08em;
      pointer-events: none; opacity: 0; transition: opacity 0.08s;
      text-shadow: 0 0 18px rgba(255,200,50,0.9);
    }

    #screen-flash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; opacity: 0; transition: opacity 0.05s;
    }

    #game-over {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(4,2,10,0.92); display: none; flex-direction: column;
      align-items: center; justify-content: center; color: white; text-align: center;
    }
    #game-over h1 {
      font: bold 30px monospace; color: #ff4466; margin-bottom: 10px;
      letter-spacing: 0.12em; text-shadow: 0 0 20px rgba(255,50,80,0.7);
    }
    #final-score {
      font: 15px monospace; color: rgba(255,255,255,0.55); margin-bottom: 28px;
      letter-spacing: 0.08em;
    }
    #restart-btn {
      background: transparent; border: 1px solid rgba(255,100,60,0.6);
      color: #ff8866; padding: 13px 36px; font: bold 14px monospace;
      cursor: pointer; letter-spacing: 0.12em; border-radius: 2px;
      transition: all 0.15s;
    }
    #restart-btn:active { background: rgba(255,100,60,0.15); }

    #start-hint {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.25); font: 11px monospace; letter-spacing: 0.15em;
      pointer-events: none; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.55} }
  </style>
  <script>
  // SRG Analytics — injected by inject_analytics.py
  window.SRG_GAME_ID = 'spirit_fox_v01';
  window.SRG_ANALYTICS_ENDPOINT = 'http://localhost:8765/event';
  </script>
  <script>
// SRG Analytics Snippet v1 — signal testing tracker
// Usage: include before game init. Call srgTrack('game_over', {score, wave}) on death.
// Endpoint: set ANALYTICS_ENDPOINT to your receiver URL (local or Cloudflare Worker).
(function() {
  var _t0 = Date.now(), GAME_ID = window.SRG_GAME_ID || 'unknown_game';
  var ENDPOINT = window.SRG_ANALYTICS_ENDPOINT || 'http://localhost:8765/event';
  var _uid = (function() {
    try { var k = 'srg_uid', v = localStorage.getItem(k); if (!v) { v = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem(k, v); } return v; }
    catch (_e) { return 'anon_' + Math.random().toString(36).slice(2); }
  })();
  window.srgTrack = function(ev, data) {
    var p = JSON.stringify({ uid: _uid, game: GAME_ID, ev: ev, d: data || {}, ms: Date.now() - _t0, day: new Date().toISOString().slice(0, 10) });
    try { navigator.sendBeacon(ENDPOINT, p); } catch (_e) { try { fetch(ENDPOINT, { method: 'POST', body: p, keepalive: true }); } catch (_e2) { /* silent: analytics must never break the game */ } }
  };
  window.srgTrack('session_start');
  document.addEventListener('visibilitychange', function() { window.srgTrack(document.hidden ? 'session_hide' : 'session_show'); });
  window.addEventListener('pagehide', function() { window.srgTrack('session_end', { total_ms: Date.now() - _t0 }); });
})();
  </script>
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div id="health-bar"></div>
    <div id="score-display">0</div>
  </div>
  <div id="wave-label">WAVE 1</div>
  <div id="combo-pop"></div>
  <div id="screen-flash"></div>
  <div id="start-hint">TAP THE SPIRITS</div>

  <!-- GAME OVER -->
  <div id="game-over">
    <h1>THE FOX FALLS</h1>
    <p id="final-score">Score: 0 · Wave: 1</p>
    <button id="restart-btn" onclick="restart()">RISE AGAIN</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ── TELEGRAM ──────────────────────────────────────────────────────────────
  if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.ready();

  // ── GAME STATE ────────────────────────────────────────────────────────────
  const MAX_HP = 5;
  let state = {
    hp: MAX_HP, score: 0, wave: 1,
    combo: 0, comboTimer: 0,
    alive: true, started: false,
    spawnTimer: 0, waveTimer: 0,
    shakeAmt: 0, flashColor: null, flashTimer: 0
  };

  // ── RENDERER ──────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  document.body.appendChild(renderer.domElement);

  // ── SCENE ─────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080412);
  scene.fog = new THREE.FogExp2(0x080412, 0.048);

  // ── CAMERA ────────────────────────────────────────────────────────────────
  const CAM_POS = new THREE.Vector3(0, 13, 9);
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.copy(CAM_POS);
  camera.lookAt(0, 0, 0);

  // ── LIGHTS ────────────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x1a0830, 2.0));
  const foxGlow = new THREE.PointLight(0xff7733, 3.0, 6);
  foxGlow.position.set(0, 2, 0);
  scene.add(foxGlow);
  const rimLight = new THREE.DirectionalLight(0x4422bb, 0.7);
  rimLight.position.set(-4, 8, -4);
  scene.add(rimLight);

  // ── GROUND ────────────────────────────────────────────────────────────────
  const groundGeo = new THREE.CircleGeometry(8.5, 8);
  const groundMat = new THREE.MeshPhongMaterial({ color: 0x16082a, flatShading: true });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // Ground triangle detail (visual interest)
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const tileMat = new THREE.MeshPhongMaterial({ color: 0x1e0f33, flatShading: true });
    const tileGeo = new THREE.CircleGeometry(1.2 + Math.random() * 0.8, 3);
    const tile = new THREE.Mesh(tileGeo, tileMat);
    tile.rotation.x = -Math.PI / 2;
    tile.position.set(Math.cos(a) * (3 + Math.random() * 3), 0.005, Math.sin(a) * (3 + Math.random() * 3));
    tile.rotation.z = Math.random() * Math.PI;
    scene.add(tile);
  }

  // ── BORDER STONES ─────────────────────────────────────────────────────────
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const r = 7.8 + Math.random() * 0.6;
    const h = 0.3 + Math.random() * 0.7;
    const geo = new THREE.BoxGeometry(0.35 + Math.random() * 0.25, h, 0.28 + Math.random() * 0.2);
    const mat = new THREE.MeshPhongMaterial({ color: 0x281540, flatShading: true });
    const stone = new THREE.Mesh(geo, mat);
    stone.position.set(Math.cos(a) * r, h / 2, Math.sin(a) * r);
    stone.rotation.y = Math.random() * Math.PI;
    scene.add(stone);
  }

  // ── SAFE ZONE RING ────────────────────────────────────────────────────────
  const ringGeo = new THREE.RingGeometry(1.25, 1.42, 36);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff6622, opacity: 0.12, transparent: true, side: THREE.DoubleSide
  });
  const safeRing = new THREE.Mesh(ringGeo, ringMat);
  safeRing.rotation.x = -Math.PI / 2;
  safeRing.position.y = 0.01;
  scene.add(safeRing);

  // ── FOX ───────────────────────────────────────────────────────────────────
  const foxGroup = new THREE.Group();
  const foxOrange = new THREE.MeshPhongMaterial({ color: 0xff5e1a, flatShading: true, emissive: 0x3a1000 });
  const foxCream  = new THREE.MeshPhongMaterial({ color: 0xffcc88, flatShading: true });

  // Body
  const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.52, 1.0), foxOrange);
  bodyMesh.position.y = 0.42;
  foxGroup.add(bodyMesh);
  // Head
  const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.46, 0.52), foxOrange);
  headMesh.position.set(0, 0.86, 0.34);
  foxGroup.add(headMesh);
  // Snout
  const snoutMesh = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.18, 0.24), foxCream);
  snoutMesh.position.set(0, 0.76, 0.6);
  foxGroup.add(snoutMesh);
  // Ears
  [-0.17, 0.17].forEach(x => {
    const ear = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.24, 4), foxOrange);
    ear.position.set(x, 1.12, 0.28);
    foxGroup.add(ear);
  });
  // Tail puff
  const tailMesh = new THREE.Mesh(new THREE.SphereGeometry(0.28, 5, 4), foxCream);
  tailMesh.position.set(0, 0.5, -0.62);
  tailMesh.scale.set(1, 0.75, 1.35);
  foxGroup.add(tailMesh);
  // Legs (simple blocks)
  [[-0.22, 0, 0.28], [0.22, 0, 0.28], [-0.22, 0, -0.28], [0.22, 0, -0.28]].forEach(([x, y, z]) => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.28, 0.14), foxOrange);
    leg.position.set(x, 0.14, z);
    foxGroup.add(leg);
  });

  scene.add(foxGroup);

  // ── ENEMY POOL ────────────────────────────────────────────────────────────
  const enemies = [];
  const enemyPool = [];

  function makeEnemyMesh() {
    const geo = new THREE.OctahedronGeometry(0.44, 0);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x7722ee, flatShading: true,
      emissive: 0x330066, emissiveIntensity: 0.4
    });
    const m = new THREE.Mesh(geo, mat);
    scene.add(m);
    return m;
  }

  function spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const r = 8.8;
    let mesh = enemyPool.length > 0 ? enemyPool.pop() : makeEnemyMesh();
    mesh.visible = true;
    mesh.scale.setScalar(1);
    mesh.material.color.setHex(0x7722ee);
    mesh.material.emissive.setHex(0x330066);
    mesh.position.set(Math.cos(angle) * r, 0.48, Math.sin(angle) * r);
    const spd = 0.85 + state.wave * 0.14 + Math.random() * 0.25;
    enemies.push({ mesh, spd, wobble: Math.random() * Math.PI * 2 });
  }

  // ── PARTICLES ─────────────────────────────────────────────────────────────
  const particles = [];

  function burst(x, y, z, color, count) {
    for (let i = 0; i < count; i++) {
      const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
      const p = new THREE.Mesh(geo, mat);
      p.position.set(x, y, z);
      const spd = 1.5 + Math.random() * 2.5;
      const a = Math.random() * Math.PI * 2;
      const el = (Math.random() - 0.3) * 1.5;
      particles.push({
        mesh: p,
        vx: Math.cos(a) * spd, vy: Math.random() * 2.5 + 0.5, vz: Math.sin(a) * spd,
        life: 1.0, decay: 1.4 + Math.random() * 0.8
      });
      scene.add(p);
    }
  }

  // ── HUD REFS ──────────────────────────────────────────────────────────────
  const healthBarEl  = document.getElementById('health-bar');
  const scoreEl      = document.getElementById('score-display');
  const waveLabelEl  = document.getElementById('wave-label');
  const comboPopEl   = document.getElementById('combo-pop');
  const flashEl      = document.getElementById('screen-flash');
  const gameOverEl   = document.getElementById('game-over');
  const finalScoreEl = document.getElementById('final-score');
  const startHintEl  = document.getElementById('start-hint');

  function buildHealthBar() {
    healthBarEl.innerHTML = '';
    for (let i = 0; i < MAX_HP; i++) {
      const d = document.createElement('div');
      d.className = 'heart' + (i < state.hp ? '' : ' empty');
      healthBarEl.appendChild(d);
    }
  }
  buildHealthBar();

  let comboHideTimer = null;
  function showCombo() {
    if (state.combo < 2) return;
    comboPopEl.textContent = `×${state.combo} COMBO!`;
    comboPopEl.style.opacity = '1';
    comboPopEl.style.fontSize = Math.min(18 + state.combo * 3, 42) + 'px';
    clearTimeout(comboHideTimer);
    comboHideTimer = setTimeout(() => { comboPopEl.style.opacity = '0'; }, 550);
  }

  function flash(color) {
    flashEl.style.background = color;
    flashEl.style.opacity = '0.35';
    setTimeout(() => { flashEl.style.opacity = '0'; }, 80);
  }

  // ── RAYCASTER ─────────────────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  const mouse2d = new THREE.Vector2();

  function onTap(e) {
    const src = e.touches ? e.touches[0] : e;
    mouse2d.x = (src.clientX / window.innerWidth)  * 2 - 1;
    mouse2d.y = -(src.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse2d, camera);

    if (!state.alive) return;
    if (!state.started) {
      state.started = true;
      startHintEl.style.display = 'none';
    }

    const meshes = enemies.map(en => en.mesh);
    const hits = raycaster.intersectObjects(meshes);

    if (hits.length > 0) {
      const idx = enemies.findIndex(en => en.mesh === hits[0].object);
      if (idx === -1) return;
      const en = enemies[idx];
      const p  = en.mesh.position;

      // Juice: particles + flash + shake
      burst(p.x, p.y, p.z, 0xaa44ff, 10);
      burst(p.x, p.y + 0.3, p.z, 0xeeccff, 5);
      flash('rgba(180,80,255,0.6)');
      state.shakeAmt = 0.18;

      // Score
      state.combo++;
      state.comboTimer = 1.6;
      const pts = 10 + (state.combo - 1) * 10;
      state.score += pts;
      scoreEl.textContent = state.score;
      showCombo();

      // Recycle
      en.mesh.visible = false;
      enemyPool.push(en.mesh);
      enemies.splice(idx, 1);
    } else {
      // Miss — lose combo but no penalty
      state.combo = 0;
      state.comboTimer = 0;
    }
  }

  renderer.domElement.addEventListener('click',      onTap);
  renderer.domElement.addEventListener('touchstart', e => { e.preventDefault(); onTap(e); }, { passive: false });

  // ── GAME OVER / RESTART ───────────────────────────────────────────────────
  function triggerGameOver() {
    if (window.srgTrack) srgTrack('game_over', { score: state.score, wave: state.wave, time_ms: Date.now() - window._srgT0 });
    state.alive = false;
    state.shakeAmt = 0.9;
    flash('rgba(255,30,60,0.7)');
    setTimeout(() => {
      gameOverEl.style.display = 'flex';
      finalScoreEl.textContent = `Score: ${state.score} · Wave: ${state.wave}`;
    }, 400);
  }

  function restart() {
    if (window.srgTrack) srgTrack('game_retry');
    Object.assign(state, {
      hp: MAX_HP, score: 0, wave: 1,
      combo: 0, comboTimer: 0,
      alive: true, started: true,
      spawnTimer: 0, waveTimer: 0,
      shakeAmt: 0, flashTimer: 0
    });
    enemies.forEach(en => { en.mesh.visible = false; enemyPool.push(en.mesh); });
    enemies.length = 0;
    particles.forEach(p => scene.remove(p.mesh));
    particles.length = 0;
    scoreEl.textContent  = '0';
    waveLabelEl.textContent = 'WAVE 1';
    gameOverEl.style.display = 'none';
    buildHealthBar();
  }

  // ── RESIZE ────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── MAIN LOOP ─────────────────────────────────────────────────────────────
  const clock = new THREE.Clock();

  function tick() {
    requestAnimationFrame(tick);
    const dt = Math.min(clock.getDelta(), 0.05);
    const t  = clock.getElapsedTime();

    // ── FOX IDLE ANIMATION ────────────────────────────────────────────────
    foxGroup.position.y = Math.sin(t * 1.9) * 0.07;
    foxGroup.rotation.y = Math.sin(t * 0.45) * 0.18;
    tailMesh.rotation.z = Math.sin(t * 2.8) * 0.32;
    foxGlow.intensity   = 2.8 + Math.sin(t * 2.6) * 0.5;
    safeRing.material.opacity = 0.07 + Math.sin(t * 1.8) * 0.04;

    if (state.alive && state.started) {
      // ── WAVE PROGRESSION ─────────────────────────────────────────────────
      state.waveTimer += dt;
      if (state.waveTimer >= 20) {
        state.waveTimer = 0;
        state.wave++;
        waveLabelEl.textContent = `WAVE ${state.wave}`;
        flash('rgba(255,200,50,0.25)');
      }

      // ── SPAWN ─────────────────────────────────────────────────────────────
      state.spawnTimer += dt;
      const interval = Math.max(0.55, 1.9 - state.wave * 0.11);
      if (state.spawnTimer >= interval) {
        state.spawnTimer = 0;
        spawnEnemy();
        if (state.wave >= 4) spawnEnemy(); // double spawn late game
      }

      // ── COMBO DECAY ───────────────────────────────────────────────────────
      if (state.comboTimer > 0) {
        state.comboTimer -= dt;
        if (state.comboTimer <= 0) { state.combo = 0; }
      }

      // ── ENEMY MOVE ────────────────────────────────────────────────────────
      for (let i = enemies.length - 1; i >= 0; i--) {
        const en  = enemies[i];
        const m   = en.mesh;
        const px  = m.position.x;
        const pz  = m.position.z;
        const dist = Math.sqrt(px * px + pz * pz);

        if (dist > 0.05) {
          m.position.x -= (px / dist) * en.spd * dt;
          m.position.z -= (pz / dist) * en.spd * dt;
        }

        // Wobble
        en.wobble += dt * 2;
        m.position.y = 0.48 + Math.sin(en.wobble) * 0.12;

        // Spin
        m.rotation.x += dt * 1.8;
        m.rotation.y += dt * 2.2;

        // Color pulse: purple → white as approaching
        const danger = Math.max(0, 1 - dist / 8.5);
        m.material.emissiveIntensity = 0.3 + danger * 0.7;
        m.material.emissive.setRGB(danger * 0.6, danger * 0.2, 0.4 + danger * 0.4);

        // Hit fox?
        if (dist < 1.32) {
          state.hp--;
          buildHealthBar();
          state.shakeAmt = 0.45;
          state.combo = 0;
          state.comboTimer = 0;
          flash('rgba(255,30,60,0.5)');
          burst(0, 0.5, 0, 0xff2244, 8);
          // Recycle
          m.visible = false;
          enemyPool.push(m);
          enemies.splice(i, 1);
          if (state.hp <= 0) triggerGameOver();
        }
      }
    }

    // ── PARTICLES ─────────────────────────────────────────────────────────
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.position.z += p.vz * dt;
      p.vy -= 5 * dt;
      p.life -= p.decay * dt;
      p.mesh.material.opacity = Math.max(0, p.life);
      p.mesh.scale.setScalar(Math.max(0.01, p.life));
      if (p.life <= 0) {
        scene.remove(p.mesh);
        particles.splice(i, 1);
      }
    }

    // ── CAMERA SHAKE ──────────────────────────────────────────────────────
    if (state.shakeAmt > 0) {
      camera.position.set(
        CAM_POS.x + (Math.random() - 0.5) * state.shakeAmt,
        CAM_POS.y + (Math.random() - 0.5) * state.shakeAmt * 0.4,
        CAM_POS.z + (Math.random() - 0.5) * state.shakeAmt * 0.25
      );
      camera.lookAt(0, 0, 0);
      state.shakeAmt -= dt * 5;
      if (state.shakeAmt < 0) {
        state.shakeAmt = 0;
        camera.position.copy(CAM_POS);
        camera.lookAt(0, 0, 0);
      }
    }

    renderer.render(scene, camera);
  }

  tick();
  </script>
</body>
</html>
