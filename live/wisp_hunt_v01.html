<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WISP HUNT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030810; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 18px; pointer-events: none;
    }
    #score { color: #fff; font: bold 26px/1 monospace; text-shadow: 0 0 18px rgba(120,210,255,0.9); }
    #combo { color: rgba(255,220,80,0.95); font: bold 17px/1 monospace;
             text-shadow: 0 0 12px rgba(255,220,80,0.6); min-width: 80px; text-align: center; }
    #lives { color: rgba(255,100,100,0.9); font: 22px/1 monospace; letter-spacing: 4px; }
    #feedback {
      position: fixed; top: 42%; left: 50%; transform: translate(-50%,-50%);
      font: bold 34px/1 monospace; pointer-events: none; opacity: 0;
      transition: opacity 0.12s; white-space: nowrap;
      text-shadow: 0 0 20px currentColor;
    }
    #hint {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.22); font: 11px/1 monospace; letter-spacing: 0.12em;
      pointer-events: none; transition: opacity 1.5s;
    }
    #hint.faded { opacity: 0; }
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: rgba(3,8,16,0.82);
    }
    #overlay h1 { color: #fff; font: bold 38px/1.3 monospace; margin-bottom: 8px; }
    #overlay .sub { color: rgba(255,255,255,0.45); font: 14px/1 monospace; margin-bottom: 6px; }
    #overlay .final { color: rgba(120,210,255,0.9); font: bold 22px/1 monospace; margin: 16px 0 24px; }
    #restart {
      background: rgba(120,210,255,0.12); border: 1px solid rgba(120,210,255,0.35);
      color: rgba(120,210,255,0.9); font: bold 18px/1 monospace; padding: 13px 36px;
      cursor: pointer; letter-spacing: 0.1em;
    }
    #restart:active { background: rgba(120,210,255,0.25); }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">00000</div>
    <div id="combo"></div>
    <div id="lives">♥♥♥</div>
  </div>
  <div id="feedback"></div>
  <div id="hint">TAP WISPS AT PEAK GLOW</div>
  <div id="overlay" style="display:none">
    <h1 id="ov-title">SPIRITS FLED</h1>
    <div class="sub">ALL WISPS ESCAPED</div>
    <div class="final" id="ov-score">SCORE: 00000</div>
    <button id="restart">HUNT AGAIN</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // ═══════════════════════════════════════════════════════════════════
  // WISP HUNT v01 — timing_window mechanic, Wild Lands aesthetic
  // Tap spirit wisps at their peak pulse to capture them.
  // SRG: TIME_001 — BEAT_MS=468.75, perfect=±12%, good=±28%
  // ═══════════════════════════════════════════════════════════════════

  if (window.Telegram?.WebApp) window.Telegram.WebApp.ready();

  // ── TIMING CONFIG (from SRG TIME_001) ───────────────────────────────
  const BEAT_MS        = 468.75;   // 128 BPM
  const PERFECT_FRAC   = 0.12;     // ±12% of beat = perfect
  const GOOD_FRAC      = 0.28;     // ±28% of beat = good
  // Convert fractions to pulse threshold (pulse = (sin+1)/2):
  // Phase offset at boundary = frac * 2π → threshold = (cos(frac*2π) + 1) / 2
  const PERFECT_THRESH = (Math.cos(PERFECT_FRAC * Math.PI * 2) + 1) / 2; // ≈ 0.862
  const GOOD_THRESH    = (Math.cos(GOOD_FRAC * Math.PI * 2) + 1) / 2;    // ≈ 0.597

  // ── RENDERER ────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // ── SCENE ───────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x030810);
  scene.fog = new THREE.FogExp2(0x050c18, 0.025);

  // ── CAMERA (isometric orthographic) ─────────────────────────────────
  const FRUSTUM = 17;
  let aspect = window.innerWidth / window.innerHeight;
  const camera = new THREE.OrthographicCamera(
    -FRUSTUM * aspect, FRUSTUM * aspect, FRUSTUM, -FRUSTUM, 0.1, 500
  );
  camera.position.set(32, 32, 32);
  camera.lookAt(0, 0, 0);
  const CAM_BASE = new THREE.Vector3(32, 32, 32);

  window.addEventListener('resize', () => {
    aspect = window.innerWidth / window.innerHeight;
    camera.left = -FRUSTUM * aspect; camera.right = FRUSTUM * aspect;
    camera.top = FRUSTUM; camera.bottom = -FRUSTUM;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── LIGHTING ────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0x0c1220, 1.0));
  const sun = new THREE.DirectionalLight(0x2a3d5a, 0.7);
  sun.position.set(12, 24, 12);
  scene.add(sun);

  // ── WORLD GEOMETRY ──────────────────────────────────────────────────
  // Ground
  (function buildGround() {
    const geo = new THREE.PlaneGeometry(42, 42, 10, 10);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) pos.setZ(i, (Math.random() - 0.5) * 0.4);
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x0a1a10, flatShading: true }));
    mesh.rotation.x = -Math.PI / 2;
    scene.add(mesh);
  })();

  // Trees
  function makeTree(x, z) {
    const g = new THREE.Group();
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x18100a, flatShading: true });
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.28, 1.6, 5), trunkMat);
    trunk.position.y = 0.8;
    g.add(trunk);
    const foliageMat = new THREE.MeshLambertMaterial({ color: 0x061508, flatShading: true });
    [[0, 1.0, 0.95], [0.65, 0.85, 0.75], [1.25, 0.65, 0.55]].forEach(([yOff, rBot, h]) => {
      const cone = new THREE.Mesh(new THREE.ConeGeometry(rBot, h, 6), foliageMat);
      cone.position.y = 1.6 + yOff;
      g.add(cone);
    });
    g.position.set(x, 0, z);
    scene.add(g);
  }
  [[-9,-9],[-13,-4],[-6,-14],[9,-11],[13,-5],[7,-16],
   [-11,9],[-14,5],[-7,13],[10,10],[14,6],[8,15],
   [-16,0],[16,1],[-2,-17],[3,17],[-18,-10],[18,8]
  ].forEach(([x,z]) => makeTree(x, z));

  // Moss rocks
  function makeRock(x, z, scale) {
    const geo = new THREE.DodecahedronGeometry(scale, 0);
    const mat = new THREE.MeshLambertMaterial({ color: 0x101a12, flatShading: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, scale * 0.5, z);
    mesh.rotation.set(Math.random(), Math.random(), Math.random());
    scene.add(mesh);
  }
  [[-4,-6,0.4],[5,-8,0.55],[-7,4,0.45],[6,5,0.5],[-3,8,0.35],[8,-3,0.6]].forEach(([x,z,s]) => makeRock(x,z,s));

  // Background ambient motes (non-interactive)
  const ambMotes = [];
  for (let i = 0; i < 12; i++) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0x1a2a44, transparent: true, opacity: 0.2 })
    );
    m.position.set((Math.random() - 0.5) * 22, 1 + Math.random() * 4, (Math.random() - 0.5) * 22);
    m._ph = Math.random() * Math.PI * 2;
    m._spd = 0.4 + Math.random() * 0.6;
    scene.add(m);
    ambMotes.push(m);
  }

  // ── GAME STATE ───────────────────────────────────────────────────────
  let score = 0, combo = 0, lives = 3, active = true;
  let wisps = [], particles = [], shake = 0;
  const clock = new THREE.Clock();

  // ── HUD ─────────────────────────────────────────────────────────────
  const scoreEl   = document.getElementById('score');
  const comboEl   = document.getElementById('combo');
  const livesEl   = document.getElementById('lives');
  const fbEl      = document.getElementById('feedback');
  const hintEl    = document.getElementById('hint');
  const overlayEl = document.getElementById('overlay');
  const ovScoreEl = document.getElementById('ov-score');
  let fbTimer = null, hintTimer = null;

  function updateHUD() {
    scoreEl.textContent = String(score).padStart(5, '0');
    comboEl.textContent = combo >= 2 ? `×${combo}` : '';
    livesEl.textContent = '♥'.repeat(lives) + '♡'.repeat(3 - lives);
  }

  function flash(text, color) {
    fbEl.textContent = text; fbEl.style.color = color; fbEl.style.opacity = 1;
    if (fbTimer) clearTimeout(fbTimer);
    fbTimer = setTimeout(() => { fbEl.style.opacity = 0; }, 420);
  }

  function hideHint() {
    if (hintTimer) return;
    hintTimer = setTimeout(() => hintEl.classList.add('faded'), 3000);
  }

  // ── WISP CLASS ──────────────────────────────────────────────────────
  const WISP_PALETTE = [0x66ccff, 0x88ffcc, 0xffcc88, 0xff88cc, 0xcc88ff, 0xaaffaa];

  class Wisp {
    constructor(index) {
      this.color  = WISP_PALETTE[index % WISP_PALETTE.length];
      this.phase  = Math.random() * Math.PI * 2;   // current pulse phase
      this.floatPh = Math.random() * Math.PI * 2;
      this.orbitR  = 2.5 + Math.random() * 5.5;
      this.orbitA  = Math.random() * Math.PI * 2;
      this.orbitSpd = (0.25 + Math.random() * 0.35) * (Math.random() < 0.5 ? 1 : -1);
      this.baseY   = 1.4 + Math.random() * 2.0;
      this.missFlash = 0;

      // Main sphere
      this.mat = new THREE.MeshLambertMaterial({
        color: this.color,
        emissive: new THREE.Color(this.color),
        emissiveIntensity: 0.2,
        flatShading: true
      });
      this.mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), this.mat);

      // Outer glow ring (visual timing cue)
      this.ringMat = new THREE.MeshBasicMaterial({
        color: this.color, transparent: true, opacity: 0.0, side: THREE.DoubleSide
      });
      this.ring = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.045, 6, 20), this.ringMat);
      this.mesh.add(this.ring);

      // Invisible wide hitbox for easier touch
      const hitMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.FrontSide });
      this.hitbox  = new THREE.Mesh(new THREE.SphereGeometry(0.65, 6, 6), hitMat);
      this.mesh.add(this.hitbox);

      // Map hitbox → wisp
      wispMap.set(this.hitbox, this);
      wispMap.set(this.mesh, this);
      wispMap.set(this.ring, this);

      scene.add(this.mesh);
    }

    get pulse() { return (Math.sin(this.phase) + 1) * 0.5; }

    checkTap() {
      const p = this.pulse;
      if (p >= PERFECT_THRESH) return 'perfect';
      if (p >= GOOD_THRESH)    return 'good';
      return 'miss';
    }

    update(dt) {
      // Pulse phase advances at beat frequency
      this.phase += dt * (Math.PI * 2) / (BEAT_MS / 1000);
      const p = this.pulse;

      // Orbit around origin
      this.orbitA += this.orbitSpd * dt;
      this.floatPh += dt * 1.1;
      this.mesh.position.set(
        Math.cos(this.orbitA) * this.orbitR,
        this.baseY + Math.sin(this.floatPh) * 0.45,
        Math.sin(this.orbitA) * this.orbitR
      );

      // Visual pulse: scale + emissive brightness
      const s = 0.65 + p * 0.7;
      this.mesh.scale.setScalar(s);
      this.mat.emissiveIntensity = 0.15 + p * 1.4;

      // Ring expands at peak, hides at trough
      this.ringMat.opacity = p * 0.85;
      this.ring.scale.setScalar(0.8 + p * 0.5);
      this.ring.rotation.y += dt * 1.8;

      // Miss flash
      if (this.missFlash > 0) {
        this.missFlash = Math.max(0, this.missFlash - dt * 5);
        this.mat.emissive.setHex(this.missFlash > 0 ? 0xff2200 : this.color);
      }
    }

    dispose() {
      wispMap.delete(this.hitbox);
      wispMap.delete(this.mesh);
      wispMap.delete(this.ring);
      scene.remove(this.mesh);
    }
  }

  const wispMap = new Map(); // THREE.Object3D → Wisp

  // ── PARTICLE BURST ──────────────────────────────────────────────────
  class Burst {
    constructor(pos, color, count, speed) {
      this.life = 1.0;
      this.meshes = [];
      for (let i = 0; i < count; i++) {
        const m = new THREE.Mesh(
          new THREE.SphereGeometry(0.05 + Math.random() * 0.1, 4, 4),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
        );
        m.position.copy(pos);
        const spd = speed * (0.6 + Math.random() * 0.8);
        const phi = Math.random() * Math.PI * 2;
        const theta = Math.random() * Math.PI;
        m._v = new THREE.Vector3(
          Math.sin(theta) * Math.cos(phi) * spd,
          Math.cos(theta) * spd + 1.5,
          Math.sin(theta) * Math.sin(phi) * spd
        );
        scene.add(m);
        this.meshes.push(m);
      }
    }
    update(dt) {
      this.life -= dt * 1.6;
      this.meshes.forEach(m => {
        m.position.addScaledVector(m._v, dt);
        m._v.y -= 6 * dt;
        m.material.opacity = Math.max(0, this.life);
      });
    }
    dispose() { this.meshes.forEach(m => scene.remove(m)); }
  }

  // ── SPAWN / DESPAWN ─────────────────────────────────────────────────
  const MAX_WISPS = 5;
  let spawnIdx = 0;
  let spawnCooldown = 0;

  function spawnWisp() {
    if (wisps.length < MAX_WISPS) {
      wisps.push(new Wisp(spawnIdx++));
    }
  }

  function removeWisp(w) {
    w.dispose();
    wisps = wisps.filter(x => x !== w);
    spawnCooldown = 1.2; // brief pause before spawning replacement
  }

  // Start with 3 wisps immediately (instant_start)
  spawnWisp(); spawnWisp(); spawnWisp();

  // ── INPUT ────────────────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  const mouse2    = new THREE.Vector2();

  function onTap(cx, cy) {
    if (!active) return;
    hideHint();

    mouse2.x = (cx / window.innerWidth)  *  2 - 1;
    mouse2.y = (cy / window.innerHeight) * -2 + 1;
    raycaster.setFromCamera(mouse2, camera);

    // Collect all hittable objects
    const targets = [];
    wisps.forEach(w => { targets.push(w.mesh); targets.push(w.hitbox); });
    const hits = raycaster.intersectObjects(targets, false);

    if (hits.length === 0) return;

    const hitObj = hits[0].object;
    const w = wispMap.get(hitObj);
    if (!w) return;

    const result = w.checkTap();
    if (result === 'perfect') {
      combo++;
      score += 100 * Math.max(1, combo);
      flash('PERFECT!', '#88ffcc');
      particles.push(new Burst(w.mesh.position.clone(), w.color, 24, 6));
      shake = 0.18;
      removeWisp(w);
    } else if (result === 'good') {
      combo++;
      score += 50 * Math.max(1, combo);
      flash('GOOD', '#88aaff');
      particles.push(new Burst(w.mesh.position.clone(), w.color, 12, 4));
      shake = 0.06;
      removeWisp(w);
    } else {
      combo = 0;
      flash('MISS', '#ff4444');
      w.missFlash = 1.0;
      shake = 0.35;
      lives--;
      if (lives <= 0) endGame();
    }
    updateHUD();
  }

  renderer.domElement.addEventListener('click',      e => onTap(e.clientX, e.clientY));
  renderer.domElement.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length > 0) onTap(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });

  // ── GAME OVER ────────────────────────────────────────────────────────
  function endGame() {
    active = false;
    ovScoreEl.textContent = `SCORE: ${String(score).padStart(5, '0')}`;
    overlayEl.style.display = 'flex';
  }

  document.getElementById('restart').addEventListener('click', () => {
    wisps.forEach(w => w.dispose()); wisps = [];
    particles.forEach(p => p.dispose()); particles = [];
    score = 0; combo = 0; lives = 3; shake = 0; spawnIdx = 0; spawnCooldown = 0;
    active = true;
    overlayEl.style.display = 'none';
    hintEl.classList.remove('faded'); hintTimer = null;
    updateHUD();
    spawnWisp(); spawnWisp(); spawnWisp();
  });

  // ── ANIMATE ──────────────────────────────────────────────────────────
  updateHUD();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if (active) {
      // Spawn replacement wisps
      spawnCooldown = Math.max(0, spawnCooldown - dt);
      if (spawnCooldown <= 0 && wisps.length < MAX_WISPS) spawnWisp();

      // Update wisps
      wisps.forEach(w => w.update(dt));

      // Update particle bursts
      particles = particles.filter(p => {
        p.update(dt);
        if (p.life <= 0) { p.dispose(); return false; }
        return true;
      });

      // Ambient motes drift
      ambMotes.forEach(m => {
        m._ph += dt * m._spd;
        m.material.opacity = 0.12 + Math.sin(m._ph) * 0.08;
        m.position.y += Math.sin(m._ph * 0.5) * dt * 0.15;
      });

      // Camera shake
      if (shake > 0.005) {
        camera.position.set(
          CAM_BASE.x + (Math.random() - 0.5) * shake,
          CAM_BASE.y + (Math.random() - 0.5) * shake,
          CAM_BASE.z + (Math.random() - 0.5) * shake
        );
        shake *= 0.80;
      } else {
        camera.position.copy(CAM_BASE);
        shake = 0;
      }
    }

    renderer.render(scene, camera);
  }
  animate();
  </script>
</body>
</html>
