<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>SPORE CASCADE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none}
#score{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  color:#7fff7f;font-size:30px;font-weight:bold;
  text-shadow:0 0 14px #00ff88;letter-spacing:2px}
#chain-label{position:absolute;top:54px;left:50%;transform:translateX(-50%);
  color:#ffdd44;font-size:18px;text-shadow:0 0 10px #ffaa00;
  opacity:0;transition:opacity .25s}
#danger{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;align-items:center}
.ddot{width:15px;height:15px;border-radius:50%;
  background:#ff4444;box-shadow:0 0 8px #ff0000;transition:all .3s}
.ddot.off{background:#1a3a28;box-shadow:none}
#flash{position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;opacity:0;transition:opacity .15s}
#popup{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
  color:#fff;font-size:22px;font-weight:bold;
  text-shadow:0 0 10px #fff;pointer-events:none;opacity:0;transition:opacity .3s}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:all}
#overlay.gone{display:none}
#overlay h1{color:#7fff7f;font-size:34px;text-shadow:0 0 22px #00ff88;
  margin-bottom:6px;letter-spacing:3px}
#overlay .sub{color:#88cc88;font-size:13px;margin-bottom:22px;
  text-align:center;line-height:1.8;max-width:260px}
#overlay .fscore{color:#ffdd44;font-size:22px;margin-bottom:18px;
  text-shadow:0 0 10px #ffaa00}
#overlay button{background:#1a4a2a;border:2px solid #00ff88;
  color:#7fff7f;font-size:17px;padding:12px 34px;
  cursor:pointer;letter-spacing:2px;font-family:'Courier New',monospace;
  box-shadow:0 0 18px #00ff8844;pointer-events:all}
#overlay button:hover{background:#2a6a3a}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score">0</div>
  <div id="chain-label">CHAIN x2</div>
  <div id="danger"></div>
  <div id="flash"></div>
  <div id="popup"></div>
</div>
<div id="overlay">
  <h1>SPORE CASCADE</h1>
  <div class="sub">Tap mushrooms before they overgrow<br>Pop neighbours for chain reactions<br>5 overripe at once = OVERGROWN</div>
  <button id="btn">BEGIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Telegram
if(window.Telegram?.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}

// ---------- SCENE ----------
const canvas = document.getElementById('c');
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(W(),H());
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x050c09);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x050c09,16,38);

const camera = new THREE.PerspectiveCamera(52,W()/H(),0.1,80);
camera.position.set(0,13,11);
camera.lookAt(0,0,0);

window.addEventListener('resize',()=>{
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// Lights
scene.add(new THREE.AmbientLight(0x112211,0.9));
const sun = new THREE.DirectionalLight(0x22ff88,0.6);
sun.position.set(4,14,4);
scene.add(sun);
const pLight = new THREE.PointLight(0x00ff66,0.5,22);
pLight.position.set(0,3,0);
scene.add(pLight);

// ---------- GROUND ----------
const gndGeo = new THREE.CylinderGeometry(9.5,9.5,0.3,14);
const gndMat = new THREE.MeshLambertMaterial({color:0x0c1e14});
scene.add(Object.assign(new THREE.Mesh(gndGeo,gndMat),{position:{x:0,y:-0.16,z:0}}));

const ringGeo = new THREE.RingGeometry(5.6,5.9,24);
const ringMat = new THREE.MeshBasicMaterial({color:0x1e4a2a,side:THREE.DoubleSide});
const ring = new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x = -Math.PI/2;
ring.position.y = 0.01;
scene.add(ring);

// ---------- TREES ----------
function makeTree(x,z){
  const g=new THREE.Group();
  const tGeo=new THREE.CylinderGeometry(0.12,0.18,1.1,5);
  const tMat=new THREE.MeshLambertMaterial({color:0x2d1a0a});
  const trunk=new THREE.Mesh(tGeo,tMat);
  trunk.position.y=0.55;
  g.add(trunk);
  for(let i=0;i<3;i++){
    const r=0.85-i*0.18;
    const h=0.95-i*0.12;
    const cGeo=new THREE.ConeGeometry(r,h,6);
    const cMat=new THREE.MeshLambertMaterial({
      color:new THREE.Color().setHSL(0.36+Math.random()*0.04,0.55,0.14+i*0.04)
    });
    const cone=new THREE.Mesh(cGeo,cMat);
    cone.position.y=1.1+i*0.65+h/2;
    g.add(cone);
  }
  g.position.set(x,0,z);
  scene.add(g);
}
for(let i=0;i<16;i++){
  const a=(i/16)*Math.PI*2+(Math.random()-.5)*0.3;
  const d=7.6+Math.random()*0.9;
  makeTree(Math.cos(a)*d,Math.sin(a)*d);
}

// Rocks
for(let i=0;i<8;i++){
  const a=(i/8)*Math.PI*2+0.5;
  const d=6.6+Math.random()*0.5;
  const rGeo=new THREE.DodecahedronGeometry(0.28+Math.random()*0.2,0);
  const rMat=new THREE.MeshLambertMaterial({color:0x2a3a2a});
  const rock=new THREE.Mesh(rGeo,rMat);
  rock.position.set(Math.cos(a)*d,0.13,Math.sin(a)*d);
  rock.rotation.set(Math.random(),Math.random(),Math.random());
  scene.add(rock);
}

// ---------- AMBIENT PARTICLES ----------
const AP_COUNT=42;
const apGeo=new THREE.BufferGeometry();
const apPos=new Float32Array(AP_COUNT*3);
const apVel=[];
for(let i=0;i<AP_COUNT;i++){
  const a=Math.random()*Math.PI*2, d=0.8+Math.random()*5;
  apPos[i*3]=Math.cos(a)*d; apPos[i*3+1]=Math.random()*3.5; apPos[i*3+2]=Math.sin(a)*d;
  apVel.push({vx:(Math.random()-.5)*.009,vy:.004+Math.random()*.008,vz:(Math.random()-.5)*.009});
}
apGeo.setAttribute('position',new THREE.BufferAttribute(apPos,3));
const apMat=new THREE.PointsMaterial({color:0x55ff99,size:.07,transparent:true,opacity:.55});
scene.add(new THREE.Points(apGeo,apMat));

// ---------- HEX GRID ----------
function hexGrid(R){
  const out=[];
  for(let q=-R;q<=R;q++)
    for(let r=-R;r<=R;r++)
      if(Math.abs(q+r)<=R) out.push({q,r});
  return out;
}
function h2w(q,r,s=1.45){
  return{x:s*(Math.sqrt(3)*q+Math.sqrt(3)/2*r), z:s*(3/2*r)};
}
const HEXES=hexGrid(3);
const gKey=(q,r)=>`${q},${r}`;

// ---------- MUSHROOM SYSTEM ----------
const mushData=new Map();  // key -> data
const mushMesh=new Map();  // key -> Group

const GROW_MS=4200;
const OVERRIPE_MS=2800;
const CHAIN_R=2.3;
const OVERGROW_MAX=5;
const MAX_ALIVE=9;

function available(){return HEXES.filter(p=>!mushData.has(gKey(p.q,p.r)));}

function buildMushroomMesh(q,r){
  const {x,z}=h2w(q,r);
  const g=new THREE.Group();

  const sGeo=new THREE.CylinderGeometry(.07,.11,.44,6);
  const sMat=new THREE.MeshLambertMaterial({color:0xddccaa});
  const stalk=new THREE.Mesh(sGeo,sMat);
  stalk.position.y=.22;
  g.add(stalk);

  const cGeo=new THREE.ConeGeometry(.4,.55,7);
  const cMat=new THREE.MeshLambertMaterial({color:0x3d8a5f});
  const cap=new THREE.Mesh(cGeo,cMat);
  cap.position.y=.62;
  g.add(cap);

  const glGeo=new THREE.SphereGeometry(.22,6,6);
  const glMat=new THREE.MeshBasicMaterial({color:0x44ff88,transparent:true,opacity:.25});
  const glow=new THREE.Mesh(glGeo,glMat);
  glow.position.y=.62;
  g.add(glow);

  g.position.set(x,0,z);
  g.scale.setScalar(.05);
  g.userData={cap,cMat,glow,glMat};
  scene.add(g);
  return g;
}

function spawnMushroom(){
  const avail=available();
  if(!avail.length||mushData.size>=MAX_ALIVE) return;
  const pos=avail[Math.floor(Math.random()*avail.length)];
  const key=gKey(pos.q,pos.r);
  mushData.set(key,{q:pos.q,r:pos.r,born:Date.now(),
    growMs:GROW_MS*(.7+Math.random()*.7),
    fullAt:null,alive:true});
  mushMesh.set(key,buildMushroomMesh(pos.q,pos.r));
}

function destroyMushroom(key){
  const mesh=mushMesh.get(key);
  if(mesh) scene.remove(mesh);
  mushData.delete(key);
  mushMesh.delete(key);
}

// ---------- PARTICLES ----------
const bursts=[];
function spawnBurst(x,z,chain){
  const count=chain?18:11;
  const color=chain?0xff8800:0x88ff44;
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  const vel=[];
  for(let i=0;i<count;i++){
    pos[i*3]=x; pos[i*3+1]=.65; pos[i*3+2]=z;
    const a=(i/count)*Math.PI*2+Math.random()*.5;
    const sp=.07+Math.random()*.1;
    vel.push({vx:Math.cos(a)*sp,vy:.06+Math.random()*.09,vz:Math.sin(a)*sp});
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color,size:.12,transparent:true,opacity:1});
  const pts=new THREE.Points(geo,mat);
  scene.add(pts);
  bursts.push({pts,vel,pos,life:1});
}

// ---------- AUDIO ----------
let actx=null;
function ensureAudio(){if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();}

function playPop(chain){
  try{
    ensureAudio();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type=chain?'sawtooth':'sine';
    const f=chain?280+Math.random()*220:480+Math.random()*320;
    o.frequency.setValueAtTime(f,actx.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*.25,actx.currentTime+.18);
    g.gain.setValueAtTime(.18,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.22);
    o.start(); o.stop(actx.currentTime+.22);
  }catch(_e){/* audio optional */}
}

function playGameOver(){
  try{
    ensureAudio();
    [280,180,100].forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g); g.connect(actx.destination);
      o.frequency.value=f;
      const t=actx.currentTime+i*.18;
      g.gain.setValueAtTime(.18,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.35);
      o.start(t); o.stop(t+.35);
    });
  }catch(_e){/* audio optional */}
}

// ---------- UI ----------
const scoreEl=document.getElementById('score');
const chainEl=document.getElementById('chain-label');
const dangerEl=document.getElementById('danger');
const flashEl=document.getElementById('flash');
const popupEl=document.getElementById('popup');
const overlay=document.getElementById('overlay');
const btn=document.getElementById('btn');

let chainTimer=null;

function setDanger(n){
  dangerEl.innerHTML='';
  for(let i=0;i<OVERGROW_MAX;i++){
    const d=document.createElement('div');
    d.className='ddot'+(i>=n?' off':'');
    dangerEl.appendChild(d);
  }
}

function showChain(x){
  if(x<2){chainEl.style.opacity=0;return;}
  chainEl.textContent=`CHAIN x${x}`;
  chainEl.style.opacity=1;
  clearTimeout(chainTimer);
  chainTimer=setTimeout(()=>{chainEl.style.opacity=0;chainMult=1;},1400);
}

function flash(col){
  flashEl.style.background=col;
  flashEl.style.opacity=.35;
  setTimeout(()=>{flashEl.style.opacity=0;},160);
}

function popup(txt,col='#fff'){
  popupEl.textContent=txt;
  popupEl.style.color=col;
  popupEl.style.opacity=1;
  setTimeout(()=>{popupEl.style.opacity=0;},900);
}

// ---------- GAME STATE ----------
let score=0, chainMult=1, running=false;
let popped=0, spawnTimer=null, spawnMs=1900;
let finalScoreEl=null;

function addScore(pts){
  score+=pts;
  scoreEl.textContent=score;
}

function countOverripe(){
  let n=0;
  const now=Date.now();
  mushData.forEach(d=>{
    if(!d.alive||!d.fullAt) return;
    if((now-d.fullAt)>=OVERRIPE_MS) n++;
  });
  return n;
}

function doChain(originQ,originR,depth){
  if(depth>3) return; // max cascade depth
  const {x:ox,z:oz}=h2w(originQ,originR);
  const now=Date.now();
  const targets=[];
  mushData.forEach((d,key)=>{
    if(!d.alive) return;
    const grow=d.fullAt?1:Math.min(1,(now-d.born)/d.growMs);
    if(grow<0.55) return;
    const {x,z}=h2w(d.q,d.r);
    const dist=Math.sqrt((x-ox)**2+(z-oz)**2);
    if(dist>0.01&&dist<CHAIN_R) targets.push({key,q:d.q,r:d.r});
  });
  targets.forEach((t,i)=>{
    setTimeout(()=>{
      if(!mushData.has(t.key)) return;
      const {x,z}=h2w(t.q,t.r);
      destroyMushroom(t.key);
      chainMult++;
      spawnBurst(x,z,true);
      playPop(true);
      addScore(20*chainMult);
      showChain(chainMult);
      flash('#ff880033');
      popped++;
      doChain(t.q,t.r,depth+1);
    },(i+1)*130);
  });
}

function tapMushroom(key){
  const d=mushData.get(key);
  if(!d||!d.alive) return;
  d.alive=false;
  const {x,z}=h2w(d.q,d.r);
  const q=d.q, r=d.r;
  destroyMushroom(key);

  chainMult=Math.min(chainMult+1,8);
  const pts=10*chainMult;
  addScore(pts);
  popped++;
  spawnBurst(x,z,false);
  playPop(false);
  flash('#44ff8822');
  showChain(chainMult);
  clearTimeout(chainTimer);
  chainTimer=setTimeout(()=>{chainEl.style.opacity=0;chainMult=1;},1600);

  doChain(q,r,0);
}

function gameOver(){
  running=false;
  clearTimeout(spawnTimer);
  playGameOver();
  flash('#ff000066');
  mushData.forEach((_,key)=>destroyMushroom(key));

  const h1=overlay.querySelector('h1');
  const sub=overlay.querySelector('.sub');
  if(!finalScoreEl){
    finalScoreEl=document.createElement('div');
    finalScoreEl.className='fscore';
    overlay.insertBefore(finalScoreEl,btn);
  }
  h1.textContent='OVERGROWN';
  sub.textContent=`${popped} spores popped`;
  finalScoreEl.textContent=`SCORE: ${score}`;
  btn.textContent='PLAY AGAIN';
  overlay.classList.remove('gone');
}

function startGame(){
  score=0; chainMult=1; popped=0; spawnMs=1900; running=true;
  scoreEl.textContent='0';
  chainEl.style.opacity=0;
  setDanger(0);
  mushData.forEach((_,k)=>destroyMushroom(k));
  bursts.length=0;
  overlay.classList.add('gone');
  // seed 3 starter mushrooms
  for(let i=0;i<3;i++) setTimeout(()=>spawnMushroom(),i*350);
  schedulSpawn();
}

function schedulSpawn(){
  if(!running) return;
  spawnMs=Math.max(750,1900-popped*7);
  spawnTimer=setTimeout(()=>{
    if(running){spawnMushroom();schedulSpawn();}
  },spawnMs+Math.random()*450);
}

btn.addEventListener('click',()=>{ensureAudio();startGame();});

// ---------- RAYCAST INPUT ----------
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function onTap(cx,cy){
  if(!running) return;
  ensureAudio();
  mouse.x=(cx/W())*2-1;
  mouse.y=-(cy/H())*2+1;
  ray.setFromCamera(mouse,camera);
  for(const [key,mesh] of mushMesh){
    const hits=ray.intersectObject(mesh,true);
    if(hits.length){
      tapMushroom(key);
      return;
    }
  }
}
canvas.addEventListener('click',e=>onTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches[0]) onTap(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

// ---------- ANIMATION ----------
const clock=new THREE.Clock();
let lastCheck=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(), t=clock.getElapsedTime();
  const now=Date.now();

  // Ambient particles
  for(let i=0;i<AP_COUNT;i++){
    apPos[i*3]+=apVel[i].vx; apPos[i*3+1]+=apVel[i].vy; apPos[i*3+2]+=apVel[i].vz;
    if(apPos[i*3+1]>4){
      apPos[i*3+1]=0;
      const a=Math.random()*Math.PI*2, d=.8+Math.random()*5;
      apPos[i*3]=Math.cos(a)*d; apPos[i*3+2]=Math.sin(a)*d;
    }
  }
  apGeo.attributes.position.needsUpdate=true;

  // Mushroom updates
  mushData.forEach((d,key)=>{
    if(!d.alive) return;
    const mesh=mushMesh.get(key);
    if(!mesh) return;
    const grow=d.fullAt?1:Math.min(1,(now-d.born)/d.growMs);
    if(grow>=1&&!d.fullAt) d.fullAt=now;
    mesh.scale.setScalar(.08+grow*.92);

    const {cMat,glMat,glow}=mesh.userData;
    if(grow>=.8){
      if(d.fullAt){
        // overripe: orange-red pulse
        const orp=(now-d.fullAt)/OVERRIPE_MS;
        const pulse=.35+.3*Math.sin(t*7+d.born*.001);
        cMat.color.setHex(orp>.5?0xff4400:0xffee00);
        glMat.color.setHex(0xff6600);
        glMat.opacity=pulse;
      } else {
        cMat.color.setHex(0xaaee44);
        glMat.color.setHex(0x44ff88);
        glMat.opacity=.25+.2*Math.sin(t*4+d.born*.001);
      }
      glow.scale.setScalar(1+.18*Math.sin(t*5+d.born*.001));
    } else {
      cMat.color.setHSL(.36,.6,.2+grow*.18);
      glMat.opacity=.05;
    }
  });

  // Burst particles
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i];
    b.life-=dt*2.2;
    if(b.life<=0){scene.remove(b.pts);bursts.splice(i,1);continue;}
    b.pts.material.opacity=Math.max(0,b.life);
    for(let j=0;j<b.vel.length;j++){
      b.pos[j*3]+=b.vel[j].vx;
      b.pos[j*3+1]+=b.vel[j].vy;
      b.pos[j*3+2]+=b.vel[j].vz;
      b.vel[j].vy-=.003;
    }
    b.pts.geometry.attributes.position.needsUpdate=true;
  }

  // Game over check every 500ms
  if(running&&now-lastCheck>500){
    lastCheck=now;
    const orp=countOverripe();
    setDanger(orp);
    if(orp>=OVERGROW_MAX) gameOver();
  }

  // Gentle camera float
  camera.position.y=13+Math.sin(t*.28)*.14;
  camera.lookAt(0,0,0);
  pLight.intensity=.4+.15*Math.sin(t*1.4);

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
