<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPARK TIDE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #06040e; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
canvas { display: block; position: fixed; inset: 0; }
#hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
#score {
  position: absolute; top: 18px; left: 18px;
  color: #ff44cc; font-size: 22px; font-weight: bold;
  text-shadow: 0 0 12px #ff44cc, 0 0 24px #ff44cc88;
  letter-spacing: 2px;
}
#mult {
  position: absolute; top: 50px; left: 18px;
  color: #ffdd33; font-size: 15px; font-weight: bold;
  text-shadow: 0 0 8px #ffdd3399;
  letter-spacing: 1px; opacity: 0; transition: opacity 0.2s;
}
#lives {
  position: absolute; top: 18px; right: 18px;
  color: #ff3355; font-size: 22px;
  text-shadow: 0 0 10px #ff335588;
  letter-spacing: 4px;
}
#wave {
  position: absolute; top: 50px; right: 18px;
  color: #7755aa; font-size: 14px; letter-spacing: 2px;
  text-shadow: 0 0 6px #7755aa88;
}
#hint {
  position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
  color: #aa88dd; font-size: 13px; letter-spacing: 2px;
  text-shadow: 0 0 8px #aa88dd66;
  text-align: center; opacity: 1; transition: opacity 1.2s;
}
#poptext {
  position: absolute; pointer-events: none;
  color: #ffee00; font-size: 20px; font-weight: bold;
  text-shadow: 0 0 14px #ffee0099;
  letter-spacing: 2px; opacity: 0;
  transition: none; z-index: 20;
  white-space: nowrap;
}
#flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 30;
  opacity: 0;
}
#go {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: rgba(6,4,14,0.93);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 18px;
}
#go h1 {
  color: #ff44cc; font-size: 38px; font-weight: bold; letter-spacing: 4px;
  text-shadow: 0 0 20px #ff44cc, 0 0 40px #ff44cc88;
}
#go .go-sub { color: #aa88dd; font-size: 14px; letter-spacing: 3px; }
#go .go-score { color: #ffdd33; font-size: 28px; font-weight: bold; text-shadow: 0 0 12px #ffdd3388; }
#go .go-stat { color: #cc88ff; font-size: 15px; letter-spacing: 1px; }
#go button {
  margin-top: 12px;
  background: transparent; border: 2px solid #ff44cc;
  color: #ff44cc; font-family: 'Courier New', monospace;
  font-size: 16px; letter-spacing: 3px; padding: 12px 36px;
  cursor: pointer; text-shadow: 0 0 8px #ff44cc88;
  box-shadow: 0 0 18px #ff44cc44;
  transition: background 0.15s, box-shadow 0.15s;
  pointer-events: all;
}
#go button:hover { background: #ff44cc22; box-shadow: 0 0 30px #ff44cc88; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="hud">
  <div id="score">0</div>
  <div id="mult">×1 COMBO</div>
  <div id="lives">♦♦♦</div>
  <div id="wave">TIDE 1</div>
  <div id="hint">TAP SPARKS · CHAIN FOR SURGE</div>
  <div id="poptext"></div>
</div>
<div id="go">
  <h1>SPARK TIDE</h1>
  <div class="go-sub">TIDE EXPIRED</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-stat" id="go-combo"></div>
  <div class="go-stat" id="go-tide"></div>
  <button id="go-btn">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function(){
'use strict';

// Telegram integration
var tg = window.Telegram && window.Telegram.WebApp;
if(tg){ tg.ready(); tg.expand(); }

// --- Palette ---
var COLORS = [0xff3377, 0xff9922, 0xffee00, 0x33ffaa, 0x22ccff, 0xcc44ff, 0xff44cc, 0x00ffdd];
var COLOR_CSS = ['#ff3377','#ff9922','#ffee00','#33ffaa','#22ccff','#cc44ff','#ff44cc','#00ffdd'];

// --- Scene Setup ---
var W = window.innerWidth, H = window.innerHeight;
var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x06040e);

var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06040e, 0.04);

var camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 100);
camera.position.set(0, 0, 12);

// --- Shared Geometries ---
var GEOS = [
  new THREE.SphereGeometry(1, 8, 6),
  new THREE.OctahedronGeometry(1, 0),
  new THREE.TetrahedronGeometry(1, 0)
];

// --- Star Field ---
(function(){
  var sg = new THREE.BufferGeometry();
  var pos = new Float32Array(350 * 3);
  for(var i = 0; i < 350; i++){
    pos[i*3]   = (Math.random()-0.5)*80;
    pos[i*3+1] = (Math.random()-0.5)*80;
    pos[i*3+2] = (Math.random()-0.5)*40 - 20;
  }
  sg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  var sm = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.7 });
  scene.add(new THREE.Points(sg, sm));
})();

// --- Game State ---
var G = {};
function resetState(){
  G.score      = 0;
  G.combo      = 0;
  G.maxCombo   = 0;
  G.lives      = 3;
  G.tide       = 1;
  G.running    = true;
  G.spawnInterval = 1.4;
  G.nextSpawn  = 0.3;
  G.speedBase  = 1.8;
  G.speedMult  = 1.0;
  G.sparks     = [];
  G.particles  = [];
  G.shakeTime  = 0;
  G.shakeAmt   = 0;
  G.tideScore  = 0;
  G.tideThreshold = 15;
  G.hintTimer  = 4.0;
}
resetState();

// --- HUD refs ---
var elScore  = document.getElementById('score');
var elMult   = document.getElementById('mult');
var elLives  = document.getElementById('lives');
var elWave   = document.getElementById('wave');
var elHint   = document.getElementById('hint');
var elPop    = document.getElementById('poptext');
var elFlash  = document.getElementById('flash');
var elGO     = document.getElementById('go');

function updateHUD(){
  elScore.textContent = G.score;
  if(G.combo > 1){
    elMult.textContent = '×' + Math.min(G.combo, 8) + ' COMBO';
    elMult.style.opacity = '1';
  } else {
    elMult.style.opacity = '0';
  }
  var livesStr = '';
  for(var i=0;i<3;i++) livesStr += (i < G.lives) ? '♦' : '◇';
  elLives.textContent = livesStr;
  elWave.textContent = 'TIDE ' + G.tide;
}

// --- Pop Text ---
var popTO = null;
function showPop(txt, x, y){
  elPop.textContent = txt;
  elPop.style.left = Math.max(10, Math.min(W-160, x - 40)) + 'px';
  elPop.style.top  = Math.max(10, y - 30) + 'px';
  elPop.style.opacity = '1';
  elPop.style.transition = 'none';
  elPop.style.transform = 'translateY(0px)';
  if(popTO) clearTimeout(popTO);
  popTO = setTimeout(function(){
    elPop.style.transition = 'opacity 0.4s, transform 0.4s';
    elPop.style.opacity = '0';
    elPop.style.transform = 'translateY(-28px)';
  }, 350);
}

// --- Flash ---
var flashTO = null;
function doFlash(cssColor, op){
  elFlash.style.background = cssColor;
  elFlash.style.opacity = op || '0.18';
  if(flashTO) clearTimeout(flashTO);
  flashTO = setTimeout(function(){
    elFlash.style.transition = 'opacity 0.15s';
    elFlash.style.opacity = '0';
  }, 80);
}

// --- Spawn Spark ---
function spawnSpark(){
  var angle = Math.random() * Math.PI * 2;
  var r = 9.5 + Math.random() * 0.8;
  var x = Math.cos(angle) * r;
  var y = Math.sin(angle) * r;
  var z = (Math.random() - 0.5) * 3;

  var ci = Math.floor(Math.random() * COLORS.length);
  var mat = new THREE.MeshBasicMaterial({
    color: COLORS[ci],
    wireframe: Math.random() < 0.30
  });
  var geo = GEOS[Math.floor(Math.random() * GEOS.length)];
  var mesh = new THREE.Mesh(geo, mat);

  var sc = 0.25 + Math.random() * 0.35;
  mesh.scale.setScalar(sc);
  mesh.position.set(x, y, z);

  // velocity toward center with wobble
  var speed = G.speedBase * G.speedMult;
  var len = Math.sqrt(x*x + y*y + z*z);
  var vx = (-x/len) * speed + (Math.random()-0.5)*0.4;
  var vy = (-y/len) * speed + (Math.random()-0.5)*0.4;
  var vz = (Math.random()-0.5)*0.2;

  mesh.userData = {
    colorIdx: ci,
    vx: vx, vy: vy, vz: vz,
    rx: (Math.random()-0.5)*2.0,
    ry: (Math.random()-0.5)*2.0,
    alive: true,
    scale: sc
  };

  scene.add(mesh);
  G.sparks.push(mesh);
}

// --- Particle Burst ---
function burstAt(pos, colorIdx, count){
  count = count || (20 + Math.floor(Math.random()*11));
  var ppos = new Float32Array(count*3);
  var pvels = [];
  for(var i=0;i<count;i++){
    ppos[i*3]   = pos.x;
    ppos[i*3+1] = pos.y;
    ppos[i*3+2] = pos.z;
    var spd = 0.5 + Math.random()*3.0;
    var th  = Math.random()*Math.PI*2;
    var ph  = Math.acos(2*Math.random()-1);
    pvels.push({
      vx: Math.sin(ph)*Math.cos(th)*spd,
      vy: Math.sin(ph)*Math.sin(th)*spd,
      vz: Math.cos(ph)*spd
    });
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(ppos, 3));
  var mat = new THREE.PointsMaterial({
    color: COLORS[colorIdx],
    size: 0.12,
    transparent: true,
    opacity: 1.0,
    depthWrite: false
  });
  var pts = new THREE.Points(geo, mat);
  scene.add(pts);
  G.particles.push({ pts: pts, geo: geo, vels: pvels, life: 0.6, maxLife: 0.6, count: count });
}

// --- Destroy Spark ---
function destroySpark(mesh){
  if(!mesh.userData.alive) return;
  mesh.userData.alive = false;
  burstAt(mesh.position, mesh.userData.colorIdx);
  scene.remove(mesh);
  mesh.material.dispose();
}

// --- Chain Check ---
function chainExplode(mesh, depth, visited){
  if(depth <= 0) return 0;
  var count = 0;
  var ci = mesh.userData.colorIdx;
  var px = mesh.position.x, py = mesh.position.y, pz = mesh.position.z;
  for(var i=0; i<G.sparks.length; i++){
    var s = G.sparks[i];
    if(!s.userData.alive) continue;
    if(s === mesh) continue;
    if(visited.indexOf(s) !== -1) continue;
    if(s.userData.colorIdx !== ci) continue;
    var dx = s.position.x - px;
    var dy = s.position.y - py;
    var dz = s.position.z - pz;
    var dist = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist < 2.5){
      visited.push(s);
      destroySpark(s);
      count++;
      count += chainExplode(s, depth-1, visited);
    }
  }
  return count;
}

// --- Score & Tide ---
function addPoints(n){
  var mult = Math.min(G.combo, 8);
  G.score += n * (mult < 1 ? 1 : mult);
  G.tideScore += n;
  if(G.tideScore >= G.tideThreshold){
    G.tideScore -= G.tideThreshold;
    G.tideThreshold = Math.floor(G.tideThreshold * 1.3);
    G.tide++;
    G.speedMult += 0.12;
    G.spawnInterval = Math.max(0.5, G.spawnInterval * 0.88);
    doFlash('#aa44ff', '0.25');
  }
}

// --- Lose Life ---
function loseLife(){
  G.lives--;
  doFlash('#ff0033', '0.35');
  G.combo = 0;
  if(G.lives <= 0){
    gameOver();
  }
}

// --- Game Over ---
function gameOver(){
  G.running = false;
  // clear sparks
  for(var i=0;i<G.sparks.length;i++){
    if(G.sparks[i].userData.alive){
      scene.remove(G.sparks[i]);
      G.sparks[i].material.dispose();
    }
  }
  G.sparks = [];
  document.getElementById('go-score').textContent = G.score;
  document.getElementById('go-combo').textContent = 'MAX COMBO ×' + G.maxCombo;
  document.getElementById('go-tide').textContent  = 'TIDE REACHED ' + G.tide;
  elGO.style.display = 'flex';
}

// --- Play Again ---
document.getElementById('go-btn').addEventListener('click', function(){
  elGO.style.display = 'none';
  // clear leftover particles
  for(var i=0;i<G.particles.length;i++){
    scene.remove(G.particles[i].pts);
    G.particles[i].geo.dispose();
    G.particles[i].pts.material.dispose();
  }
  G.particles = [];
  for(var j=0;j<G.sparks.length;j++){
    if(G.sparks[j].userData.alive){
      scene.remove(G.sparks[j]);
      G.sparks[j].material.dispose();
    }
  }
  resetState();
  updateHUD();
  elHint.style.opacity = '1';
  elHint.style.transition = 'none';
});

// --- Input: convert screen coords to normalized device ---
var raycaster = new THREE.Raycaster();
raycaster.params.Points = { threshold: 0.3 };
var mouse2D = new THREE.Vector2();

function handleTap(cx, cy){
  if(!G.running) return;
  mouse2D.x =  (cx / W) * 2 - 1;
  mouse2D.y = -(cy / H) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);

  var aliveMeshes = [];
  for(var i=0;i<G.sparks.length;i++){
    if(G.sparks[i].userData.alive) aliveMeshes.push(G.sparks[i]);
  }
  var hits = raycaster.intersectObjects(aliveMeshes);
  if(hits.length > 0){
    var mesh = hits[0].object;
    if(!mesh.userData.alive) return;
    G.combo++;
    if(G.combo > G.maxCombo) G.maxCombo = G.combo;
    var visited = [mesh];
    destroySpark(mesh);
    var chained = chainExplode(mesh, 3, visited);
    var total = chained + 1;
    addPoints(10 * total);
    // shake
    G.shakeAmt  = 0.08 + chained * 0.04;
    G.shakeTime = 0.15;
    // flash
    doFlash(COLOR_CSS[mesh.userData.colorIdx], '0.18');
    // pop text
    if(chained > 0){
      var label = (chained >= 3) ? 'SURGE ×' : 'CHAIN ×';
      showPop(label + total, cx, cy);
    }
    updateHUD();
  } else {
    // miss
    G.combo = 0;
    updateHUD();
  }
}

document.addEventListener('click', function(e){ handleTap(e.clientX, e.clientY); });
document.addEventListener('touchstart', function(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    handleTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
  }
}, { passive: false });

// --- Resize ---
window.addEventListener('resize', function(){
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H);
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
});

// --- Main Loop ---
var prev = performance.now();
var camBase = new THREE.Vector3(0, 0, 12);

function loop(now){
  requestAnimationFrame(loop);
  var dt = Math.min((now - prev) / 1000, 0.05);
  prev = now;

  if(!G.running){
    renderer.render(scene, camera);
    return;
  }

  // hint fade
  if(G.hintTimer > 0){
    G.hintTimer -= dt;
    if(G.hintTimer <= 0){
      elHint.style.transition = 'opacity 1.2s';
      elHint.style.opacity = '0';
    }
  }

  // spawn
  G.nextSpawn -= dt;
  if(G.nextSpawn <= 0){
    spawnSpark();
    G.nextSpawn = G.spawnInterval * (0.8 + Math.random() * 0.4);
  }

  // move sparks
  var toRemove = [];
  for(var i=0;i<G.sparks.length;i++){
    var sp = G.sparks[i];
    if(!sp.userData.alive){ toRemove.push(i); continue; }
    var ud = sp.userData;
    sp.position.x += ud.vx * dt;
    sp.position.y += ud.vy * dt;
    sp.position.z += ud.vz * dt;
    sp.rotation.x += ud.rx * dt;
    sp.rotation.y += ud.ry * dt;
    // check center
    var dx = sp.position.x, dy = sp.position.y, dz = sp.position.z;
    var dist2 = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(dist2 < 1.0){
      scene.remove(sp);
      sp.material.dispose();
      sp.userData.alive = false;
      toRemove.push(i);
      loseLife();
      updateHUD();
    }
  }
  // remove dead sparks (reverse to preserve indices)
  for(var ri = toRemove.length-1; ri >= 0; ri--){
    G.sparks.splice(toRemove[ri], 1);
  }

  // update particles
  var pRemove = [];
  for(var pi=0;pi<G.particles.length;pi++){
    var p = G.particles[pi];
    p.life -= dt;
    if(p.life <= 0){
      scene.remove(p.pts);
      p.geo.dispose();
      p.pts.material.dispose();
      pRemove.push(pi);
      continue;
    }
    p.pts.material.opacity = p.life / p.maxLife;
    var posArr = p.geo.attributes.position.array;
    for(var vi=0;vi<p.count;vi++){
      posArr[vi*3]   += p.vels[vi].vx * dt;
      posArr[vi*3+1] += p.vels[vi].vy * dt - 2.5 * dt * (1.0 - p.life/p.maxLife);
      posArr[vi*3+2] += p.vels[vi].vz * dt;
    }
    p.geo.attributes.position.needsUpdate = true;
  }
  for(var prm = pRemove.length-1; prm>=0; prm--){
    G.particles.splice(pRemove[prm], 1);
  }

  // screen shake
  if(G.shakeTime > 0){
    G.shakeTime -= dt;
    var sv = (G.shakeTime > 0) ? G.shakeAmt : 0;
    camera.position.x = camBase.x + (Math.random()-0.5)*2*sv;
    camera.position.y = camBase.y + (Math.random()-0.5)*2*sv;
    camera.position.z = camBase.z;
  } else {
    camera.position.copy(camBase);
  }

  renderer.render(scene, camera);
}

updateHUD();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
