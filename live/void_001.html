<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VOID</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { display: block; }
#ui {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; font-family: 'Courier New', monospace;
}
#score-wrap {
  position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
  text-align: center;
}
#score {
  font-size: 52px; font-weight: bold; color: #fff;
  text-shadow: 0 0 18px rgba(140, 80, 255, 0.9);
  line-height: 1;
}
#combo {
  font-size: 16px; color: rgba(180, 130, 255, 0.85);
  letter-spacing: 3px; margin-top: 4px;
  min-height: 20px;
}
#hint {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  font-size: 13px; color: rgba(255,255,255,0.35); letter-spacing: 2px;
  transition: opacity 1.2s;
}
#flash {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(120,60,255,0.18) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.08s;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="ui">
  <div id="score-wrap">
    <div id="score">0</div>
    <div id="combo"></div>
  </div>
  <div id="hint">DRAG THE VOID</div>
  <div id="flash"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// VOID — gravity_collect mechanic
// Atoms: GRAVITY_WELL_ATTRACT, SPIRAL_INFALL, PARTICLE_BURST_POOL,
//        COMBO_COLLECTOR_LOOP, VOID_VISUAL_PULSE
// ============================================================

// ---- CONFIG ----
const C = {
  MAX_PARTICLES: 480,
  MAX_BURST: 96,
  SPAWN_RATE: 0.07,     // s per particle
  GRAVITY_RADIUS: 210,
  CAPTURE_RADIUS: 32,
  SPIRAL_SPEED: 7.5,
  GRAVITY_STRENGTH: 900,
  PARTICLE_SPEED_MIN: 28,
  PARTICLE_SPEED_MAX: 95,
  COMBO_DECAY: 2.2,     // seconds before combo resets
  MAX_DT: 0.033,
};

// ---- SETUP ----
const W = window.innerWidth, H = window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
camera.position.z = 10;

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
document.body.prepend(renderer.domElement);

// ---- VOID VISUALS ----
// Core black disc
const coreGeo = new THREE.CircleGeometry(1, 40);
const coreMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const coreMesh = new THREE.Mesh(coreGeo, coreMat);
coreMesh.scale.setScalar(26);
scene.add(coreMesh);

// Inner glow ring
const ring1Geo = new THREE.RingGeometry(26, 31, 40);
const ring1Mat = new THREE.MeshBasicMaterial({
  color: 0x7722ee, side: THREE.DoubleSide,
  transparent: true, opacity: 0.55
});
const ring1 = new THREE.Mesh(ring1Geo, ring1Mat);
scene.add(ring1);

// Outer glow ring
const ring2Geo = new THREE.RingGeometry(31, 38, 40);
const ring2Mat = new THREE.MeshBasicMaterial({
  color: 0x3311aa, side: THREE.DoubleSide,
  transparent: true, opacity: 0.28
});
const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
scene.add(ring2);

// Far field ring
const ring3Geo = new THREE.RingGeometry(C.GRAVITY_RADIUS - 2, C.GRAVITY_RADIUS + 2, 64);
const ring3Mat = new THREE.MeshBasicMaterial({
  color: 0x220044, side: THREE.DoubleSide,
  transparent: true, opacity: 0.10
});
const ring3 = new THREE.Mesh(ring3Geo, ring3Mat);
scene.add(ring3);

// ---- PARTICLE SYSTEM ----
// States: 0=dead, 1=free, 2=attracted, 3=spiral
const pPos  = new Float32Array(C.MAX_PARTICLES * 3);
const pCol  = new Float32Array(C.MAX_PARTICLES * 3);
const pVx   = new Float32Array(C.MAX_PARTICLES);
const pVy   = new Float32Array(C.MAX_PARTICLES);
const pState= new Uint8Array(C.MAX_PARTICLES);
const pSpA  = new Float32Array(C.MAX_PARTICLES); // spiral angle
const pSpR  = new Float32Array(C.MAX_PARTICLES); // spiral radius

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
const pMat = new THREE.PointsMaterial({
  size: 4, vertexColors: true,
  transparent: true, opacity: 0.92, sizeAttenuation: false
});
const pPoints = new THREE.Points(pGeo, pMat);
scene.add(pPoints);

// ---- BURST POOL ----
// Short-lived particles emitted on collect
const bPos  = new Float32Array(C.MAX_BURST * 3);
const bCol  = new Float32Array(C.MAX_BURST * 3);
const bVx   = new Float32Array(C.MAX_BURST);
const bVy   = new Float32Array(C.MAX_BURST);
const bLife = new Float32Array(C.MAX_BURST); // 0=dead, >0=age remaining
const bMaxL = new Float32Array(C.MAX_BURST);

const bGeo = new THREE.BufferGeometry();
bGeo.setAttribute('position', new THREE.BufferAttribute(bPos, 3));
bGeo.setAttribute('color',    new THREE.BufferAttribute(bCol, 3));
const bMat = new THREE.PointsMaterial({
  size: 3.5, vertexColors: true,
  transparent: true, opacity: 0.80, sizeAttenuation: false
});
const bPoints = new THREE.Points(bGeo, bMat);
scene.add(bPoints);

// ---- STATE ----
let voidX = 0, voidY = 0;
let dragging = false;
let score = 0;
let combo = 0;
let comboTimer = 0;
let shakeX = 0, shakeY = 0, shakePower = 0;
let pulseT = 0;
let collectFlash = 0;
let spawnTimer = 0;
let hintVisible = true;

const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const hintEl  = document.getElementById('hint');
const flashEl = document.getElementById('flash');

// ---- PALETTE ----
// [r, g, b] in 0-1
const COLORS = [
  [0.62, 0.22, 1.00],  // violet
  [0.22, 0.68, 1.00],  // cyan
  [1.00, 1.00, 1.00],  // white
  [0.48, 0.12, 0.90],  // deep purple
  [0.15, 0.90, 0.90],  // teal
  [0.85, 0.45, 1.00],  // lilac
];

function randColor(i) {
  const c = COLORS[Math.floor(Math.random() * COLORS.length)];
  pCol[i*3]   = c[0];
  pCol[i*3+1] = c[1];
  pCol[i*3+2] = c[2];
}

// ---- SPAWN ----
function spawnParticle(i, fromEdge) {
  let x, y;
  if (fromEdge) {
    const side = (Math.random() * 4) | 0;
    if (side === 0) { x = (Math.random() - 0.5) * W; y =  H/2 + 12; }
    else if (side === 1) { x = (Math.random() - 0.5) * W; y = -H/2 - 12; }
    else if (side === 2) { x = -W/2 - 12; y = (Math.random() - 0.5) * H; }
    else                 { x =  W/2 + 12; y = (Math.random() - 0.5) * H; }
  } else {
    x = (Math.random() - 0.5) * W * 0.92;
    y = (Math.random() - 0.5) * H * 0.92;
  }
  pPos[i*3]   = x;
  pPos[i*3+1] = y;
  pPos[i*3+2] = 0;

  const spd = C.PARTICLE_SPEED_MIN + Math.random() * (C.PARTICLE_SPEED_MAX - C.PARTICLE_SPEED_MIN);
  const ang = Math.random() * Math.PI * 2;
  pVx[i] = Math.cos(ang) * spd;
  pVy[i] = Math.sin(ang) * spd;
  pState[i] = 1;
  randColor(i);
}

// Initial fill — spread across screen
for (let i = 0; i < C.MAX_PARTICLES; i++) {
  if (Math.random() < 0.58) {
    spawnParticle(i, false);
  } else {
    pState[i] = 0;
    pPos[i*3+2] = -1000;
  }
}

// Init burst pool
for (let i = 0; i < C.MAX_BURST; i++) {
  bLife[i] = 0;
  bPos[i*3+2] = -1000;
}

// ---- BURST EMIT ----
function emitBurst(x, y, r, g, b, count) {
  let emitted = 0;
  for (let i = 0; i < C.MAX_BURST && emitted < count; i++) {
    if (bLife[i] > 0) continue;
    const spd = 60 + Math.random() * 160;
    const ang = Math.random() * Math.PI * 2;
    bVx[i] = Math.cos(ang) * spd;
    bVy[i] = Math.sin(ang) * spd;
    bPos[i*3]   = x;
    bPos[i*3+1] = y;
    bPos[i*3+2] = 0.5;
    bCol[i*3]   = r;
    bCol[i*3+1] = g;
    bCol[i*3+2] = b;
    const life = 0.35 + Math.random() * 0.25;
    bLife[i]  = life;
    bMaxL[i]  = life;
    emitted++;
  }
}

// ---- INPUT ----
function toWorld(cx, cy) {
  return { x: cx - W/2, y: -(cy - H/2) };
}

renderer.domElement.addEventListener('mousedown', e => {
  dragging = true;
  const w = toWorld(e.clientX, e.clientY);
  voidX = w.x; voidY = w.y;
  if (hintVisible) { hintEl.style.opacity = '0'; hintVisible = false; }
});
renderer.domElement.addEventListener('mousemove', e => {
  if (!dragging) return;
  const w = toWorld(e.clientX, e.clientY);
  voidX = w.x; voidY = w.y;
});
renderer.domElement.addEventListener('mouseup',    () => { dragging = false; });
renderer.domElement.addEventListener('mouseleave', () => { dragging = false; });

renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  dragging = true;
  const t = e.touches[0];
  const w = toWorld(t.clientX, t.clientY);
  voidX = w.x; voidY = w.y;
  if (hintVisible) { hintEl.style.opacity = '0'; hintVisible = false; }
}, { passive: false });
renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const w = toWorld(t.clientX, t.clientY);
  voidX = w.x; voidY = w.y;
}, { passive: false });
renderer.domElement.addEventListener('touchend',   () => { dragging = false; });

// ---- MAIN LOOP ----
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);

  const dt = Math.min(clock.getDelta(), C.MAX_DT);
  pulseT += dt * 2.1;

  // Decay
  comboTimer = Math.max(0, comboTimer - dt);
  if (comboTimer <= 0 && combo > 0) { combo = 0; comboEl.textContent = ''; }
  collectFlash = Math.max(0, collectFlash - dt * 4);
  shakePower   = Math.max(0, shakePower  - dt * 6);

  // Spawn new particles
  spawnTimer += dt;
  if (spawnTimer >= C.SPAWN_RATE) {
    spawnTimer = 0;
    for (let i = 0; i < C.MAX_PARTICLES; i++) {
      if (pState[i] === 0) { spawnParticle(i, true); break; }
    }
  }

  let collected = 0;
  let collectR = 0, collectG = 0, collectB = 0;

  // ---- Update particles ----
  for (let i = 0; i < C.MAX_PARTICLES; i++) {
    if (pState[i] === 0) continue;

    const px = pPos[i*3];
    const py = pPos[i*3+1];

    // --- Spiral state ---
    if (pState[i] === 3) {
      pSpA[i] += dt * (C.SPIRAL_SPEED + (1 - pSpR[i] / C.CAPTURE_RADIUS) * 12);
      pSpR[i] *= 0.84;
      pPos[i*3]   = voidX + Math.cos(pSpA[i]) * pSpR[i];
      pPos[i*3+1] = voidY + Math.sin(pSpA[i]) * pSpR[i];

      // Brighten toward white
      const bright = 1 - pSpR[i] / C.CAPTURE_RADIUS;
      pCol[i*3]   = Math.min(1, pCol[i*3]   + bright * 0.35);
      pCol[i*3+1] = Math.min(1, pCol[i*3+1] + bright * 0.35);
      pCol[i*3+2] = 1;

      if (pSpR[i] < 3) {
        // Collected
        collectR += pCol[i*3];
        collectG += pCol[i*3+1];
        collectB += pCol[i*3+2];
        pState[i] = 0;
        pPos[i*3+2] = -1000;
        collected++;
      }
      continue;
    }

    // --- Free / Attracted state ---
    const dx = voidX - px;
    const dy = voidY - py;
    const dist2 = dx*dx + dy*dy;
    const dist  = Math.sqrt(dist2);

    if (dragging && dist < C.CAPTURE_RADIUS) {
      // Enter spiral
      pState[i] = 3;
      pSpA[i]   = Math.atan2(py - voidY, px - voidX);
      pSpR[i]   = dist;
      continue;
    }

    if (dragging && dist < C.GRAVITY_RADIUS) {
      const force = (1 - dist / C.GRAVITY_RADIUS) * C.GRAVITY_STRENGTH;
      const nx = dx / (dist + 0.001);
      const ny = dy / (dist + 0.001);
      pVx[i] += nx * force * dt;
      pVy[i] += ny * force * dt;

      // Color shift toward violet when attracted
      pCol[i*3]   = Math.min(1, pCol[i*3]   + 0.012);
      pCol[i*3+2] = 1;
      pState[i] = 2;
    } else {
      pState[i] = 1;
    }

    // Velocity cap
    const spd2 = pVx[i]*pVx[i] + pVy[i]*pVy[i];
    if (spd2 > 450*450) {
      const inv = 450 / Math.sqrt(spd2);
      pVx[i] *= inv; pVy[i] *= inv;
    }

    // Light damping (free) / heavier (attracted keeps momentum)
    const damp = pState[i] === 2 ? 0.998 : 0.9985;
    pVx[i] *= damp;
    pVy[i] *= damp;

    pPos[i*3]   += pVx[i] * dt;
    pPos[i*3+1] += pVy[i] * dt;

    // Off-screen → kill
    if (Math.abs(pPos[i*3]) > W/2 + 40 || Math.abs(pPos[i*3+1]) > H/2 + 40) {
      pState[i] = 0;
      pPos[i*3+2] = -1000;
    } else {
      pPos[i*3+2] = 0;
    }
  }

  // ---- Update burst ----
  for (let i = 0; i < C.MAX_BURST; i++) {
    if (bLife[i] <= 0) continue;
    bLife[i] -= dt;
    if (bLife[i] <= 0) { bLife[i] = 0; bPos[i*3+2] = -1000; continue; }
    bPos[i*3]   += bVx[i] * dt;
    bPos[i*3+1] += bVy[i] * dt;
    bVx[i] *= 0.90;
    bVy[i] *= 0.90;
    const fade = bLife[i] / bMaxL[i];
    bCol[i*3]   = Math.min(1, bCol[i*3]   * fade + (1 - fade) * 0.3);
    bCol[i*3+1] = Math.min(1, bCol[i*3+1] * fade + (1 - fade) * 0.1);
    bCol[i*3+2] = 1;
    bPos[i*3+2] = 0.5;
  }

  // ---- Collection scoring ----
  if (collected > 0) {
    combo++;
    comboTimer = C.COMBO_DECAY;

    const multiplier = 1 + Math.floor(combo / 4);
    score += collected * multiplier;
    scoreEl.textContent = score;

    if (combo >= 4) {
      comboEl.textContent = 'x' + multiplier + ' COMBO';
    } else {
      comboEl.textContent = '';
    }

    // Burst emit at void center
    const avgR = collectR / collected;
    const avgG = collectG / collected;
    const burstCount = Math.min(12, 4 + collected * 2);
    emitBurst(voidX, voidY, avgR, avgG, 1, burstCount);

    collectFlash = 1.0;
    shakePower = Math.min(1, shakePower + collected * 0.18);
  }

  // ---- Void visual update ----
  const ps   = 24 + Math.sin(pulseT) * 3.5;
  coreMesh.scale.setScalar(ps);
  coreMesh.position.set(voidX, voidY, 1);
  ring1.position.set(voidX, voidY, 0.8);
  ring2.position.set(voidX, voidY, 0.7);
  ring3.position.set(voidX, voidY, 0.6);

  // Ring opacity pulse
  ring1Mat.opacity = 0.38 + Math.sin(pulseT * 1.4) * 0.18 + collectFlash * 0.3;
  ring2Mat.opacity = 0.18 + Math.sin(pulseT) * 0.08 + collectFlash * 0.15;
  ring3Mat.opacity = 0.06 + (dragging ? 0.06 : 0);

  // Color flash on collect
  if (collectFlash > 0.3) {
    ring1Mat.color.setRGB(1.0, 0.5 + collectFlash * 0.3, collectFlash);
    ring2Mat.color.setRGB(0.7, 0.2, collectFlash * 0.8);
  } else {
    ring1Mat.color.setRGB(0.47, 0.13, 0.93);
    ring2Mat.color.setRGB(0.20, 0.07, 0.67);
  }

  // ---- Screen shake ----
  if (shakePower > 0.01) {
    shakeX = (Math.random() - 0.5) * shakePower * 9;
    shakeY = (Math.random() - 0.5) * shakePower * 9;
  } else {
    shakeX = 0; shakeY = 0;
  }
  camera.position.x = shakeX;
  camera.position.y = shakeY;

  // ---- CSS flash overlay ----
  flashEl.style.opacity = collectFlash > 0 ? (collectFlash * 0.7).toFixed(2) : '0';

  // ---- BG pulse (subtle) ----
  const bgV = collectFlash * 0.035;
  renderer.setClearColor(new THREE.Color(bgV * 0.6, 0, bgV), 1);

  // ---- Upload buffers ----
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate    = true;
  bGeo.attributes.position.needsUpdate = true;
  bGeo.attributes.color.needsUpdate    = true;

  renderer.render(scene, camera);
}

tick();
</script>
</body>
</html>
