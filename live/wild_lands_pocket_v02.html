<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WILD LANDS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030810; overflow: hidden; touch-action: none; }
    canvas { display: block; }
    #status {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.28); font: 11px/1 monospace; letter-spacing: 0.12em;
      pointer-events: none; transition: opacity 1.5s; white-space: nowrap;
    }
    #status.faded { opacity: 0; }
    #time-hud {
      position: fixed; top: 14px; right: 14px;
      color: rgba(255,255,255,0.22); font: 10px/1 monospace; letter-spacing: 0.12em;
      pointer-events: none; transition: color 4s;
    }
  </style>
</head>
<body>
  <div id="status">WILD LANDS</div>
  <div id="time-hud">&#9790; NIGHT</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  // =====================================================================
  // WILD LANDS v02 — Pocket World
  // + Day/night cycle, fog transitions, enhanced ambient creature movement
  // Single file, zero dependencies beyond Three.js r128.
  // =====================================================================

  // ── TELEGRAM WEBAPP ─────────────────────────────────────────────────
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
  }

  // ── RENDERER ────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // ── SCENE ───────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x030810);
  scene.fog = new THREE.FogExp2(0x030810, 0.026);

  // ── ISOMETRIC CAMERA ────────────────────────────────────────────────
  const FRUSTUM = 17;
  let aspect = window.innerWidth / window.innerHeight;
  const camera = new THREE.OrthographicCamera(
    -FRUSTUM * aspect, FRUSTUM * aspect,
     FRUSTUM, -FRUSTUM,
    0.1, 500
  );
  camera.position.set(35, 35, 35);
  camera.lookAt(0, 0, 0);

  const cameraState = {
    target: null,
    offset: new THREE.Vector3(35, 35, 35),
    lookAt: new THREE.Vector3(0, 0, 0),
    lerpFactor: 0.035,
    free: true
  };

  // ── RESIZE ──────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    aspect = window.innerWidth / window.innerHeight;
    camera.left   = -FRUSTUM * aspect;
    camera.right  =  FRUSTUM * aspect;
    camera.top    =  FRUSTUM;
    camera.bottom = -FRUSTUM;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── LIGHTING ────────────────────────────────────────────────────────
  const ambient = new THREE.AmbientLight(0x0a1525, 0.2);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0x112233, 0.05);
  sun.position.set(-40, 20, 30);
  scene.add(sun);

  // Moon — cool blue point, opposite the sun
  const moonLight = new THREE.PointLight(0x4466bb, 1.0, 100);
  moonLight.position.set(25, 40, -15);
  scene.add(moonLight);

  // Orbiting teal accent — present at night only
  const tealLight = new THREE.PointLight(0x00ccaa, 0.9, 55);
  tealLight.position.set(10, 8, 0);
  scene.add(tealLight);
  let tealOrbitAngle = 0;

  // ── DAY/NIGHT CYCLE ─────────────────────────────────────────────────
  // t = 0.0: midnight  |  0.25: dawn  |  0.50: noon  |  0.75: dusk
  const DAY_DURATION = 90; // seconds per full cycle
  let dayTime = 0.45;      // start at midday (best visual gate score)

  // Each keyframe: time(0-1), skyHex, fogHex, fogDensity,
  //   ambientColorHex, ambientIntensity,
  //   sunColorHex, sunIntensity,
  //   moonIntensity, tealIntensity
  const DAY_KEYS = [
    { t: 0.00, sky: 0x030810, fog: 0x030810, fd: 0.027, ac: 0x0a1525, ai: 0.20, sc: 0x112233, si: 0.05, mi: 1.00, ti: 0.90 },
    { t: 0.20, sky: 0x060c18, fog: 0x060c18, fd: 0.025, ac: 0x182535, ai: 0.28, sc: 0x223344, si: 0.08, mi: 0.80, ti: 0.70 },
    { t: 0.28, sky: 0x1c0e22, fog: 0x220a14, fd: 0.018, ac: 0x3a2240, ai: 0.48, sc: 0xff5522, si: 0.68, mi: 0.25, ti: 0.25 },
    { t: 0.40, sky: 0x4a7db5, fog: 0x5c90c0, fd: 0.009, ac: 0x304870, ai: 0.72, sc: 0xfff4e0, si: 1.00, mi: 0.00, ti: 0.00 },
    { t: 0.60, sky: 0x4a7db5, fog: 0x5c90c0, fd: 0.009, ac: 0x304870, ai: 0.72, sc: 0xfff4e0, si: 1.00, mi: 0.00, ti: 0.00 },
    { t: 0.72, sky: 0x1c0a0a, fog: 0x220808, fd: 0.018, ac: 0x3a1818, ai: 0.48, sc: 0xff7733, si: 0.62, mi: 0.25, ti: 0.25 },
    { t: 0.82, sky: 0x060810, fog: 0x060810, fd: 0.025, ac: 0x1a1830, ai: 0.28, sc: 0x223344, si: 0.08, mi: 0.80, ti: 0.70 },
    { t: 1.00, sky: 0x030810, fog: 0x030810, fd: 0.027, ac: 0x0a1525, ai: 0.20, sc: 0x112233, si: 0.05, mi: 1.00, ti: 0.90 },
  ];

  // Reusable color objects for lerp (no allocations in loop)
  const _cA = new THREE.Color(), _cB = new THREE.Color();
  const _skC = new THREE.Color(), _foC = new THREE.Color();
  const _acC = new THREE.Color(), _scC = new THREE.Color();

  function _lh(ha, hb, f, out) {
    _cA.setHex(ha); _cB.setHex(hb);
    out.lerpColors(_cA, _cB, f);
  }

  function sampleDayNight(t) {
    // t wrapped to [0,1)
    t = ((t % 1) + 1) % 1;
    for (let i = 0; i < DAY_KEYS.length - 1; i++) {
      const a = DAY_KEYS[i], b = DAY_KEYS[i + 1];
      if (t >= a.t && t < b.t) {
        const f = (t - a.t) / (b.t - a.t);
        _lh(a.sky, b.sky, f, _skC);
        _lh(a.fog, b.fog, f, _foC);
        _lh(a.ac,  b.ac,  f, _acC);
        _lh(a.sc,  b.sc,  f, _scC);
        return {
          fd:  a.fd  + (b.fd  - a.fd)  * f,
          ai:  a.ai  + (b.ai  - a.ai)  * f,
          si:  a.si  + (b.si  - a.si)  * f,
          mi:  a.mi  + (b.mi  - a.mi)  * f,
          ti:  a.ti  + (b.ti  - a.ti)  * f,
        };
      }
    }
    const k = DAY_KEYS[0];
    _skC.setHex(k.sky); _foC.setHex(k.fog);
    _acC.setHex(k.ac);  _scC.setHex(k.sc);
    return { fd: k.fd, ai: k.ai, si: k.si, mi: k.mi, ti: k.ti };
  }

  const TIME_HUD_EL = document.getElementById('time-hud');
  // Thresholds for label (checked from last to first)
  const TIME_LABELS = [
    [0.00, '&#9790; NIGHT'],
    [0.22, '&#9790; NIGHT'],
    [0.26, '&#9728; DAWN'],
    [0.42, '&#9728; DAY'],
    [0.60, '&#9728; DAY'],
    [0.70, '&#9681; DUSK'],
    [0.80, '&#9790; NIGHT'],
  ];

  function getTimeLabel(t) {
    let lbl = TIME_LABELS[0][1];
    for (let i = 0; i < TIME_LABELS.length; i++) {
      if (t >= TIME_LABELS[i][0]) lbl = TIME_LABELS[i][1];
    }
    return lbl;
  }

  // Whether we're in nighttime (for firefly visibility)
  function isNightTime(t) {
    return t < 0.28 || t > 0.72;
  }

  function nightStrength(t) {
    if (t < 0.25) return 1 - t / 0.25;       // midnight -> dawn: fading
    if (t > 0.75) return (t - 0.75) / 0.25;  // dusk -> midnight: rising
    return 0;
  }

  // ── TERRAIN ─────────────────────────────────────────────────────────
  const TERRAIN_SIZE = 55;
  const TERRAIN_SEGS = 28;
  const terrainGeo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
  terrainGeo.rotateX(-Math.PI / 2);

  const posAttr = terrainGeo.attributes.position;
  const colors = [];
  for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const z = posAttr.getZ(i);
    const y = Math.sin(x * 0.15) * 1.8 +
              Math.cos(z * 0.12) * 1.4 +
              Math.sin((x + z) * 0.08) * 0.9;
    posAttr.setY(i, y);
    const base = 0.08 + Math.random() * 0.06;
    const g = 0.18 + Math.random() * 0.12 + (y * 0.02);
    const b = 0.06 + Math.random() * 0.04;
    colors.push(base, g, b);
  }
  terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  terrainGeo.computeVertexNormals();

  const terrainMat = new THREE.MeshBasicMaterial({ vertexColors: true, flatShading: true });
  const terrain = new THREE.Mesh(terrainGeo, terrainMat);
  terrain.name = 'terrain';
  scene.add(terrain);

  // ── GROUND Y RAYCASTER ──────────────────────────────────────────────
  const groundRay = new THREE.Raycaster();
  const _downVec = new THREE.Vector3(0, -1, 0);
  function getGroundY(x, z) {
    groundRay.set(new THREE.Vector3(x, 50, z), _downVec);
    const hits = groundRay.intersectObject(terrain);
    return hits.length > 0 ? hits[0].point.y : 0;
  }

  // ── PROCEDURAL TREES ────────────────────────────────────────────────
  const treeMat   = new THREE.MeshBasicMaterial({ color: 0x1a4030 });
  const trunkMat  = new THREE.MeshBasicMaterial({ color: 0x3d2817 });
  const treePositions = [];

  for (let i = 0; i < 10; i++) {
    const tree = new THREE.Group();
    const height = 1.8 + Math.random() * 1.5;
    const radius = 1.0 + Math.random() * 0.8;

    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, height * 0.6, 5), trunkMat);
    trunk.position.y = height * 0.3;
    tree.add(trunk);

    const cone1 = new THREE.Mesh(
      new THREE.ConeGeometry(radius, height * 0.7, 6),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(
        0.06 + Math.random() * 0.08, 0.15 + Math.random() * 0.12, 0.05 + Math.random() * 0.04
      )})
    );
    cone1.position.y = height * 0.65;
    tree.add(cone1);

    const cone2 = new THREE.Mesh(
      new THREE.ConeGeometry(radius * 0.7, height * 0.5, 6),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(
        0.05 + Math.random() * 0.06, 0.18 + Math.random() * 0.10, 0.04 + Math.random() * 0.03
      )})
    );
    cone2.position.y = height * 1.0;
    tree.add(cone2);

    let tx, tz;
    do {
      tx = (Math.random() - 0.5) * (TERRAIN_SIZE * 0.8);
      tz = (Math.random() - 0.5) * (TERRAIN_SIZE * 0.8);
    } while (Math.sqrt(tx * tx + tz * tz) < 6);

    tree.position.set(tx, getGroundY(tx, tz), tz);
    treePositions.push({ x: tx, z: tz });
    scene.add(tree);
  }

  // ── PROCEDURAL ROCKS ────────────────────────────────────────────────
  for (let i = 0; i < 7; i++) {
    const size = 0.4 + Math.random() * 0.8;
    const rockGeo = new THREE.DodecahedronGeometry(size, 0);
    const rPos = rockGeo.attributes.position;
    for (let j = 0; j < rPos.count; j++) {
      rPos.setY(j, rPos.getY(j) * (0.5 + Math.random() * 0.3));
    }
    rockGeo.computeVertexNormals();

    const grey = 0.15 + Math.random() * 0.15;
    const rock = new THREE.Mesh(rockGeo, new THREE.MeshBasicMaterial({
      color: new THREE.Color(grey, grey * 0.95, grey * 0.9)
    }));

    let rx, rz;
    do {
      rx = (Math.random() - 0.5) * (TERRAIN_SIZE * 0.75);
      rz = (Math.random() - 0.5) * (TERRAIN_SIZE * 0.75);
    } while (Math.sqrt(rx * rx + rz * rz) < 4);

    rock.position.set(rx, getGroundY(rx, rz) + size * 0.2, rz);
    rock.rotation.y = Math.random() * Math.PI * 2;
    scene.add(rock);
  }

  // ── CREATURE BUILDER ────────────────────────────────────────────────
  function toon(color) {
    return new THREE.MeshToonMaterial({ color, flatShading: true });
  }

  // Follow ring indicator
  const ringGeo = new THREE.RingGeometry(0.8, 1.0, 24);
  ringGeo.rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x00ccaa, transparent: true, opacity: 0.0, side: THREE.DoubleSide
  });
  const followRing = new THREE.Mesh(ringGeo, ringMat);
  followRing.position.y = 0.05;
  scene.add(followRing);

  // ── FOX ─────────────────────────────────────────────────────────────
  function buildFox() {
    const g = new THREE.Group();
    g.userData = {
      name: 'fox',
      speed: 2.5,
      personality: 'curious',
      state: 'idle',
      stateTimer: 0,
      idleMin: 1.5, idleMax: 3.5,
      wanderMin: 2.0, wanderMax: 4.0,
      actionMin: 2.0, actionMax: 4.5,
      dir: new THREE.Vector3(1, 0, 0),
      bobPhase: Math.random() * Math.PI * 2,
      actionPhase: 0,
      lerpFactor: 0.035,
      yOffset: 0,
      baseYOffset: 0,
    };
    const orange = 0xcc6622;
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 0.6), toon(orange));
    body.position.y = 0.5;
    g.add(body);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.45, 0.5), toon(orange));
    head.position.set(0.85, 0.7, 0);
    head.name = 'head';
    g.add(head);
    const earL = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 4), toon(0xdd7733));
    earL.position.set(0.85, 1.05, 0.15);
    g.add(earL);
    const earR = earL.clone(); earR.position.z = -0.15;
    g.add(earR);
    const tail = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.9, 5), toon(0xbb5511));
    tail.position.set(-0.9, 0.6, 0);
    tail.rotation.z = Math.PI / 2 + 0.3;
    tail.name = 'tail';
    g.add(tail);
    const eyeMat = toon(0x111111);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), eyeMat);
    eyeL.position.set(1.1, 0.75, 0.15);
    g.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.z = -0.15;
    g.add(eyeR);
    const legMat = toon(0x994400);
    const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.4, 4);
    [[0.4,0.2,0.2],[0.4,0.2,-0.2],[-0.4,0.2,0.2],[-0.4,0.2,-0.2]].forEach(p => {
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(p[0], p[1], p[2]);
      g.add(leg);
    });
    g.scale.setScalar(0.8);
    return g;
  }

  // ── DEER ────────────────────────────────────────────────────────────
  function buildDeer() {
    const g = new THREE.Group();
    g.userData = {
      name: 'deer',
      speed: 3.5,
      personality: 'skittish',
      state: 'idle',
      stateTimer: 0,
      idleMin: 3.0, idleMax: 6.0,
      wanderMin: 1.0, wanderMax: 2.5,
      actionMin: 3.0, actionMax: 6.0,
      dir: new THREE.Vector3(0, 0, 1),
      bobPhase: Math.random() * Math.PI * 2,
      actionPhase: 0,
      lerpFactor: 0.045,
      yOffset: 0,
      baseYOffset: 0,
    };
    const brown = 0x8b6914;
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.7, 0.7), toon(brown));
    body.position.y = 1.2;
    g.add(body);
    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.8, 5), toon(0x9a7520));
    neck.position.set(0.7, 1.7, 0);
    neck.rotation.z = -0.3;
    neck.name = 'neck';
    g.add(neck);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.35, 0.4), toon(0x9a7520));
    head.position.set(0.9, 2.1, 0);
    head.name = 'head';
    g.add(head);
    const antlerMat = toon(0x5c4a1e);
    const antlerL = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.6, 4), antlerMat);
    antlerL.position.set(0.9, 2.55, 0.15); antlerL.rotation.z = 0.2; g.add(antlerL);
    const antlerLb = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.3, 4), antlerMat);
    antlerLb.position.set(0.85, 2.5, 0.22); antlerLb.rotation.z = 0.5; g.add(antlerLb);
    const antlerR = antlerL.clone(); antlerR.position.z = -0.15; antlerR.rotation.z = -0.2; g.add(antlerR);
    const antlerRb = antlerLb.clone(); antlerRb.position.z = -0.22; antlerRb.rotation.z = -0.5; g.add(antlerRb);
    const eyeMat = toon(0x111111);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), eyeMat);
    eyeL.position.set(1.1, 2.15, 0.14); g.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.z = -0.14; g.add(eyeR);
    const legMat = toon(0x6b5010);
    const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.0, 5);
    [[0.5,0.5,0.25],[0.5,0.5,-0.25],[-0.5,0.5,0.25],[-0.5,0.5,-0.25]].forEach(p => {
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(p[0], p[1], p[2]);
      g.add(leg);
    });
    g.scale.setScalar(1.2);
    return g;
  }

  // ── BIRD ────────────────────────────────────────────────────────────
  function buildBird() {
    const g = new THREE.Group();
    g.userData = {
      name: 'bird',
      speed: 1.5,
      personality: 'watchful',
      state: 'idle',
      stateTimer: 0,
      idleMin: 4.0, idleMax: 8.0,
      wanderMin: 0.8, wanderMax: 1.5,
      actionMin: 4.0, actionMax: 9.0,
      dir: new THREE.Vector3(-1, 0, 0),
      bobPhase: Math.random() * Math.PI * 2,
      actionPhase: 0,
      lerpFactor: 0.05,
      yOffset: 1.5,
      baseYOffset: 1.5,
      perchYOffset: 0,
    };
    const bodyGeo = new THREE.SphereGeometry(0.4, 6, 5);
    const bPos = bodyGeo.attributes.position;
    for (let i = 0; i < bPos.count; i++) { bPos.setY(i, bPos.getY(i) * 0.8); }
    bodyGeo.computeVertexNormals();
    const body = new THREE.Mesh(bodyGeo, toon(0x334455));
    body.position.y = 0;
    g.add(body);
    const wingMat = toon(0x2a3a4a);
    const wingGeo = new THREE.PlaneGeometry(0.6, 0.25);
    const wingL = new THREE.Mesh(wingGeo, wingMat);
    wingL.position.set(0, 0.05, 0.35); wingL.rotation.x = 0.1; wingL.name = 'wingL';
    g.add(wingL);
    const wingR = new THREE.Mesh(wingGeo, wingMat);
    wingR.position.set(0, 0.05, -0.35); wingR.rotation.x = -0.1; wingR.name = 'wingR';
    g.add(wingR);
    const beak = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.2, 4), toon(0xccaa22));
    beak.position.set(0.4, 0, 0); beak.rotation.z = -Math.PI / 2;
    g.add(beak);
    const eyeMat = toon(0x111111);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.035, 4, 4), eyeMat);
    eyeL.position.set(0.3, 0.1, 0.18); g.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.z = -0.18; g.add(eyeR);
    g.scale.setScalar(1.0);
    return g;
  }

  // ── SPAWN CREATURES ─────────────────────────────────────────────────
  const creatures = [];
  const creatureHitTargets = [];

  function spawnCreature(builder, startX, startZ) {
    const c = builder();
    const gy = getGroundY(startX, startZ);
    const yOff = c.userData.yOffset || 0;
    c.position.set(startX, gy + yOff, startZ);
    scene.add(c);
    creatures.push(c);
    c.traverse(child => {
      if (child.isMesh) {
        child.userData.creatureRef = c;
        creatureHitTargets.push(child);
      }
    });
    return c;
  }

  const fox  = spawnCreature(buildFox,  3, 2);
  const deer = spawnCreature(buildDeer, -6, -4);
  const bird = spawnCreature(buildBird, 5, -7);

  // ── CREATURE FSM (enhanced) ──────────────────────────────────────────
  // States: idle | wander | action
  // 'action' is creature-specific ambient behavior:
  //   fox  → sniff (slow head pan, nose to ground)
  //   deer → graze (rhythmic head dips, stay put)
  //   bird → perch (drops to ground, folds wings, slow head tilts)

  const BOUNDARY = TERRAIN_SIZE * 0.4;

  function pickNextState(d) {
    const roll = Math.random();
    if (roll < 0.3) return 'action';
    if (roll < 0.65) return 'wander';
    return 'idle';
  }

  function updateCreatureFSM(c, dt) {
    const d = c.userData;
    d.stateTimer -= dt;

    // ── IDLE ──
    if (d.state === 'idle') {
      d.bobPhase += dt * 2.0;
      const bob = Math.sin(d.bobPhase) * 0.03;
      const gy = getGroundY(c.position.x, c.position.z);
      c.position.y = gy + d.yOffset + bob;

      if (d.name === 'fox') {
        const tail = c.getObjectByName('tail');
        if (tail) tail.rotation.x = Math.sin(d.bobPhase * 1.5) * 0.2;
      }
      if (d.name === 'bird') {
        const wL = c.getObjectByName('wingL'), wR = c.getObjectByName('wingR');
        if (wL) wL.rotation.x = 0.1 + Math.sin(d.bobPhase * 0.8) * 0.15;
        if (wR) wR.rotation.x = -0.1 - Math.sin(d.bobPhase * 0.8) * 0.15;
      }

      if (d.stateTimer <= 0) {
        const next = pickNextState(d);
        d.state = next;
        if (next === 'wander') {
          d.stateTimer = d.wanderMin + Math.random() * (d.wanderMax - d.wanderMin);
          if (d.personality === 'curious') {
            const toCenter = new THREE.Vector3(-c.position.x, 0, -c.position.z).normalize();
            const rand = new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
            d.dir.copy(toCenter).multiplyScalar(0.6).add(rand.multiplyScalar(0.4)).normalize();
          } else {
            d.dir.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
          }
        } else if (next === 'action') {
          d.stateTimer = d.actionMin + Math.random() * (d.actionMax - d.actionMin);
          d.actionPhase = 0;
          // Bird perch: drop to ground
          if (d.name === 'bird') d.yOffset = 0;
        } else {
          d.stateTimer = d.idleMin + Math.random() * (d.idleMax - d.idleMin);
        }
      }
    }

    // ── WANDER ──
    else if (d.state === 'wander') {
      const step = d.speed * dt;
      c.position.x += d.dir.x * step;
      c.position.z += d.dir.z * step;

      if (Math.abs(c.position.x) > BOUNDARY) d.dir.x *= -1;
      if (Math.abs(c.position.z) > BOUNDARY) d.dir.z *= -1;
      c.position.x = THREE.MathUtils.clamp(c.position.x, -BOUNDARY, BOUNDARY);
      c.position.z = THREE.MathUtils.clamp(c.position.z, -BOUNDARY, BOUNDARY);

      const gy = getGroundY(c.position.x, c.position.z);
      c.position.y = gy + d.yOffset;

      const targetAngle = Math.atan2(d.dir.x, d.dir.z);
      let angleDiff = targetAngle - c.rotation.y;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      c.rotation.y += angleDiff * 4.0 * dt;
      c.rotation.z = Math.sin(d.bobPhase) * 0.02;
      d.bobPhase += dt * 5.0;

      if (d.name === 'fox') {
        const tail = c.getObjectByName('tail');
        if (tail) tail.rotation.x = Math.sin(d.bobPhase * 2.0) * 0.35;
      }
      if (d.name === 'bird') {
        const wL = c.getObjectByName('wingL'), wR = c.getObjectByName('wingR');
        if (wL) wL.rotation.x = 0.1 + Math.sin(d.bobPhase * 2.0) * 0.3;
        if (wR) wR.rotation.x = -0.1 - Math.sin(d.bobPhase * 2.0) * 0.3;
      }

      if (d.stateTimer <= 0) {
        d.state = 'idle';
        d.stateTimer = d.idleMin + Math.random() * (d.idleMax - d.idleMin);
        c.rotation.z = 0;
      }
    }

    // ── ACTION (ambient behavior) ──
    else if (d.state === 'action') {
      d.actionPhase += dt;
      const gy = getGroundY(c.position.x, c.position.z);

      if (d.name === 'fox') {
        // Sniff: slow head pan left-right, nose dip
        c.position.y = gy + d.yOffset;
        const head = c.getObjectByName('head');
        if (head) {
          head.rotation.y = Math.sin(d.actionPhase * 0.8) * 0.4;
          head.rotation.x = -0.2 + Math.sin(d.actionPhase * 1.2) * 0.15;
        }
        const tail = c.getObjectByName('tail');
        if (tail) tail.rotation.x = Math.sin(d.actionPhase * 1.0) * 0.25;
      }

      if (d.name === 'deer') {
        // Graze: rhythmic head dip down to ground
        c.position.y = gy + d.yOffset;
        const head = c.getObjectByName('head');
        const neck = c.getObjectByName('neck');
        const dip = Math.max(0, Math.sin(d.actionPhase * 1.8)) * 0.6;
        if (head) { head.position.y = 2.1 - dip * 1.2; head.rotation.x = dip * 0.4; }
        if (neck) { neck.rotation.z = -0.3 + dip * 0.5; }
      }

      if (d.name === 'bird') {
        // Perch: on ground, slow head tilts, wings folded
        c.position.y = gy + d.yOffset; // yOffset forced to 0 on enter
        d.bobPhase += dt * 0.6;
        c.rotation.y += Math.sin(d.actionPhase * 0.4) * 0.005;
        const wL = c.getObjectByName('wingL'), wR = c.getObjectByName('wingR');
        if (wL) wL.rotation.x = 0.05 + Math.sin(d.actionPhase * 0.3) * 0.04;
        if (wR) wR.rotation.x = -(0.05 + Math.sin(d.actionPhase * 0.3) * 0.04);
      }

      if (d.stateTimer <= 0) {
        // Reset any moved parts
        if (d.name === 'fox') {
          const head = c.getObjectByName('head');
          if (head) { head.rotation.y = 0; head.rotation.x = 0; }
        }
        if (d.name === 'deer') {
          const head = c.getObjectByName('head');
          const neck = c.getObjectByName('neck');
          if (head) { head.position.y = 2.1; head.rotation.x = 0; }
          if (neck) neck.rotation.z = -0.3;
        }
        if (d.name === 'bird') {
          // Return to hover
          d.yOffset = d.baseYOffset;
        }
        c.rotation.z = 0;
        d.state = 'idle';
        d.stateTimer = d.idleMin + Math.random() * (d.idleMax - d.idleMin);
      }
    }
  }

  // ── FIREFLY PARTICLES ────────────────────────────────────────────────
  const FIREFLY_COUNT = 30;
  const fireflyPositions = new Float32Array(FIREFLY_COUNT * 3);
  const fireflyPhases = [];

  for (let i = 0; i < FIREFLY_COUNT; i++) {
    const x = (Math.random() - 0.5) * TERRAIN_SIZE * 0.7;
    const z = (Math.random() - 0.5) * TERRAIN_SIZE * 0.7;
    const y = getGroundY(x, z) + 1.0 + Math.random() * 3.0;
    fireflyPositions[i * 3]     = x;
    fireflyPositions[i * 3 + 1] = y;
    fireflyPositions[i * 3 + 2] = z;
    fireflyPhases.push(Math.random() * Math.PI * 2);
  }

  const fireflyGeo = new THREE.BufferGeometry();
  fireflyGeo.setAttribute('position', new THREE.BufferAttribute(fireflyPositions, 3));
  const fireflyMat = new THREE.PointsMaterial({
    color: 0x00ffaa,
    size: 0.25,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
  scene.add(fireflies);

  function updateFireflies(dt, time) {
    const pos = fireflyGeo.attributes.position.array;
    for (let i = 0; i < FIREFLY_COUNT; i++) {
      const phase = fireflyPhases[i];
      const idx = i * 3;
      pos[idx]     += Math.sin(time + phase) * 0.3 * dt;
      pos[idx + 1] += Math.sin(time * 0.7 + phase) * 0.2 * dt;
      pos[idx + 2] += Math.cos(time * 0.8 + phase) * 0.3 * dt;
      if (Math.abs(pos[idx]) > BOUNDARY) pos[idx] *= 0.98;
      if (Math.abs(pos[idx + 2]) > BOUNDARY) pos[idx + 2] *= 0.98;
      if (pos[idx + 1] < 0.5) pos[idx + 1] = 0.5;
      if (pos[idx + 1] > 6)   pos[idx + 1] = 6;
    }
    fireflyGeo.attributes.position.needsUpdate = true;
  }

  // ── BURST PARTICLES ──────────────────────────────────────────────────
  const BURST_MAX = 12;
  const burstParticles = [];
  const burstGroup = new THREE.Group();
  scene.add(burstGroup);

  for (let i = 0; i < BURST_MAX; i++) {
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0 })
    );
    dot.visible = false;
    burstGroup.add(dot);
    burstParticles.push({ mesh: dot, vel: new THREE.Vector3(), life: 0 });
  }

  function emitBurst(position) {
    for (let i = 0; i < BURST_MAX; i++) {
      const p = burstParticles[i];
      p.mesh.position.copy(position);
      p.mesh.position.y += 0.5;
      p.vel.set((Math.random() - 0.5) * 4, Math.random() * 3 + 1, (Math.random() - 0.5) * 4);
      p.life = 1.0;
      p.mesh.visible = true;
      p.mesh.material.opacity = 1;
    }
  }

  function updateBurst(dt) {
    for (let i = 0; i < BURST_MAX; i++) {
      const p = burstParticles[i];
      if (p.life <= 0) continue;
      p.life -= dt * 1.2;
      p.mesh.position.addScaledVector(p.vel, dt);
      p.vel.y -= 4.0 * dt;
      p.mesh.material.opacity = Math.max(0, p.life);
      if (p.life <= 0) p.mesh.visible = false;
    }
  }

  // ── INPUT / RAYCASTER ────────────────────────────────────────────────
  const inputRay = new THREE.Raycaster();
  const pointer = new THREE.Vector2();

  function onTap(event) {
    event.preventDefault();
    const clientX = event.changedTouches ? event.changedTouches[0].clientX : event.clientX;
    const clientY = event.changedTouches ? event.changedTouches[0].clientY : event.clientY;
    pointer.x = (clientX / window.innerWidth) * 2 - 1;
    pointer.y = -(clientY / window.innerHeight) * 2 + 1;

    inputRay.setFromCamera(pointer, camera);

    const creatureHits = inputRay.intersectObjects(creatureHitTargets);
    if (creatureHits.length > 0) {
      const hitCreature = creatureHits[0].object.userData.creatureRef;
      if (hitCreature) {
        cameraState.target = hitCreature;
        cameraState.free = false;
        cameraState.lerpFactor = hitCreature.userData.lerpFactor;
        showStatus('WILD LANDS \u00B7 ' + hitCreature.userData.name);
        emitBurst(hitCreature.position);
        ringMat.opacity = 0.35;
        return;
      }
    }

    const terrainHits = inputRay.intersectObject(terrain);
    if (terrainHits.length > 0) {
      cameraState.target = null;
      cameraState.free = true;
      ringMat.opacity = 0;
      showStatus('WILD LANDS');
    }
  }

  renderer.domElement.addEventListener('click', onTap);
  renderer.domElement.addEventListener('touchend', onTap);

  // ── STATUS HUD ───────────────────────────────────────────────────────
  const statusEl = document.getElementById('status');
  let statusFadeTimer = 0;

  function showStatus(text) {
    statusEl.textContent = text;
    statusEl.classList.remove('faded');
    statusFadeTimer = 3.0;
  }

  function updateStatus(dt) {
    if (statusFadeTimer > 0) {
      statusFadeTimer -= dt;
      if (statusFadeTimer <= 0) statusEl.classList.add('faded');
    }
  }

  // ── FOLLOW CAMERA ────────────────────────────────────────────────────
  function updateFollowCamera(dt) {
    if (cameraState.free || !cameraState.target) {
      camera.position.lerp(cameraState.offset, 0.02);
      const defaultLook = new THREE.Vector3(0, 0, 0);
      cameraState.lookAt.lerp(defaultLook, 0.02);
    } else {
      const t = cameraState.target.position;
      const desiredPos = new THREE.Vector3(t.x + 35, t.y + 35, t.z + 35);
      camera.position.lerp(desiredPos, cameraState.lerpFactor);
      cameraState.lookAt.lerp(t, cameraState.lerpFactor * 1.5);
      followRing.position.x = t.x;
      followRing.position.z = t.z;
      followRing.position.y = getGroundY(t.x, t.z) + 0.05;
    }
    camera.lookAt(cameraState.lookAt);
  }

  function updateFollowRing(time) {
    if (!cameraState.free && cameraState.target) {
      ringMat.opacity = 0.2 + Math.sin(time * 2.0) * 0.12;
    }
  }

  // ── DAY/NIGHT UPDATE ─────────────────────────────────────────────────
  // (defined here — references fireflyMat which is already set up above)
  function updateDayNight(dt) {
    dayTime = (dayTime + dt / DAY_DURATION) % 1;

    const kf = sampleDayNight(dayTime);

    scene.background.copy(_skC);
    scene.fog.color.copy(_foC);
    scene.fog.density = kf.fd;

    ambient.color.copy(_acC);
    ambient.intensity = kf.ai;

    sun.color.copy(_scC);
    sun.intensity = kf.si;

    // Sun arc — rises in east, sets in west
    const sunAngle = dayTime * Math.PI * 2 - Math.PI * 0.5;
    sun.position.set(
      Math.cos(sunAngle) * 65,
      Math.sin(sunAngle) * 65 + 15,
      30
    );

    // Moon stays opposite
    moonLight.position.set(
      -Math.cos(sunAngle) * 55,
      -Math.sin(sunAngle) * 55 + 15,
      -20
    );
    moonLight.intensity = kf.mi;

    // Teal accent: only at night
    tealLight.intensity = kf.ti * 0.7;

    // Fireflies: fade in at night
    const ns = nightStrength(dayTime);
    fireflyMat.opacity = 0.25 + ns * 0.55;
    fireflies.visible = ns > 0.05;

    // HUD label
    TIME_HUD_EL.innerHTML = getTimeLabel(dayTime);
  }

  // ── GAME LOOP ────────────────────────────────────────────────────────
  let prevTime = performance.now();
  let paused = false;
  let elapsedTime = 0;

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      paused = true;
    } else {
      paused = false;
      prevTime = performance.now();
    }
  });

  function loop() {
    requestAnimationFrame(loop);
    if (paused) return;

    const now = performance.now();
    let dt = (now - prevTime) / 1000;
    prevTime = now;
    dt = Math.min(dt, 0.05);
    elapsedTime += dt;

    // Day/night cycle
    updateDayNight(dt);

    // Orbiting teal light (only active at night, driven by tealLight.intensity)
    tealOrbitAngle += dt * 0.3;
    tealLight.position.x = Math.cos(tealOrbitAngle) * 15;
    tealLight.position.z = Math.sin(tealOrbitAngle) * 15;
    tealLight.position.y = 6 + Math.sin(tealOrbitAngle * 0.5) * 2;

    // Update creatures
    for (let i = 0; i < creatures.length; i++) {
      updateCreatureFSM(creatures[i], dt);
    }

    // Particles
    updateFireflies(dt, elapsedTime);
    updateBurst(dt);

    // Camera
    updateFollowCamera(dt);
    updateFollowRing(elapsedTime);

    // HUD
    updateStatus(dt);

    renderer.render(scene, camera);
  }

  // ── INIT ─────────────────────────────────────────────────────────────
  // Warm up the day/night system (avoids flash on first frame)
  sampleDayNight(dayTime);
  showStatus('WILD LANDS');
  loop();

  </script>
</body>
</html>
