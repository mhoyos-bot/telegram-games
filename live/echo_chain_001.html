<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ECHO CHAIN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020008;overflow:hidden;touch-action:none;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;pointer-events:none;padding:14px 18px}
#score{color:#fff;font-size:30px;font-weight:bold;letter-spacing:2px;text-shadow:0 0 12px #a0f}
#best{color:#a0f;font-size:13px;margin-top:3px;letter-spacing:1px}
#lv{color:rgba(255,255,255,0.45);font-size:12px;margin-top:2px;letter-spacing:2px}
#combo{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;font-size:46px;font-weight:bold;
  text-shadow:0 0 22px #0ff;opacity:0;transition:opacity 0.12s;letter-spacing:3px
}
#hint{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.45);font-size:12px;pointer-events:none;
  letter-spacing:2px;transition:opacity 0.8s
}
</style>
</head>
<body>
<div id="hud">
  <div id="score">0</div>
  <div id="best">BEST CHAIN: 1</div>
  <div id="lv">LV 1</div>
</div>
<div id="combo"></div>
<div id="hint">TAP GLOWING NODES</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
// ===========================
// ECHO CHAIN · Lane 004
// rhythm_tap + chain_reaction
// lc_lane_004_unknown_0a6371
// ===========================

const CFG = {
  BEAT_BASE: 0.88,    // seconds per beat
  BEAT_MIN:  0.42,
  PULSE_FRAC: 0.24,   // fraction of beat node is hittable
  NODE_COUNT: 13,
  SPREAD: 7.8,
  CONNECT_DIST: 4.4,
  WAVE_SPEED: 4.8,    // units/sec
  TAP_PX: 88          // screen-space tap radius
};

// ---- Renderer ----
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x020008);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020008, 0.058);

const camera = new THREE.PerspectiveCamera(54, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 17);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x110022, 1.6));

// ---- Palettes ----
const COLORS = [
  0xff00ff, 0x00ffff, 0xff6600, 0x00ff88,
  0xaa00ff, 0xff0055, 0x00aaff, 0xffee00,
  0xff88aa, 0x44ffdd, 0xff4400, 0x88ff00, 0xcc00ff
];

// ---- Geometry pools ----
const nodeGeo  = new THREE.SphereGeometry(0.32, 12, 8);
const ringGeo  = new THREE.RingGeometry(0.40, 0.54, 28);

// ---- Nodes ----
const nodes = [];

function makeNode(i) {
  let px, py, pz, tries = 0;
  do {
    px = (Math.random() - 0.5) * CFG.SPREAD * 2;
    py = (Math.random() - 0.5) * CFG.SPREAD * 0.55;
    pz = (Math.random() - 0.5) * 3.5;
    tries++;
  } while (tries < 30 && nodes.some(n =>
    Math.hypot(n.px - px, n.py - py, n.pz - pz) < 2.4
  ));

  const color = COLORS[i % COLORS.length];
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.18,
    roughness: 0.3, metalness: 0.7
  });
  const mesh = new THREE.Mesh(nodeGeo, mat);
  mesh.position.set(px, py, pz);
  scene.add(mesh);

  const ringMat = new THREE.MeshBasicMaterial({
    color, side: THREE.DoubleSide,
    transparent: true, opacity: 0, depthWrite: false,
    blending: THREE.AdditiveBlending
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  mesh.add(ring);

  const light = new THREE.PointLight(color, 0, 4.2);
  mesh.add(light);

  const node = {
    px, py, pz, i, color,
    mesh, ring, light,
    phase: Math.random(),
    pulsing: false, wasPulsing: false,
    hit: false, missTimer: 0,
    conns: []
  };
  nodes.push(node);
}

for (let i = 0; i < CFG.NODE_COUNT; i++) makeNode(i);

// ---- Connections ----
const conns = [];
const _baseLineColor = new THREE.Color(0x330044);
const _tmpColor = new THREE.Color();

function addConn(a, b) {
  const pts = [a.mesh.position.clone(), b.mesh.position.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({
    color: 0x330044, transparent: true, opacity: 0.22, depthWrite: false
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  const dist = a.mesh.position.distanceTo(b.mesh.position);
  const c = { a, b, line, dist, waves: [] };
  conns.push(c);
  a.conns.push({ other: b, c });
  b.conns.push({ other: a, c });
}

for (let i = 0; i < nodes.length; i++) {
  for (let j = i + 1; j < nodes.length; j++) {
    const d = nodes[i].mesh.position.distanceTo(nodes[j].mesh.position);
    if (d < CFG.CONNECT_DIST) addConn(nodes[i], nodes[j]);
  }
}
// Ensure no isolated nodes
for (const node of nodes) {
  if (node.conns.length === 0) {
    let best = null, bestD = Infinity;
    for (const other of nodes) {
      if (other === node) continue;
      const d = node.mesh.position.distanceTo(other.mesh.position);
      if (d < bestD) { bestD = d; best = other; }
    }
    if (best) addConn(node, best);
  }
}

// ---- Stars ----
const sVerts = [];
for (let i = 0; i < 600; i++) {
  sVerts.push(
    (Math.random() - 0.5) * 90,
    (Math.random() - 0.5) * 45,
    (Math.random() - 0.5) * 28 - 10
  );
}
const sGeo = new THREE.BufferGeometry();
sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sVerts, 3));
scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0x553366, size: 0.065 })));

// ---- Particle System ----
const MAX_P = 120;
const pPos = new Float32Array(MAX_P * 3);
const pCol = new Float32Array(MAX_P * 3);
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('color',    new THREE.BufferAttribute(pCol, 3));
const pMat = new THREE.PointsMaterial({
  size: 0.13, vertexColors: true, transparent: true, opacity: 0.95,
  blending: THREE.AdditiveBlending, depthWrite: false
});
scene.add(new THREE.Points(pGeo, pMat));
const activeP = [];

function burst(pos, color, n) {
  const c = new THREE.Color(color);
  for (let i = 0; i < n && activeP.length < MAX_P; i++) {
    const spd = 2 + Math.random() * 4.5;
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const p = {
      x: pos.x, y: pos.y, z: pos.z,
      vx: Math.sin(ph) * Math.cos(th) * spd,
      vy: Math.sin(ph) * Math.sin(th) * spd,
      vz: Math.cos(ph) * spd * 0.45,
      life: 0.5 + Math.random() * 0.5,
      r: c.r, g: c.g, b: c.b
    };
    p.maxLife = p.life;
    activeP.push(p);
  }
}

function tickP(dt) {
  for (let i = activeP.length - 1; i >= 0; i--) {
    const p = activeP[i];
    p.life -= dt;
    if (p.life <= 0) { activeP.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
    p.vx *= 0.87; p.vy *= 0.87; p.vz *= 0.87;
  }
  for (let i = 0; i < MAX_P; i++) {
    if (i < activeP.length) {
      const p = activeP[i];
      const t = p.life / p.maxLife;
      pPos[i*3]   = p.x; pPos[i*3+1] = p.y; pPos[i*3+2] = p.z;
      pCol[i*3]   = p.r * t; pCol[i*3+1] = p.g * t; pCol[i*3+2] = p.b * t;
    } else {
      pPos[i*3+1] = -999;
      pCol[i*3] = pCol[i*3+1] = pCol[i*3+2] = 0;
    }
  }
  pGeo.attributes.position.needsUpdate = true;
  pGeo.attributes.color.needsUpdate = true;
}

// ---- HUD ----
let score = 0, bestChain = 1, level = 1, levelPts = 0;
const scoreEl    = document.getElementById('score');
const bestEl     = document.getElementById('best');
const lvEl       = document.getElementById('lv');
const comboEl    = document.getElementById('combo');
const hintEl     = document.getElementById('hint');
let comboTO = null;

try {
  const s = localStorage.getItem('echo_chain_best');
  if (s) { bestChain = parseInt(s) || 1; bestEl.textContent = 'BEST CHAIN: ' + bestChain; }
} catch (_e) { /* storage unavailable */ }

const COMBO_LABELS = ['', '', 'CHAIN x2', 'CHAIN x3!', 'RESONANCE x4!', 'NOVA x5!!', 'HYPER x6!!'];
const COMBO_COLORS = ['', '', '#ffffff',  '#00ffff',   '#ffff00',       '#ff00ff',   '#ff4400'];

function showCombo(chain) {
  if (comboTO) clearTimeout(comboTO);
  const label = chain < COMBO_LABELS.length ? COMBO_LABELS[chain] : `ULTRA x${chain}!!!`;
  const col   = chain < COMBO_COLORS.length ? COMBO_COLORS[chain] : '#ff0000';
  comboEl.textContent = label;
  comboEl.style.color = col;
  comboEl.style.textShadow = `0 0 22px ${col}`;
  comboEl.style.opacity = '1';
  comboTO = setTimeout(() => { comboEl.style.opacity = '0'; }, 950);
}

function addScore(pts, chain) {
  score += pts;
  levelPts += pts;
  scoreEl.textContent = score;
  if (chain > bestChain) {
    bestChain = chain;
    bestEl.textContent = 'BEST CHAIN: ' + bestChain;
    try { localStorage.setItem('echo_chain_best', bestChain); } catch (_e) { /* ignore */ }
  }
  if (levelPts >= 900 * level) { level++; lvEl.textContent = 'LV ' + level; }
  if (chain >= 2) showCombo(chain);
}

// ---- Activation ----
const _flashPool = [];

function activateNode(node, chain) {
  node.hit = true;
  burst(node.mesh.position, node.color, 16 + chain * 5);
  addScore(100 * chain * chain, chain);

  // Flash light — reuse or create
  const fl = new THREE.PointLight(node.color, 10, 15);
  fl.position.copy(node.mesh.position);
  fl._t = 0;
  scene.add(fl);
  _flashPool.push(fl);

  // Dispatch activation waves
  for (const { other, c } of node.conns) {
    c.waves.push({ fromA: c.a === node, chain, target: other, progress: 0 });
  }
}

function tickFlash(dt) {
  for (let i = _flashPool.length - 1; i >= 0; i--) {
    const fl = _flashPool[i];
    fl._t += dt * 5;
    fl.intensity = 10 * Math.max(0, 1 - fl._t);
    if (fl._t >= 1) { scene.remove(fl); _flashPool.splice(i, 1); }
  }
}

// ---- Input ----
let hintHidden = false;
const _tmpV3 = new THREE.Vector3();
const _scaleT = new THREE.Vector3();

function onTap(evt) {
  evt.preventDefault();
  const cx = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const cy = evt.touches ? evt.touches[0].clientY : evt.clientY;

  if (!hintHidden) {
    hintHidden = true;
    hintEl.style.opacity = '0';
  }

  // Screen-space tap detection (ATOM_SCREEN_SPACE_TAP)
  let best = null, bestD = CFG.TAP_PX;
  for (const node of nodes) {
    _tmpV3.copy(node.mesh.position).project(camera);
    const sx = (_tmpV3.x * 0.5 + 0.5) * innerWidth;
    const sy = (-_tmpV3.y * 0.5 + 0.5) * innerHeight;
    const d = Math.hypot(sx - cx, sy - cy);
    if (d < bestD) { bestD = d; best = node; }
  }

  if (!best) return;

  if (best.pulsing && !best.hit) {
    activateNode(best, 1);
  } else {
    // Miss sparkle
    burst(best.mesh.position, 0x440033, 5);
  }
}

renderer.domElement.addEventListener('click', onTap);
renderer.domElement.addEventListener('touchstart', onTap, { passive: false });

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- Main Tick ----
let gt = 0, lastT = 0;

function tick(ts) {
  requestAnimationFrame(tick);
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  gt += dt;

  const bp = Math.max(CFG.BEAT_MIN, CFG.BEAT_BASE - (level - 1) * 0.04);
  const ws = CFG.WAVE_SPEED + (level - 1) * 0.3;

  // ---- Update nodes ----
  for (const node of nodes) {
    node.wasPulsing = node.pulsing;
    node.phase = (node.phase + dt / bp) % 1.0;
    node.pulsing = node.phase < CFG.PULSE_FRAC;

    // New pulse: reset hit state
    if (!node.wasPulsing && node.pulsing) {
      node.hit = false;
    }
    // Pulse closed without hit: red flash
    if (node.wasPulsing && !node.pulsing && !node.hit) {
      node.missTimer = 0.12;
      node.mesh.material.emissive.set(0xff0022);
    }
    if (node.missTimer > 0) {
      node.missTimer -= dt;
      if (node.missTimer <= 0) node.mesh.material.emissive.set(node.color);
    }

    // Visual state
    if (node.pulsing && !node.hit) {
      const t = 1 - node.phase / CFG.PULSE_FRAC; // 1→0 over pulse window
      node.mesh.material.emissiveIntensity = 0.5 + t * 2.2;
      node.light.intensity = (0.5 + t * 2.0) * 1.3;
      node.mesh.scale.setScalar(1 + t * 0.28);
      node.ring.material.opacity = t * 0.82;
      node.ring.scale.setScalar(1 + (1 - t) * 0.55);
      node.ring.quaternion.copy(camera.quaternion);
    } else if (node.hit) {
      node.mesh.material.emissiveIntensity *= 0.82;
      node.light.intensity = 0;
      _scaleT.setScalar(0.72);
      node.mesh.scale.lerp(_scaleT, 0.12);
      node.ring.material.opacity *= 0.75;
    } else {
      const idle = 0.11 + Math.sin(gt * 1.1 + node.i * 0.85) * 0.04;
      node.mesh.material.emissiveIntensity = idle;
      node.light.intensity = 0;
      _scaleT.setScalar(1.0);
      node.mesh.scale.lerp(_scaleT, 0.08);
      node.ring.material.opacity = Math.max(0, node.ring.material.opacity - dt * 3.5);
    }
  }

  // ---- Update waves (ATOM_CHAIN_WAVE) ----
  for (const conn of conns) {
    let maxW = 0;
    let wColor = 0x330044;

    for (let i = conn.waves.length - 1; i >= 0; i--) {
      const w = conn.waves[i];
      w.progress += (dt * ws) / conn.dist;
      const intensity = Math.sin(Math.min(w.progress, 1.0) * Math.PI); // bell curve
      if (intensity > maxW) {
        maxW = intensity;
        wColor = w.fromA ? conn.a.color : conn.b.color;
      }

      if (w.progress >= 1.0) {
        const tgt = w.target;
        if (tgt.pulsing && !tgt.hit) {
          activateNode(tgt, w.chain + 1);
        } else {
          burst(tgt.mesh.position, wColor, 4);
        }
        conn.waves.splice(i, 1);
      }
    }

    // Update line appearance
    conn.line.material.opacity = 0.14 + maxW * 0.78;
    _tmpColor.set(wColor);
    if (maxW > 0.08) {
      conn.line.material.color.lerp(_tmpColor, 0.28);
    } else {
      conn.line.material.color.lerp(_baseLineColor, 0.07);
    }
  }

  // ---- Sub-systems ----
  tickP(dt);
  tickFlash(dt);

  // ---- Camera drift ----
  camera.position.x = Math.sin(gt * 0.055) * 1.9;
  camera.position.y = 1.5 + Math.cos(gt * 0.08) * 0.65;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

requestAnimationFrame(tick);
</script>
</body>
</html>
