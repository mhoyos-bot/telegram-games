<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>VOID GRID</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000010;overflow:hidden;touch-action:none;font-family:monospace}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:max(env(safe-area-inset-top,0px),12px) 16px 0}
#top{display:flex;justify-content:space-between;align-items:flex-start}
#score{color:#14f195;font:bold 32px/1 monospace;text-shadow:0 0 14px #14f195}
#hp{display:flex;gap:5px;padding-top:4px}
.h{color:#ff4466;font-size:22px;text-shadow:0 0 8px #ff4466}
#combo{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);color:#ff00ee;font:bold 24px/1 monospace;text-shadow:0 0 14px #ff00ee;opacity:0;transition:opacity 0.2s;z-index:10;pointer-events:none;white-space:nowrap}
#wave{position:fixed;top:max(env(safe-area-inset-top,0px),12px);right:16px;color:#6644ff;font:11px monospace;opacity:0.75;z-index:10;pointer-events:none;padding-top:4px}
#lanes{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:22px;z-index:10;pointer-events:none}
.ld{width:9px;height:9px;border-radius:50%;background:#223333;transition:background 0.12s,box-shadow 0.12s}
.ld.on{background:#14f195;box-shadow:0 0 8px #14f195}
#xb{position:fixed;bottom:0;left:0;right:0;height:3px;background:#0a1a0a;z-index:10}
#xf{height:100%;background:#14f195;width:0%;transition:width 0.18s;box-shadow:0 0 6px #14f195}
#lvl{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:13px;background:rgba(0,0,18,0.93);z-index:20;backdrop-filter:blur(6px)}
#lvl h2{color:#14f195;font:bold 28px monospace;text-shadow:0 0 18px #14f195;letter-spacing:3px}
#lvl p{color:#446655;font:13px monospace;margin-top:-6px}
.ub{background:rgba(20,241,149,0.07);border:1.5px solid #14f195;color:#ccffee;font:bold 15px/1.5 monospace;padding:13px 22px;border-radius:8px;cursor:pointer;width:84%;max-width:320px;text-align:center;transition:background 0.13s}
.ub:active,.ub:hover{background:rgba(20,241,149,0.18)}
.un{font-size:16px;color:#14f195;display:block}
.ud{font-size:12px;color:#7a9988;display:block;margin-top:2px}
#go{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:rgba(0,0,10,0.95);z-index:20}
#go h1{color:#14f195;font:bold 44px monospace;text-shadow:0 0 22px #14f195;letter-spacing:6px}
#go .sub{color:#ff4466;font:bold 22px monospace;text-shadow:0 0 12px #ff4466}
#fs{color:#ccc;font:20px monospace}
#rb{background:#14f195;color:#000;font:bold 20px monospace;padding:14px 44px;border:none;border-radius:8px;cursor:pointer;letter-spacing:3px;margin-top:4px}
</style>
</head>
<body>
<div id="ui"><div id="top"><div id="score">0</div><div id="hp"></div></div></div>
<div id="wave">WAVE 0</div>
<div id="combo"></div>
<div id="lanes"><div class="ld" id="ld0"></div><div class="ld on" id="ld1"></div><div class="ld" id="ld2"></div></div>
<div id="xb"><div id="xf"></div></div>
<div id="lvl"><h2>LEVEL UP</h2><p>CHOOSE UPGRADE</p></div>
<div id="go">
  <h1>VOID GRID</h1>
  <div class="sub">GAME OVER</div>
  <div id="fs"></div>
  <button id="rb">RETRY</button>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.min.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── TELEGRAM ────────────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const imp = (t, v) => tg?.HapticFeedback?.impactOccurred?.(v||t);
const notif = v => tg?.HapticFeedback?.notificationOccurred?.(v);

// ── RENDERER ─────────────────────────────────────────────────────────────────
const W = () => window.innerWidth, H = () => window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = false;
document.body.appendChild(renderer.domElement);

// ── SCENE ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000010, 42, 88);

const camera = new THREE.PerspectiveCamera(58, W() / H(), 0.1, 120);
camera.position.set(0, 9, -9);
camera.lookAt(0, 0, 33);
const CAM0 = camera.position.clone();

window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

scene.add(new THREE.AmbientLight(0x112233, 3.5));
const sun = new THREE.DirectionalLight(0x14f195, 2.5);
sun.position.set(0, 10, -5);
scene.add(sun);

// ── FLOOR ────────────────────────────────────────────────────────────────────
const gc = document.createElement('canvas');
gc.width = 256; gc.height = 512;
const gx = gc.getContext('2d');
gx.fillStyle = '#000010';
gx.fillRect(0, 0, 256, 512);
gx.strokeStyle = 'rgba(20,241,149,0.52)';
gx.lineWidth = 1;
for (let i = 0; i <= 256; i += 32) { gx.beginPath(); gx.moveTo(i,0); gx.lineTo(i,512); gx.stroke(); }
for (let i = 0; i <= 512; i += 32) { gx.beginPath(); gx.moveTo(0,i); gx.lineTo(256,i); gx.stroke(); }
const GT = new THREE.CanvasTexture(gc);
GT.wrapS = GT.wrapT = THREE.RepeatWrapping;
GT.repeat.set(5, 28);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(55, 170),
  new THREE.MeshBasicMaterial({ map: GT })
);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, -1.3, 66);
scene.add(floor);

// Lane dividers
const ldm = new THREE.MeshBasicMaterial({ color: 0x1a3322, transparent: true, opacity: 0.65 });
[-2.5, 2.5].forEach(x => {
  const ln = new THREE.Mesh(new THREE.PlaneGeometry(0.07, 170), ldm);
  ln.rotation.x = -Math.PI / 2;
  ln.position.set(x, -1.28, 66);
  scene.add(ln);
});

// Horizon glow
const hgm = new THREE.MeshBasicMaterial({ color: 0x14f195, transparent: true, opacity: 0.12 });
scene.add(Object.assign(new THREE.Mesh(new THREE.PlaneGeometry(55, 5), hgm), { position: new THREE.Vector3(0, 0.8, 80) }));

// Speed lines (tunnel lines rushing toward camera)
const SL = [];
for (let i = 0; i < 30; i++) {
  const a = (i / 30) * Math.PI * 2;
  const r = 9 + Math.random() * 5;
  const x = Math.cos(a) * r;
  const y = Math.sin(a) * r * 0.45 + 2.5;
  const len = 6 + Math.random() * 7;
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, y, 0), new THREE.Vector3(x * 1.06, y * 1.06, len)
  ]);
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x14f195, transparent: true, opacity: 0.22 }));
  line.position.z = Math.random() * 74;
  scene.add(line);
  SL.push(line);
}

// ── PLAYER ───────────────────────────────────────────────────────────────────
const LANES = [-4.5, 0, 4.5];
const PZ = 1.5;

const pGeo = new THREE.ConeGeometry(0.58, 1.7, 4);
pGeo.rotateX(Math.PI / 2);
const PM = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color: 0x14f195 }));
PM.position.set(0, 0, PZ);
scene.add(PM);

// Glow halo
const gGeo = new THREE.ConeGeometry(0.85, 2.3, 4);
gGeo.rotateX(Math.PI / 2);
const glow = new THREE.Mesh(gGeo, new THREE.MeshBasicMaterial({ color: 0x14f195, transparent: true, opacity: 0.2 }));
PM.add(glow);

// Engine trail
const trail = Array.from({ length: 7 }, (_, i) => {
  const t = new THREE.Mesh(
    new THREE.PlaneGeometry(0.18 - i * 0.02, 0.32),
    new THREE.MeshBasicMaterial({ color: 0x14f195, transparent: true, opacity: 0.5 - i * 0.06, side: THREE.DoubleSide })
  );
  t.rotation.y = Math.PI / 2;
  t.position.set(i % 2 === 0 ? -0.22 : 0.22, 0, -(i * 0.38 + 0.5));
  PM.add(t);
  return t;
});

// ── POOL HELPERS ──────────────────────────────────────────────────────────────
function pool(geo, col, n, extras = {}) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: col }));
    m.visible = false;
    scene.add(m);
    arr.push(Object.assign({ mesh: m, active: false }, extras));
  }
  return arr;
}
const grab = arr => arr.find(p => !p.active) || null;
const drop = p => { p.active = false; p.mesh.visible = false; };

// ── OBJECT POOLS ──────────────────────────────────────────────────────────────
// Bullets
const BG = new THREE.CylinderGeometry(0.07, 0.07, 0.55, 5);
BG.rotateX(Math.PI / 2);
const BULLETS = pool(BG, 0xffffff, 50, { vz: 0, pierce: 0 });

// Enemy bullets
const EBG = new THREE.SphereGeometry(0.22, 5, 4);
const EBULLETS = pool(EBG, 0xff00cc, 22, { vx: 0, vz: 0, life: 0 });

// Enemy geometry/color/stats (shared geos)
const EG = {
  drone:   new THREE.BoxGeometry(1.1, 0.55, 1.45),
  sweeper: new THREE.CylinderGeometry(0.45, 0.6, 1.1, 7),
  turret:  new THREE.OctahedronGeometry(0.78),
  titan:   new THREE.SphereGeometry(1.65, 8, 6),
  phantom: new THREE.TorusGeometry(0.65, 0.22, 6, 12),
};
const EC = { drone: 0xff3311, sweeper: 0xff8800, turret: 0xaa00ff, titan: 0xff2255, phantom: 0x00ccff };
const EHP = { drone: 1, sweeper: 1, turret: 2, titan: 4, phantom: 1 };
const ESP = { drone: 9, sweeper: 5.5, turret: 4, titan: 3.5, phantom: 14 };
const EPT = { drone: 10, sweeper: 15, turret: 25, titan: 60, phantom: 35 };
const EHR = { drone: 1.4, sweeper: 1.4, turret: 1.3, titan: 2.3, phantom: 1.2 };

const ENEMIES = [];
for (let i = 0; i < 32; i++) {
  const m = new THREE.Mesh(EG.drone, new THREE.MeshBasicMaterial({ color: 0xff3311 }));
  m.visible = false;
  scene.add(m);
  ENEMIES.push({ mesh: m, active: false, hp: 1, type: 'drone', vz: 0, timer: 0, lane: 1, shootTimer: 0 });
}

// Gems
const GEM_GEO = new THREE.OctahedronGeometry(0.3);
const GEMS = pool(GEM_GEO, 0xffdd00, 24, { vy: 0, vz: 0 });

// Particles
const PT_GEO = new THREE.BoxGeometry(0.17, 0.17, 0.17);
const PARTS = pool(PT_GEO, 0xffffff, 80, { vx: 0, vy: 0, vz: 0, life: 0 });

// ── GAME STATE ────────────────────────────────────────────────────────────────
let hp, score, combo, comboT, xp, xpMax, level;
let state; // 'play' | 'lvlup' | 'over'
let iframe, scrollSpd, fireRate, fireT, nBullets;
let waveT, waveInt, waveN;
let shakeT, shakeAmt, shockT;
let playerLane, targetX;
const UPG = {};

// ── UI REFS ───────────────────────────────────────────────────────────────────
const scoreEl = document.getElementById('score');
const hpEl    = document.getElementById('hp');
const comboEl = document.getElementById('combo');
const waveEl  = document.getElementById('wave');
const xfEl    = document.getElementById('xf');
const lvlEl   = document.getElementById('lvl');
const goEl    = document.getElementById('go');
const fsEl    = document.getElementById('fs');

function renderHP() {
  hpEl.innerHTML = Array.from({ length: hp }, () => '<span class="h">♥</span>').join('');
}

function updateLaneDots() {
  [0, 1, 2].forEach(i => {
    const el = document.getElementById('ld' + i);
    el.className = 'ld' + (i === playerLane ? ' on' : '');
  });
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
renderer.domElement.addEventListener('pointerdown', e => {
  if (state !== 'play') return;
  if (e.clientX < W() * 0.5) {
    if (playerLane > 0) { playerLane--; targetX = LANES[playerLane]; onSwitch(); }
  } else {
    if (playerLane < 2) { playerLane++; targetX = LANES[playerLane]; onSwitch(); }
  }
}, { passive: true });

function onSwitch() {
  PM.scale.x = 1.55;
  PM.scale.z = 0.6;
  updateLaneDots();
  imp('impactOccurred', 'light');
  if (UPG.ghost) iframe = Math.max(iframe, 0.45);
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnEnemy(type, lane) {
  const e = ENEMIES.find(e => !e.active);
  if (!e) return;
  e.type = type; e.lane = lane;
  e.hp = EHP[type];
  e.mesh.geometry = EG[type];
  e.mesh.material.color.setHex(EC[type]);
  e.mesh.material.transparent = type === 'phantom';
  e.mesh.material.opacity = 1;
  e.mesh.position.set(LANES[lane], 0, 72);
  e.vz = -ESP[type] * (1 + waveN * 0.013);
  e.shootTimer = 2.4; e.timer = 0;
  e.mesh.visible = true; e.active = true;
}

function spawnWave() {
  waveN++;
  waveEl.textContent = 'WAVE ' + waveN;
  const d = Math.min(waveN / 25, 1);
  scrollSpd = 8 + d * 7 + (UPG.overdrive ? 4 : 0);
  waveInt = Math.max(0.65, 1.8 - d * 0.95);

  const types = ['drone'];
  if (waveN > 3)  types.push('sweeper');
  if (waveN > 6)  types.push('turret');
  if (waveN > 12) types.push('titan');
  if (waveN > 18) types.push('phantom');

  const type = types[Math.floor(Math.random() * types.length)];
  const lane = Math.floor(Math.random() * 3);
  spawnEnemy(type, lane);

  if (waveN > 4 && Math.random() < 0.45) {
    const o = (lane + 1 + Math.floor(Math.random() * 2)) % 3;
    setTimeout(() => { if (state === 'play') spawnEnemy('drone', o); }, 220);
  }
  if (waveN > 14 && Math.random() < 0.3) {
    const t2 = types[Math.floor(Math.random() * types.length)];
    setTimeout(() => { if (state === 'play') spawnEnemy(t2, Math.floor(Math.random() * 3)); }, 550);
  }
}

// ── COMBAT ────────────────────────────────────────────────────────────────────
function fire(ox) {
  const b = grab(BULLETS);
  if (!b) return;
  b.mesh.position.set(PM.position.x + ox, 0, PZ + 1.2);
  b.mesh.material.color.setHex(UPG.twin ? 0x14f195 : 0xffffff);
  b.vz = 40; b.pierce = UPG.pierce ? 3 : 0;
  b.mesh.visible = true; b.active = true;
}

function spawnGem(x, z) {
  const g = grab(GEMS);
  if (!g) return;
  g.mesh.position.set(x, 1.3, z);
  g.vy = -2.8; g.vz = -1.8;
  g.mesh.visible = true; g.active = true;
}

function burst(x, y, z, col, n) {
  for (let i = 0; i < n; i++) {
    const p = grab(PARTS);
    if (!p) break;
    p.mesh.position.set(x + (Math.random() - 0.5) * 0.6, y, z + (Math.random() - 0.5) * 0.6);
    p.mesh.material.color.setHex(col);
    p.mesh.material.transparent = true;
    p.vx = (Math.random() - 0.5) * 7;
    p.vy = Math.random() * 4 + 0.5;
    p.vz = (Math.random() - 0.5) * 6;
    p.life = 0.55; p.mesh.visible = true; p.active = true;
  }
}

function doShake(amt) { shakeAmt = amt; shakeT = 0.28; }

function killEnemy(e) {
  burst(e.mesh.position.x, e.mesh.position.y, e.mesh.position.z, EC[e.type], 10);
  spawnGem(e.mesh.position.x, e.mesh.position.z);
  combo++;
  comboT = UPG.surge ? 5.8 : 3.2;
  const mx = combo >= 8 ? 8 : combo >= 5 ? 4 : combo >= 3 ? 2 : 1;
  score += EPT[e.type] * mx * (UPG.overdrive ? 2 : 1);
  scoreEl.textContent = score.toLocaleString();
  if (combo >= 3) {
    comboEl.style.opacity = '1';
    comboEl.textContent = '\u00d7' + mx + ' COMBO!';
    comboEl.style.color = mx >= 4 ? '#ff00ee' : '#ff8800';
  }
  xp++;
  xfEl.style.width = (xp / xpMax * 100) + '%';
  if (xp >= xpMax) { xp = 0; xfEl.style.width = '0%'; xpMax = Math.floor(xpMax * 1.5); showLvlUp(); }
  drop(e);
  imp('impactOccurred', 'medium');
  doShake(0.12);
}

function hitPlayer() {
  if (iframe > 0) return;
  hp--;
  renderHP();
  iframe = 1.5;
  doShake(1.0);
  combo = 0; comboT = 0; comboEl.style.opacity = '0';
  notif('error');
  document.body.style.filter = 'brightness(3) saturate(0)';
  setTimeout(() => { document.body.style.filter = ''; }, 90);
  if (hp <= 0) endGame();
}

// ── LEVEL UP ──────────────────────────────────────────────────────────────────
const UDEFS = [
  { id:'rapid',   name:'RAPID FIRE',  desc:'Fire rate \u00d70.58',         apply:() => { fireRate *= 0.58; } },
  { id:'twin',    name:'TWIN BEAMS',  desc:'Dual laser columns',           apply:() => { nBullets = 2; } },
  { id:'pierce',  name:'PIERCE',      desc:'Bullets pass through enemies', apply:() => { UPG.pierce = true; } },
  { id:'drive',   name:'OVERDRIVE',   desc:'Speed +30%, score \u00d72',    apply:() => { UPG.overdrive = true; scrollSpd *= 1.3; } },
  { id:'repair',  name:'REPAIR',      desc:'Restore 1 HP',                 apply:() => { hp = Math.min(hp + 1, 5); renderHP(); } },
  { id:'shock',   name:'SHOCKWAVE',   desc:'Auto-explode every 4s',        apply:() => { UPG.shockwave = true; shockT = 4; } },
  { id:'ghost',   name:'GHOST STEP',  desc:'Invincible on lane switch',    apply:() => { UPG.ghost = true; } },
  { id:'surge',   name:'SURGE MODE',  desc:'Combo lasts 2\u00d7 longer',   apply:() => { UPG.surge = true; } },
];

function showLvlUp() {
  if (state !== 'play') return;
  state = 'lvlup';
  level++;
  const picks = UDEFS.slice().sort(() => Math.random() - 0.5).slice(0, 3);
  lvlEl.querySelectorAll('.ub').forEach(b => b.remove());
  lvlEl.querySelector('h2').textContent = 'LEVEL ' + level;
  picks.forEach(u => {
    const b = document.createElement('button');
    b.className = 'ub';
    b.innerHTML = '<span class="un">' + u.name + '</span><span class="ud">' + u.desc + '</span>';
    b.onclick = () => {
      u.apply(); UPG[u.id] = true;
      lvlEl.style.display = 'none';
      state = 'play';
    };
    lvlEl.appendChild(b);
  });
  lvlEl.style.display = 'flex';
  notif('success');
}

// ── GAME OVER / RESET ─────────────────────────────────────────────────────────
function endGame() {
  state = 'over';
  fsEl.textContent = 'SCORE: ' + score.toLocaleString();
  goEl.style.display = 'flex';
  notif('error');
}

document.getElementById('rb').onclick = () => { goEl.style.display = 'none'; reset(); };

function reset() {
  hp = 3; score = 0; combo = 0; comboT = 0;
  xp = 0; xpMax = 12; level = 0;
  state = 'play'; iframe = 0;
  scrollSpd = 8; fireRate = 0.42; fireT = 0; nBullets = 1;
  waveT = 0; waveInt = 1.8; waveN = 0;
  shakeT = 0; shakeAmt = 0; shockT = 5;
  playerLane = 1; targetX = 0;
  Object.keys(UPG).forEach(k => delete UPG[k]);
  PM.position.x = 0;
  scoreEl.textContent = '0'; comboEl.style.opacity = '0';
  waveEl.textContent = 'WAVE 0'; xfEl.style.width = '0%';
  renderHP(); updateLaneDots();
  [...BULLETS, ...EBULLETS, ...ENEMIES, ...GEMS, ...PARTS].forEach(p => drop(p));
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function d2(a, b) { return Math.hypot(a.x - b.x, a.z - b.z); }

let last = performance.now();

function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;

  if (state !== 'play') { renderer.render(scene, camera); return; }

  // Floor scroll
  GT.offset.y -= dt * scrollSpd * 0.078;

  // Speed lines
  const speedOp = 0.15 + (scrollSpd - 8) * 0.022;
  SL.forEach(l => {
    l.position.z -= scrollSpd * dt;
    if (l.position.z < -14) l.position.z += 74;
    l.material.opacity = speedOp;
  });

  // Player X
  PM.position.x += (targetX - PM.position.x) * Math.min(1, dt * 20);

  // Squash-stretch recovery
  PM.scale.x += (1 - PM.scale.x) * dt * 13;
  PM.scale.z += (1 - PM.scale.z) * dt * 13;

  // iframes blink
  if (iframe > 0) {
    iframe -= dt;
    PM.visible = Math.sin(iframe * 28) > 0;
  } else {
    PM.visible = true;
  }

  // Trail color
  const trailCol = combo >= 5 ? 0xff00ee : 0x14f195;
  trail.forEach(t => t.material.color.setHex(trailCol));

  // Glow pulse
  glow.scale.setScalar(1 + Math.sin(now * 0.005) * 0.13 + (combo >= 3 ? 0.28 : 0));

  // Fire
  fireT -= dt;
  if (fireT <= 0) {
    fireT = fireRate;
    nBullets === 1 ? fire(0) : (fire(-0.58), fire(0.58));
  }

  // Waves
  waveT -= dt;
  if (waveT <= 0) { waveT = waveInt; spawnWave(); }

  // Combo decay
  if (combo > 0) {
    comboT -= dt;
    if (comboT <= 0) { combo = 0; comboEl.style.opacity = '0'; }
  }

  // Shockwave upgrade
  if (UPG.shockwave) {
    shockT -= dt;
    if (shockT <= 0) {
      shockT = 4;
      burst(PM.position.x, 0, PZ, 0x14f195, 18);
      doShake(0.4);
      ENEMIES.forEach(e => { if (e.active && d2(e.mesh.position, PM.position) < 9) killEnemy(e); });
    }
  }

  // Score trickle
  score += Math.ceil(dt * 4 * scrollSpd);
  if (Math.random() < 0.1) scoreEl.textContent = score.toLocaleString();

  // Player bullets vs enemies
  BULLETS.forEach(b => {
    if (!b.active) return;
    b.mesh.position.z += b.vz * dt;
    if (b.mesh.position.z > 76) { drop(b); return; }
    ENEMIES.forEach(e => {
      if (!e.active || !b.active) return;
      if (d2(b.mesh.position, e.mesh.position) < 1.25) {
        e.hp--;
        if (e.hp <= 0) {
          killEnemy(e);
        } else {
          const orig = EC[e.type];
          e.mesh.material.color.setHex(0xffffff);
          setTimeout(() => { if (e.active) e.mesh.material.color.setHex(orig); }, 70);
        }
        if (!b.pierce || --b.pierce < 0) drop(b);
      }
    });
  });

  // Enemy bullets
  EBULLETS.forEach(b => {
    if (!b.active) return;
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.z += b.vz * dt;
    b.life -= dt;
    if (b.life <= 0 || b.mesh.position.z < -1) { drop(b); return; }
    if (d2(b.mesh.position, PM.position) < 0.9) { hitPlayer(); drop(b); }
  });

  // Enemies
  ENEMIES.forEach(e => {
    if (!e.active) return;
    e.mesh.position.z += e.vz * dt;
    e.timer += dt;

    if (e.type === 'sweeper') {
      e.mesh.position.x = LANES[e.lane] + Math.sin(e.timer * 1.9) * 1.6;
    }
    if (e.type === 'phantom') {
      e.mesh.material.opacity = 0.22 + Math.abs(Math.sin(e.timer * 3.8)) * 0.78;
    }
    if (e.type === 'turret') {
      e.mesh.rotation.y += dt * 1.8;
      if (e.mesh.position.z < 44 && e.mesh.position.z > 8) {
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = 2.3;
          const eb = grab(EBULLETS);
          if (eb) {
            eb.mesh.position.copy(e.mesh.position);
            const dx = PM.position.x - e.mesh.position.x;
            const dz = PM.position.z - e.mesh.position.z;
            const len = Math.hypot(dx, dz);
            eb.vx = dx / len * 11; eb.vz = dz / len * 11;
            eb.life = 4.5; eb.mesh.visible = true; eb.active = true;
          }
        }
      }
    }
    if (e.type === 'titan') {
      e.mesh.rotation.x += dt; e.mesh.rotation.z += dt * 0.7;
    }

    // Player collision
    if (d2(e.mesh.position, PM.position) < EHR[e.type]) {
      hitPlayer();
      if (e.type !== 'titan') drop(e);
    }

    if (e.mesh.position.z < -1) drop(e);
  });

  // Gems
  GEMS.forEach(g => {
    if (!g.active) return;
    g.mesh.position.y += g.vy * dt;
    if (g.mesh.position.y < -0.9) { g.vy = 0; g.mesh.position.y = -0.9; }
    g.mesh.position.z += g.vz * dt;
    g.mesh.rotation.y += dt * 3.5;
    const dist = d2(g.mesh.position, PM.position);
    if (dist < 4.2) {
      g.mesh.position.x += (PM.position.x - g.mesh.position.x) * dt * 6;
      g.mesh.position.z += (PM.position.z - g.mesh.position.z) * dt * 6;
    }
    if (dist < 1.0) {
      xp++;
      xfEl.style.width = (xp / xpMax * 100) + '%';
      if (xp >= xpMax) { xp = 0; xfEl.style.width = '0%'; xpMax = Math.floor(xpMax * 1.5); showLvlUp(); }
      drop(g);
    }
    if (g.mesh.position.z < -1) drop(g);
  });

  // Particles
  PARTS.forEach(p => {
    if (!p.active) return;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.vy -= 11 * dt;
    p.life -= dt;
    p.mesh.material.opacity = Math.max(0, p.life / 0.55);
    if (p.life <= 0) drop(p);
  });

  // Screen shake
  if (shakeT > 0) {
    shakeT -= dt;
    const s = shakeAmt * (shakeT / 0.28);
    camera.position.x = CAM0.x + (Math.random() - 0.5) * s;
    camera.position.y = CAM0.y + (Math.random() - 0.5) * s * 0.5;
  } else {
    camera.position.copy(CAM0);
  }

  renderer.render(scene, camera);
}

// ── START ─────────────────────────────────────────────────────────────────────
reset();
loop();
</script>
</body>
</html>
