<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CRYSTAL GROVE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0614; overflow: hidden; touch-action: none; font-family: monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 18px; pointer-events: none;
    }
    #score { color: #c87fff; font: bold 28px/1 monospace; text-shadow: 0 0 18px rgba(200,127,255,0.8); }
    #sub-score { color: rgba(180,140,255,0.45); font: 11px/1 monospace; margin-top: 4px; letter-spacing: 0.1em; }
    #combo {
      color: #ffdb4d; font: bold 15px/1 monospace; text-align: right;
      text-shadow: 0 0 12px rgba(255,219,77,0.7);
    }
    #timer-wrap { color: rgba(200,160,255,0.5); font: 12px/1 monospace; text-align: right; margin-top: 4px; }
    #flash {
      position: fixed; inset: 0; pointer-events: none; opacity: 0;
      background: rgba(200,127,255,0.15); transition: opacity 0.07s;
    }
    #popup {
      position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%);
      font: bold 38px/1 monospace; pointer-events: none; opacity: 0;
      text-shadow: 0 0 22px currentColor; white-space: nowrap;
    }
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(10,6,20,0.88); z-index: 10;
    }
    #overlay h1 {
      color: #c87fff; font: bold 40px/1.2 monospace; margin-bottom: 6px;
      text-shadow: 0 0 30px rgba(200,127,255,0.6); letter-spacing: 0.06em;
    }
    #overlay .sub {
      color: rgba(200,160,255,0.35); font: 11px/1 monospace;
      letter-spacing: 0.2em; margin-bottom: 28px;
    }
    #ov-score {
      color: rgba(255,219,77,0.9); font: bold 18px/1.5 monospace;
      margin-bottom: 24px; display: none; text-align: center;
    }
    #btn {
      background: rgba(200,127,255,0.08); border: 1px solid rgba(200,127,255,0.38);
      color: rgba(200,127,255,0.9); font: bold 17px/1 monospace;
      padding: 14px 46px; cursor: pointer; letter-spacing: 0.14em;
    }
    #btn:active { background: rgba(200,127,255,0.22); }
    #hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(200,160,255,0.22); font: 10px/1 monospace; letter-spacing: 0.15em;
      pointer-events: none; transition: opacity 2s;
    }
    #hint.gone { opacity: 0; }
  </style>
</head>
<body>
<div id="hud">
  <div>
    <div id="score">0</div>
    <div id="sub-score">CRYSTALS</div>
  </div>
  <div>
    <div id="combo"></div>
    <div id="timer-wrap">TIME: <span id="timer">60</span></div>
  </div>
</div>
<div id="flash"></div>
<div id="popup"></div>
<div id="hint">TAP CRYSTALS</div>
<div id="overlay">
  <h1>CRYSTAL GROVE</h1>
  <div class="sub">WILD LANDS · TAP TO HARVEST</div>
  <div id="ov-score"></div>
  <button id="btn">ENTER THE GROVE</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ─── STATE ─── */
let score = 0, combo = 1, comboTimer = 0, gameTime = 60;
let gameRunning = false, gameOver = false;
let crystals = [], creatures = [], particles = [];
let orbitAngle = 0;
const clock = new THREE.Clock();

/* ─── RENDERER ─── */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ─── SCENE ─── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0614);
scene.fog = new THREE.FogExp2(0x1a0830, 0.045);

/* ─── CAMERA ─── */
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 9, 14);
camera.lookAt(0, 0, 0);

/* ─── LIGHTING ─── */
const ambient = new THREE.AmbientLight(0x2a1550, 0.8);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xc060ff, 1.4);
dirLight.position.set(8, 15, 6);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(512, 512);
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 40;
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 12;
dirLight.shadow.camera.bottom = -12;
scene.add(dirLight);

const fillLight = new THREE.PointLight(0x3040ff, 0.6, 20);
fillLight.position.set(-6, 4, -4);
scene.add(fillLight);

/* ─── TERRAIN ─── */
const terrainGeo = new THREE.PlaneGeometry(32, 32, 20, 20);
terrainGeo.rotateX(-Math.PI / 2);
const posAttr = terrainGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i), z = posAttr.getZ(i);
  const dist = Math.sqrt(x * x + z * z);
  const h = (Math.sin(x * 0.4) * Math.cos(z * 0.4) * 0.6
           + Math.sin(x * 0.9 + 1.2) * Math.sin(z * 0.7) * 0.35
           + Math.cos(dist * 0.3) * 0.3) * (1 - Math.min(dist / 14, 1) * 0.7);
  posAttr.setY(i, h);
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshLambertMaterial({ color: 0x1a0d35 });
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

/* ─── MUSHROOM-TREE CLUSTER ─── */
function makeTree(x, z, scale) {
  const g = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(0.08 * scale, 0.12 * scale, 0.7 * scale, 5);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x3d1a5a });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.castShadow = true;
  g.add(trunk);
  const capGeo = new THREE.ConeGeometry(0.45 * scale, 0.7 * scale, 6);
  const capMat = new THREE.MeshLambertMaterial({ color: 0x5a1a6e });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.y = 0.55 * scale;
  cap.castShadow = true;
  g.add(cap);
  g.position.set(x, getTerrainY(x, z) + 0.35 * scale, z);
  scene.add(g);
}

function getTerrainY(x, z) {
  const dist = Math.sqrt(x * x + z * z);
  return (Math.sin(x * 0.4) * Math.cos(z * 0.4) * 0.6
        + Math.sin(x * 0.9 + 1.2) * Math.sin(z * 0.7) * 0.35
        + Math.cos(dist * 0.3) * 0.3) * (1 - Math.min(dist / 14, 1) * 0.7);
}

const treePositions = [
  [-4, -3, 1.1], [-6, 1, 0.9], [3, -5, 1.2], [5, 2, 0.8],
  [-2, 5, 1.0], [1, -7, 1.3], [-7, -1, 0.85], [6, -3, 0.95],
  [2, 6, 1.1], [-5, 4, 0.9], [4, 4, 0.75], [-3, -6, 1.0]
];
treePositions.forEach(([x, z, s]) => makeTree(x, z, s));

/* ─── CRYSTALS ─── */
const CRYSTAL_COLORS = [0xc87fff, 0x7fc8ff, 0xffdb4d, 0xff6ec7, 0x4dffc8];
const crystalGeos = [
  new THREE.OctahedronGeometry(0.35, 0),
  new THREE.TetrahedronGeometry(0.4, 0),
  new THREE.OctahedronGeometry(0.28, 0),
];

function spawnCrystal() {
  if (crystals.length >= 12) return;
  const angle = Math.random() * Math.PI * 2;
  const radius = 2 + Math.random() * 6.5;
  const x = Math.cos(angle) * radius;
  const z = Math.sin(angle) * radius;
  const color = CRYSTAL_COLORS[Math.floor(Math.random() * CRYSTAL_COLORS.length)];
  const geo = crystalGeos[Math.floor(Math.random() * crystalGeos.length)];
  const mat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  const baseY = getTerrainY(x, z) + 0.55;
  mesh.position.set(x, baseY, z);
  mesh.rotation.y = Math.random() * Math.PI * 2;
  mesh.castShadow = true;

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.38, 0.52, 12);
  const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = getTerrainY(x, z) + 0.04;
  scene.add(ring);

  // Light
  const light = new THREE.PointLight(color, 0.7, 3);
  mesh.add(light);

  scene.add(mesh);
  crystals.push({
    mesh, ring, light, color,
    baseY, phase: Math.random() * Math.PI * 2,
    value: 10 + Math.floor(Math.random() * 20),
    alive: true
  });
}

// Initial spawn
for (let i = 0; i < 10; i++) spawnCrystal();

/* ─── CREATURES (low-poly wanderers) ─── */
function makeCreature(cx, cz) {
  const g = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(0.32, 0.22, 0.48);
  const color = 0x3a1a5a;
  const mat = new THREE.MeshLambertMaterial({ color });
  const body = new THREE.Mesh(bodyGeo, mat);
  body.castShadow = true;
  g.add(body);
  const headGeo = new THREE.BoxGeometry(0.22, 0.2, 0.22);
  const head = new THREE.Mesh(headGeo, mat);
  head.position.set(0, 0.19, 0.2);
  head.castShadow = true;
  g.add(head);
  // eyes
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffdb4d });
  const eyeGeo = new THREE.SphereGeometry(0.03, 4, 4);
  const el = new THREE.Mesh(eyeGeo, eyeMat);
  el.position.set(-0.07, 0.22, 0.32);
  g.add(el);
  const er = new THREE.Mesh(eyeGeo, eyeMat);
  er.position.set(0.07, 0.22, 0.32);
  g.add(er);
  g.position.set(cx, getTerrainY(cx, cz) + 0.24, cz);
  scene.add(g);
  return {
    group: g, angle: Math.random() * Math.PI * 2,
    speed: 0.4 + Math.random() * 0.3,
    turnRate: (Math.random() - 0.5) * 0.6,
    bobPhase: Math.random() * Math.PI * 2,
    legPhase: 0
  };
}

for (let i = 0; i < 5; i++) {
  const a = (i / 5) * Math.PI * 2;
  creatures.push(makeCreature(Math.cos(a) * 5, Math.sin(a) * 5));
}

/* ─── PARTICLE POOL ─── */
const particlePool = [];
function getParticle() {
  return particlePool.find(p => !p.alive) || null;
}

function spawnBurst(pos, color, count) {
  for (let i = 0; i < count; i++) {
    let p = getParticle();
    const geo = new THREE.SphereGeometry(0.07 + Math.random() * 0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = p ? p.mesh : new THREE.Mesh(geo, mat);
    if (!p) {
      scene.add(mesh);
      particlePool.push({ mesh, alive: false, vel: new THREE.Vector3(), life: 0, maxLife: 0 });
      p = particlePool[particlePool.length - 1];
    }
    p.mesh.material.color.setHex(color);
    p.mesh.scale.setScalar(1);
    p.mesh.position.copy(pos);
    p.vel.set(
      (Math.random() - 0.5) * 5,
      1.5 + Math.random() * 3.5,
      (Math.random() - 0.5) * 5
    );
    p.life = 0;
    p.maxLife = 0.5 + Math.random() * 0.4;
    p.alive = true;
    p.mesh.visible = true;
  }
}

/* ─── SCORE RING ─── */
const scoreRings = [];
function spawnScoreRing(pos) {
  const geo = new THREE.RingGeometry(0.1, 0.15, 12);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  mesh.rotation.x = -Math.PI / 2;
  scene.add(mesh);
  scoreRings.push({ mesh, life: 0, maxLife: 0.55 });
}

/* ─── HIT TEST ─── */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function onTap(clientX, clientY) {
  if (!gameRunning || gameOver) return;
  pointer.x = (clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  const meshes = crystals.filter(c => c.alive).map(c => c.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length === 0) return;

  const hitMesh = hits[0].object;
  const crystal = crystals.find(c => c.mesh === hitMesh && c.alive);
  if (!crystal) return;
  collectCrystal(crystal, hits[0].point);
}

function collectCrystal(crystal, point) {
  crystal.alive = false;
  scene.remove(crystal.mesh);
  scene.remove(crystal.ring);

  const pts = crystal.value * combo;
  score += pts;
  combo = Math.min(combo + 1, 8);
  comboTimer = 1.8;

  spawnBurst(crystal.mesh.position, crystal.color, 14);
  spawnScoreRing(crystal.mesh.position);
  showPopup(`+${pts}`, `#${crystal.color.toString(16).padStart(6, '0')}`);
  flashScreen();

  document.getElementById('score').textContent = score;
  updateComboUI();

  // Remove from array
  crystals = crystals.filter(c => c !== crystal);

  // Spawn replacement after delay
  if (gameRunning) setTimeout(spawnCrystal, 800 + Math.random() * 1200);
}

/* ─── UI HELPERS ─── */
let popupTO = null;
function showPopup(text, color) {
  const el = document.getElementById('popup');
  el.textContent = text;
  el.style.color = color;
  el.style.opacity = '1';
  if (popupTO) clearTimeout(popupTO);
  popupTO = setTimeout(() => { el.style.opacity = '0'; }, 600);
}

function flashScreen() {
  const el = document.getElementById('flash');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 80);
}

function updateComboUI() {
  const el = document.getElementById('combo');
  if (combo > 1) {
    el.textContent = `x${combo} COMBO`;
  } else {
    el.textContent = '';
  }
}

/* ─── GAME LOOP ─── */
function startGame() {
  score = 0; combo = 1; comboTimer = 0; gameTime = 60;
  gameRunning = true; gameOver = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('combo').textContent = '';
  document.getElementById('timer').textContent = '60';
  document.getElementById('overlay').style.display = 'none';

  const hint = document.getElementById('hint');
  hint.classList.remove('gone');
  setTimeout(() => hint.classList.add('gone'), 3000);

  // Ensure crystals are spawned
  while (crystals.length < 10) spawnCrystal();
}

function endGame() {
  gameRunning = false; gameOver = true;
  const ov = document.getElementById('overlay');
  const ovScore = document.getElementById('ov-score');
  ovScore.style.display = 'block';
  ovScore.innerHTML = `SCORE<br>${score}<br><span style="font-size:13px;color:rgba(200,160,255,0.55)">TAP AGAIN TO REPLAY</span>`;
  document.getElementById('btn').textContent = 'PLAY AGAIN';
  ov.style.display = 'flex';
}

/* ─── CAMERA SHAKE ─── */
let shakeAmount = 0;
function addShake(v) { shakeAmount = Math.max(shakeAmount, v); }
function flashScreen2() { addShake(0.08); flashScreen(); }

/* ─── ANIMATE ─── */
let spawnTimer = 0;
let timerCountdown = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameRunning && !gameOver) {
    gameTime -= dt;
    timerCountdown += dt;
    if (timerCountdown >= 1) {
      timerCountdown = 0;
      const t = Math.ceil(gameTime);
      document.getElementById('timer').textContent = Math.max(0, t);
    }
    if (gameTime <= 0) { endGame(); }

    // Combo decay
    if (combo > 1) {
      comboTimer -= dt;
      if (comboTimer <= 0) {
        combo = 1;
        updateComboUI();
      }
    }

    // Auto-spawn if too few
    spawnTimer += dt;
    if (spawnTimer > 2.5 && crystals.length < 8) {
      spawnCrystal();
      spawnTimer = 0;
    }
  }

  const t = clock.elapsedTime;

  // Orbit camera
  orbitAngle += dt * 0.12;
  const camR = 14, camH = 9;
  camera.position.x = Math.cos(orbitAngle) * camR;
  camera.position.z = Math.sin(orbitAngle) * camR;
  camera.position.y = camH + Math.sin(t * 0.2) * 0.3;

  // Camera shake
  if (shakeAmount > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeAmount;
    camera.position.y += (Math.random() - 0.5) * shakeAmount;
    shakeAmount *= 0.8;
    if (shakeAmount < 0.001) shakeAmount = 0;
  }
  camera.lookAt(0, 0.5, 0);

  // Animate crystals
  for (const c of crystals) {
    if (!c.alive) continue;
    const pulse = 0.85 + 0.15 * Math.sin(t * 2.5 + c.phase);
    c.mesh.scale.setScalar(pulse);
    c.mesh.position.y = c.baseY + 0.12 * Math.sin(t * 1.8 + c.phase);
    c.mesh.rotation.y += dt * 0.9;
    c.mesh.material.emissiveIntensity = 0.35 + 0.45 * Math.abs(Math.sin(t * 2.5 + c.phase));
    c.ring.material.opacity = 0.15 + 0.3 * Math.abs(Math.sin(t * 2.0 + c.phase));
    c.ring.scale.setScalar(0.9 + 0.2 * Math.sin(t * 2.0 + c.phase));
  }

  // Animate creatures
  for (const cr of creatures) {
    cr.angle += cr.turnRate * dt;
    cr.legPhase += dt * 4;
    const dx = Math.cos(cr.angle) * cr.speed * dt;
    const dz = Math.sin(cr.angle) * cr.speed * dt;
    let nx = cr.group.position.x + dx;
    let nz = cr.group.position.z + dz;
    const dist = Math.sqrt(nx * nx + nz * nz);
    if (dist > 8) { cr.angle += Math.PI * 0.5; nx = cr.group.position.x; nz = cr.group.position.z; }
    cr.group.position.x = nx;
    cr.group.position.z = nz;
    cr.group.position.y = getTerrainY(nx, nz) + 0.24 + Math.abs(Math.sin(cr.legPhase)) * 0.04;
    cr.group.rotation.y = cr.angle + Math.PI * 0.5;
    // Occasional direction change
    if (Math.random() < dt * 0.3) {
      cr.turnRate = (Math.random() - 0.5) * 0.8;
    }
  }

  // Particles
  for (const p of particlePool) {
    if (!p.alive) continue;
    p.life += dt;
    const f = p.life / p.maxLife;
    if (f >= 1) { p.alive = false; p.mesh.visible = false; continue; }
    p.vel.y -= 4.5 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.scale.setScalar(1 - f * 0.8);
    p.mesh.material.opacity = 1 - f;
  }

  // Score rings
  for (let i = scoreRings.length - 1; i >= 0; i--) {
    const sr = scoreRings[i];
    sr.life += dt;
    const f = sr.life / sr.maxLife;
    if (f >= 1) { scene.remove(sr.mesh); scoreRings.splice(i, 1); continue; }
    sr.mesh.scale.setScalar(1 + f * 3);
    sr.mesh.material.opacity = (1 - f) * 0.7;
  }

  // Ambient light pulse
  ambient.intensity = 0.75 + 0.08 * Math.sin(t * 0.5);

  renderer.render(scene, camera);
}

/* ─── EVENTS ─── */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

renderer.domElement.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (!gameRunning) return;
  onTap(e.clientX, e.clientY);
  addShake(0.06);
});

document.getElementById('btn').addEventListener('click', () => {
  document.getElementById('ov-score').style.display = 'none';
  startGame();
});

// Start immediately (instant_start)
startGame();
animate();
</script>
</body>
</html>
