<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CUBE CATCH v02 — Three.js Minimal Renderer Exp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020810; overflow: hidden; touch-action: none; font-family: monospace; }
    #game-canvas { display: block; position: fixed; top: 0; left: 0; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0; pointer-events: none;
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
    }
    #score { color: #50ffcc; font: bold 24px monospace; letter-spacing: 0.06em;
      text-shadow: 0 0 14px rgba(80,255,200,0.9), 0 0 28px rgba(80,255,200,0.4); }
    #lives { color: #ff5040; font: bold 20px monospace;
      text-shadow: 0 0 10px rgba(255,80,64,0.7); }
    #hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.45); font: 12px monospace; letter-spacing: 0.18em;
      pointer-events: none; text-align: center;
    }
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(2,4,16,0.94); display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: white; text-align: center;
    }
    #overlay h1 { font: bold 30px monospace; color: #50ffcc; margin-bottom: 8px;
      letter-spacing: 0.12em; text-shadow: 0 0 24px rgba(80,255,200,0.9); }
    #overlay .sub { font: 13px monospace; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
    #overlay button {
      background: transparent; border: 1px solid rgba(80,255,200,0.6);
      color: #50ffcc; padding: 12px 34px; font: bold 14px monospace;
      letter-spacing: 0.1em; cursor: pointer; margin-top: 14px; transition: all 0.15s;
    }
    #overlay button:hover { background: rgba(80,255,200,0.1); border-color: #50ffcc; }
    #overlay.hidden { display: none; }
    #combo-pop {
      position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%);
      font: bold 34px monospace; color: #ffe840; pointer-events: none;
      opacity: 0; text-shadow: 0 0 20px rgba(255,232,64,1);
      transition: opacity 0.12s;
    }
    #miss-flash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,40,40,0); pointer-events: none;
      transition: background 0.05s;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <div id="score">0</div>
    <div id="lives">▲▲▲</div>
  </div>
  <div id="hint">TAP CUBES TO CATCH THEM</div>
  <div id="combo-pop"></div>
  <div id="miss-flash"></div>
  <div id="overlay">
    <h1>CUBE CATCH</h1>
    <div class="sub">EXP 02 · THREE.JS MINIMAL · v02</div>
    <div class="sub" style="font-size:11px; color:rgba(255,255,255,0.3);">3D cubes fall — tap to catch before they land</div>
    <button id="start-btn">TAP TO START</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.ready();
    }

    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const overlay = document.getElementById('overlay');
    const comboPop = document.getElementById('combo-pop');
    const hintEl = document.getElementById('hint');
    const missFlash = document.getElementById('miss-flash');

    // THREE SETUP — minimal
    const renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('game-canvas'), antialias: false
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x030c18);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x030c18, 16, 32);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 2, 12);
    camera.lookAt(0, 0, 0);

    // Lighting — boosted for contrast
    scene.add(new THREE.AmbientLight(0x203050, 1.0));
    const sun = new THREE.DirectionalLight(0x50ffcc, 1.8);
    sun.position.set(5, 10, 5);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xff4466, 0.6);
    fill.position.set(-6, 4, -3);
    scene.add(fill);

    // Floor — bright grid for contrast
    const floorGeo = new THREE.PlaneGeometry(22, 4, 22, 4);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x1a3a5a, wireframe: false });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -3;
    scene.add(floor);

    // Grid overlay for visual contrast
    const gridHelper = new THREE.GridHelper(22, 22, 0x50ffcc, 0x204060);
    gridHelper.position.y = -2.98;
    scene.add(gridHelper);

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // Game state
    let score = 0, lives = 3, combo = 0, wave = 1;
    let cubes = [], particles = [];
    let running = false, frameCount = 0;
    let spawnTimer = 0, spawnInterval = 100;

    // Screen shake state
    let shakeIntensity = 0;
    let shakeDecay = 0.88;

    // Bright contrasting colors
    const CUBE_COLORS = [0x50ffcc, 0xff3366, 0xc4ff40, 0xffe840, 0xcc60ff, 0xff8020, 0x40ddff];
    const cubeGeos = [
      new THREE.BoxGeometry(0.9, 0.9, 0.9),
      new THREE.OctahedronGeometry(0.6),
      new THREE.TetrahedronGeometry(0.7)
    ];

    function spawnCube() {
      const color = CUBE_COLORS[Math.floor(Math.random() * CUBE_COLORS.length)];
      const geo = cubeGeos[Math.floor(Math.random() * cubeGeos.length)];
      const mat = new THREE.MeshLambertMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random() - 0.5) * 10, 8 + Math.random() * 4, (Math.random() - 0.5) * 2);
      mesh.rotation.set(Math.random(), Math.random(), Math.random());
      const speed = 0.04 + wave * 0.008 + Math.random() * 0.03;
      cubes.push({ mesh, speed, color, alive: true, rotSpeed: (Math.random()-0.5)*0.08 });
      scene.add(mesh);
    }

    // Enhanced burst: ring + spray particles
    function spawnBurst(pos, color) {
      // Spray particles (12 pieces)
      for (let i = 0; i < 12; i++) {
        const size = 0.07 + Math.random() * 0.1;
        const geo = new THREE.SphereGeometry(size, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        const angle = Math.random() * Math.PI * 2;
        const spd = 0.12 + Math.random() * 0.15;
        const v = new THREE.Vector3(
          Math.cos(angle) * spd, 0.15 + Math.random() * 0.2, Math.sin(angle) * spd * 0.4
        );
        particles.push({ mesh, v, life: 1, decay: 0.035 + Math.random() * 0.03 });
        scene.add(mesh);
      }
      // Ring flash particles (8 outward, same plane)
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const geo = new THREE.PlaneGeometry(0.15, 0.15);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        const r = 0.25 + Math.random() * 0.1;
        const v = new THREE.Vector3(Math.cos(angle) * r, 0.02, Math.sin(angle) * r * 0.4);
        particles.push({ mesh, v, life: 1, decay: 0.09 + Math.random() * 0.04 });
        scene.add(mesh);
      }
    }

    // Miss burst: red shards
    function spawnMissBurst(pos) {
      for (let i = 0; i < 6; i++) {
        const geo = new THREE.SphereGeometry(0.06, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0xff3040, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        const angle = Math.random() * Math.PI * 2;
        const v = new THREE.Vector3(
          (Math.random()-0.5)*0.2, 0.1 + Math.random()*0.1, (Math.random()-0.5)*0.1
        );
        particles.push({ mesh, v, life: 1, decay: 0.06 + Math.random() * 0.04 });
        scene.add(mesh);
      }
    }

    // Screen shake trigger
    function triggerShake(intensity) {
      shakeIntensity = Math.max(shakeIntensity, intensity);
    }

    // Red flash on miss
    function triggerMissFlash() {
      missFlash.style.background = 'rgba(255,40,40,0.22)';
      setTimeout(() => { missFlash.style.background = 'rgba(255,40,40,0)'; }, 120);
    }

    // Raycaster for tap
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onTap(clientX, clientY) {
      if (!running) return;
      mouse.x = (clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const meshes = cubes.filter(c => c.alive).map(c => c.mesh);
      const hits = raycaster.intersectObjects(meshes);
      if (hits.length > 0) {
        const hitMesh = hits[0].object;
        const cube = cubes.find(c => c.mesh === hitMesh);
        if (cube && cube.alive) {
          cube.alive = false;
          combo++;
          const pts = combo >= 4 ? combo * 3 : combo;
          score += pts;
          scoreEl.textContent = score;
          if (combo >= 3) {
            comboPop.textContent = `x${combo}!`;
            comboPop.style.opacity = '1';
            setTimeout(() => { comboPop.style.opacity = '0'; }, 400);
          }
          spawnBurst(cube.mesh.position, cube.color);
          scene.remove(cube.mesh);
        }
      } else {
        combo = 0;
      }
    }

    document.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      onTap(t.clientX, t.clientY);
    }, { passive: false });
    document.addEventListener('mousedown', (e) => onTap(e.clientX, e.clientY));

    function updateLives() {
      livesEl.textContent = '▲'.repeat(lives) + '△'.repeat(Math.max(0, 3 - lives));
    }

    function gameOver() {
      running = false;
      overlay.innerHTML = `
        <h1 style="color:#ff3366">GAME OVER</h1>
        <div class="sub">SCORE: ${score}</div>
        <div class="sub" style="font-size:11px; color:rgba(255,255,255,0.3);">THREE.JS v02 · ${frameCount} frames</div>
        <button onclick="startGame()">PLAY AGAIN</button>
      `;
      overlay.classList.remove('hidden');
    }

    function startGame() {
      cubes.forEach(c => scene.remove(c.mesh));
      particles.forEach(p => scene.remove(p.mesh));
      cubes = []; particles = [];
      score = 0; lives = 3; combo = 0; wave = 1; frameCount = 0;
      spawnTimer = 0; spawnInterval = 100; shakeIntensity = 0;
      scoreEl.textContent = '0';
      updateLives();
      overlay.classList.add('hidden');
      running = true;
    }

    document.getElementById('start-btn').addEventListener('click', startGame);

    const _camBase = new THREE.Vector3(0, 2, 12);

    function animate() {
      requestAnimationFrame(animate);
      if (!running) { renderer.render(scene, camera); return; }
      frameCount++;

      // Spawn
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        const n = 1 + Math.floor(wave / 3);
        for (let i = 0; i < n; i++) spawnCube();
        spawnInterval = Math.max(40, 100 - wave * 6);
      }

      // Wave
      if (score > wave * 20) {
        wave++;
        hintEl.textContent = `WAVE ${wave}`;
        setTimeout(() => { hintEl.textContent = 'TAP CUBES TO CATCH THEM'; }, 1200);
      }

      // Update cubes
      for (let i = cubes.length - 1; i >= 0; i--) {
        const c = cubes[i];
        if (!c.alive) { cubes.splice(i, 1); continue; }
        c.mesh.position.y -= c.speed;
        c.mesh.rotation.x += c.rotSpeed;
        c.mesh.rotation.z += c.rotSpeed * 0.7;
        if (c.mesh.position.y < -3.5) {
          spawnMissBurst(c.mesh.position);
          scene.remove(c.mesh);
          cubes.splice(i, 1);
          lives--;
          combo = 0;
          updateLives();
          triggerShake(0.32);
          triggerMissFlash();
          if (lives <= 0) { gameOver(); return; }
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= p.decay;
        if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); continue; }
        p.mesh.position.addScaledVector(p.v, 1);
        p.v.y -= 0.012;
        p.mesh.material.opacity = p.life;
        p.mesh.scale.setScalar(p.life * 0.8 + 0.2);
      }

      // Screen shake
      if (shakeIntensity > 0.002) {
        camera.position.x = _camBase.x + (Math.random()-0.5)*shakeIntensity*2 + Math.sin(Date.now()*0.0003)*0.3;
        camera.position.y = _camBase.y + (Math.random()-0.5)*shakeIntensity;
        shakeIntensity *= shakeDecay;
      } else {
        shakeIntensity = 0;
        camera.position.x = _camBase.x + Math.sin(Date.now()*0.0003)*0.3;
        camera.position.y = _camBase.y;
      }

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
