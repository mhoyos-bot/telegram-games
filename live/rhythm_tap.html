<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RHYTHM TAP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;touch-action:none;background:#040410;font-family:'Arial Black',Arial,sans-serif}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:12px 16px 0}
#row1{display:flex;justify-content:space-between;align-items:flex-start}
#score{font-size:36px;font-weight:900;color:#14f195;text-shadow:0 0 16px #14f195;letter-spacing:2px}
#lives{display:flex;gap:5px;padding-top:6px}
.h{width:14px;height:14px;background:#ff1493;border-radius:50%;box-shadow:0 0 6px #ff1493;transition:all .14s}
.h.x{background:#181822;box-shadow:none;transform:scale(.5)}
#row2{margin-top:6px;display:flex;gap:10px;align-items:center}
#combo{font-size:16px;font-weight:900;color:#ffd700;text-shadow:0 0 10px #ffd700;min-height:20px;transition:transform .07s}
#mult{font-size:20px;font-weight:900;color:#ff8c00;text-shadow:0 0 12px #ff8c00;min-height:24px}
#fbar{flex:1;height:6px;background:#111;border-radius:3px;overflow:hidden}
#fbfill{width:0%;height:100%;background:linear-gradient(90deg,#14f195,#00b4ff);border-radius:3px;transition:width .1s}
#ftxt{font-size:12px;font-weight:900;color:#14f195;text-shadow:0 0 8px #14f195;letter-spacing:1px;opacity:0;transition:opacity .25s;white-space:nowrap}
#feed{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);font-size:30px;font-weight:900;pointer-events:none;z-index:20;opacity:0;text-align:center;white-space:nowrap}
#go{display:none;position:fixed;inset:0;background:rgba(2,2,16,.93);flex-direction:column;align-items:center;justify-content:center;z-index:100;pointer-events:all;gap:14px}
#go.show{display:flex}
#go h1{font-size:48px;color:#ff1493;text-shadow:0 0 26px #ff1493;letter-spacing:4px}
#go .lbl{font-size:16px;color:#555}
#go .fin{font-size:42px;color:#14f195;text-shadow:0 0 18px #14f195;font-weight:900}
#go button{background:#14f195;color:#040410;border:none;font-size:20px;font-weight:900;padding:14px 46px;border-radius:50px;cursor:pointer;touch-action:manipulation;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
</style>
</head><body>
<div id="ui">
  <div id="row1">
    <div id="score">00000</div>
    <div id="lives"></div>
  </div>
  <div id="row2">
    <div id="combo"></div>
    <div id="mult"></div>
    <div id="fbar"><div id="fbfill"></div></div>
    <div id="ftxt">FEVER!</div>
  </div>
</div>
<div id="feed"></div>
<div id="go">
  <h1>GAME OVER</h1>
  <div class="lbl">Final Score</div>
  <div class="fin" id="fs">0</div>
  <button id="rb">RETRY</button>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.128/build/three.module.min.js"}}</script>
<script type="module">
// ATOMS: threejs_telegram_bridge | threejs_scene_setup | threejs_touch_input
//        threejs_object_pool | threejs_particle_system | threejs_ui_overlay
//        fever_mode_atom (NEW) — combo-triggered rainbow visual + 2x scoring

import * as THREE from 'three';

// ── ATOM: threejs_telegram_bridge ─────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
function haptic(t) { tg?.HapticFeedback?.impactOccurred?.(t); }

// ── ATOM: threejs_scene_setup ─────────────────────────────────────────────────
let W = innerWidth, H = innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = false;
renderer.setSize(W, H);
renderer.setClearColor(0x040410);
Object.assign(renderer.domElement.style, { position:'fixed', top:'0', left:'0', zIndex:'1' });
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const cam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, 0.1, 100);
cam.position.z = 10;

// ── Constants ─────────────────────────────────────────────────────────────────
const COLS      = 4;
const CLR       = [0xff1493, 0x14f195, 0xff8c00, 0x00b4ff];
const CSS       = ['#ff1493','#14f195','#ff8c00','#00b4ff'];
const MAX_HP    = 5;
const HIT_H     = 76;   // hit zone height at screen bottom (px)
const NOTE_H    = 50;   // tap note tile height (px)
const GAP       = 3;    // column gap (px)
const PERF_W    = 68;   // ±ms perfect window
const GOOD_W    = 185;  // ±ms good window
const MISS_T    = 295;  // ms past hit = auto miss
const BPM       = 130;
const BEAT      = 60000 / BPM;

// ── Layout (recalculated on resize) ──────────────────────────────────────────
let colW, colXs, hitY, spawnY, travelPx;
let spd = 330;  // px/s, increases with difficulty

function calcLayout() {
  colW    = (W - GAP * (COLS + 1)) / COLS;
  colXs   = Array.from({length: COLS}, (_, i) => -W/2 + GAP*(i+1) + colW*(i+0.5));
  hitY    = -H/2 + HIT_H * 0.5;
  spawnY  =  H/2 + NOTE_H;
  travelPx = spawnY - hitY;
}
calcLayout();

function travelMs() { return travelPx / spd * 1000; }

// ── ATOM: threejs_scene_setup — column backgrounds + hit zone ─────────────────
const colBGMats = [];
for (let i = 0; i < COLS; i++) {
  const mat  = new THREE.MeshBasicMaterial({ color: CLR[i], transparent:true, opacity:0.02 });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(colW, H), mat);
  mesh.position.set(colXs[i], 0, -1);
  scene.add(mesh);
  colBGMats.push(mat);
}

// Hit zone: colored panels at bottom per column
const hitZoneMats = [];
for (let i = 0; i < COLS; i++) {
  const mat  = new THREE.MeshBasicMaterial({ color: CLR[i], transparent:true, opacity:0.22 });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(colW - 4, HIT_H - 6), mat);
  mesh.position.set(colXs[i], hitY, 0.1);
  scene.add(mesh);
  hitZoneMats.push(mat);
}

// Separator line above hit zone
{
  const y = -H/2 + HIT_H;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([-W/2,y,0, W/2,y,0], 3));
  scene.add(new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.14 })));
}

// Column dividers
for (let i = 1; i < COLS; i++) {
  const x = -W/2 + GAP*i + colW*i;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([x,-H/2,0, x,H/2,0], 3));
  scene.add(new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.05 })));
}

// ── ATOM: threejs_object_pool — Note pool ─────────────────────────────────────
const NOTE_MAX = 32;
const noteGeo  = new THREE.PlaneGeometry(1, NOTE_H);  // width set via scale.x
const notePool = [];
for (let i = 0; i < NOTE_MAX; i++) {
  const mat  = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0 });
  const mesh = new THREE.Mesh(noteGeo, mat);
  mesh.visible = false;
  scene.add(mesh);
  notePool.push({ mesh, mat, col:0, pt:0, active:false, tapped:false });
}

function spawnNote(col, pt) {
  for (const n of notePool) {
    if (n.active) continue;
    n.col = col; n.pt = pt; n.active = true; n.tapped = false;
    n.mat.color.setHex(CLR[col]);
    n.mat.opacity = 0.92;
    n.mesh.scale.set(colW - 6, 1, 1);
    n.mesh.position.set(colXs[col], spawnY, 0.3);
    n.mesh.visible = true;
    return;
  }
}
function killNote(n) { n.active = false; n.mesh.visible = false; }

// ── ATOM: threejs_particle_system — burst on hit ──────────────────────────────
const PMAX = 48;
const parts = [];
for (let i = 0; i < PMAX; i++) {
  const m    = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0 });
  const mesh = new THREE.Mesh(new THREE.CircleGeometry(3 + Math.random()*5, 6), m);
  mesh.visible = false;
  scene.add(mesh);
  parts.push({ mesh, m, vx:0, vy:0, life:0, max:0 });
}
function burst(x, y, hex, n) {
  let c = 0;
  for (const p of parts) {
    if (p.life > 0 || c >= n) continue;
    const a = Math.random()*Math.PI*2, s = 130 + Math.random()*280;
    p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s;
    p.life = p.max = 0.38 + Math.random()*0.22;
    p.mesh.position.set(x, y, 1.5);
    p.mesh.scale.setScalar(1);
    p.m.color.setHex(hex); p.m.opacity = 1;
    p.mesh.visible = true;
    c++;
  }
}

// DOM score popups
const POPMAX = 8;
const pops   = [];
for (let i = 0; i < POPMAX; i++) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;pointer-events:none;z-index:22;font-family:"Arial Black",Arial;font-weight:900;font-size:21px;display:none;transform:translate(-50%,-50%)';
  document.body.appendChild(el);
  pops.push({ el, life:0, sy:0 });
}
function popScore(txt, col, css) {
  const sx = colXs[col] + W/2;
  const sy = H - HIT_H * 0.5;
  for (const p of pops) {
    if (p.life > 0) continue;
    p.life = 0.75; p.sy = sy;
    p.el.textContent = txt; p.el.style.color = css;
    p.el.style.textShadow = `0 0 10px ${css}`;
    p.el.style.display = 'block'; p.el.style.opacity = '1';
    p.el.style.left = sx+'px'; p.el.style.top = sy+'px';
    break;
  }
}

// ── Web Audio helpers ─────────────────────────────────────────────────────────
let actx = null;
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function tone(freq, dur, type, vol) {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(_e) { /* audio unavailable */ }
}
const FREQS = [392, 523, 659, 784];  // G4 C5 E5 G5
function playHit(col, perf) { tone(FREQS[col], perf?0.18:0.1, 'sine', perf?0.38:0.22); }
function playMiss()         { tone(110, 0.12, 'sawtooth', 0.07); }
function playBeat()         { tone(880, 0.03, 'square', 0.028); }
function playFeverJingle()  { tone(1320,0.22,'sine',0.1); tone(1760,0.16,'sine',0.07); }

// ── ATOM: fever_mode_atom ─────────────────────────────────────────────────────
// Fills on PERFECT hits → triggers FEVER MODE (2x points, rainbow notes, 8s)
const FEVER_DUR   = 8;     // seconds active
const FEVER_DECAY = 2.0;   // drain/sec when inactive
let fever = 0;             // 0–100
let feverOn = false;
let feverT  = 0;
let feverHue = 0;

const fbfill = document.getElementById('fbfill');
const ftxt   = document.getElementById('ftxt');

function addFever(v) {
  if (feverOn) return;
  fever = Math.min(100, fever + v);
  fbfill.style.width = fever + '%';
  if (fever >= 100) {
    feverOn = true; feverT = FEVER_DUR;
    ftxt.style.opacity = '1';
    playFeverJingle();
    haptic('heavy');
  }
}
function loseFever() {
  fever = Math.max(0, fever - 28);
  fbfill.style.width = fever + '%';
}

// ── ATOM: threejs_ui_overlay — game state + DOM ───────────────────────────────
let score=0, combo=0, mult=1, hp=MAX_HP, phase='playing';
let nextBeat = performance.now() + 850;
let beatCnt=0, patStep=0, elapsed=0, beatSkip=2;
let tier=0, shake=0, lastT=performance.now(), feedT=0;

const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const multEl  = document.getElementById('mult');
const livesEl = document.getElementById('lives');
const feedEl  = document.getElementById('feed');
const goEl    = document.getElementById('go');
const fsEl    = document.getElementById('fs');

function buildLives() {
  livesEl.innerHTML = '';
  for (let i = 0; i < MAX_HP; i++) {
    const d = document.createElement('div');
    d.className = 'h' + (i >= hp ? ' x' : '');
    livesEl.appendChild(d);
  }
}
buildLives();

function showFeed(txt, css) {
  feedEl.textContent = txt; feedEl.style.color = css;
  feedEl.style.textShadow = `0 0 16px ${css}`;
  feedEl.style.opacity = '1'; feedT = 0.52;
}
function refreshCombo() {
  if (combo >= 4) {
    mult = combo >= 20 ? 5 : combo >= 10 ? 3 : combo >= 5 ? 2 : 1;
    comboEl.textContent = `${combo}✕`;
    multEl.textContent  = mult > 1 ? `×${mult}` : '';
    comboEl.style.transform = `scale(${1 + Math.min(combo*0.012, 0.34)})`;
  } else {
    mult = 1;
    comboEl.textContent = ''; multEl.textContent = '';
    comboEl.style.transform = 'scale(1)';
  }
}

// ── Patterns per difficulty tier ──────────────────────────────────────────────
const PATS = [
  [[0],[1],[2],[3],[0],[2],[1],[3],[0,2],[1,3],[0],[1]],
  [[0],[1,3],[2],[0,3],[1],[2],[0,2],[3],[1,3],[0],[2,3],[1,0]],
  [[0,2],[1,3],[0],[1,2,3],[0,3],[2],[0,1],[3],[1,2],[0,2,3],[0],[1,3]],
];

function scheduleBeat(bt) {
  beatCnt++;
  elapsed += BEAT / 1000;

  if      (elapsed > 90 && tier < 2) { tier=2; beatSkip=1; spd=Math.min(700,spd+80); }
  else if (elapsed > 45 && tier < 1) { tier=1; beatSkip=1; spd=Math.min(700,spd+50); }
  if (beatCnt % 8 === 0) spd = Math.min(700, spd + 6);

  playBeat();
  if (beatCnt % beatSkip !== 0) return;

  const pat  = PATS[tier];
  const step = pat[patStep % pat.length];
  patStep++;
  const pt = bt + travelMs();
  for (const col of step) spawnNote(col, pt);
}

// ── ATOM: threejs_touch_input — column tap detection ─────────────────────────
function colFromX(cx) {
  for (let i = 0; i < COLS; i++) {
    const left  = colXs[i] - colW/2 + W/2;
    const right = colXs[i] + colW/2 + W/2;
    if (cx >= left && cx <= right) return i;
  }
  return -1;
}

function onTap(cx) {
  if (phase !== 'playing') return;
  if (actx?.state === 'suspended') actx.resume();

  const col = colFromX(cx);
  if (col < 0) return;

  const now = performance.now();
  let best = null, bd = Infinity;
  for (const n of notePool) {
    if (!n.active || n.tapped || n.col !== col) continue;
    const d = Math.abs(now - n.pt);
    if (d < bd) { bd = d; best = n; }
  }
  if (!best) return;

  best.tapped = true;
  killNote(best);
  const fMult = feverOn ? 2 : 1;

  if (bd <= PERF_W) {
    const pts = 150 * mult * fMult;
    score += pts; combo++;
    scoreEl.textContent = String(score).padStart(5, '0');
    refreshCombo(); showFeed('PERFECT!', CSS[col]);
    burst(colXs[col], hitY, CLR[col], 18);
    hitZoneMats[col].opacity = 0.78;
    addFever(12); shake = 0.011; playHit(col, true);
    popScore('+'+pts, col, CSS[col]);
    haptic('heavy');
  } else if (bd <= GOOD_W) {
    const pts = 70 * mult * fMult;
    score += pts; combo++;
    scoreEl.textContent = String(score).padStart(5, '0');
    refreshCombo(); showFeed('GOOD', CSS[col]);
    burst(colXs[col], hitY, CLR[col], 9);
    hitZoneMats[col].opacity = 0.5;
    addFever(5); shake = 0.005; playHit(col, false);
    popScore('+'+pts, col, CSS[col]);
    haptic('medium');
  } else {
    combo = 0; refreshCombo();
    showFeed(now < best.pt ? 'EARLY' : 'LATE', '#ff4444');
    hitZoneMats[col].opacity = 0.46;
    loseFever(); playMiss(); hp--; buildLives(); haptic('light');
    if (hp <= 0) gameOver();
  }
}

function doMiss(n) {
  combo = 0; refreshCombo();
  showFeed('MISS!', '#ff4444');
  killNote(n); loseFever(); playMiss(); hp--; buildLives(); haptic('light');
  if (hp <= 0) gameOver();
}

function gameOver() {
  phase = 'gameover';
  fsEl.textContent = score;
  goEl.classList.add('show');
}

function restart() {
  score=0; combo=0; mult=1; hp=MAX_HP; phase='playing';
  tier=0; patStep=0; beatCnt=0; beatSkip=2;
  elapsed=0; spd=330; shake=0; feedT=0;
  fever=0; feverOn=false; feverT=0; feverHue=0;
  scoreEl.textContent='00000';
  comboEl.textContent=''; multEl.textContent='';
  feedEl.style.opacity='0';
  fbfill.style.width='0%'; ftxt.style.opacity='0';
  buildLives();
  nextBeat = performance.now() + 850;
  for (const n of notePool) killNote(n);
  for (const p of parts)    { p.life=0; p.mesh.visible=false; }
  for (const p of pops)     { p.life=0; p.el.style.display='none'; }
  for (let i=0; i<COLS; i++) {
    hitZoneMats[i].opacity = 0.22;
    colBGMats[i].color.setHex(CLR[i]);
    colBGMats[i].opacity = 0.02;
  }
  goEl.classList.remove('show');
}

document.getElementById('rb').addEventListener('pointerdown', restart);
renderer.domElement.addEventListener('pointerdown', e => { e.preventDefault(); onTap(e.clientX); });

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;

  if (phase === 'playing') {
    while (ts >= nextBeat) { scheduleBeat(nextBeat); nextBeat += BEAT; }
  }

  const beatPhase = (ts % BEAT) / BEAT;
  const pulse     = Math.pow(Math.max(0, 1 - beatPhase * 4.2), 2);
  const now       = performance.now();

  // ATOM: fever_mode_atom — tick fever timer + rainbow visuals
  if (feverOn) {
    feverT  -= dt;
    feverHue = (feverHue + dt * 200) % 360;
    if (feverT <= 0) {
      feverOn = false; fever = 0;
      fbfill.style.width = '0%'; ftxt.style.opacity = '0';
      for (let i=0; i<COLS; i++) colBGMats[i].color.setHex(CLR[i]);
    }
    for (let i=0; i<COLS; i++) {
      colBGMats[i].color.setHSL(((feverHue + i*90) % 360)/360, 1, 0.5);
      colBGMats[i].opacity = 0.065 + pulse * 0.04;
    }
  } else {
    for (let i=0; i<COLS; i++) {
      colBGMats[i].opacity = 0.02 + pulse * 0.014;
    }
    if (fever > 0) {
      fever = Math.max(0, fever - FEVER_DECAY * dt);
      fbfill.style.width = fever + '%';
    }
  }

  // Note movement: y derived from timing, zero drift
  for (const n of notePool) {
    if (!n.active) continue;
    const y = hitY + (n.pt - now) * spd / 1000;
    n.mesh.position.y = y;
    n.mesh.visible = (y > -H/2 - NOTE_H && y < H/2 + NOTE_H);

    // Fever: rainbow note color
    if (feverOn) {
      n.mat.color.setHSL(((feverHue + n.col*90) % 360)/360, 1, 0.72);
    } else {
      n.mat.color.setHex(CLR[n.col]);
    }

    // Auto miss when too far past hit zone
    if (!n.tapped && now > n.pt + MISS_T) { doMiss(n); continue; }

    // Brighten notes approaching perfect window
    const dist = Math.abs(n.pt - now);
    n.mat.opacity = dist < PERF_W ? 1.0 : dist < GOOD_W ? 0.9 : 0.82;
  }

  // Hit zone flash decay + beat pulse
  for (let i=0; i<COLS; i++) {
    const base = feverOn ? 0.38 : 0.12 + pulse * 0.1;
    if (hitZoneMats[i].opacity > base + 0.01) {
      hitZoneMats[i].opacity = Math.max(base, hitZoneMats[i].opacity - dt * 4);
    } else {
      hitZoneMats[i].opacity = base;
    }
  }

  // Particles
  for (const p of parts) {
    if (p.life <= 0) continue;
    p.life -= dt;
    if (p.life <= 0) { p.mesh.visible=false; continue; }
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.vy -= 420 * dt;
    const t = p.life / p.max;
    p.m.opacity = t * t; p.mesh.scale.setScalar(0.4 + t);
  }

  // Score popups
  for (const p of pops) {
    if (p.life <= 0) continue;
    p.life -= dt;
    if (p.life <= 0) { p.el.style.display='none'; continue; }
    p.sy -= 95 * dt;
    p.el.style.top     = p.sy+'px';
    p.el.style.opacity = Math.min(1, p.life * 2.6).toFixed(2);
  }

  // Feedback text fade
  if (feedT > 0) {
    feedT -= dt;
    feedEl.style.opacity = feedT <= 0 ? '0' : feedT < 0.18 ? (feedT/0.18).toFixed(2) : '1';
  }

  // Camera shake
  if (shake > 0) {
    shake *= 0.8;
    cam.position.x = (Math.random()-0.5) * shake * 18;
    cam.position.y = (Math.random()-0.5) * shake * 18;
  } else {
    cam.position.x = 0; cam.position.y = 0;
  }

  renderer.render(scene, cam);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = innerWidth; H = innerHeight;
  renderer.setSize(W, H);
  cam.left=-W/2; cam.right=W/2; cam.top=H/2; cam.bottom=-H/2;
  cam.updateProjectionMatrix();
  calcLayout();
});

requestAnimationFrame(loop);
</script>
</body></html>
