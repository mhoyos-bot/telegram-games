<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TILE FLIP — CSS3D Renderer Exp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030d10; overflow: hidden; touch-action: none; font-family: monospace;
      height: 100vh; width: 100vw; display: flex; flex-direction: column;
      align-items: center; justify-content: center; user-select: none; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
      z-index: 10; pointer-events: none;
    }
    #score { color: #40e8ff; font: bold 22px monospace; letter-spacing: 0.06em;
      text-shadow: 0 0 12px rgba(64,232,255,0.8); }
    #timer { color: #ff9040; font: bold 18px monospace; letter-spacing: 0.1em; }

    #arena {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
      perspective: 600px;
      max-width: 360px;
      width: 90vw;
    }

    .tile {
      aspect-ratio: 1;
      position: relative;
      transform-style: preserve-3d;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
    }
    .tile.flipped { transform: rotateY(180deg); }
    .tile.matched { transform: rotateY(180deg) scale(0.9); }
    .tile.shake {
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-6px); }
      75% { transform: rotateY(180deg) translateX(6px); }
    }

    .tile-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(18px, 6vw, 28px);
    }
    .tile-back {
      background: linear-gradient(135deg, #0a2535 0%, #0d1a25 100%);
      border: 1px solid rgba(64,232,255,0.2);
      box-shadow: 0 0 8px rgba(64,232,255,0.1);
    }
    .tile-front {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #0d2540 0%, #0a1a2e 100%);
      border: 1px solid rgba(64,232,255,0.4);
      box-shadow: 0 0 12px rgba(64,232,255,0.15), inset 0 0 8px rgba(64,232,255,0.05);
    }
    .tile-front.color-0 { border-color: rgba(64,232,255,0.6); box-shadow: 0 0 14px rgba(64,232,255,0.3); }
    .tile-front.color-1 { border-color: rgba(255,64,100,0.6); box-shadow: 0 0 14px rgba(255,64,100,0.3); }
    .tile-front.color-2 { border-color: rgba(180,255,80,0.6); box-shadow: 0 0 14px rgba(180,255,80,0.3); }
    .tile-front.color-3 { border-color: rgba(255,232,64,0.6); box-shadow: 0 0 14px rgba(255,232,64,0.3); }
    .tile-front.color-4 { border-color: rgba(200,128,255,0.6); box-shadow: 0 0 14px rgba(200,128,255,0.3); }
    .tile-front.color-5 { border-color: rgba(255,160,64,0.6); box-shadow: 0 0 14px rgba(255,160,64,0.3); }
    .tile-front.color-6 { border-color: rgba(64,200,255,0.6); box-shadow: 0 0 14px rgba(64,200,255,0.3); }
    .tile-front.color-7 { border-color: rgba(255,100,180,0.6); box-shadow: 0 0 14px rgba(255,100,180,0.3); }

    .tile.matched .tile-front {
      background: linear-gradient(135deg, #0d2a18 0%, #0a1a12 100%);
      opacity: 0.5;
    }

    #hint {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font: 11px monospace; letter-spacing: 0.18em;
      pointer-events: none;
    }
    #combo-label {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font: bold 28px monospace; color: #40e8ff; pointer-events: none;
      opacity: 0; text-shadow: 0 0 18px rgba(64,232,255,1);
    }

    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(3,13,16,0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: white; text-align: center;
      z-index: 100;
    }
    #overlay h1 { font: bold 26px monospace; color: #40e8ff; margin-bottom: 8px;
      letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(64,232,255,0.9); }
    #overlay .sub { font: 13px monospace; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
    #overlay button {
      background: transparent; border: 1px solid rgba(64,232,255,0.5);
      color: #40e8ff; padding: 12px 34px; font: bold 14px monospace;
      letter-spacing: 0.1em; cursor: pointer; margin-top: 14px;
    }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">0</div>
    <div id="timer">30</div>
  </div>
  <div id="arena"></div>
  <div id="hint">MATCH PAIRS — CSS 3D RENDERER</div>
  <div id="combo-label"></div>
  <div id="overlay">
    <h1>TILE FLIP</h1>
    <div class="sub">EXP 04 · CSS3D · RENDERER TEST</div>
    <div class="sub" style="font-size:11px; color:rgba(255,255,255,0.2);">no canvas — pure CSS transforms and animations</div>
    <button id="start-btn">TAP TO START</button>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.expand();
      window.Telegram.WebApp.ready();
    }

    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const arena = document.getElementById('arena');
    const overlay = document.getElementById('overlay');
    const comboLabel = document.getElementById('combo-label');
    const hintEl = document.getElementById('hint');

    const SYMBOLS = ['★','●','▲','◆','♦','✦','⬟','❋'];
    const TIME_LIMIT = 30; // seconds, per round
    const PAIRS = 8; // 4x4 grid = 8 pairs

    let score = 0, combo = 0;
    let flipped = [], matched = [], locked = false;
    let running = false;
    let timeLeft = TIME_LIMIT;
    let timerInterval = null;
    let round = 1;
    let totalMatchTime = 0;
    let roundStart = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showCombo(text, color) {
      comboLabel.textContent = text;
      comboLabel.style.color = color || '#40e8ff';
      comboLabel.style.opacity = '1';
      setTimeout(() => { comboLabel.style.opacity = '0'; }, 500);
    }

    function buildGrid() {
      arena.innerHTML = '';
      matched = []; flipped = []; locked = false;
      const pairs = [];
      for (let i = 0; i < PAIRS; i++) pairs.push(i, i);
      shuffle(pairs);

      pairs.forEach((pairId, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.pairId = pairId;
        tile.dataset.idx = idx;

        const back = document.createElement('div');
        back.className = 'tile-face tile-back';
        back.innerHTML = '◇';

        const front = document.createElement('div');
        front.className = `tile-face tile-front color-${pairId}`;
        front.innerHTML = SYMBOLS[pairId];

        tile.appendChild(back);
        tile.appendChild(front);
        tile.addEventListener('click', () => onTileTap(tile));
        arena.appendChild(tile);
      });
    }

    function onTileTap(tile) {
      if (!running || locked) return;
      if (tile.classList.contains('flipped') || tile.classList.contains('matched')) return;
      if (flipped.length >= 2) return;

      tile.classList.add('flipped');
      flipped.push(tile);

      if (flipped.length === 2) {
        locked = true;
        const [a, b] = flipped;
        const matchTime = Date.now() - roundStart;

        if (a.dataset.pairId === b.dataset.pairId) {
          // Match!
          combo++;
          const pts = 10 + combo * 5;
          score += pts;
          scoreEl.textContent = score;
          totalMatchTime += matchTime;

          if (combo >= 3) showCombo(`x${combo} COMBO +${pts}`, '#40e8ff');
          else showCombo(`+${pts}`);

          setTimeout(() => {
            a.classList.add('matched');
            b.classList.add('matched');
            matched.push(a, b);
            flipped = [];
            locked = false;

            if (matched.length === PAIRS * 2) {
              // All matched — next round
              round++;
              timeLeft = Math.max(10, TIME_LIMIT - (round - 1) * 3);
              hintEl.textContent = `ROUND ${round}`;
              setTimeout(() => {
                hintEl.textContent = 'MATCH PAIRS — CSS 3D RENDERER';
                buildGrid();
                roundStart = Date.now();
              }, 800);
            }
          }, 300);
        } else {
          // No match
          combo = 0;
          a.classList.add('shake');
          b.classList.add('shake');
          setTimeout(() => {
            a.classList.remove('flipped', 'shake');
            b.classList.remove('flipped', 'shake');
            flipped = [];
            locked = false;
          }, 700);
        }
      }
    }

    function gameOver() {
      running = false;
      clearInterval(timerInterval);
      overlay.innerHTML = `
        <h1 style="color:#ff4466">TIME'S UP</h1>
        <div class="sub">SCORE: ${score}</div>
        <div class="sub">ROUND: ${round}</div>
        <div class="sub" style="font-size:11px; color:rgba(255,255,255,0.2);">CSS3D ONLY · NO CANVAS · NO THREE.JS</div>
        <button onclick="startGame()">PLAY AGAIN</button>
      `;
      overlay.classList.remove('hidden');
    }

    function startGame() {
      score = 0; combo = 0; round = 1;
      timeLeft = TIME_LIMIT; totalMatchTime = 0;
      scoreEl.textContent = '0';
      timerEl.textContent = timeLeft;
      buildGrid();
      overlay.classList.add('hidden');
      running = true;
      roundStart = Date.now();

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!running) return;
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 5) timerEl.style.color = '#ff4466';
        else timerEl.style.color = '#ff9040';
        if (timeLeft <= 0) gameOver();
      }, 1000);
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
  </script>
</body>
</html>
