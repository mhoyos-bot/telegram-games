<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FLOW</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080810; overflow:hidden; width:100vw; height:100vh; }
canvas { display:block; touch-action:none; }
#ui {
  position:absolute; top:0; left:0; right:0; padding:14px 18px;
  display:flex; justify-content:space-between; align-items:center;
  font-family:'Courier New',monospace; color:#fff; font-size:13px;
  pointer-events:none; letter-spacing:1px;
}
#hint {
  position:absolute; bottom:18px; left:0; right:0; text-align:center;
  font-family:'Courier New',monospace; color:rgba(255,255,255,0.35);
  font-size:11px; pointer-events:none; letter-spacing:1px;
}
</style>
</head>
<body>
<div id="ui">
  <span id="lvl">LVL 1</span>
  <span style="opacity:0.5">FLOW</span>
  <span id="score">0</span>
</div>
<div id="hint">drag from dot · connect same colour</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// FLOW — grid path connect puzzle
// Mechanic: connect_flow
// Atoms: ATOM_GRID_PATH_DRAG, ATOM_PATH_BACKTRACK, ATOM_FLOW_ENDPOINT_CONNECT, ATOM_FILL_VALIDATE

const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x080810);
document.body.appendChild(renderer.domElement);

const cam = new THREE.OrthographicCamera(-W/2, W/2, H/2, -H/2, -100, 100);
const scene = new THREE.Scene();

// ---- GRID CONFIG ----
const GN = 5;                                   // grid size
const GSIZEPX = Math.min(W, H) * 0.80;         // grid pixel footprint
const CELL = GSIZEPX / GN;                      // cell size in world units
const CGAP = 0.10;                              // gap fraction
const CVIS = CELL * (1 - CGAP);                // visual cell size
const GOX = -CELL * (GN - 1) / 2;             // grid origin x (cell [0] centre)
const GOY = -CELL * (GN - 1) / 2;             // grid origin y

// ---- COLOURS ----
// Each flow: [bright, dim, trail]
const FC = [
  [0xff3355, 0x55111e, 0xcc2244],  // red
  [0x3399ff, 0x112244, 0x2277cc],  // blue
  [0xffcc00, 0x443300, 0xccaa00],  // yellow
  [0x33ff88, 0x114422, 0x22cc66],  // green
  [0xff8833, 0x442211, 0xcc6622],  // orange
];

// ---- LEVELS ----
// Each entry: array of [colorIdx, r1,c1, r2,c2]
// r=0 = visual bottom, r=4 = visual top
const LEVELS = [
  { // LVL 1 — simple verticals + one cross
    flows:[
      [0, 4,0, 0,0],   // red: left column top↔bottom
      [1, 4,4, 0,4],   // blue: right column top↔bottom
      [2, 4,2, 0,2],   // yellow: middle column
      [3, 2,1, 2,3],   // green: mid-row short hop
    ]
  },
  { // LVL 2 — criss-cross forces routing
    flows:[
      [0, 4,0, 0,4],   // red: top-left to bottom-right
      [1, 4,4, 0,0],   // blue: top-right to bottom-left
      [2, 4,2, 2,2],   // yellow: top-mid to centre
      [3, 3,1, 1,3],   // green: diagonal hop
    ]
  },
  { // LVL 3 — 5 flows, denser routing
    flows:[
      [0, 4,0, 0,0],
      [1, 4,4, 0,4],
      [2, 4,2, 0,2],
      [3, 4,1, 0,3],
      [4, 4,3, 0,1],
    ]
  },
  { // LVL 4 — tight centre
    flows:[
      [0, 4,0, 0,4],
      [1, 4,4, 0,0],
      [2, 3,2, 1,2],
      [3, 4,2, 0,2],
    ]
  },
];

// ---- STATE ----
let curLevel = 0;
let score = 0;
let lvlStartTime = Date.now();
let grid = [];          // grid[r][c] = flowIdx | null
let flows = [];         // {ci, ep:[[r,c],[r,c]], path:[[r,c],...], complete}
let cellMeshes = [];    // [r][c] = THREE.Mesh (background cell)
let trailMeshes = [];   // flat list of trail segment meshes (rebuilt per path)
let particles = [];
let activeDrag = null;  // {fi}
let winPending = false;

// ---- HELPERS ----
function cellWorld(r, c) {
  return new THREE.Vector3(GOX + c * CELL, GOY + r * CELL, 0);
}

function worldToCell(x, y) {
  const c = Math.round((x - GOX) / CELL);
  const r = Math.round((y - GOY) / CELL);
  if (r < 0 || r >= GN || c < 0 || c >= GN) return null;
  return [r, c];
}

function isAdj(r1,c1,r2,c2) { return Math.abs(r1-r2)+Math.abs(c1-c2)===1; }

// ---- INIT ----
function initLevel() {
  while (scene.children.length) scene.remove(scene.children[0]);
  cellMeshes = [];
  trailMeshes = [];
  particles.length = 0;
  activeDrag = null;
  winPending = false;

  const lv = LEVELS[curLevel % LEVELS.length];
  grid = Array.from({length:GN}, () => Array(GN).fill(null));
  flows = lv.flows.map(([ci,r1,c1,r2,c2]) => ({
    ci, ep:[[r1,c1],[r2,c2]], path:[], complete:false,
  }));

  // Background cells
  for (let r = 0; r < GN; r++) {
    cellMeshes.push([]);
    for (let c = 0; c < GN; c++) {
      const geo = new THREE.PlaneGeometry(CVIS, CVIS);
      const mat = new THREE.MeshBasicMaterial({ color: 0x12121e });
      const m = new THREE.Mesh(geo, mat);
      m.position.copy(cellWorld(r, c));
      scene.add(m);
      cellMeshes[r].push(m);
    }
  }

  // Endpoint dots (outer ring + inner dark)
  flows.forEach(f => {
    f.ep.forEach(([r,c]) => {
      const p = cellWorld(r, c);
      const outer = new THREE.Mesh(
        new THREE.CircleGeometry(CELL * 0.31, 24),
        new THREE.MeshBasicMaterial({ color: FC[f.ci][0] })
      );
      outer.position.set(p.x, p.y, 2);
      scene.add(outer);
      const inner = new THREE.Mesh(
        new THREE.CircleGeometry(CELL * 0.14, 16),
        new THREE.MeshBasicMaterial({ color: 0x080810 })
      );
      inner.position.set(p.x, p.y, 3);
      scene.add(inner);
    });
  });

  updateUI();
}

// ---- GRID REFRESH ----
function applyPath(fi) {
  const f = flows[fi];

  // Clear old grid ownership for this flow
  for (let r = 0; r < GN; r++)
    for (let c = 0; c < GN; c++)
      if (grid[r][c] === fi) grid[r][c] = null;

  // Re-stamp
  f.path.forEach(([r,c]) => { grid[r][c] = fi; });
  redrawCells();
  rebuildTrails(fi);
}

function redrawCells() {
  for (let r = 0; r < GN; r++) {
    for (let c = 0; c < GN; c++) {
      const fi = grid[r][c];
      if (fi === null) {
        cellMeshes[r][c].material.color.setHex(0x12121e);
      } else {
        const f = flows[fi];
        const isEp = f.ep.some(([er,ec]) => er===r && ec===c);
        cellMeshes[r][c].material.color.setHex(isEp ? FC[f.ci][0] : FC[f.ci][1]);
      }
    }
  }
}

// ATOM_GRID_PATH_DRAG — trail segments between adjacent path cells
function rebuildTrails(fi) {
  // Remove old trail meshes for this flow
  trailMeshes = trailMeshes.filter(({flowIdx, mesh}) => {
    if (flowIdx === fi) { scene.remove(mesh); return false; }
    return true;
  });

  const f = flows[fi];
  if (f.path.length < 2) return;

  const colHex = FC[f.ci][2];
  const halfW = CELL * 0.22;

  for (let i = 0; i < f.path.length - 1; i++) {
    const [r1,c1] = f.path[i];
    const [r2,c2] = f.path[i+1];
    const p1 = cellWorld(r1, c1);
    const p2 = cellWorld(r2, c2);
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);
    const geo = new THREE.PlaneGeometry(len, halfW * 2);
    const mat = new THREE.MeshBasicMaterial({ color: colHex });
    const m = new THREE.Mesh(geo, mat);
    m.position.set((p1.x+p2.x)/2, (p1.y+p2.y)/2, 1);
    m.rotation.z = angle;
    scene.add(m);
    trailMeshes.push({ flowIdx: fi, mesh: m });
  }
}

// ---- WIN CHECK ----
function allConnected() { return flows.every(f => f.complete); }

function fillRatio() {
  let filled = 0;
  for (let r = 0; r < GN; r++)
    for (let c = 0; c < GN; c++)
      if (grid[r][c] !== null) filled++;
  return filled / (GN * GN);
}

// ---- PARTICLES ----
function burst(r, c, colHex, n) {
  const p = cellWorld(r, c);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 4;
    const sz = CELL * 0.06 + Math.random() * CELL * 0.06;
    const geo = new THREE.CircleGeometry(sz, 6);
    const mat = new THREE.MeshBasicMaterial({ color: colHex, transparent: true, opacity: 1 });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(p.x + (Math.random()-.5)*CELL*.3, p.y + (Math.random()-.5)*CELL*.3, 4);
    scene.add(m);
    particles.push({ mesh:m, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:1, dec: .04+Math.random()*.03 });
  }
}

// ---- WIN SEQUENCE ----
function triggerWin() {
  winPending = true;
  const elapsed = Math.max(1, (Date.now() - lvlStartTime) / 1000);
  const fill = fillRatio();
  const pts = Math.round(800 / elapsed) + Math.round(fill * 200);
  score += pts;

  flows.forEach(f => {
    f.ep.forEach(([r,c]) => burst(r, c, FC[f.ci][0], 16));
  });

  document.getElementById('hint').textContent = `+${pts}  ·  fill ${Math.round(fill*100)}%  ·  next!`;
  document.getElementById('score').textContent = score;

  setTimeout(() => {
    curLevel++;
    lvlStartTime = Date.now();
    document.getElementById('hint').textContent = 'drag from dot · connect same colour';
    initLevel();
  }, 1500);
}

// ---- INPUT ----
function evtWorld(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: cx - W/2, y: H/2 - cy };
}

// ATOM_GRID_PATH_DRAG: resolve which flow to drag, set activeDrag
function onDown(e) {
  e.preventDefault();
  if (winPending) return;
  const {x, y} = evtWorld(e);
  const cell = worldToCell(x, y);
  if (!cell) return;
  const [r, c] = cell;

  // Prefer starting from an endpoint
  let fi = flows.findIndex(f => f.ep.some(([er,ec]) => er===r && ec===c));
  if (fi === -1) {
    fi = grid[r][c];
    if (fi === null) return;
  }

  const f = flows[fi];
  // Restart from the nearest endpoint of this flow to the tap
  const ep = f.ep.reduce((best, ep) => {
    const da = Math.abs(ep[0]-r)+Math.abs(ep[1]-c);
    const db = Math.abs(best[0]-r)+Math.abs(best[1]-c);
    return da < db ? ep : best;
  }, f.ep[0]);

  f.complete = false;
  f.path = [[ep[0], ep[1]]];
  applyPath(fi);
  activeDrag = { fi };
}

// ATOM_PATH_BACKTRACK: if new cell matches path[-2], pop last cell instead of appending
function onMove(e) {
  e.preventDefault();
  if (!activeDrag || winPending) return;
  const {x, y} = evtWorld(e);
  const cell = worldToCell(x, y);
  if (!cell) return;
  const [r, c] = cell;
  const fi = activeDrag.fi;
  const f = flows[fi];
  const path = f.path;
  if (!path.length) return;

  const [lr, lc] = path[path.length - 1];
  if (lr === r && lc === c) return;
  if (!isAdj(lr, lc, r, c)) return;

  // Backtrack: finger retraced to second-to-last cell
  if (path.length >= 2) {
    const [pr, pc] = path[path.length - 2];
    if (pr === r && pc === c) {
      path.pop();
      applyPath(fi);
      return;
    }
  }

  // Can't enter cell owned by a different flow
  const owner = grid[r][c];
  if (owner !== null && owner !== fi) return;

  // Can't enter another flow's endpoint
  const blockedByOtherEp = flows.some((of, ofi) => ofi !== fi && of.ep.some(([er,ec]) => er===r && ec===c));
  if (blockedByOtherEp) return;

  // ATOM_FLOW_ENDPOINT_CONNECT: detect arrival at the target endpoint
  const startEp = path[0];
  const otherEp = f.ep.find(([er,ec]) => !(er===startEp[0] && ec===startEp[1]));
  if (otherEp && r === otherEp[0] && c === otherEp[1]) {
    path.push([r, c]);
    f.complete = true;
    applyPath(fi);
    activeDrag = null;
    burst(r, c, FC[f.ci][0], 10);
    if (allConnected()) triggerWin();
    return;
  }

  // If cell already in own path (self-intersect): trim back to it
  const existIdx = path.findIndex(([pr,pc]) => pr===r && pc===c);
  if (existIdx !== -1) {
    f.path = path.slice(0, existIdx + 1);
    applyPath(fi);
    return;
  }

  path.push([r, c]);
  applyPath(fi);
}

function onUp(e) { activeDrag = null; }

renderer.domElement.addEventListener('mousedown', onDown);
renderer.domElement.addEventListener('mousemove', onMove);
renderer.domElement.addEventListener('mouseup', onUp);
renderer.domElement.addEventListener('touchstart', onDown, { passive: false });
renderer.domElement.addEventListener('touchmove', onMove, { passive: false });
renderer.domElement.addEventListener('touchend', onUp);

// ---- ANIMATION LOOP ----
function updateUI() {
  document.getElementById('lvl').textContent = `LVL ${curLevel + 1}`;
  document.getElementById('score').textContent = score;
}

let lastTs = 0;
function animate(ts) {
  requestAnimationFrame(animate);
  lastTs = ts;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.vy -= 0.10;
    p.life -= p.dec;
    p.mesh.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
  }
  renderer.render(scene, cam);
}

initLevel();
animate(0);
</script>
</body>
</html>
