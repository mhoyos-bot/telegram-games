<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wild Run</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#04030d; touch-action:none; }
canvas { display:block; position:fixed; top:0; left:0; }
#ui { position:fixed; inset:0; pointer-events:none; font-family:'Arial Black',Arial,sans-serif; }

#score {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  font-size:38px; font-weight:900; color:#fff; letter-spacing:3px;
  text-shadow:0 0 16px #7f4,0 0 32px #7f4,1px 1px 0 #000;
}
#dist {
  position:absolute; top:62px; left:50%; transform:translateX(-50%);
  font-size:13px; color:#4a6; letter-spacing:2px;
}
#combo {
  position:absolute; top:88px; left:50%; transform:translateX(-50%);
  font-size:19px; color:#fc0; text-shadow:0 0 10px #fc0;
  opacity:0; white-space:nowrap; transition:opacity 0.15s;
}
#flash { position:fixed; inset:0; background:rgba(255,30,20,0.2); opacity:0; pointer-events:none; }

#overlay {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(4,3,13,0.88);
}
.ot {
  font-size:52px; font-weight:900; letter-spacing:6px;
  background:linear-gradient(135deg,#7f4,#4f9,#cf0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:4px;
}
.os { font-size:14px; color:#4a6; letter-spacing:3px; margin-bottom:28px; text-transform:uppercase; }
.of { font-size:22px; color:#fc0; margin-bottom:18px; display:none; }
.ob { font-size:21px; color:#fff; animation:blink 1.1s ease-in-out infinite; }

#hint {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  font-size:12px; color:#2a3; letter-spacing:2px;
}

@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.95)} }
</style>
</head>
<body>
<div id="ui">
  <div id="score">0</div>
  <div id="dist">0m</div>
  <div id="combo"></div>
  <div id="flash"></div>
  <div id="overlay">
    <div class="ot">WILD RUN</div>
    <div class="os" id="os">Sprint the ancient forest</div>
    <div class="of" id="of"></div>
    <div class="ob" id="ob">TAP TO BEGIN</div>
  </div>
  <div id="hint">← SWIPE → LANES  |  TAP JUMP</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// WILD RUN v01 | Lane 001 Wild Lands | lc_lane_001_unknown_b9c6dd
// Fox-spirit endless runner | Three.js | Telegram Mini App

if (window.Telegram?.WebApp) window.Telegram.WebApp.ready();

// ─── RENDERER ───────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04030d);
scene.fog = new THREE.FogExp2(0x04030d, 0.040);

const cam = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 100);
cam.position.set(0, 3.6, 8.2);
cam.lookAt(0, 0.6, 0);

// ─── LIGHTS ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x102008, 2.5));
const moonLight = new THREE.DirectionalLight(0x4488cc, 1.8);
moonLight.position.set(-3, 12, 4);
scene.add(moonLight);
const glowLight = new THREE.PointLight(0x66ff44, 1.2, 12);
glowLight.position.set(0, 2, 0);
scene.add(glowLight);

// ─── UI ─────────────────────────────────────────────────────────────────────
const $score   = document.getElementById('score');
const $dist    = document.getElementById('dist');
const $combo   = document.getElementById('combo');
const $flash   = document.getElementById('flash');
const $overlay = document.getElementById('overlay');
const $os      = document.getElementById('os');
const $of      = document.getElementById('of');
const $ob      = document.getElementById('ob');

// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const LANES      = [-1.75, 0, 1.75];
const GRAV       = -25;
const JUMP_V     = 11.2;
const TRACK_W    = 5.8;
const TILE_D     = 5.5;
const TILE_N     = 16;
const CULL_Z     = 11;
const SPAWN_DIST = 38;

// ─── GAME STATE ─────────────────────────────────────────────────────────────
let STATE = 'idle';
let score = 0, meters = 0, speed = 0, elapsed = 0;
let combo = 0, comboTimer = 0;
let shake = 0, cShX = 0, cShY = 0;
let spawnTimer = 0;
let best = +localStorage.getItem('wr_best') || 0;

// Player physics
let lane = 1, tgtLane = 1;
let px = 0, py = 0, vy = 0, grounded = true;

// ─── FOX MODEL ──────────────────────────────────────────────────────────────
const foxGroup = new THREE.Group();
scene.add(foxGroup);

function toon(col) { return new THREE.MeshToonMaterial({ color: col }); }
function basic(col) { return new THREE.MeshBasicMaterial({ color: col }); }

// Body
const fBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.55, 0.85), toon(0xdd7722));
fBody.position.set(0, 0.38, 0);
foxGroup.add(fBody);

// Head
const fHead = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.48, 0.52), toon(0xee8833));
fHead.position.set(0, 0.85, 0.22);
foxGroup.add(fHead);

// Snout
const fSnout = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.2, 0.25), toon(0xffddaa));
fSnout.position.set(0, 0.76, 0.48);
foxGroup.add(fSnout);

// Ears
const earGeo = new THREE.ConeGeometry(0.13, 0.28, 4);
const earMat = toon(0xee7722);
const earL = new THREE.Mesh(earGeo, earMat);
earL.position.set(-0.18, 1.15, 0.22);
earL.rotation.z = 0.15;
const earR = earL.clone();
earR.position.set(0.18, 1.15, 0.22);
earR.rotation.z = -0.15;
foxGroup.add(earL, earR);

// Eyes (white base + dark pupil)
const eyeW = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.04), basic(0xffffff));
eyeW.position.set(-0.14, 0.88, 0.46);
const eyeW2 = eyeW.clone(); eyeW2.position.set(0.14, 0.88, 0.46);
const pupilGeo = new THREE.BoxGeometry(0.06, 0.06, 0.03);
const pupilMat = basic(0x111122);
const eyeP  = new THREE.Mesh(pupilGeo, pupilMat);
eyeP.position.set(-0.14, 0.88, 0.48);
const eyeP2 = eyeP.clone(); eyeP2.position.set(0.14, 0.88, 0.48);
foxGroup.add(eyeW, eyeW2, eyeP, eyeP2);

// Tail (big fluffy)
const tailGeo = new THREE.SphereGeometry(0.35, 5, 4);
const tail = new THREE.Mesh(tailGeo, toon(0xee8833));
tail.scale.set(0.65, 0.65, 1.2);
tail.position.set(0, 0.45, -0.52);
foxGroup.add(tail);
const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.18, 4, 3), toon(0xfff0e0));
tailTip.position.set(0, 0.5, -0.82);
foxGroup.add(tailTip);

// Glow aura around fox
const auraGeo = new THREE.SphereGeometry(0.7, 8, 6);
const auraMat = new THREE.MeshBasicMaterial({ color: 0x44ff66, transparent: true, opacity: 0.06 });
const aura = new THREE.Mesh(auraGeo, auraMat);
aura.position.set(0, 0.55, 0);
foxGroup.add(aura);

// ─── PARTICLES ──────────────────────────────────────────────────────────────
const POOL = 160;
const particles = [];
const pGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);

for (let i = 0; i < POOL; i++) {
  const m = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
  m.visible = false;
  scene.add(m);
  particles.push({ m, vx:0, vy:0, vz:0, t:1, maxT:1 });
}

function burst(x, y, z, col, n = 10) {
  let spawned = 0;
  for (const p of particles) {
    if (p.t >= p.maxT && spawned < n) {
      p.m.position.set(x, y, z);
      p.m.material.color.setHex(col);
      p.m.material.opacity = 1;
      p.m.scale.setScalar(1);
      p.m.visible = true;
      const a = Math.random() * Math.PI * 2;
      const sp = 3 + Math.random() * 7;
      p.vx = Math.cos(a) * sp * 0.6;
      p.vy = 2.5 + Math.random() * 8;
      p.vz = Math.sin(a) * sp * 0.4 - 1.5;
      p.t = 0;
      p.maxT = 0.3 + Math.random() * 0.5;
      spawned++;
    }
  }
}

// ─── TRAIL ──────────────────────────────────────────────────────────────────
const TRAIL_N = 20;
const trail = [];
const trGeo = new THREE.SphereGeometry(0.09, 4, 3);
for (let i = 0; i < TRAIL_N; i++) {
  const m = new THREE.Mesh(trGeo, new THREE.MeshBasicMaterial({ color:0x44ff66, transparent:true, opacity:0 }));
  scene.add(m);
  trail.push({ m, life: 0 });
}
let trailIdx = 0, trailTick = 0;

// ─── TERRAIN ────────────────────────────────────────────────────────────────
const tileColors = [0x0b1508, 0x0d1a0a, 0x091205, 0x0f1e0c, 0x0a1407];
const tiles = [];
for (let i = 0; i < TILE_N; i++) {
  const geo = new THREE.BoxGeometry(TRACK_W, 0.35, TILE_D);
  const mat = new THREE.MeshToonMaterial({ color: tileColors[i % tileColors.length] });
  const t = new THREE.Mesh(geo, mat);
  t.position.set(0, -0.175, -TILE_D * i);
  scene.add(t);
  tiles.push(t);
}

// Ground glow strip (center lane indicator)
const stripGeo = new THREE.PlaneGeometry(0.25, TILE_D * TILE_N);
const stripMat = new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.035 });
const strip = new THREE.Mesh(stripGeo, stripMat);
strip.rotation.x = -Math.PI / 2;
strip.position.set(0, 0.01, -TILE_D * TILE_N / 2);
scene.add(strip);

// Forest trees (side decoration pool, static + reused)
const TREE_N = 24;
const trees = [];
function makeTree(side) {
  const g = new THREE.Group();
  const trunkH = 0.9 + Math.random() * 1.2;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.16, trunkH, 5),
    new THREE.MeshToonMaterial({ color: 0x2a1a08 })
  );
  trunk.position.y = trunkH * 0.5;
  g.add(trunk);
  // 2-3 cone layers
  const layers = 2 + (Math.random() > 0.5 ? 1 : 0);
  for (let k = 0; k < layers; k++) {
    const r = (0.45 + Math.random() * 0.35) * (1 - k * 0.2);
    const h = r * 1.8;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(r, h, 5),
      new THREE.MeshToonMaterial({ color: k === 0 ? 0x0d2208 : 0x163310 })
    );
    cone.position.y = trunkH * 0.7 + k * (h * 0.55);
    g.add(cone);
    // Occasional glow wisp on tree
    if (Math.random() > 0.75) {
      const wisp = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 4, 3),
        new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0x66ff44 : 0x44ccff, transparent: true, opacity: 0.7 })
      );
      wisp.position.set((Math.random()-0.5)*r*1.5, trunkH * 0.8 + h * 0.5, 0);
      g.add(wisp);
    }
  }
  g.visible = false;
  scene.add(g);
  trees.push({ g, side, active: false });
  return trees[trees.length - 1];
}
for (let i = 0; i < TREE_N; i++) makeTree(i % 2 === 0 ? -1 : 1);

let treeSpawnTimer = 0;
const activeTreeZ = [];

// ─── OBSTACLES ──────────────────────────────────────────────────────────────
const OBS_N = 18;
const obsPool = [];
const obsGeos = [
  new THREE.DodecahedronGeometry(0.4, 0),
  new THREE.BoxGeometry(0.6, 0.7, 0.6),
  new THREE.ConeGeometry(0.35, 0.85, 5),
];
const obsMats = [
  new THREE.MeshToonMaterial({ color: 0x331122 }),
  new THREE.MeshToonMaterial({ color: 0x4a1a10 }),
  new THREE.MeshToonMaterial({ color: 0x280a18 }),
];
for (let i = 0; i < OBS_N; i++) {
  const m = new THREE.Mesh(obsGeos[i % 3], obsMats[i % 3]);
  m.visible = false;
  scene.add(m);
  obsPool.push({ m, active: false });
}

// ─── COLLECTIBLES (WISPS) ───────────────────────────────────────────────────
const WISP_N = 36;
const wispPool = [];
const wispCols = [0x66ff44, 0x44ffdd, 0xffdd22, 0xcc44ff, 0x44aaff];
for (let i = 0; i < WISP_N; i++) {
  const col = wispCols[i % wispCols.length];
  const geo = new THREE.SphereGeometry(0.2, 6, 4);
  const mat = new THREE.MeshBasicMaterial({ color: col });
  const m = new THREE.Mesh(geo, mat);
  m.visible = false;
  scene.add(m);
  // Inner glow
  const inner = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 4, 3),
    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 })
  );
  m.add(inner);
  wispPool.push({ m, active: false, baseY: 0.65, col });
}

// ─── SPAWN SYSTEM ───────────────────────────────────────────────────────────
function getFree(pool) { return pool.find(p => !p.active); }

function spawnObstacle(z) {
  const obs = getFree(obsPool);
  if (!obs) return null;
  const l = Math.floor(Math.random() * 3);
  obs.m.position.set(LANES[l], 0.38, z);
  obs.m.scale.setScalar(0.8 + Math.random() * 0.4);
  obs.m.rotation.set(Math.random(), Math.random() * Math.PI, 0);
  obs.m.visible = true;
  obs.active = true;
  obs.lane = l;
  return obs;
}

function spawnWisp(z, laneIdx, y = 0.65) {
  const w = getFree(wispPool);
  if (!w) return;
  w.m.position.set(LANES[laneIdx], y, z);
  w.m.visible = true;
  w.active = true;
  w.baseY = y;
}

function spawnBatch(z) {
  const r = Math.random();
  if (r < 0.28) {
    // Obstacle + safe wisps
    const obs = spawnObstacle(z);
    if (obs) {
      const safe = [0,1,2].filter(l => l !== obs.lane);
      spawnWisp(z + 1.2, safe[Math.floor(Math.random() * safe.length)]);
      if (Math.random() > 0.5) spawnWisp(z - 2, safe[Math.floor(Math.random() * safe.length)]);
    }
  } else if (r < 0.55) {
    // Wisp trail (3-4 in a row, same lane)
    const l = Math.floor(Math.random() * 3);
    const n = 3 + (Math.random() > 0.5 ? 1 : 0);
    for (let i = 0; i < n; i++) spawnWisp(z - i * 2.4, l);
  } else if (r < 0.78) {
    // Two parallel wisps
    const l1 = Math.floor(Math.random() * 3);
    const l2 = (l1 + 1 + Math.floor(Math.random() * 2)) % 3;
    spawnWisp(z, l1); spawnWisp(z - 2.8, l2);
  } else if (r < 0.90) {
    // Overhead jump arc
    const obs = spawnObstacle(z);
    if (obs) {
      // Wisp above obstacle (jump reward)
      spawnWisp(z, obs.lane, 1.85);
      // Wisps flanking on ground
      [0,1,2].filter(l => l !== obs.lane).forEach(l => {
        if (Math.random() > 0.4) spawnWisp(z - 1.5, l);
      });
    }
  } else {
    // Double obstacles with gap
    const l1 = 0, l2 = 2;
    spawnObstacle(z);
    // Already set to random lane above -- redo properly:
    const o1 = getFree(obsPool); if (o1) { o1.m.position.set(LANES[0],0.38,z); o1.m.scale.setScalar(0.9); o1.m.visible=true; o1.active=true; o1.lane=0; }
    const o2 = getFree(obsPool); if (o2) { o2.m.position.set(LANES[2],0.38,z); o2.m.scale.setScalar(0.9); o2.m.visible=true; o2.active=true; o2.lane=2; }
    spawnWisp(z, 1); // safe middle
  }
}

function spawnTree(z) {
  const t = getFree(trees);
  if (!t) return;
  const side = Math.random() > 0.5 ? 1 : -1;
  const x = side * (TRACK_W / 2 + 0.6 + Math.random() * 2.5);
  t.g.position.set(x, 0, z);
  t.g.scale.setScalar(0.7 + Math.random() * 0.6);
  t.g.rotation.y = Math.random() * Math.PI;
  t.g.visible = true;
  t.active = true;
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
let tSX = 0, tSY = 0;

function doJump() {
  if (!grounded) return;
  vy = JUMP_V; grounded = false;
  burst(px, 0.1, 0, 0x44ff66, 7);
}
function doLane(dir) {
  if (dir > 0 && tgtLane < 2) tgtLane++;
  else if (dir < 0 && tgtLane > 0) tgtLane--;
}
function handleInput(dir = 0) {
  if (STATE !== 'play') { startGame(); return; }
  if (dir === 0) doJump();
  else doLane(dir);
}

addEventListener('click', () => handleInput(0));
addEventListener('touchstart', e => { tSX = e.touches[0].clientX; tSY = e.touches[0].clientY; }, { passive:true });
addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tSX;
  const dy = e.changedTouches[0].clientY - tSY;
  if (Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy)) handleInput(dx > 0 ? 1 : -1);
  else handleInput(0);
}, { passive:true });
addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleInput(0); }
  else if (e.code === 'ArrowLeft')  handleInput(-1);
  else if (e.code === 'ArrowRight') handleInput(1);
});

// ─── GAME FLOW ───────────────────────────────────────────────────────────────
function resetPools() {
  obsPool.forEach(p  => { p.m.visible = false; p.active = false; });
  wispPool.forEach(p => { p.m.visible = false; p.active = false; });
  trees.forEach(p    => { p.g.visible = false; p.active = false; });
}

function startGame() {
  resetPools();
  score = 0; meters = 0; speed = 10; elapsed = 0;
  lane = 1; tgtLane = 1; px = 0;
  py = 0; vy = 0; grounded = true;
  combo = 0; comboTimer = 0;
  spawnTimer = 0;
  treeSpawnTimer = 0;

  tiles.forEach((t, i) => t.position.z = -TILE_D * i);

  // Pre-spawn initial content
  for (let i = 0; i < 7; i++) spawnBatch(-(14 + i * 5.5));
  for (let i = 0; i < 5; i++) spawnTree(-(8 + i * 7));
  spawnTimer = 1.0;

  $score.textContent = '0';
  $dist.textContent  = '0m';
  $combo.style.opacity = '0';
  $overlay.style.display = 'none';

  STATE = 'play';
}

function die() {
  STATE = 'dead';
  shake = 0.6;
  burst(px, 0.8, 0, 0xff4422, 28);
  burst(px, 0.8, 0, 0xffaa22, 18);

  // Flash
  $flash.style.opacity = '1';
  setTimeout(() => { $flash.style.opacity = '0'; }, 180);

  const nb = score > best;
  if (nb) { best = score; localStorage.setItem('wr_best', best); }

  const $ot = document.querySelector('.ot');
  $ot.textContent = 'GAME OVER';
  $os.textContent = nb ? '★ NEW BEST! ★' : 'The forest claims you...';
  $of.textContent = `SCORE: ${score}   BEST: ${best}`;
  $of.style.display = 'block';
  $ob.textContent = 'TAP TO RUN AGAIN';
  $overlay.style.display = 'flex';
}

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  const dt  = Math.min(clock.getDelta(), 0.05);
  const T   = clock.elapsedTime;

  if (STATE === 'play') {
    elapsed += dt;
    speed    = 10 + elapsed * 0.26;
    meters  += speed * dt;
    score   += Math.ceil(dt * speed * 1.5);
    $score.textContent = score;
    $dist.textContent  = Math.floor(meters) + 'm';

    const dz = speed * dt;

    // Lane slide
    px += (LANES[tgtLane] - px) * 11 * dt;

    // Jump physics
    if (!grounded) {
      vy += GRAV * dt;
      py += vy * dt;
      if (py <= 0) {
        py = 0; vy = 0; grounded = true;
        burst(px, 0.08, 0, 0x335522, 5);
      }
    }

    foxGroup.position.set(px, py, 0);

    // Fox body bob + run animation
    fBody.rotation.z = Math.sin(elapsed * 10) * 0.06;
    fHead.rotation.z = Math.sin(elapsed * 10 + 0.5) * 0.04;
    tail.rotation.x = Math.sin(elapsed * 6) * 0.2;
    // Squash on landing / stretch on jump
    if (!grounded) {
      foxGroup.scale.set(0.88, 1.12, 0.95);
    } else {
      const bobScale = 1 + Math.sin(elapsed * 10) * 0.04;
      foxGroup.scale.set(1, bobScale, 1);
    }

    // Glow pulse
    auraMat.opacity = 0.04 + Math.sin(T * 3) * 0.025;
    glowLight.position.set(px, 2, 0);
    glowLight.intensity = 0.9 + Math.sin(T * 4) * 0.3;

    // Combo decay
    if (comboTimer > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) { combo = 0; $combo.style.opacity = '0'; }
    }

    // Trail
    trailTick += dt;
    if (trailTick > 0.038) {
      trailTick = 0;
      const tp = trail[trailIdx % TRAIL_N];
      tp.m.position.set(px, py + 0.42, 0.08);
      tp.m.material.opacity = 0.55;
      tp.life = 1;
      trailIdx = (trailIdx + 1) % TRAIL_N;
    }

    // Scroll tiles
    tiles.forEach(t => {
      t.position.z += dz;
      if (t.position.z > 9) t.position.z -= TILE_N * TILE_D;
    });

    // Scroll + collide obstacles
    for (const obs of obsPool) {
      if (!obs.active) continue;
      obs.m.position.z += dz;
      obs.m.rotation.y += dt * 1.6;
      if (obs.m.position.z > CULL_Z) { obs.m.visible = false; obs.active = false; continue; }
      const dx = Math.abs(obs.m.position.x - px);
      const dz2= Math.abs(obs.m.position.z);
      const dy2= Math.abs(obs.m.position.y - (py + 0.4));
      if (dx < 0.5 && dz2 < 0.8 && dy2 < 0.6) { die(); return; }
    }

    // Scroll + collect wisps
    for (const w of wispPool) {
      if (!w.active) continue;
      w.m.position.z += dz;
      w.m.rotation.y += dt * 2.5;
      w.m.position.y = w.baseY + Math.sin(T * 3.5 + w.m.position.x * 2) * 0.12;
      // Pulse scale
      const s = 0.9 + Math.sin(T * 5 + w.m.position.x) * 0.12;
      w.m.scale.setScalar(s);
      if (w.m.position.z > CULL_Z) { w.m.visible = false; w.active = false; continue; }
      const dx = Math.abs(w.m.position.x - px);
      const dz2= Math.abs(w.m.position.z);
      const dy2= Math.abs(w.m.position.y - (py + 0.65));
      if (dx < 0.58 && dz2 < 1.05 && dy2 < 0.72) {
        burst(w.m.position.x, w.m.position.y, 0, w.col, 14);
        w.m.visible = false; w.active = false;
        combo++;
        const pts = 10 * Math.min(combo, 5);
        score += pts;
        if (combo >= 2) {
          $combo.textContent = `×${Math.min(combo,5)} SPIRIT COMBO  +${pts}`;
          $combo.style.opacity = '1';
          comboTimer = 1.8;
        }
      }
    }

    // Scroll trees
    for (const t of trees) {
      if (!t.active) continue;
      t.g.position.z += dz;
      if (t.g.position.z > 14) { t.g.visible = false; t.active = false; }
    }

    // Spawn content
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnBatch(-SPAWN_DIST);
      spawnTimer = Math.max(0.32, 0.85 - elapsed * 0.004);
    }

    // Spawn trees
    treeSpawnTimer -= dt;
    if (treeSpawnTimer <= 0) {
      spawnTree(-SPAWN_DIST - 4 + Math.random() * 6);
      treeSpawnTimer = 0.5 + Math.random() * 0.8;
    }
  }

  // Update trail (always)
  for (const tp of trail) {
    if (tp.life > 0) {
      tp.life -= dt * 4;
      tp.m.material.opacity = Math.max(0, tp.life * 0.55);
    }
  }

  // Update particles (always)
  for (const p of particles) {
    if (p.t < p.maxT) {
      p.t += dt;
      const ratio = p.t / p.maxT;
      p.vy += GRAV * 0.35 * dt;
      p.m.position.x += p.vx * dt;
      p.m.position.y += p.vy * dt;
      p.m.position.z += p.vz * dt;
      p.m.material.opacity = (1 - ratio) * 0.9;
      p.m.scale.setScalar(1 - ratio * 0.5);
      if (p.t >= p.maxT) p.m.visible = false;
    }
  }

  // Camera shake
  if (shake > 0) {
    shake = Math.max(0, shake - dt * 5);
    cShX = (Math.random() - 0.5) * shake * 0.4;
    cShY = (Math.random() - 0.5) * shake * 0.25;
  } else {
    cShX *= 0.82; cShY *= 0.82;
  }
  cam.position.set(cShX, 3.6 + cShY, 8.2);

  renderer.render(scene, cam);
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

tick();
</script>
</body>
</html>
